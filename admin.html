<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel - RJ Ailiverse</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as LucideIcons from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, onSnapshot, deleteDoc, updateDoc, setDoc } from 'firebase/firestore';

        // 1. เชื่อมต่อ Firebase (รหัสเดียวกับหน้าเว็บหลัก)
        const fbP1 = "AIzaSyBs275"; const fbP2 = "NY99gdv1uZdAnb"; const fbP3 = "mx3UlWO8K4o5a0";
        let fbConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
            ? JSON.parse(__firebase_config) : { apiKey: fbP1 + fbP2 + fbP3, authDomain: "e-learning-with-fah-ai.firebaseapp.com", projectId: "e-learning-with-fah-ai", storageBucket: "e-learning-with-fah-ai.firebasestorage.app", messagingSenderId: "418946105960", appId: "1:418946105960:web:728e28070790975df231dd" };
        
        const app = initializeApp(fbConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? String(__app_id).replace(/\//g, '-') : 'fah-elearning-prod';

        function AdminApp() {
            const [users, setUsers] = useState([]);
            const [settings, setSettings] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState("");
            const [activeTab, setActiveTab] = useState('users');
            const [searchQuery, setSearchQuery] = useState("");
            const [user, setUser] = useState(null);

            // Effect ที่ 1: จัดการการยืนยันตัวตน (Authentication) ให้เสร็จก่อน
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error", err);
                        setError("เกิดข้อผิดพลาดในการเชื่อมต่อระบบยืนยันตัวตน โปรดรีเฟรชหน้าเว็บ");
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Effect ที่ 2: ดึงข้อมูลหลังจากยืนยันตัวตนสำเร็จแล้ว
            useEffect(() => {
                if (!user) return; // Guard ป้องกันการดึงข้อมูลก่อน Auth เสร็จ

                // ดึงข้อมูลผู้ใช้งานแบบ Real-time
                const unsubUsers = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'elearning_users'), (snapshot) => {
                    const data = [];
                    snapshot.forEach(d => data.push({ ...d.data(), id: d.id }));
                    // เรียงคะแนนจากมากไปน้อย
                    data.sort((a,b) => (b.progress || 0) - (a.progress || 0));
                    setUsers(data);
                    setLoading(false);
                }, err => setError(err.message));

                // ดึงข้อมูลการตั้งค่าแบบ Real-time
                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_config', 'settings'), (docSnap) => {
                    if (docSnap.exists()) {
                        setSettings(docSnap.data());
                    } else {
                        setSettings({
                            appsScriptUrl: "", certScriptUrl: "",
                            liveConfig: { status: 'offline', topic: '', url: '', allowPosttest: false }
                        });
                    }
                }, err => setError(err.message));

                return () => { unsubUsers(); unsubSettings(); };
            }, [user]);

            const handleDeleteUser = async (id, name) => {
                if (window.confirm(`ยืนยันการลบข้อมูลผู้ใช้งาน: ${name} ใช่หรือไม่?`)) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', id));
                        alert('ลบข้อมูลสำเร็จ');
                    } catch (err) {
                        alert('ลบข้อมูลไม่สำเร็จ: ' + err.message);
                    }
                }
            };

            const handleSaveSettings = async () => {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_config', 'settings'), settings, { merge: true });
                    alert('บันทึกการตั้งค่าระบบเรียบร้อยแล้ว');
                } catch (err) {
                    alert('บันทึกไม่สำเร็จ: ' + err.message);
                }
            };

            // ระบบค้นหาผู้ใช้
            const filteredUsers = users.filter(u => 
                (u.name || '').toLowerCase().includes(searchQuery.toLowerCase()) || 
                (u.hospital || '').toLowerCase().includes(searchQuery.toLowerCase())
            );

            // หากมี Error จาก Firebase
            if (error) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-900 text-rose-500 font-bold p-6 text-center">
                        <LucideIcons.AlertTriangle size={64} className="mb-4" />
                        <h2 className="text-2xl mb-2">ระบบฐานข้อมูลขัดข้อง</h2>
                        <p className="text-slate-400">{error}</p>
                    </div>
                );
            }

            // หน้าจอโหลด
            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white font-bold text-xl tracking-widest">
                        <LucideIcons.Loader className="animate-spin mr-3 text-blue-500" size={32} /> LOADING DASHBOARD...
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-900 text-slate-200">
                    {/* Header */}
                    <div className="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50 shadow-md">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-lg md:text-2xl font-black flex items-center gap-2 text-white">
                                <LucideIcons.ShieldCheck className="text-emerald-500" />
                                RJ Ailiverse <span className="hidden md:inline text-slate-400">| Executive Admin</span>
                            </h1>
                            <a href="./index.html" className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors flex items-center gap-2 shadow-sm border border-slate-600">
                                <LucideIcons.ArrowLeft size={16} /> <span className="hidden md:inline">กลับหน้าห้องเรียน</span>
                            </a>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
                        
                        {/* Sidebar Menu */}
                        <div className="md:col-span-1 flex flex-row md:flex-col gap-2 overflow-x-auto custom-scrollbar pb-2 md:pb-0">
                            <button onClick={() => setActiveTab('users')} className={`shrink-0 md:w-full text-left px-5 py-4 rounded-2xl font-bold flex items-center gap-3 transition-all ${activeTab === 'users' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'bg-slate-800 hover:bg-slate-700 text-slate-400 border border-slate-700'}`}>
                                <LucideIcons.Users size={20} /> จัดการผู้เรียน
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`shrink-0 md:w-full text-left px-5 py-4 rounded-2xl font-bold flex items-center gap-3 transition-all ${activeTab === 'settings' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/30' : 'bg-slate-800 hover:bg-slate-700 text-slate-400 border border-slate-700'}`}>
                                <LucideIcons.Settings size={20} /> ตั้งค่าระบบไลฟ์
                            </button>
                        </div>

                        {/* Main Content */}
                        <div className="md:col-span-3 bg-slate-800 rounded-[2rem] border border-slate-700 p-6 min-h-[600px] flex flex-col shadow-xl">
                            
                            {/* TAB 1: USERS */}
                            {activeTab === 'users' && (
                                <div className="flex flex-col h-full animate-in fade-in">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                                        <h2 className="text-xl font-black flex items-center gap-2 text-white"><LucideIcons.Users className="text-blue-400"/> ฐานข้อมูลผู้เรียน ({users.length} คน)</h2>
                                        <div className="flex items-center bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 w-full md:w-64 focus-within:border-blue-500 transition-colors">
                                            <LucideIcons.Search size={16} className="text-slate-500 mr-2" />
                                            <input type="text" placeholder="ค้นหาชื่อ หรือ รพ..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="bg-transparent border-none outline-none text-sm w-full text-white placeholder-slate-500" />
                                        </div>
                                    </div>

                                    <div className="flex-1 overflow-x-auto custom-scrollbar rounded-xl border border-slate-700 bg-slate-900/50">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-slate-900 text-slate-400 sticky top-0 z-10 shadow-sm">
                                                <tr>
                                                    <th className="px-5 py-4 font-bold">ชื่อ-สกุล / สิทธิ์</th>
                                                    <th className="px-5 py-4 font-bold">หน่วยงาน</th>
                                                    <th className="px-5 py-4 font-bold text-center">เวลาเรียน</th>
                                                    <th className="px-5 py-4 font-bold text-center">Empathy Score</th>
                                                    <th className="px-5 py-4 font-bold text-center">จัดการ</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800">
                                                {filteredUsers.length === 0 ? (
                                                    <tr><td colSpan="5" className="px-5 py-12 text-center text-slate-500 font-medium"><LucideIcons.SearchX size={32} className="mx-auto mb-2 opacity-50"/> ไม่พบข้อมูลที่ค้นหา</td></tr>
                                                ) : filteredUsers.map(u => {
                                                    const empathyScore = u.skillLabHistory && u.skillLabHistory.length > 0 ? u.skillLabHistory[u.skillLabHistory.length-1].score : '-';
                                                    return (
                                                    <tr key={u.id} className="hover:bg-slate-700/40 transition-colors">
                                                        <td className="px-5 py-4">
                                                            <div className="font-bold text-white text-base">{u.name}</div>
                                                            <div className="flex items-center gap-2 mt-1">
                                                                <span className="text-[10px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded font-mono">{u.id}</span>
                                                                <span className="text-[10px] bg-blue-900/50 text-blue-300 border border-blue-700/50 px-2 py-0.5 rounded">{u.userType || 'N/A'}</span>
                                                            </div>
                                                        </td>
                                                        <td className="px-5 py-4 text-slate-300 font-medium">{u.hospital || '-'}</td>
                                                        <td className="px-5 py-4 text-center">
                                                            <div className="flex flex-col items-center">
                                                                <span className="font-black text-white">{u.progress || 0}%</span>
                                                                <div className="w-16 h-1.5 bg-slate-700 rounded-full mt-1.5 overflow-hidden"><div className="h-full bg-gradient-to-r from-emerald-500 to-emerald-400 rounded-full" style={{width: `${u.progress || 0}%`}}></div></div>
                                                            </div>
                                                        </td>
                                                        <td className="px-5 py-4 text-center">
                                                            {empathyScore !== '-' ? <span className="inline-flex items-center justify-center bg-rose-500/20 text-rose-400 font-black border border-rose-500/30 px-3 py-1 rounded-lg text-lg">{empathyScore}</span> : <span className="text-slate-600">-</span>}
                                                        </td>
                                                        <td className="px-5 py-4 text-center">
                                                            <button onClick={() => handleDeleteUser(u.id, u.name)} className="p-2 text-slate-500 hover:text-rose-500 hover:bg-rose-500/20 rounded-xl transition-all border border-transparent hover:border-rose-500/30" title="ลบข้อมูล">
                                                                <LucideIcons.Trash2 size={18} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                )})}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* TAB 2: SETTINGS */}
                            {activeTab === 'settings' && settings && (
                                <div className="animate-in fade-in flex flex-col h-full">
                                    <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                                        <h2 className="text-xl font-black flex items-center gap-2 text-white"><LucideIcons.Settings className="text-emerald-400"/> ตั้งค่าระบบส่วนกลาง</h2>
                                        <button onClick={handleSaveSettings} className="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all active:scale-95">
                                            <LucideIcons.Save size={18} /> บันทึกการตั้งค่า
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-6 flex-1 overflow-y-auto custom-scrollbar pr-2">
                                        {/* Live Settings */}
                                        <div className="bg-slate-900 p-6 rounded-2xl border border-slate-700 shadow-inner">
                                            <h3 className="font-bold text-rose-400 mb-5 flex items-center gap-2 text-lg"><LucideIcons.Radio size={20} className="animate-pulse"/> ควบคุมการถ่ายทอดสด (Live Stream)</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                <div>
                                                    <label className="block text-sm font-bold text-slate-400 mb-2">สถานะ Live ในห้องเรียน</label>
                                                    <select value={settings.liveConfig?.status || 'offline'} onChange={e => setSettings({...settings, liveConfig: {...settings.liveConfig, status: e.target.value}})} className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-base text-white focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none font-bold">
                                                        <option value="offline">⚫ ออฟไลน์ (ปิดการถ่ายทอดสด)</option>
                                                        <option value="live">🔴 ถ่ายทอดสด (Live Now!)</option>
                                                        <option value="paused">⏸️ พักเบรก (Paused)</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-bold text-slate-400 mb-2">หัวข้อการบรรยาย (Topic)</label>
                                                    <input type="text" value={settings.liveConfig?.topic || ''} onChange={e => setSettings({...settings, liveConfig: {...settings.liveConfig, topic: e.target.value}})} className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white focus:border-emerald-500 outline-none" placeholder="เช่น การเจรจาแจ้งข่าวร้าย..." />
                                                </div>
                                                <div className="md:col-span-2">
                                                    <label className="block text-sm font-bold text-slate-400 mb-2">URL ลิงก์สตรีม (Youtube, Vimeo, StreamYard Embed)</label>
                                                    <input type="text" value={settings.liveConfig?.url || ''} onChange={e => setSettings({...settings, liveConfig: {...settings.liveConfig, url: e.target.value}})} className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-sm text-amber-300 focus:border-emerald-500 outline-none font-mono" placeholder="https://..." />
                                                </div>
                                                
                                                <div className="md:col-span-2 flex items-center p-4 bg-amber-500/10 border border-amber-500/30 rounded-xl mt-2">
                                                    <input type="checkbox" id="allowPosttest" checked={settings.liveConfig?.allowPosttest || false} onChange={e => setSettings({...settings, liveConfig: {...settings.liveConfig, allowPosttest: e.target.checked}})} className="w-5 h-5 rounded bg-slate-800 border-slate-600 cursor-pointer accent-amber-500" />
                                                    <label htmlFor="allowPosttest" className="ml-3 text-sm font-bold text-amber-400 cursor-pointer">เปิดระบบฉุกเฉิน: ปลดล็อคให้ทุกคนทำ Posttest ได้ทันที (ข้ามเงื่อนไขเวลาและ Skill Lab)</label>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Apps Script Settings */}
                                        <div className="bg-slate-900 p-6 rounded-2xl border border-slate-700 shadow-inner">
                                            <h3 className="font-bold text-blue-400 mb-5 flex items-center gap-2 text-lg"><LucideIcons.CloudLightning size={20}/> การเชื่อมต่อ API & Automation</h3>
                                            <div className="space-y-5">
                                                <div>
                                                    <label className="block text-sm font-bold text-slate-400 mb-2">1. Main Apps Script URL (ระบบ AI และส่ง OTP)</label>
                                                    <input type="text" value={settings.appsScriptUrl || ''} onChange={e => setSettings({...settings, appsScriptUrl: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-300 focus:border-blue-500 outline-none font-mono" placeholder="https://script.google.com/macros/..." />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-bold text-slate-400 mb-2">2. Certificate Apps Script URL (ระบบออกเกียรติบัตร PDF)</label>
                                                    <input type="text" value={settings.certScriptUrl || ''} onChange={e => setSettings({...settings, certScriptUrl: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-300 focus:border-blue-500 outline-none font-mono" placeholder="https://script.google.com/macros/..." />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ระบบจับ Error อัตโนมัติ (Fail-safe) ไม่ให้ขึ้นจอขาว
        try {
            const root = createRoot(document.getElementById('root'));
            root.render(<AdminApp />);
        } catch (err) {
            document.body.innerHTML = `
                <div style="background-color:#0f172a; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#f8fafc; font-family:sans-serif; padding:20px; text-align:center;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:20px;"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                    <h2 style="font-size:24px; font-weight:bold; margin-bottom:10px;">เกิดข้อผิดพลาดในการโหลดหน้า Admin</h2>
                    <p style="color:#94a3b8; max-width:500px; line-height:1.5;">${err.message}</p>
                    <a href="./index.html" style="margin-top:30px; padding:12px 24px; background-color:#3b82f6; color:white; text-decoration:none; border-radius:8px; font-weight:bold;">กลับหน้าหลัก</a>
                </div>
            `;
        }
    </script>
</body>
</html>
