<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- เรียกใช้ไฟล์ข้อมูลแยก (Static Data) -->

              gold: { 200: '#FDE68A', 300: '#FCD34D', 400: '#FBBF24', 500: '#F59E0B', 600: '#D97706' }

            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px rgba(59, 130, 246, 0.5)' },

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            background-color: #0f172a;
        }

        /* --- Parallax Background --- */
        .sky-bg { position: fixed; inset: 0; z-index: 0; }
        .clouds-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        .layer-1 { opacity: 0.9; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png'); animation-duration: 150s; }
        .layer-2 { opacity: 0.6; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog2.png'); animation-duration: 200s; transform: scale(1.1); }
        .layer-3 { opacity: 0.4; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png'); animation-duration: 250s; transform: scale(1.2); }

        @keyframes drift { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* --- UI Utilities --- */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.4); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(255,255,255,0.6); }
        
        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .top-safe { top: env(safe-area-inset-top, 20px); }

        /* Print Media Styles */
        @media print {
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .sky-bg, .clouds-wrapper { display: none !important; }
            .print-border-gold { border: 2px solid #D4AF37 !important; border-radius: 12px; }
            .print-text-dark { color: #1e293b !important; }
            .print-bg-white { background-color: white !important; }
            .print-shadow-none { box-shadow: none !important; }
        }

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { createPortal } from 'react-dom';
        import * as LucideIcons from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, getDoc } from 'firebase/firestore';

        // ============================================================================
        // 1. DATA CONSTANTS (ดึงจาก data.js)
        // ============================================================================
        const FAH_IDLE_VIDEO = window.FAH_IDLE_VIDEO || "";
        const CHARACTER_VIDEOS = window.CHARACTER_VIDEOS || {};
        const FAH_PROFILE_PIC = window.FAH_PROFILE_PIC || "";
        const HOSPITAL_MAPPING = window.HOSPITAL_MAPPING || {};
        const INITIAL_LESSONS = window.INITIAL_LESSONS || [];
        const SKILL_LAB_SCENARIOS = window.SKILL_LAB_SCENARIOS || [];
        const QUIZ_QUESTIONS_RAW = window.QUIZ_QUESTIONS_RAW || [];

        const ICONS = {
          Play: LucideIcons.Play, Clock: LucideIcons.Clock, LogIn: LucideIcons.LogIn, Lock: LucideIcons.Lock, Users: LucideIcons.Users, 
          MonitorPlay: LucideIcons.MonitorPlay, Radio: LucideIcons.Radio, User: LucideIcons.User, ArrowLeft: LucideIcons.ArrowLeft, 
          Mail: LucideIcons.Mail, Check: LucideIcons.Check, LogOut: LucideIcons.LogOut, FileText: LucideIcons.FileText, 
          Plus: LucideIcons.Plus, Trash2: LucideIcons.Trash2, Database: LucideIcons.Database, RefreshCw: LucideIcons.RefreshCw, 
          Info: LucideIcons.Info, Award: LucideIcons.Award, ChevronRight: LucideIcons.ChevronRight, PauseCircle: LucideIcons.PauseCircle, 
          Save: LucideIcons.Save, History: LucideIcons.History, Volume2: LucideIcons.Volume2, VolumeX: LucideIcons.VolumeX, 
          ShieldCheck: LucideIcons.ShieldCheck, Download: LucideIcons.Download, Target: LucideIcons.Target, 
          CheckSquare: LucideIcons.CheckSquare, CheckCircle: LucideIcons.CheckCircle, Sparkles: LucideIcons.Sparkles, 
          LayoutDashboard: LucideIcons.LayoutDashboard, Activity: LucideIcons.Activity, BookOpen: LucideIcons.BookOpen, 
          Upload: LucideIcons.Upload, MessageSquare: LucideIcons.MessageSquare, Send: LucideIcons.Send, X: LucideIcons.X,
          ImageIcon: LucideIcons.Image, Mic: LucideIcons.Mic, Brain: LucideIcons.Brain, ArrowRight: LucideIcons.ArrowRight, 
          Bot: LucideIcons.Bot, PlayCircle: LucideIcons.PlayCircle, Camera: LucideIcons.Camera, Eye: LucideIcons.Eye,
          Settings2: LucideIcons.Settings2, Search: LucideIcons.Search, CloudLightning: LucideIcons.CloudLightning,
          Globe: LucideIcons.Globe, Heart: LucideIcons.Heart, TrendingUp: LucideIcons.TrendingUp, MapPin: LucideIcons.MapPin,
          Cpu: LucideIcons.Cpu, Settings: LucideIcons.Settings
        };

        function SafeIcon({ name, size = 24, className = "", strokeWidth = 2, ...rest }) {
          const IconComponent = ICONS[name] || ICONS['Sparkles'];
          return <IconComponent size={size} className={className} strokeWidth={strokeWidth} {...rest} />;
        }

        // ============================================================================
        // 2. FIREBASE & UTILS
        // ============================================================================
        let app, auth, db, appId;
        try {
          const fbP1 = "AIzaSyBs275"; const fbP2 = "NY99gdv1uZdAnb"; const fbP3 = "mx3UlWO8K4o5a0";
          let fbConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
            ? JSON.parse(__firebase_config) : { apiKey: fbP1 + fbP2 + fbP3, authDomain: "e-learning-with-fah-ai.firebaseapp.com", projectId: "e-learning-with-fah-ai", storageBucket: "e-learning-with-fah-ai.firebasestorage.app", messagingSenderId: "418946105960", appId: "1:418946105960:web:728e28070790975df231dd" };
          if (fbConfig && Object.keys(fbConfig).length > 0) {
            app = initializeApp(fbConfig); auth = getAuth(app); db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? String(__app_id).replace(/\//g, '-') : 'fah-elearning-prod';
          }
        } catch (error) { console.warn("Firebase init error", error); }

        function recursiveShuffle(arr) { if (!arr || arr.length <= 1) return arr; const idx = Math.floor(Math.random() * arr.length); const rest = [...arr]; rest.splice(idx, 1); return [arr[idx], ...recursiveShuffle(rest)]; }
        function formatQuestions(qs) { return qs.map(q => { const correctAnswerText = q.options[q.answer]; const shuffledOpts = recursiveShuffle([...q.options]); return { ...q, options: shuffledOpts, answer: shuffledOpts.indexOf(correctAnswerText) }; }); }
        function parseRawExams(raw) { return raw.map((str, idx) => { const parts = str.split('|').map(s => s.trim()); return { id: idx + 1, question: parts[0].replace(/^[0-9]+\.\s*/, ''), options: parts.slice(1, parts.length - 1), answer: parseInt(parts[parts.length - 1].replace(/[^0-9]/g, ''), 10) }; }); }
        const FULL_EXAMS = [recursiveShuffle(formatQuestions(parseRawExams(QUIZ_QUESTIONS_RAW)))];
        const formatTime = (secs) => !secs ? "0 ชม. 0 นาที" : `${Math.floor(secs / 3600)} ชม. ${Math.floor((secs % 3600) / 60)} นาที`.trim();
        const calcProgress = (secs, totalSecs) => Math.min(100, Math.round(((secs||0) / (totalSecs||1)) * 100));
        const generateSessionId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);
        const calculateScore = (questions, answers) => questions.reduce((acc, q) => acc + +(answers[q.id] === q.answer), 0);
        const correctMedicalTerms = (text) => { if (!text) return text; let corrected = text; const dict = { "แอบเนีย": "Apnea", "แอปเนีย": "Apnea", "ดีคัปปิ้ง": "Decoupling", "ดีคับปลิ้ง": "Decoupling", "เบรนเดส": "Brain Death", "สมองตาย": "Brain Death" }; Object.keys(dict).forEach(key => corrected = corrected.replace(new RegExp(key, "g"), dict[key])); return corrected; };
        
        // ============================================================================
        // 3. APPS SCRIPT API PROXY (SECURITY UPGRADE)
        // ============================================================================
        const callGeminiAPI = async (prompt, systemInstruction, base64Image = null) => {
            try {
                const res = await actions.fetchAppsScript({
                    action: 'callGemini',
                    prompt: prompt,
                    systemInstruction: systemInstruction,
                    base64Image: base64Image
                });
                
                if (res.status === 'success' && res.text) {
                    return res.text;
                } else {
                    throw new Error(res.message || "ไม่มีข้อมูลตอบกลับจาก AI โปรดตรวจสอบการตั้งค่า Apps Script");
                }
            } catch (e) { 
                console.error("Gemini Proxy Error:", e);
                return `[ระบบขัดข้อง] ${e.message}`; 
            }
        };

        const callGeminiTTS = async (text, voiceName = "Aoede") => {
            const maxRetries = 3;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const res = await actions.fetchAppsScript({
                        action: 'callGeminiTTS',
                        text: text,
                        voiceName: voiceName
                    });
                    
                    if (res.status === 'success' && res.inlineData) {
                        return res.inlineData;
                    } else {
                        throw new Error(res.message || 'ไม่มีข้อมูลเสียงส่งกลับมา โปรดตรวจสอบ Apps Script');
                    }
                } catch (e) {
                    console.warn(`TTS Attempt ${i + 1} failed:`, e);
                    if (i < maxRetries - 1) {
                        if (window.showGlobalMsg) window.showGlobalMsg('ระบบเสียงกำลังเชื่อมต่อ...', 'info');
                        await new Promise(resolve => setTimeout(resolve, 2500)); 
                    } else {
                        throw e; 
                    }
                }
            }
        };

        const pcm16ToWav = (base64PCM, sampleRate = 24000) => {
          const binaryString = window.atob(base64PCM); const bytes = Uint8Array.from([...binaryString].map(c => c.charCodeAt(0))); 
          const buffer = new ArrayBuffer(44 + bytes.length); const view = new DataView(buffer);
          const writeString = (v, offset, string) => { for (let i = 0; i < string.length; i++) v.setUint8(offset + i, string.charCodeAt(i)); };
          writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true); writeString(view, 8, 'WAVE'); 
          writeString(view, 12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); 
          view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(view, 36, 'data'); view.setUint32(40, bytes.length, true);
          new Uint8Array(buffer, 44).set(bytes); 
          return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        };

        // ============================================================================
        // 4. STATE MANAGEMENT
        // ============================================================================
        const createGlobalStore = (initialState) => {
          let savedState = null;
          try { savedState = JSON.parse(localStorage.getItem('elearning_app_state') ?? 'null'); } catch (e) {}
          let state = Object.assign({ isAuthReady: false, fbUser: null, syncQueue: [], isFetchingMaster: false, syncState: { isSyncing: false, text: 'ส่งข้อมูลเข้า Google Sheets', lastSync: null } }, initialState, savedState ?? {});
          const listeners = new Set();
          return {
            getState: () => state,
            setState: (updater) => { 
              state = Object.assign({}, state, typeof updater === 'function' ? updater(state) : updater);
              try { const { currentScreen, loggedInUser, activeTab, currentVideoId, selectedLabId, studySeconds, chatTrigger } = state; 
                if (!['landing', 'intro', 'auth_wizard'].includes(currentScreen)) { localStorage.setItem('elearning_app_state', JSON.stringify({ currentScreen, loggedInUser, activeTab, currentVideoId, selectedLabId, studySeconds, chatTrigger })); }
              } catch(e) {}
              listeners.forEach(l => l(state)); 
            },
            subscribe: (l) => { listeners.add(l); return () => listeners.delete(l); }
          };
        };

        const globalStore = createGlobalStore({
          currentScreen: 'landing', uiMessage: { type: '', text: '', visible: false }, tempLicense: '', authStep: 'check_license', adminClickCount: 0,
          registrationData: { name: '', email: '', phone: '', position: '', licenseId: '', department: '', hospital: '', customHospital: '', province: '', userType: '', isPrefilled: false },
          otpData: { input: '', isSending: false, error: '' }, fallbackOtp: null, loggedInUser: null, currentSessionId: null, studySeconds: 0,
          quizData: { type: 'pretest', questions: FULL_EXAMS[0] || [], currentIndex: 0, answers: {}, score: 0, isFinished: false },
          activeTab: 'video', currentVideoId: 1, isLiveCheckedIn: false,
          liveConfig: { status: 'offline', days: 1, hours: 10, allowPosttest: false, topic: 'บรรยายพิเศษ', url: 'https://www.canva.com/design/DAHLSXAISSw/D6KdfmIaWm_qsEVr3Msf4Q/view?embed', documentUrl: '' },
          lookerStudioUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQx-jhRcJFjIK4nfSzCHdtJ5nSXJTJCmKDxlUHq4xpa7kEVxXFGZSaMWQBzmXOvwYLoQlGTQp5xLqrs/pubhtml?gid=1285992394&single=true&widget=true&headers=false',
          liveChatMessages: [{ sender: 'ai', text: 'สวัสดีค่ะพี่ๆ นักเรียน! สงสัยตรงไหนพิมพ์ถามฟ้าได้เลยนะคะ ✨' }], 
          appsScriptUrl: 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec', certScriptUrl: 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec',
          dbUsers: [], lessons: INITIAL_LESSONS, questionSets: FULL_EXAMS, hasWelcomedSession: false, chatTrigger: null, speakTextTrigger: null, selectedLabId: null, scenarioState: {},
          roleplayPhase: 'none', currentSpeaker: 'FAH', currentEmotion: 'NEUTRAL'
        });

        function useGlobalState() { const [s, setS] = useState(globalStore.getState()); useEffect(() => globalStore.subscribe(setS), []); return [s, globalStore.setState]; }

        const actions = {
          nav: (sc) => { window.location.hash = sc; globalStore.setState({ currentScreen: sc }); window.scrollTo(0, 0); },
          showMsg: (t, type = 'success') => { globalStore.setState({ uiMessage: { type, text: String(t), visible: true } }); setTimeout(() => globalStore.setState(p => ({ uiMessage: { ...p.uiMessage, visible: false } })), 3500); },
          speakText: (text) => globalStore.setState({ speakTextTrigger: text }),
          fetchAppsScript: async (payload, specificUrl = null) => { 
              try { const url = specificUrl || globalStore.getState().appsScriptUrl; if(!url) return { status: 'error' }; const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) }); return await res.json(); } catch(e) { return { status: 'error', message: e.message }; } 
          },
          enqueueSync: (payload) => globalStore.setState(p => ({ syncQueue: [...p.syncQueue, { id: Date.now(), payload, retries: 0 }] })),
          saveUserToDB: async (u) => { if (db && globalStore.getState().fbUser) { try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', u.id), u, { merge: true }); } catch (e) { } } },
          
          handleAdminClick: () => { 
              const count = globalStore.getState().adminClickCount ?? 0; 
              if (count + 1 >= 3) { 
                  globalStore.setState({ adminClickCount: 0 }); 
                  window.location.href = './admin.html'; 
              } else { 
                  globalStore.setState({ adminClickCount: count + 1 }); 
              } 
          },

          handleLogout: () => { const { loggedInUser: u, studySeconds: s, liveConfig: lc } = globalStore.getState(); if (u) { const up = { ...u, studySeconds: s, progress: calcProgress(s, (lc?.hours ?? 1) * 3600) }; actions.enqueueSync({ action: 'upsertUser', user: up }); actions.saveUserToDB(up); } globalStore.setState({ loggedInUser: null, studySeconds: 0, isLiveCheckedIn: false, currentSessionId: null, currentScreen: 'intro' }); localStorage.removeItem('elearning_app_state'); actions.showMsg('ออกจากระบบแล้ว'); },
          submitQuiz: () => { const { quizData, loggedInUser: u, dbUsers } = globalStore.getState(); if (quizData.isFinished) return; const score = calculateScore(quizData.questions, quizData.answers); const isPretest = quizData.type === 'pretest'; const isPassed = score >= Math.ceil(quizData.questions.length * 0.8); const upUser = { ...u, ...(isPretest ? { pretest: `${score}/${quizData.questions.length}` } : { posttest: `${score}/${quizData.questions.length}`, status: isPassed ? 'ผ่าน' : 'ไม่ผ่าน' }) }; actions.saveUserToDB(upUser); actions.enqueueSync({ action: 'upsertUser', user: upUser }); globalStore.setState({ loggedInUser: upUser, dbUsers: dbUsers.map(x => x.id === upUser.id ? upUser : x), quizData: { ...quizData, score, isFinished: true }, currentScreen: isPretest ? 'quiz_result' : isPassed ? 'cert_confirm' : 'quiz_fail' }); },
          startSkillLabRoleplay: (scenario) => globalStore.setState({ chatTrigger: { id: Date.now(), scenario } })
        };
        window.showGlobalMsg = actions.showMsg;

        // ============================================================================
        // 5. SHARED UI
        // ============================================================================
        function GlassCard({ children, className = "", onClick, ...rest }) {
          let radiusClass = 'rounded-[2rem]'; const m = className.match(/rounded-(?:\[.*?\]|\w+)/); if (m) radiusClass = m[0];
          let bgClass = className.replace(/\bbg-(?:white|slate-[12]00)(?:\/\d+)?\b/g, '').replace(/\bborder-white(?:\/\d+)?\b/g, '').replace(/\bbackdrop-blur-(?:sm|md|lg|xl|2xl|3xl)\b/g, '').replace(/\b!border-none\b/g, '').replace(/\bborder-none\b/g, '');
          return (
            <div onClick={onClick} className={`relative overflow-hidden bg-white/20 backdrop-blur-2xl backdrop-saturate-[1.2] border border-white/40 shadow-[0_8px_32px_rgba(0,0,0,0.15)] ${radiusClass} transition-all duration-300 ${onClick ? 'cursor-pointer hover:-translate-y-1 hover:bg-white/30' : ''} ${bgClass}`} {...rest}>
              <div className="absolute inset-0 bg-gradient-to-br from-white/40 via-white/10 to-transparent pointer-events-none z-0" />
              <div className="relative z-10 w-full h-full text-slate-800">{children}</div>
            </div>
          );
        }
        function GradientButton({ children, disabled, className = "", ...rest }) {
          return (
              <button disabled={disabled} className={`px-6 py-4 md:px-8 rounded-2xl font-bold text-white text-base md:text-lg transition-all duration-300 flex items-center justify-center gap-2 relative overflow-hidden active:scale-95 group shadow-[0_8px_20px_rgba(0,185,0,0.3)] ${disabled ? 'bg-white/40 cursor-not-allowed shadow-none text-slate-500 border border-white/50 backdrop-blur-md' : 'bg-line-500 hover:bg-line-600 hover:scale-105 border border-line-400'} ${className}`} {...rest}>
                  <span className="relative z-10 flex items-center gap-2 drop-shadow-md">{children}</span>
              </button>
          );
        }
        function FormInput({ label, disabled, className="", ...props }) {
          return (
              <div className={`w-full relative z-10 flex flex-col ${className}`}>
                  {label && <label className="block text-xs md:text-sm font-bold text-slate-800 mb-2 ml-1 drop-shadow-sm">{label}</label>}
                  <input required disabled={disabled} className={`w-full px-4 py-3.5 rounded-xl border focus:outline-none transition-all shadow-[inset_0_2px_5px_rgba(0,0,0,0.05),inset_0_0_15px_rgba(255,255,255,0.4)] font-medium tracking-wide ${disabled ? 'bg-white/30 border-white/40 text-slate-600 cursor-not-allowed' : 'bg-white/40 border-white/50 text-slate-800 placeholder-slate-600 hover:bg-white/50 focus:bg-white/60 focus:border-white focus:ring-2 focus:ring-white/50 backdrop-blur-xl'}`} {...props} />
              </div>
          );
        }
        function FormSelect({ label, options, placeholder, disabled, className="", ...props }) {
          return (
              <div className={`w-full relative z-10 flex flex-col ${className}`}>
                  {label && <label className="block text-xs md:text-sm font-bold text-slate-800 mb-2 ml-1 drop-shadow-sm">{label}</label>}
                  <select required disabled={disabled} className={`w-full px-4 py-3.5 rounded-xl border focus:outline-none transition-all shadow-[inset_0_2px_5px_rgba(0,0,0,0.05),inset_0_0_15px_rgba(255,255,255,0.4)] font-medium tracking-wide appearance-none ${disabled ? 'bg-white/30 border-white/40 text-slate-600 cursor-not-allowed' : 'bg-white/40 border-white/50 text-slate-800 hover:bg-white/50 focus:bg-white/60 focus:border-white focus:ring-2 focus:ring-white/50 backdrop-blur-xl'}`} {...props}>
                      <option value="" disabled>{placeholder}</option>
                      {options.map(opt => <option key={opt} value={opt} className="text-slate-800">{opt}</option>)}
                  </select>
              </div>
          );
        }
        function GlobalBackground() {
          return (

                  const evalPrompt = `คุณคือฟ้า ประเมินการเจรจาผู้เรียน ประวัติ:\n${history}\nให้คะแนนความเห็นอกเห็นใจ (Empathy Score) จาก 0-100 บอกข้อดี ข้อเสนอแนะตามหลัก B=MAP หากคะแนนเกิน 60 ถือว่าผ่านให้พิมพ์ [PASS] ถ้าไม่ผ่านพิมพ์ [FAIL] และต้องแนบแท็ก [EMPATHY: ระบุคะแนน] มาด้วยเสมอ`;
                  
                  try {
                      const aiResponse = await callGeminiAPI("ประเมินการเจรจาหน่อย", evalPrompt); 
                      const isPass = aiResponse.includes('[PASS]'); 
                      const empathyMatch = aiResponse.match(/\[EMPATHY:\s*(\d+)\]/i);
                      const empathyScore = empathyMatch ? parseInt(empathyMatch[1]) : (isPass ? 80 : 40);
                      
                      let cleanResponse = aiResponse.replace(/\[PASS\]/g, '').replace(/\[FAIL\]/g, '').replace(/\[EMPATHY:\s*\d+\]/gi, '').trim();
                      
                      setMessages(prev => [...prev, { id: Date.now()+1, sender: 'ai', text: cleanResponse, isVoiceOnly: false }]); 
                      
                      const u = store.loggedInUser; 
                      if (u) { 
                          const evalRecord = { timestamp: new Date().toISOString(), scenarioId: store.selectedLabId, passed: isPass, score: empathyScore, evaluation: cleanResponse, chatLog: history }; 
                          const upUser = { ...u, skillLabPassed: true, skillLabHistory: [...(u.skillLabHistory || []), evalRecord] }; 
                          globalStore.setState(p => ({ loggedInUser: upUser, dbUsers: p.dbUsers.map(x => x.id === upUser.id ? upUser : x) })); 
                          actions.saveUserToDB(upUser); 
                      }
                      actions.showMsg(`บันทึกผลเรียบร้อย (Empathy Score: ${empathyScore}) ปลดล็อก Posttest แล้ว!`, 'success'); 
                      speakThai(cleanResponse.replace(/[*#]/g, ''), null, true);
                  } catch (e) { 
                      setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: `ข้อผิดพลาด: ${e.message}`, isVoiceOnly: false }]); 
                  }
              } else if (actionType === 'return_to_dashboard') {
                  setIsRoleplay(false); 
                  globalStore.setState({ roleplayPhase: 'none', selectedLabId: null, currentEmotion: 'NEUTRAL', currentSpeaker: 'FAH' });
                  setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: "กลับสู่ห้องเรียนเรียบร้อยค่ะ", isVoiceOnly: false }]); 
                  speakThai("กลับสู่ห้องเรียนเรียบร้อยค่ะ", null, true);
              } else if (actionType === 'resume_journey') {
                  const u = store.loggedInUser; 
                  const lc = store.liveConfig; 
                  const isTimeMet = u?.userType === 'Onsite' || u?.progress >= 80 || lc?.allowPosttest;
                  
                  globalStore.setState({ activeTab: u?.posttest !== '-' ? 'profile' : (isTimeMet && u?.skillLabPassed) ? 'video' : isTimeMet ? 'skill_lab' : 'video', currentScreen: 'dashboard' });
                  if (isTimeMet && u?.skillLabPassed && u?.posttest === '-') globalStore.setState({ currentScreen: 'quiz' }); 
                  setIsOpen(false);
              } else if (actionType === 'adaptive_learning') {
                  const { questions, answers } = store.quizData; 
                  const wrongQs = questions.filter(q => answers[q.id] !== q.answer); 
                  const wrongText = wrongQs.map(q => q.question).join(" | ");
                  
                  globalStore.setState({ currentEmotion: 'ADVISING', currentSpeaker: 'FAH' }); 
                  setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: "ช่วยวิเคราะห์ข้อที่ผิดหน่อยค่ะ" }]);
                  
                  const adaptivePrompt = `คุณคือฟ้า วิเคราะห์ข้อที่ตอบผิด: "${wrongText}" ให้กำลังใจ แนะนำให้ไปดูวิดีโอบทไหน ไม่ต้องเฉลยคำตอบ`;
                  try { 
                      const aiResponse = await callGeminiAPI("วิเคราะห์ข้อสอบ", adaptivePrompt); 
                      setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: aiResponse, isVoiceOnly: false }]); 
                      speakThai(aiResponse.replace(/[*#]/g, '')); 
                  } catch (e) { 
                      setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: `เกิดข้อผิดพลาด (${e.message})`, isVoiceOnly: false }]); 
                  }
              }
              setIsTyping(false);
          };

          // -------------------------------------------------------------------------
          // 🔴 ระบบแยกข้อความแชทเพื่อตัดสินว่าใครคือคนพูด (Fah หรือ Mek หรือ Boyfriend)
          // -------------------------------------------------------------------------
          const handleSendChat = async (e, quickActionText = null) => {
              if (e) e.preventDefault(); 
              const userMsg = quickActionText ?? chatInput.trim(); 
              if ((!userMsg && !selectedImage) || isTyping) return;
              
              stopAudio(); 
              if (isRoleplay && ['speaking_intro', 'playing_scenario'].includes(roleplayPhase)) return; 
              
              setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: userMsg, image: selectedImage }]); 
              setChatInput(''); 
              const imageToSend = selectedImage; 
              setSelectedImage(null); 
              setIsTyping(true);
              
              const historyContext = messages.filter(m => !m.isWelcome).slice(-10).map(m => `${m.sender === 'user' ? 'ผู้เรียน' : 'ครอบครัว'}: ${m.text}`).join('\n');
              
              // กลยุทธ์จับคู่การแนะนำตัวของผู้เรียน
              let introGuideline = "";
              if (userMsg.match(/(ชื่อ|แนะนำตัว|พยาบาล|หมอ|แพทย์|สวัสดี)/i) && messages.length <= 3) {
                  introGuideline = `\n[กฎระบบแนะนำตัวเพิ่มเติม]: เนื่องจากผู้เรียนเพิ่งเริ่มแนะนำตัว ให้ตัวละคร "ฟ้า" สวมบทบาทตอบรับด้วยความสุภาพ อ่อนน้อม แนะนำตัวของเธอและทุกคนในครอบครัวทีเดียวพร้อมกัน คือ:\n1. ฟ้า (ลูกสาวคนโต อายุ 22 ปี จบ ป.ตรี กำลังเรียน ป.โท ทำงาน Google)\n2. เมฆ (น้องชาย อายุ 18 ปี เรียนปี 2 ม.เอกชน)\n3. แฟนของฟ้า ชื่อพี่เอก (อายุ 32 ปี จบ ป.โท รับราชการ)\nโดยไม่มีคำพูดชู้สาวหรือคำหวาน เน้นความสุขุมให้เกียรติซึ่งกันและกัน`;
              }

              const generalPrompt = `คุณคือ "ฟ้า" AI ผู้ช่วยสอน อายุ 22 ปี เป็นมิตร สุภาพ ลงท้ายด้วย "ค่ะ"\n[กฎเหล็กสูงสุดระดับชาติ]: ห้ามคุกคามทางเพศหรือหยาบคาย\nเรียกคู่สนทนาตามชื่อหรืออาชีพที่เขาแนะนำ ประวัติ:\n${historyContext}\nผู้เรียน: ${userMsg}\nฟ้า:`;
              const roleplayPrompt = `${currentScenarioPrompt}${introGuideline}\n\nประวัติ:\n${historyContext}\nผู้เรียน: ${userMsg}\nญาติ (ใส่ Tag อารมณ์และชื่อคนพูดก่อนเสมอ เช่น [SAD] [ฟ้า] หรือ [ANGRY] [เมฆ] หรือ [NEUTRAL] [พี่เอก]):`;
              const systemPrompt = isRoleplay ? roleplayPrompt : generalPrompt;
              
              try {
                  let rawResponse = await callGeminiAPI(userMsg || "ช่วยแปลสไลด์หน่อย", systemPrompt, imageToSend); 
                  let spk = 'FAH'; 
                  let visualSpeaker = 'FAH'; // ตัวแปรสำหรับคุมวิดีโอ
                  let cleanText = rawResponse; 
                  const checkStr = cleanText.substring(0, 150).toLowerCase();
                  
                  // ตรวจจับชื่อคนพูดจากบริบท (Detect Speaker)
                  if (checkStr.match(/\[\s*(เมฆ|น้องชาย|mek|brother)\s*\]|(^|\s)(เมฆ|น้องชาย|mek|brother)\s*:/)) {
                      spk = 'BROTHER'; 
                      visualSpeaker = 'BROTHER';
                  } else if (checkStr.match(/\[\s*(พี่เอก|เอก|แฟน|แฟนของฟ้า|แฟนหนุ่ม|boyfriend)\s*\]|(^|\s)(พี่เอก|เอก|แฟน|แฟนของฟ้า|แฟนหนุ่ม|boyfriend)\s*:/)) {
                      spk = 'BOYFRIEND'; 
                      visualSpeaker = 'FAH'; // แฟนพูด แต่วิดีโอยังจับภาพฟ้าที่กำลังซบไหล่หรือฟังอยู่
                  } else if (checkStr.match(/\[\s*(ฟ้า|ลูกสาว|fah|sister)\s*\]|(^|\s)(ฟ้า|ลูกสาว|fah|sister)\s*:/)) {
                      spk = 'FAH';
                      visualSpeaker = 'FAH';
                  }
                  
                  let foundEmotion = "SAD"; 
                  const emotionsList = ["SAD", "HESITANT", "CONFUSED", "ANGRY", "ADVISING", "NEUTRAL"]; 
                  for (const em of emotionsList) { 
                      if (new RegExp(`\\[\\s*${em}\\s*\\]`, 'i').test(checkStr)) { foundEmotion = em; break; } 
                  }
                  
                  globalStore.setState({ currentSpeaker: visualSpeaker, currentEmotion: foundEmotion });
                  cleanText = cleanText.replace(/\[.*?\]/g, '').replace(/^(ฟ้า|เมฆ|พี่เอก|เอก|น้องชาย|ลูกสาว|แฟน|แฟนของฟ้า|Fah|Mek|Brother|Sister|Boyfriend)\s*:\s*/i, '').replace(/[*#]/g, '').trim();
                  
                  const isVoiceOnly = isRoleplay && roleplayPhase === 'negotiating'; 
                  const speakerName = spk === 'BROTHER' ? 'เมฆ' : spk === 'BOYFRIEND' ? 'พี่เอก' : 'ฟ้า'; 
                  const msgId = Date.now() + 1;
                  
                  // แนบชื่อคนพูดเข้าไปในประวัติแชทเพื่อให้อ่านง่ายขึ้น
                  const displayChatText = (isRoleplay && roleplayPhase === 'negotiating') ? `(${speakerName}) ${cleanText}` : cleanText;
                  
                  setMessages(prev => [...prev, { id: msgId, sender: 'ai', text: displayChatText, isVoiceOnly, speakerName }]); 
                  setIsTyping(false); 
                  
                  speakThai(cleanText, () => setMessages(prev => prev.map(m => m.id === msgId ? { ...m, isVoiceOnly: false, isHidden: isRoleplay && roleplayPhase === 'negotiating' } : m)), false, spk);
              } catch (err) { 
                  setIsTyping(false); 
                  setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: `ข้อผิดพลาด (${err.message})`, isVoiceOnly: false, speakerName: 'ฟ้า' }]); 
              }
          };

          const [pos, setPos] = useState({ x: 0, y: 0 }); 
          const [isDragging, setIsDragging] = useState(false); 
          const startPos = useRef({ x: 0, y: 0 });
          
          const handlePointerDown = (e) => { 
              if (e.target.closest('.no-drag') || window.innerWidth < 768) return; 
              setIsDragging(true); 
              const { clientX, clientY } = e.touches ? e.touches[0] : e; 
              startPos.current = { x: clientX - pos.x, y: clientY - pos.y }; 
          };

          const isChaos = store.currentEmotion === 'ANGRY' || store.currentEmotion === 'CONFUSED' || store.currentEmotion === 'HESITANT';
          const hrRate = isRoleplay ? (isChaos ? (Math.floor(Math.random() * 20) + 115) : (Math.floor(Math.random() * 10) + 75)) : 0; 
          const spo2 = isRoleplay ? (isChaos ? 94 : 98) : 0;
          
          const emotionStressMap = { ANGRY: 95, CONFUSED: 75, HESITANT: 60, SAD: 50, NEUTRAL: 20, ADVISING: 10 };
          const stressLevel = isRoleplay ? (emotionStressMap[store.currentEmotion] || 20) : 0;
          const stressColor = stressLevel > 70 ? 'bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.8)]' : stressLevel > 40 ? 'bg-amber-400 shadow-[0_0_10px_rgba(251,191,36,0.8)]' : 'bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.8)]';

          useEffect(() => {
            const handlePointerMove = (e) => { 
                if (!isDragging) return; 
                const { clientX, clientY } = e.touches ? e.touches[0] : e; 
                setPos({ x: clientX - startPos.current.x, y: clientY - startPos.current.y }); 
            };
            const handlePointerUp = () => setIsDragging(false);
            
            if (isDragging) { 
                window.addEventListener('mousemove', handlePointerMove, { passive: false }); 
                window.addEventListener('mouseup', handlePointerUp); 
                window.addEventListener('touchmove', handlePointerMove, { passive: false }); 
                window.addEventListener('touchmove', handlePointerUp); 
            }
            return () => { 
                window.removeEventListener('mousemove', handlePointerMove); 
                window.removeEventListener('mouseup', handlePointerUp); 
                window.removeEventListener('touchmove', handlePointerMove); 
                window.removeEventListener('touchmove', handlePointerUp); 
            };
          }, [isDragging]);

          if (['auth_wizard', 'intro', 'landing', 'admin'].includes(store.currentScreen)) return null;

          const scenario = SKILL_LAB_SCENARIOS.find(s => s.id === store.selectedLabId);
          
          let videoToPlay = CHARACTER_VIDEOS['FAH']['NEUTRAL'];
          if (currentSpeaker === 'BROTHER') videoToPlay = CHARACTER_VIDEOS['BROTHER']?.[currentEmotion] || CHARACTER_VIDEOS['BROTHER']['NEUTRAL'];
          else videoToPlay = CHARACTER_VIDEOS['FAH']?.[currentEmotion] || CHARACTER_VIDEOS['FAH']['NEUTRAL'];

          const leftVideoContent = (
              <div className="w-full h-full flex flex-col md:flex-row overflow-hidden shadow-[inset_-10px_0_20px_rgba(0,0,0,0.2)] md:rounded-l-[2.5rem]">
                 <div className={`w-full md:w-[42%] h-[80px] md:h-full flex flex-row md:flex-col py-2 md:py-6 px-4 bg-slate-900/40 backdrop-blur-xl border-b md:border-b-0 md:border-r border-white/20 shrink-0 relative z-20 shadow-xl transition-colors duration-500 ${isChaos ? 'border-l-4 border-l-rose-500 bg-rose-950/40 animate-pulse' : ''}`}>
                    <div className="flex md:flex-col items-center gap-2 md:gap-4 w-auto md:w-full">
                        <button onClick={() => { stopAudio(); stopVAD(); globalStore.setState({ selectedLabId: null, chatTrigger: null, roleplayPhase: 'none' }); setMessages([]); }} className="w-10 h-10 md:w-full md:py-3 bg-white/10 hover:bg-rose-500/80 border border-white/20 text-white font-bold text-xs rounded-full md:rounded-xl transition-all shadow-sm active:scale-95 flex items-center justify-center gap-2 backdrop-blur-md">
                           <SafeIcon name="ArrowLeft" size={16} /> <span className="hidden md:inline">EXIT</span>
                        </button>
                    </div>

                    {isRoleplay && roleplayPhase !== 'speaking_intro' && (
                        <div className="flex-1 flex flex-row md:flex-col justify-center items-center gap-4 md:gap-6 w-auto md:w-full overflow-x-auto custom-scrollbar md:overflow-visible px-2 md:px-0">
                            <div className="hidden md:block w-full text-center mt-4 mb-2">
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-line-300 to-line-500 font-black tracking-[0.2em] uppercase text-base drop-shadow-md">Ailiverse</span>
                            </div>

                            <div className="flex flex-row md:flex-col gap-4 md:gap-6 w-full px-2">
                                <div className="flex flex-col text-green-300 w-full">
                                    <div className="text-[10px] md:text-xs font-bold tracking-widest flex justify-between opacity-80"><span>HR</span><span>bpm</span></div>
                                    <div className={`text-3xl md:text-6xl font-black font-mono leading-none tracking-tighter text-center mt-1 drop-shadow-[0_0_15px_rgba(74,222,128,0.3)] ${isChaos ? 'text-rose-500 animate-pulse drop-shadow-[0_0_15px_rgba(244,63,94,0.6)]' : ''}`}>{hrRate}</div>
                                </div>
                                <div className="flex flex-col text-cyan-300 w-full">
                                    <div className="text-[10px] md:text-xs font-bold tracking-widest flex justify-between opacity-80"><span>SpO2</span><span>%</span></div>
                                    <div className="text-3xl md:text-5xl font-black font-mono leading-none tracking-tighter text-center mt-1 drop-shadow-[0_0_15px_rgba(34,211,238,0.3)]">{spo2}</div>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex flex-col w-full mt-2 px-2">
                                <div className="text-[10px] font-bold tracking-widest flex justify-between text-slate-200 mb-1">
                                    <span className="flex items-center gap-1"><SafeIcon name="TrendingUp" size={12}/> STRESS LEVEL</span>
                                    <span>{stressLevel}%</span>
                                </div>
                                <div className="w-full h-2 bg-slate-800/80 rounded-full overflow-hidden border border-slate-600/50">
                                    <div className={`h-full rounded-full transition-all duration-700 ease-in-out ${stressColor}`} style={{ width: `${stressLevel}%` }}></div>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex flex-col w-full mt-4 p-4 bg-indigo-500/20 border border-indigo-400/40 rounded-2xl relative z-10 transition-all shadow-[inset_0_0_20px_rgba(99,102,241,0.15)] backdrop-blur-md">
                                <div className="flex items-center gap-2 mb-2 text-indigo-300"><SafeIcon name="Brain" size={16} className="animate-pulse" /><span className="text-xs font-extrabold tracking-widest uppercase">AI Guide</span></div>
                                <p className="text-sm text-indigo-100 font-medium leading-relaxed">{isChaos ? "อารมณ์ญาติกำลังพุ่งสูง หลีกเลี่ยงการโต้เถียง รับฟังด้วยความสงบ" : "ใช้ทักษะ Active Listening และเจรจาด้วยหลัก B.A.L.I."}</p>
                            </div>
                        </div>
                    )}
                 </div>
                 
                 <div className="w-full md:w-[58%] relative bg-black/80 flex items-center justify-center shrink-0 border-l border-r border-white/20">
                     {isChaos && <div className="absolute inset-0 bg-rose-500/20 mix-blend-overlay z-10 pointer-events-none animate-pulse"></div>}
                     
                     {roleplayPhase === 'negotiating' && (
                         <div className="absolute top-4 right-4 md:top-6 md:right-6 z-50 bg-black/60 backdrop-blur-md px-4 py-2 rounded-full border border-white/20 text-white text-xs font-bold shadow-lg flex items-center gap-2">
                             <span className={`w-2.5 h-2.5 rounded-full animate-pulse shadow-[0_0_8px_currentColor] ${store.currentSpeaker === 'BROTHER' ? 'bg-blue-400 text-blue-400' : store.currentSpeaker === 'BOYFRIEND' ? 'bg-emerald-400 text-emerald-400' : 'bg-pink-400 text-pink-400'}`}></span>
                             กำลังฟัง: {store.currentSpeaker === 'BROTHER' ? 'เมฆ' : store.currentSpeaker === 'BOYFRIEND' ? 'พี่เอก' : 'ฟ้า'}
                         </div>
                     )}

                     {roleplayPhase === 'playing_scenario' && (
                         <button onClick={triggerScenarioNegotiation} className="absolute bottom-4 right-4 md:bottom-8 md:right-8 z-50 bg-white/20 hover:bg-white/40 backdrop-blur-md text-white px-4 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-sm font-bold border border-white/50 transition-colors shadow-lg">
                             ข้ามวิดีโอ (Skip) ⏭️
                         </button>
                     )}

                     {roleplayPhase === 'playing_scenario' ? <iframe key="vid_scenario" src={`${scenario?.videoUrl}?autoplay=1&muted=0&api=1&player_id=scenario_vid&loop=0`} className="absolute inset-0 w-full h-full border-none pointer-events-auto transition-opacity duration-700 animate-in fade-in" allow="autoplay; fullscreen" title="Scenario Video" /> : <iframe key={`vid_char_${videoToPlay}`} src={videoToPlay} allow="autoplay; fullscreen" className="absolute inset-0 w-full h-full border-none pointer-events-none transition-opacity duration-700 animate-in fade-in" title="Character Video" />}
                 </div>
              </div>
          );

          const chatInterface = (
            <div className={`flex-1 flex flex-col relative z-10 min-h-0 ${isDocked ? 'w-full h-full bg-white/40 backdrop-blur-2xl backdrop-saturate-[1.5] md:rounded-[2.5rem] md:rounded-l-none' : 'h-[60vh] md:h-[600px] md:w-[400px] bg-white/40 backdrop-blur-2xl backdrop-saturate-[1.5] shadow-[0_15px_50px_rgba(0,0,0,0.2)] rounded-t-[2.5rem] md:rounded-[2.5rem] border border-white/50'}`}>
                <div className="absolute inset-0 bg-gradient-to-br from-white/60 via-white/30 to-transparent pointer-events-none rounded-[inherit] z-0" />
                {!isDocked && (
                    <div onPointerDown={handlePointerDown} className={`hidden md:flex p-4 shrink-0 items-center justify-between shadow-sm border-b border-white/50 relative z-10 cursor-grab active:cursor-grabbing`}>
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full overflow-hidden border border-white"><img src={FAH_PROFILE_PIC} alt="Fah" className="w-full h-full object-cover scale-110" /></div>
                            <div><h3 className={`font-extrabold text-sm text-slate-800 drop-shadow-sm`}>{isRoleplay ? 'ครอบครัวผู้ป่วย' : 'ฟ้า (Tutor)'}</h3><p className="text-[10px] text-slate-700 font-medium">เสียง: Aoede</p></div>
                        </div>

                   <GlassCard className="p-6 md:p-8 space-y-4 border border-white/10">
                     <h3 className="font-bold text-lg flex items-center gap-2 mb-4 text-white drop-shadow-sm"><SafeIcon icon={MonitorPlay} className="text-white/60"/> ตั้งค่าวิดีโอบทเรียน ({lessons.length} บท)</h3>
                     <FormSelect label="เลือกบทเรียน" value={selectedLessonId} onChange={(e) => { const id = parseInt(e.target.value, 10); setSelectedLessonId(id); const target = lessons.find(l => l.id === id); setEditVideoId(target?.videoId || ''); setEditVideoTitle(target?.title || ''); setEditDocUrl(target?.documentUrl || ''); }} options={lessons.map(l => l.id)} placeholder="-- เลือก --" />
                     <FormInput label="ชื่อบทเรียน" value={editVideoTitle} onChange={(e) => setEditVideoTitle(e.target.value)} placeholder="ระบุชื่อบทเรียน" />
                     <FormInput label="Google Drive File ID" value={editVideoId} onChange={(e) => setEditVideoId(e.target.value)} placeholder="เช่น 1-sX4LnWRMSjoEQmWee-9GuiQ2XMvkSro" />
                     <FormInput label="URL เอกสารประกอบ (ถ้ามี)" value={editDocUrl} onChange={(e) => setEditDocUrl(e.target.value)} placeholder="เช่น https://drive.google.com/..." />
                     <div className="pt-2 relative z-10"><button onClick={() => { globalStore.setState(p => ({ lessons: p.lessons.map(l => l.id === selectedLessonId ? { ...l, title: editVideoTitle, videoId: editVideoId, documentUrl: editDocUrl } : l) })); actions.showMsg('อัปเดตบทเรียนแล้ว'); }} className="w-full bg-white/10 text-white hover:bg-white/20 border border-white/20 py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 transition-all shadow-md"><SafeIcon icon={Save} size={18}/> บันทึก</button></div>
                   </GlassCard>
                   <GlassCard className="p-6 md:p-8 space-y-6 border border-white/10">
                     <h3 className="font-bold text-lg flex items-center gap-2 mb-4 text-white drop-shadow-sm"><SafeIcon icon={CheckCircle2} className="text-emerald-400"/> อัปโหลดเนื้อหาขึ้น Cloud</h3>
                     <div className="p-5 bg-blue-500/10 backdrop-blur-md rounded-2xl border border-blue-500/30 text-sm text-blue-200 shadow-[inset_0_2px_5px_rgba(0,0,0,0.2)] relative z-10">คุณสามารถกดปุ่มเพื่ออัปโหลดระบบ Content ปัจจุบัน (รวมถึงวิดีโอและข้อสอบใหม่) ขึ้น Firestore ได้เลยครับ</div>
                     <button onClick={() => actions.showMsg('อัปโหลดเนื้อหาขึ้นระบบ Cloud สำเร็จ')} className="w-full bg-white/10 text-white hover:bg-white/20 border border-white/20 py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-md relative z-10"><SafeIcon icon={Upload} size={18}/> เผยแพร่ขึ้น Cloud</button>
                   </GlassCard>
                 </div>
               </div>
            ),
            live: (
               <div className="animate-in fade-in">
                  <h2 className="text-2xl font-extrabold mb-6 flex gap-2 text-white drop-shadow-sm"><SafeIcon icon={Radio} className="text-rose-400"/> จัดการ Live</h2>
                  <GlassCard className="p-8 max-w-3xl space-y-6 border border-white/10">
                     <div className="flex gap-4 relative z-10"><button onClick={()=>globalStore.setState({ liveConfig: { ...liveConfig, status: 'live' }})} className={`p-4 rounded-xl font-bold flex-1 transition-all shadow-md ${liveConfig.status==='live'?'bg-white/20 text-white border border-white/40 shadow-[0_0_20px_rgba(255,255,255,0.2)] scale-105':'bg-black/40 text-white/60 border border-white/10 hover:bg-white/10'}`}>🔴 ถ่ายทอดสด</button><button onClick={()=>globalStore.setState({ liveConfig: { ...liveConfig, status: 'paused' }})} className={`p-4 rounded-xl font-bold flex-1 transition-all shadow-md ${liveConfig.status==='paused'?'bg-white/20 text-white border border-white/40 shadow-[0_0_20px_rgba(255,255,255,0.2)] scale-105':'bg-black/40 text-white/60 border border-white/10 hover:bg-white/10'}`}>⏸️ พักเบรก</button><button onClick={()=>globalStore.setState({ liveConfig: { ...liveConfig, status: 'offline' }})} className={`p-4 rounded-xl font-bold flex-1 transition-all shadow-md ${liveConfig.status==='offline'?'bg-white/20 text-white border border-white/40 shadow-[0_0_20px_rgba(255,255,255,0.2)] scale-105':'bg-black/40 text-white/60 border border-white/10 hover:bg-white/10'}`}>⏹️ ออฟไลน์</button></div>
                     <div className="grid grid-cols-2 gap-4 border-t border-white/10 pt-6 relative z-10"><FormInput label="จำนวนวัน" type="number" value={liveConfig.days} onChange={e => globalStore.setState({ liveConfig: { ...liveConfig, days: e.target.value }})} /><FormInput label="ชั่วโมงรวม" type="number" value={liveConfig.hours} onChange={e => globalStore.setState({ liveConfig: { ...liveConfig, hours: e.target.value }})} /></div>
                     <div className="pt-2 relative z-10"><FormInput label="อัปเดต URL เอกสารประกอบการบรรยายสด (Google Drive)" placeholder="วางลิงก์แชร์จาก Google Drive เช่น https://drive.google.com/..." value={liveConfig.documentUrl || ''} onChange={e => globalStore.setState({ liveConfig: { ...liveConfig, documentUrl: e.target.value }})} /></div>
                     <button onClick={() => globalStore.setState({ liveConfig: { ...liveConfig, allowPosttest: !liveConfig.allowPosttest }})} className={`w-full py-4 rounded-2xl font-bold transition-all shadow-md border relative z-10 ${liveConfig.allowPosttest ? 'bg-white/20 text-white border-white/40 shadow-[0_0_20px_rgba(255,255,255,0.2)]' : 'bg-black/40 text-white/60 border-white/10 hover:bg-white/10'}`}>{liveConfig.allowPosttest ? '✅ Posttest เปิดใช้งานอยู่' : '🔒 ปลดล็อกระบบ Posttest ทันที'}</button>
                  </GlassCard>
               </div>
            ),
            users: (
              <div className="animate-in fade-in">
                <h2 className="text-2xl font-extrabold mb-6 flex gap-2 text-white drop-shadow-sm"><SafeIcon icon={Users} className="text-orange-400"/> จัดการสิทธิ์ผู้ใช้</h2>
                <GlassCard className="p-0 border border-white/10">
                <div className="p-6 border-b border-white/10 flex flex-col xl:flex-row justify-between items-center bg-black/20 gap-4 relative z-10">
                  <h3 className="font-bold shrink-0 text-white">รายชื่อผู้ใช้งาน</h3>
                  <input type="text" placeholder="ค้นหา ชื่อ / ใบอนุญาต..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full xl:w-64 px-4 py-2 rounded-xl border border-white/20 bg-black/40 backdrop-blur-md text-white outline-none focus:border-orange-400 placeholder-white/40 text-sm shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)]" />
                  <div className="flex gap-2">
                    <button onClick={() => globalStore.setState({ showManualForm: !showManualForm })} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-4 py-2 rounded-xl font-bold text-sm flex gap-2 shrink-0 transition-colors shadow-md"><SafeIcon icon={Plus} size={16}/> เพิ่ม Manual</button>
                    <button onClick={downloadCSV} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold text-sm flex gap-2 shrink-0 transition-colors shadow-md"><SafeIcon icon={Download} size={16}/> CSV</button>
                  </div>
                </div>
                {showManualForm && (
                   <form onSubmit={(e) => { 
                       e.preventDefault(); 
                       const newUser = {id: manualForm.license || Date.now().toString(), name: manualForm.name, license: manualForm.license, hospital: manualForm.hospital, userType: manualForm.userType, progress: 0, studySeconds: 0, status: 'กำลังเรียน', pretest: '-', posttest: '-', skillLabPassed: false, lastVideoId: 1, videoTimes: {}};
                       actions.saveUserToDB(newUser); globalStore.setState(p => ({ dbUsers: [newUser, ...p.dbUsers], showManualForm: false })); 
                   }} className="p-6 bg-black/40 backdrop-blur-md grid grid-cols-1 md:grid-cols-5 gap-4 items-end border-b border-white/10 relative z-10"><FormInput label="ชื่อ" value={manualForm.name} onChange={e => globalStore.setState(p=>({ manualForm: {...p.manualForm, name: e.target.value} }))} /><FormInput label="ใบอนุญาต" value={manualForm.license} onChange={e => globalStore.setState(p=>({ manualForm: {...p.manualForm, license: e.target.value} }))} /><FormInput label="รพ." value={manualForm.hospital} onChange={e => globalStore.setState(p=>({ manualForm: {...p.manualForm, hospital: e.target.value} }))} /><FormSelect label="สิทธิ์" value={manualForm.userType} onChange={e => globalStore.setState(p=>({ manualForm: {...p.manualForm, userType: e.target.value} }))} options={['เรียนใหม่', 'Onsite', 'Online']} placeholder="เลือกสิทธิ์" /><button type="submit" className="w-full bg-white/10 text-white border border-white/20 shadow-md py-3.5 rounded-xl font-bold transition-all hover:bg-white/20">บันทึก</button></form>
                )}
                <div className="overflow-x-auto relative z-10"><table className="w-full text-left text-sm whitespace-nowrap"><thead className="bg-black/20 border-b border-white/10 text-white/70"><tr><th className="p-5">ชื่อ-สกุล</th><th className="p-5">ใบอนุญาต</th><th className="p-5 text-center">Pre</th><th className="p-5 text-center">Post</th><th className="p-5">สิทธิ์</th><th className="p-5 text-center">ลบ</th></tr></thead><tbody className="divide-y divide-white/5">{paginatedUsers.map(u => (<tr key={u.id} className="hover:bg-white/5 text-white/80 transition-colors"><td className="p-5 font-bold text-white drop-shadow-sm">{u.name}</td><td className="p-5">{u.license}</td><td className="p-5 text-center"><input value={u.pretest} onChange={e => actions.updateUserField(u.id, 'pretest', e.target.value)} className="w-16 border border-white/20 bg-black/40 rounded-lg text-center py-1 text-xs outline-none focus:border-orange-400 text-white" /></td><td className="p-5 text-center"><input value={u.posttest} onChange={e => actions.updateUserField(u.id, 'posttest', e.target.value)} className="w-16 border border-white/20 bg-black/40 rounded-lg text-center py-1 text-xs outline-none focus:border-orange-400 text-white" /></td><td className="p-5"><select value={u.userType} onChange={e => actions.updateUserField(u.id, 'userType', e.target.value)} className="border border-white/20 bg-black/40 rounded-lg px-2 py-1 text-xs outline-none text-white [&>option]:text-gray-900"><option>เรียนใหม่</option><option>Onsite</option><option>Online</option></select></td><td className="p-5 text-center"><button onClick={() => actions.deleteUserFromDB(u.id)} className="text-white/40 hover:text-rose-400 transition-colors p-2"><SafeIcon icon={Trash2} size={18}/></button></td></tr>))}</tbody></table></div>
                <div className="p-4 border-t border-white/10 flex justify-between items-center bg-black/20 relative z-10"><button onClick={() => setCurrentPage(p => Math.max(1, p - 1))} disabled={currentPage === 1} className="px-4 py-2 bg-white/10 border border-white/20 hover:bg-white/20 rounded-lg text-sm font-bold disabled:opacity-30 text-white transition-colors">ก่อนหน้า</button><span className="text-sm font-bold text-white/50">หน้า {currentPage} จาก {totalPages} (รวม {filteredUsers.length} คน)</span><button onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages} className="px-4 py-2 bg-white/10 border border-white/20 hover:bg-white/20 rounded-lg text-sm font-bold disabled:opacity-30 text-white transition-colors">ถัดไป</button></div>
              </GlassCard></div>
            )
          };

          return (
            <div className="flex h-screen bg-transparent transition-colors z-10 relative">
              <div className="w-72 bg-[#0a0a0a]/60 backdrop-blur-2xl text-white p-6 flex flex-col gap-2 border-r border-white/10 z-20 shadow-2xl">
                <h2 className="font-black text-2xl mb-8 text-white drop-shadow-sm flex items-center gap-3"><SafeIcon icon={Lock} size={22} className="text-white/60" /> Admin Panel</h2>
                {[{id:'users', icon:Users, label:'จัดการสิทธิ์'}, {id:'content', icon:BookOpen, label:'เนื้อหา'}, {id:'live', icon:Radio, label:'Live สด'}].map(t => <button key={t.id} onClick={() => globalStore.setState({ adminTab: t.id })} className={`flex items-center gap-3 w-full px-4 py-3.5 rounded-xl font-bold transition-all text-left shadow-sm ${store.adminTab === t.id ? 'bg-white/20 text-white border border-white/40 shadow-[0_0_15px_rgba(255,255,255,0.2)] scale-105' : 'bg-transparent border border-transparent text-white/60 hover:bg-white/10 hover:text-white'}`}><SafeIcon icon={t.icon} size={20}/> {t.label}</button>)}
                <div className="mt-auto pt-6 border-t border-white/10"><button onClick={() => actions.nav('welcome')} className="w-full p-4 bg-white/5 border border-white/10 rounded-xl font-bold text-white/70 hover:bg-rose-500/20 hover:text-rose-400 hover:border-rose-500/40 flex justify-center gap-2 transition-all shadow-sm"><SafeIcon icon={LogOut} size={20}/> ออกจากระบบ</button></div>
              </div>
              <div className="flex-1 p-6 md:p-10 overflow-y-auto relative custom-scrollbar"><div className="max-w-6xl mx-auto">{ADMIN_TABS[adminTab] || ADMIN_TABS.users}</div></div>
            </div>
          );
        };

        const SCREENS = {
          intro: IntroScreen,
          welcome: WelcomeScreen, check_license: CheckLicenseScreen, register: RegisterScreen, verify_otp: VerifyOtpScreen,
          dashboard: StudentDashboard, admin_login: AdminLoginScreen, admin_dashboard: AdminDashboard,
          profile_summary: ProfileSummaryScreen, quiz: QuizScreen, quiz_result: QuizResultScreen, 
          cert_confirm: CertConfirmScreen, quiz_fail: QuizFailScreen
        };

        export default function App() {
          const [store] = useGlobalState();
          const { currentScreen = 'intro', theme, isAuthReady } = store;

          useEffect(() => { actions.fetchMasterData(); }, []);

          useEffect(() => {
            if (!auth) return;
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token); } 
                else { await signInAnonymously(auth); }
              } catch (e) { console.error("Auth error", e); }
            };
            initAuth();
            return onAuthStateChanged(auth, user => globalStore.setState({ fbUser: user, isAuthReady: true }));
          }, []);

          useEffect(() => {
            if (!isAuthReady || !db || !store.fbUser) return;
            const unsub = onSnapshot(
                collection(db, 'artifacts', appId, 'public', 'data', 'elearning_users'), 
                (snapshot) => {
                    const users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    globalStore.setState({ dbUsers: users, top10Users: [...users].sort((a,b)=>b.progress-a.progress).slice(0,10) });
                },
                (error) => {
                    console.error("Firebase Snapshot Error: ", error);
                }
            );
            return () => unsub();
          }, [isAuthReady, store.fbUser]);

          useEffect(() => {
            const interval = setInterval(() => {
              const { loggedInUser: u, studySeconds: s, activeTab: tab, currentVideoId: vId, isLiveCheckedIn, liveConfig } = globalStore.getState();
              if (!u) return;
              
              let isCounting = false;
              let currentVidTime = u.videoTimes?.[vId] || 0;

              if (tab === 'video') {
                isCounting = true;
                currentVidTime += 1;
              } else if (tab === 'live' && isLiveCheckedIn && liveConfig.status === 'live') {
                isCounting = true;
              }

              if (isCounting) {
                globalStore.setState({ 
                  studySeconds: s + 1, 
                  loggedInUser: { 
                    ...u, 
                    studySeconds: s + 1, 
                    progress: calcProgress(s + 1, (liveConfig.hours || 1) * 3600),
                    videoTimes: tab === 'video' ? { ...u.videoTimes, [vId]: currentVidTime } : u.videoTimes
                  } 
                });
              }
            }, 1000); 
            return () => clearInterval(interval);
          }, []);

          const CurrentScreenComponent = SCREENS[currentScreen] || IntroScreen;

          return (
            <div className={`w-full min-h-screen`}>
              <div className="min-h-screen relative flex flex-col overflow-x-hidden transition-colors duration-500 text-white">
                <style>{`
                  body { 
                    font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "SF Pro Display", "Thonburi", "Segoe UI", sans-serif; 
                    color: #f3f4f6;
                  } 
                  .custom-scrollbar::-webkit-scrollbar { width: 8px; } 
                  .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; margin-block: 8px; }
                  .custom-scrollbar::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #fb923c, #f59e0b); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
                  .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(251, 146, 60, 0.8); }
                `}</style>
                
                <GlobalBackground />

                {store.uiMessage?.visible && <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full font-bold shadow-xl animate-in slide-in-from-top-4 border backdrop-blur-md ${store.uiMessage.type === 'error' ? 'bg-rose-500/20 text-rose-300 border-rose-500/50' : 'bg-emerald-500/20 text-emerald-300 border-emerald-500/50'}`}>{store.uiMessage.text}</div>}
                
                <main className="relative z-10 w-full flex-1 flex flex-col">
                  <CurrentScreenComponent store={store} actions={actions} />
                </main>
                
                <GlobalAIChatbot store={store} />
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
