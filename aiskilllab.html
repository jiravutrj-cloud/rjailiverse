<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ Ailiverse Skill Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white h-screen overflow-hidden">
    <!-- กล่องแชทแบบลอยตัว (Zero-Glass, Clean UI) -->
    <div id="skilllab-root" class="w-full h-full"></div>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
    </script>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';

        function App() {
            const [audioReady, setAudioReady] = useState(false);
            const audioCtx = useRef(null);

            // ⚙️ THE SILENT UNLOCKER: บังคับปลดล็อคเสียงทันทีที่เกิด Interaction
            const unlockAudio = async () => {
                if (!audioCtx.current) {
                    audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.current.state === 'suspended') {
                    await audioCtx.current.resume();
                }
                // เล่นเสียงเปล่า 0.1 วินาที เพื่อหลอกเบราว์เซอร์ว่าเราได้รับอนุญาตแล้ว
                const buffer = audioCtx.current.createBuffer(1, 1, 22050);
                const source = audioCtx.current.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.current.destination);
                source.start(0);
                setAudioReady(true);
            };

            useEffect(() => {
                window.addEventListener('click', unlockAudio, { once: true });
                window.addEventListener('touchstart', unlockAudio, { once: true });
                return () => {
                    window.removeEventListener('click', unlockAudio);
                    window.removeEventListener('touchstart', unlockAudio);
                };
            }, []);

            return (
                <div className="relative w-full h-full flex flex-col items-center justify-center p-6">
                    {/* พื้นหลังจำลองห้องเซิร์ฟเวอร์ */}
                    <div className="absolute inset-0 bg-[url('https://res.cloudinary.com/djwclucoz/image/upload/v1783149499/Pngtree_global_connectivity_and_technical_networks_15770649_1_h9ggdv.jpg')] bg-cover bg-center"></div>
                    <div className="absolute inset-0 bg-black/60"></div>
                    
                    {/* UI ที่ลอยเด่นขึ้นมา */}
                    <div className="relative z-10 w-full max-w-2xl text-center space-y-6">
                        {!audioReady && (
                            <div className="bg-rose-500/20 border border-rose-500/50 p-4 rounded-xl text-rose-200 text-sm font-bold animate-pulse">
                                กรุณาแตะหน้าจอเพื่ออนุญาตเล่นเสียงระบบ
                            </div>
                        )}
                        <div className="p-6 bg-transparent border border-white/20 rounded-2xl backdrop-blur-sm">
                            <h2 className="text-xl font-bold mb-2">กรณีศึกษา (Thai Case): Multi-Agent Pressure Test</h2>
                            <p className="text-sm text-slate-300">ข้อมูลเบื้องต้น: คนไข้ชาย อายุ 46 ปี ประสบอุบัติเหตุรถยนต์ แพทย์ประเมินก้านสมองตายแล้ว... เริ่มการเจรจาได้เลยค่ะ</p>
                        </div>
                    </div>

                    {/* จำลองการทักทายอัตโนมัติเมื่อปลดล็อคแล้ว */}
                    {audioReady && (
                        <div className="mt-8 text-center animate-bounce text-emerald-400 font-bold">
                            ระบบพร้อม: "สวัสดีค่ะ... คุณคือใครคะ?"
                        </div>
                    )}
                </div>
            );
        }

        createRoot(document.getElementById('skilllab-root')).render(<App />);
    </script>
</body>
</html>
