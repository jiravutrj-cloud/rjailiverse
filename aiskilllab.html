          const binaryString = window.atob(base64PCM); const bytes = new Uint8Array(binaryString.length); for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);

        function SkillLabApp() {
            const [user, setUser] = useState(null);

            const audioContextRef = useRef(null); const analyserRef = useRef(null); const microphoneRef = useRef(null); const vadSilenceTimerRef = useRef(null); const isSpeakingRef = useRef(false); const latestTranscriptRef = useRef('');
            const recognitionRef = useRef(null); const messagesEndRef = useRef(null); const audioRef = useRef(null); const currentSpeechIdRef = useRef(0); const currentSequenceIdRef = useRef(0);
            
            const ttsCanvasRef = useRef(null);

            const ttsAnalyserRef = useRef(null);
            const ttsAnimFrameRef = useRef(null);
            const vimeoPlayerRef = useRef(null);
            
            // 🌟 Hologram Sync Refs 🌟
            const currentSpeakerRef = useRef('FAH');
            const currentEmotionRef = useRef('NEUTRAL');
            const isAiSpeakingRef = useRef(false);

            const isEn = selectedScenario && selectedScenario.language === 'en';

            // ตรวจสอบการล็อกอิน และ สิทธิ์จาก LocalStorage
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('elearning_app_state');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.loggedInUser) {
                            const uType = parsed.loggedInUser.userType;

                    } else {
                        safeRedirect('./index.html');

                } catch (e) { safeRedirect('./index.html'); }
            }, []);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, smartSuggestions]);

            useEffect(() => { currentSpeakerRef.current = currentSpeaker; }, [currentSpeaker]);

            // VAD Logic
            useEffect(() => {

                    recognitionRef.current.onresult = (e) => { let finalT = ''; let interT = ''; for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) finalT += e.results[i][0].transcript; else interT += e.results[i][0].transcript; } setChatInput(p => { const newText = p + finalT; latestTranscriptRef.current = newText || interT; return newText || interT; }); };

<div class="row">
  <main>

    <div id="content">
      <div class="row"><section class="page-content" id="the-shape-tool">
        <h1>The Shape Tool</h1>
        <p>The <img src="/images/tool/tool_shape.png" alt="Tool Shape icon" class="d-inline-block align-bottom" />  <a href="#id3" id="id1"><strong>Shape Tool</strong></a> is used to make adjustments to <a class="reference internal" href="Shape.html#shape"><span class="std std-ref">shape</span></a> layers. In the current iteration, this tool
allows you to <a class="reference internal" href="Shape.html#edit-shape"><span class="std std-ref">add and remove anchors</span></a>, <a class="reference internal" href="Shape.html#edit-shape"><span class="std std-ref">change bounding box</span></a>, and <a class="reference internal" href="Shape.html#edit-shape"><span class="std std-ref">control handles</span></a>. Currently, when the shape tool
is active, only the shape you last worked with is shown. You must
first use <a class="reference internal" href="transform.html#transform"><span class="std std-ref">Transform Tool</span></a> to select a shape layer.</p>
<figure class="align-center" id="id2">
<img alt="../../_images/shape-tool-options.png" src="../../_images/shape-tool-options.png" />
<figcaption>
<p><span class="caption-text">Shape tool options</span><a class="headerlink" href="#id2" title="Link to this image">¶</a></p>
</figcaption>
</figure>
<dl>
<dt>Edit Mode</dt><dd><p>Toggle between node editing and bounding box editing.</p>
</dd>
<dt>Curve Type</dt><dd><dl class="simple">
<dt>Linear</dt><dd><p>When a curve becomes flat.</p>
</dd>
<dt>Curve</dt><dd><p>When a curve becomes round.</p>
</dd>
</dl>
</dd>
<dt>Join Type</dt><dd><dl class="simple">
<dt>Straight</dt><dd><p>The two points won't be in line with each other.</p>
</dd>
<dt>Smooth</dt><dd><p>The two points will be kept as a straight line relative to the center, therefore making the curve smooth.</p>
</dd>
<dt>Symmetric</dt><dd><p>The two points will be kept as a straight line relative to the center, and the other will have the same length to the center point as the one you are moving.</p>
</dd>
</dl>
</dd>
<dt>Add node</dt><dd><p>Add a new node to the shape. Press <kbd class="kbd docutils literal notranslate">Backspace</kbd> or <kbd class="kbd docutils literal notranslate">Delete</kbd> to delete a selected node.</p>
</dd>
<dt>Delete Node</dt><dd><p>Remove a node.</p>
</dd>
<dt>Break path at selected point</dt><dd><p>Break the path.</p>
</dd>
<dt>Break path at selected segment</dt><dd><p>Split the path.</p>
</dd>
<dt>Join paths</dt><dd><p>Join two nodes.</p>
</dd>
<dt>Merge nodes</dt><dd><p>Merge two nodes.</p>
</dd>
<dt>Convert to line</dt><dd><p>Make the selected segment straight.</p>
</dd>
<dt>Convert to curve</dt><dd><p>Make the selected segment curvy.</p>
</dd>
</dl>
</section>


    </div>
    
  </main>
</div>

<div class="row">
  <main>

    <div id="content">
      <div class="row"><section id="resource-tags">
<span id="id1"></span><h1>Resource Tags<a class="headerlink" href="#resource-tags" title="Link to this heading">¶</a></h1>
<p>Krita allows you to tag resources to make it more easier to sort them. A tag in Krita is simply a text-based keyword that is attached to a resource. To create a tag just click on the add a tag to the selected tag <img alt="addtag" src="../../_images/view-choose.png" /> icon.
In the docker you have a drop-down to sort between various tags. The brush docker defaults to the “All” tag, which is pseudo-tag that means all resources.</p>
<p>You can manage your tags <a class="reference internal" href="resource_manager.html#resource-management"><span class="std std-ref">Resource Management</span></a>.</p>
<p>As you use Krita you will be adding, deleting or editing the <a class="reference internal" href="../preferences/brush_settings.html#brush-settings"><span class="std std-ref">Brush Settings</span></a>. These changes are saved inside your user folder.
In Krita, there is no “Make new preset” button to save your changes to the original brush preset. Thus, you only have the option to make a new one.</p>
<section id="assigning-an-existing-tag">
<h2>Assigning an existing tag<a class="headerlink" href="#assigning-an-existing-tag" title="Link to this heading">¶</a></h2>
<p>You can assign tags in the brush preset docker, by right clicking on a brush and selecting <span class="guilabel">assign to tag</span>.</p>
</section>
<section id="adding-a-new-tag">
<h2>Adding a new tag<a class="headerlink" href="#adding-a-new-tag" title="Link to this heading">¶</a></h2>
<p>To add a new tag, press the <img alt="addtag" src="../../_images/view-choose.png" /> button, and type the name of the new tag.</p>
<p>Press the <kbd class="kbd docutils literal notranslate">Enter</kbd> key and the tag is created.</p>
</section>
<section id="changing-a-tag-s-name">
<h2>Changing a tag’s name<a class="headerlink" href="#changing-a-tag-s-name" title="Link to this heading">¶</a></h2>
<p>Select the tag you want to change from the drop-down, and press the <img alt="renametag" src="../../_images/edit-rename.png" /> icon. Then edit the name and press the <kbd class="kbd docutils literal notranslate">Enter</kbd> key to confirm.</p>
</section>
<section id="deleting-a-tag">
<h2>Deleting a tag<a class="headerlink" href="#deleting-a-tag" title="Link to this heading">¶</a></h2>
<p>Select the tag you want to delete from the drop-down, and press the <img alt="trash" src="../../_images/user-trash.png" /> icon.</p>
</section>
</section>


    </div>
    
  </main>
</div>

<span id="color-selector"></span><h1>Color Selector Tool<a class="headerlink" href="#color-selector-tool" title="Link to this heading">¶</a></h1>
<p><img alt="tool_color_picker" src="../../_images/tool_color_picker.png" /> This tool allows you to choose a point from the canvas and make the color of that point the active foreground color. When a painting or drawing tool is selected the Color Selector tool can be quickly accessed by pressing the <kbd class="kbd docutils literal notranslate">Ctrl</kbd> key.</p>
<figure class="align-center" id="id1">
<img alt="../../_images/color-selector-options.png" src="../../_images/color-selector-options.png" />
<figcaption>
<p><span class="caption-text">Color selector tool options</span><a class="headerlink" href="#id1" title="Link to this image">¶</a></p>
</figcaption>
</figure>
<p>There are several options shown in the <span class="guilabel">Tool Options</span> docker when the Color Selector tool is active:</p>
<dl>
<dt>Sample</dt><dd><p>If you pick from the current layer it will only pick up the color from the currently selected layer. If you pick from all visible layers it will use the flattened, visible, image.</p>
</dd>
<dt>Radius</dt><dd><p>The radius of the color picker.
Usually it takes 1 pixel, but with this you can pick the averaged color of a larger area.</p>
</dd>
<dt>Blend</dt><dd><p>This controls the color picked with the current color, and mix the two colors according to the percentage.</p>
</dd>
<dt>Update color</dt><dd><p>This controls whether to update the current foreground color, background color, or to add it to the <a class="reference internal" href="../dockers/palette_docker.html#palette-docker"><span class="std std-ref">current palette</span></a>.</p>
</dd>
<dt>Add to Palette</dt><dd><p>This switch works with the <em>Update Color</em> option so that a picked color is also added to the current active <a class="reference internal" href="../dockers/palette_docker.html#palette-docker"><span class="std std-ref">palette</span></a>. If there are no palettes yet, then a new palette will be added.</p>
<div class="versionadded">
<p><span class="versionmodified added">New in version 4.1.</span></p>
</div>
</dd>
<dt>Update Selection</dt><dd><p>When enabled, updates the <a class="reference internal" href="../dockers/advanced_color_selector.html#advanced-color-selector-docker"><span class="std std-ref">Advanced Color Selector Docker</span></a> to show the picked color as the central color. This allows you to quickly pick a new shape or shade from the current color.</p>
<div class="versionadded">
<p><span class="versionmodified added">New in version 4.4.</span></p>
</div>
</dd>
<dt>Show colors</dt><dd><p>When this is turned on, the color picker will display a small circle showing the previous color on the top left, and the color you are currently picking on the bottom right.</p>
</dd>
</dl>
