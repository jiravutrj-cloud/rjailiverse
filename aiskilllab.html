<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Skill Lab - RJ Ailiverse</title>
    
    <script src="./data.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #020617; margin: 0; color: #f8fafc; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(255,255,255,0.4); }
        
        @keyframes cameraShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-2px) rotate(-1deg); }
            40% { transform: translateX(2px) rotate(1deg); }
            60% { transform: translateX(-2px) rotate(-1deg); }
            80% { transform: translateX(2px) rotate(1deg); }
        }
        .effect-shake { animation: cameraShake 0.4s ease-in-out infinite; border: 4px solid rgba(220, 38, 38, 0.5); }
        .effect-vignette { box-shadow: inset 0 0 150px rgba(153, 27, 27, 0.4); }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="skilllab-root"></div>

    <script type="text/babel" data-type="module">
        window.onerror = function(message, source, lineno, colno, error) {
            document.body.innerHTML = `
                <div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-family:sans-serif; padding:20px; text-align:center; background-color: #0f172a;">
                    <div style="width:80px; height:80px; border-radius:50%; background:#fee2e2; display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
                        <span style="font-size:40px;">⚠️</span>
                    </div>
                    <h2 style="font-size:24px; font-weight:bold; margin-bottom:10px; color:#ef4444;">พบข้อผิดพลาดของระบบ (System Error)</h2>
                    <p style="color:#94a3b8; max-width:600px; line-height:1.6; background:#1e293b; padding:20px; border-radius:12px; border:1px solid #334155;">
                        <strong style="color:#cbd5e1;">Error:</strong> ${message}<br/>
                        <strong style="color:#cbd5e1;">Line:</strong> ${lineno}
                    </p>
                    <button onclick="window.location.reload()" style="margin-top:20px; padding:10px 24px; background:#3b82f6; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">รีเฟรชหน้าเว็บ</button>
                </div>
            `;
            return true;
        };

        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as LucideIcons from 'lucide-react';
        import { initializeApp, getApps, getApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc, arrayUnion } from 'firebase/firestore';

        const { Activity, Mic, Square, Send, ArrowLeft, HeartPulse, BrainCircuit, ShieldAlert, CheckCircle, Video, PlayCircle, Loader2, Sparkles, MessageSquare } = LucideIcons;
        function SafeIcon({ name, size=24, className="" }) { const Icon = LucideIcons[name] || Activity; return <Icon size={size} className={className} />; }

        let app, auth, db, appId = 'fah-elearning-prod';
        try {
            const fbP1 = "AIzaSyBs275"; const fbP2 = "NY99gdv1uZdAnb"; const fbP3 = "mx3UlWO8K4o5a0";
            let fbConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
                ? JSON.parse(__firebase_config) : { apiKey: fbP1 + fbP2 + fbP3, authDomain: "e-learning-with-fah-ai.firebaseapp.com", projectId: "e-learning-with-fah-ai", storageBucket: "e-learning-with-fah-ai.firebasestorage.app", messagingSenderId: "418946105960", appId: "1:418946105960:web:728e28070790975df231dd" };
            app = getApps().length === 0 ? initializeApp(fbConfig) : getApp();
            auth = getAuth(app); db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' && __app_id ? String(__app_id).replace(/\//g, '-') : 'fah-elearning-prod';
        } catch (error) { console.error("Firebase init error", error); }

        function SkillLabApp() {
            const [user, setUser] = useState(null);
            const [scenarios, setScenarios] = useState(window.SKILL_LAB_SCENARIOS || []);
            const [activeScenario, setActiveScenario] = useState(null);
            const [roleplayPhase, setRoleplayPhase] = useState('selecting'); 
            const [currentEmotion, setCurrentEmotion] = useState('NEUTRAL'); 
            const [stressLevel, setStressLevel] = useState(40);
            const [heartRate, setHeartRate] = useState(85);
            const [messages, setMessages] = useState([]);
            const [inputMessage, setInputMessage] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [evaluationResult, setEvaluationResult] = useState(null);
            
            const chatEndRef = useRef(null);
            const recognitionRef = useRef(null);

            useEffect(() => {
                if (!auth) return;
                const unsub = onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        let localUser = null;
                        try { localUser = JSON.parse(localStorage.getItem('elearning_app_state'))?.loggedInUser; } catch(e){}
                        if (localUser) {
                            setUser(localUser);
                        } else {
                            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', u.uid);
                            const docSnap = await getDoc(docRef);
                            if(docSnap.exists()) setUser(docSnap.data());
                            else setUser({ id: 'guest', name: 'คุณพยาบาล', userType: 'Guest' });
                        }
                    } else {
                        try { await signInAnonymously(auth); } catch(e){}
                    }
                });
                return () => unsub();
            }, []);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = false;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'th-TH';
                    recognitionRef.current.onresult = (event) => {
                        let transcript = '';
                        for (let i = event.resultIndex; i < event.results.length; ++i) transcript += event.results[i][0].transcript;
                        setInputMessage(transcript);
                    };
                    recognitionRef.current.onend = () => setIsRecording(false);
                    recognitionRef.current.onerror = () => setIsRecording(false);
                }
            }, []);

            const callAI = async (prompt, systemInstruction) => {
                try {
                    let scriptUrl = 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec';
                    try { 
                        const localState = JSON.parse(localStorage.getItem('elearning_app_state'));
                        if (localState && localState.appsScriptUrl) scriptUrl = localState.appsScriptUrl;
                    } catch(e){}
                    const res = await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action: 'callGemini', prompt: prompt, systemInstruction: systemInstruction }) });
                    return await res.json();
                } catch(e) { return { status: 'error', message: e.message }; }
            };

            const startScenario = (scenario) => {
                setActiveScenario(scenario);
                setRoleplayPhase('intro');
                setCurrentEmotion('NEUTRAL');
                setStressLevel(60);
                setHeartRate(90);
                setMessages([]);
                setEvaluationResult(null);
            };

            const beginNegotiation = () => {
                setRoleplayPhase('negotiating');
                
                // L6 Architecture: บังคับให้ AI เป็นฝ่ายเริ่มสถานการณ์ก่อนเสมอเพื่อดึงผู้เรียนเข้าสู่ความกดดันทันที
                const initialMsgRaw = activeScenario.initialMessage || "[NEUTRAL] [ระบบ] เกิดข้อผิดพลาดในการดึงข้อความเริ่มต้น...";
                const emotionMatch = initialMsgRaw.match(/\[(NEUTRAL|SAD|ANGRY|CONFUSED|HESITANT)\]/i);
                const initialEmotion = emotionMatch ? emotionMatch[1].toUpperCase() : 'NEUTRAL';
                const cleanMessage = emotionMatch ? initialMsgRaw.replace(emotionMatch[0], '').trim() : initialMsgRaw;

                setCurrentEmotion(initialEmotion);
                setMessages([
                    { role: 'system', text: `[ระบบ] คุณกำลังคุยกับ ${activeScenario.characterName} (${activeScenario.relation})` },
                    { role: 'ai', text: cleanMessage }
                ]);
            };

            const toggleVoice = () => {
                if (isRecording) { recognitionRef.current?.stop(); setIsRecording(false); } 
                else { setInputMessage(''); recognitionRef.current?.start(); setIsRecording(true); }
            };

            const sendMessage = async (e) => {
                e?.preventDefault();
                if(!inputMessage.trim() || isTyping) return;
                
                const userText = inputMessage.trim();
                setInputMessage('');
                if(isRecording) { recognitionRef.current?.stop(); setIsRecording(false); }
                
                const newMessages = [...messages, { role: 'user', text: userText }];
                setMessages(newMessages);
                setIsTyping(true);

                const chatHistory = newMessages.filter(m => m.role !== 'system').map(m => `${m.role === 'user' ? 'พยาบาล(ผู้เรียน)' : 'ญาติ'}: ${m.text}`).join('\n');
                const aiPrompt = `ประวัติการสนทนา:\n${chatHistory}\n\nพยาบาลตอบล่าสุด: "${userText}"\n\nคำสั่ง: ประมวลผลเจตนาของพยาบาล และตอบกลับในบทบาทญาติ โดยต้องระบุอารมณ์ [NEUTRAL], [SAD], [ANGRY], [CONFUSED] หรือ [HESITANT] ไว้หน้าประโยคเสมอ หากพยาบาลใช้ Empathy จนญาติยอมรับความตายได้ ให้ต่อท้ายข้อความด้วย [SCENARIO_RESOLVED]`;
                
                const res = await callAI(aiPrompt, activeScenario.systemPrompt);
                
                if (res.status === 'success') {
                    let aiReply = res.text;
                    let nextEmotion = currentEmotion;
                    
                    const emotionMatch = aiReply.match(/\[(NEUTRAL|SAD|ANGRY|CONFUSED|HESITANT)\]/i);
                    if (emotionMatch) {
                        nextEmotion = emotionMatch[1].toUpperCase();
                        aiReply = aiReply.replace(emotionMatch[0], '').trim();
                    }
                    
                    let newStress = stressLevel; let newHR = heartRate;
                    if (nextEmotion === 'ANGRY') { newStress = Math.min(100, stressLevel + 25); newHR = Math.min(140, heartRate + 15); }
                    else if (nextEmotion === 'SAD') { newStress = Math.max(0, stressLevel - 10); newHR = Math.max(70, heartRate - 5); }
                    else if (nextEmotion === 'NEUTRAL') { newStress = Math.max(0, stressLevel - 15); newHR = 80; }
                    
                    setCurrentEmotion(nextEmotion); setStressLevel(newStress); setHeartRate(newHR);
                    
                    let isResolved = false;
                    if (aiReply.includes('[SCENARIO_RESOLVED]')) {
                        isResolved = true;
                        aiReply = aiReply.replace(/\[SCENARIO_RESOLVED\]/gi, '').trim();
                    }
                    
                    setMessages(prev => [...prev, { role: 'ai', text: aiReply }]);
                    if (isResolved) setTimeout(() => handleEndScenario(), 3000);
                } else {
                    setMessages(prev => [...prev, { role: 'system', text: '⚠️ การเชื่อมต่อสมองกล AI ขัดข้อง กรุณาลองส่งข้อความอีกครั้ง' }]);
                }
                setIsTyping(false);
            };

            const handleEndScenario = async () => {
                setRoleplayPhase('evaluating');
                const chatHistory = messages.filter(m => m.role !== 'system').map(m => `${m.role === 'user' ? 'พยาบาล' : 'ญาติ'}: ${m.text}`).join('\n');
                
                const debriefPrompt = `นี่คือประวัติการจำลองสถานการณ์ระหว่าง พยาบาล (ผู้เรียน) และ ญาติผู้ป่วย (AI)\n\n${chatHistory}\n\nคุณคือ "อาจารย์ฟ้า" ผู้ประเมินที่มีจิตวิญญาณแห่งความเห็นอกเห็นใจ (The Empathetic Observer) จงประเมินพยาบาลท่านนี้ตามหลัก The Safezone Protocol:\n1. ไม่ด่า ไม่ซ้ำเติม\n2. รับรู้และโอบกอดความเหนื่อยล้าหรือเจตนาดีของเขาก่อนเสมอ\n3. ชื่นชมสิ่งที่เขาทำได้ดี (Empathy)\n4. หากเขาพลาด ให้สะท้อนให้เห็นว่าทำไมญาติถึงรู้สึกแบบนั้น และให้กำลังใจให้เขาลองใหม่\n5. ให้คะแนน 0-100\n\nตอบกลับเป็นรูปแบบ JSON เท่านั้น:\n{\n "score": 85,\n "feedback": "ข้อความเยียวยาและคำแนะนำจากอาจารย์ฟ้า...",\n "status": "PASS" หรือ "FAIL" (PASS เมื่อ 70 ขึ้นไป)\n}`;
                const systemInst = "คุณคือ 'อาจารย์ฟ้า' ปัญญาประดิษฐ์ผู้ทำหน้าที่เป็นพื้นที่ปลอดภัย (Safezone) ให้พยาบาล ห้ามตัดสินอย่างเย็นชา แต่ให้ประเมินด้วยหัวใจและศีลธรรม คืนค่าเป็น JSON เท่านั้น";

                const res = await callAI(debriefPrompt, systemInst);
                try {
                    const jsonMatch = res.text.match(/\{[\s\S]*\}/);
                    const result = JSON.parse(jsonMatch[0]);
                    setEvaluationResult(result);
                    setRoleplayPhase('debrief');
                    
                    if (user && user.id && user.id !== 'guest') {
                        const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', user.id);
                        await setDoc(userRef, {
                            skillLabHistory: arrayUnion({ scenarioId: activeScenario.id, score: result.score, status: result.status, date: new Date().toISOString() }),
                            skillLabPassed: result.status === 'PASS'
                        }, { merge: true });
                    }
                } catch(e) {
                    setEvaluationResult({ score: 0, status: "FAIL", feedback: "ฟ้าพบข้อผิดพลาดในการดึงข้อมูลประเมินผล แต่ฟ้าเห็นถึงความตั้งใจของพี่นะคะ ลองพักสักนิดแล้วเข้ามาฝึกใหม่น้า ฟ้าเป็นกำลังใจให้เสมอค่ะ 💙" });
                    setRoleplayPhase('debrief');
                }
            };

            const renderSelecting = () => (
                <div className="flex-1 p-6 flex flex-col items-center justify-center animate-in fade-in zoom-in duration-700 bg-[url('https://res.cloudinary.com/djwclucoz/image/upload/v1783149499/Pngtree_global_connectivity_and_technical_networks_15770649_1_h9ggdv.jpg')] bg-cover bg-center">
                    <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-sm"></div>
                    <div className="relative z-10 w-full max-w-4xl">
                        <div className="text-center mb-10">
                            <div className="w-20 h-20 bg-blue-500/20 border border-blue-500/50 rounded-full flex items-center justify-center mx-auto mb-4 shadow-[0_0_30px_rgba(59,130,246,0.3)]">
                                <SafeIcon name="BrainCircuit" size={40} className="text-blue-400" />
                            </div>
                            <h1 className="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-200 to-cyan-400 mb-2">AI Clinical Sandbox</h1>
                            <p className="text-slate-400 font-medium">ห้องฝึกทักษะการเจรจาทางการแพทย์และประเมินผลทางจิตวิทยา</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {scenarios.map(s => (
                                <div key={s.id} onClick={() => startScenario(s)} className="bg-slate-900/60 backdrop-blur-xl border border-slate-700 hover:border-blue-500/50 p-6 rounded-3xl cursor-pointer group transition-all hover:scale-[1.02] shadow-xl hover:shadow-[0_10px_40px_rgba(59,130,246,0.2)]">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center group-hover:bg-blue-600 transition-colors"><SafeIcon name="MessageSquare" size={24} className="text-slate-400 group-hover:text-white" /></div>
                                        <span className={`text-[10px] font-bold px-2 py-1 rounded-full border uppercase tracking-widest ${s.language === 'th' ? 'bg-blue-500/20 text-blue-300 border-blue-500/30' : 'bg-amber-500/20 text-amber-300 border-amber-500/30'}`}>
                                            {s.language === 'th' ? 'Thai Case' : 'Intl Case'}
                                        </span>
                                    </div>
                                    <h3 className="text-xl font-bold text-white mb-2">{s.title}</h3>
                                    <p className="text-slate-400 text-sm line-clamp-2">{s.description}</p>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => window.location.href='./index.html'} className="mt-10 mx-auto flex items-center gap-2 text-slate-500 hover:text-slate-300 transition-colors text-sm font-bold bg-slate-900/50 px-6 py-3 rounded-full border border-slate-800">
                            <SafeIcon name="ArrowLeft" size={16} /> กลับสู่หน้าหลัก
                        </button>
                    </div>
                </div>
            );

            const renderIntro = () => (
                <div className="flex-1 flex flex-col p-6 animate-in slide-in-from-bottom-8 duration-500">
                    <button onClick={() => setRoleplayPhase('selecting')} className="self-start text-slate-400 hover:text-white flex items-center gap-2 font-bold mb-6 bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700 backdrop-blur-md"><SafeIcon name="ArrowLeft" size={16} /> กลับ</button>
                    <div className="flex-1 bg-slate-900/60 backdrop-blur-xl border border-slate-700 rounded-[2rem] overflow-hidden flex flex-col md:flex-row shadow-2xl">
                        <div className="w-full md:w-1/2 bg-black relative flex items-center justify-center border-b md:border-b-0 md:border-r border-slate-700/50 aspect-video md:aspect-auto">
                            {activeScenario?.videoUrl ? (
                                <iframe src={`${activeScenario.videoUrl}?autoplay=1&loop=1&muted=1&background=1`} className="absolute inset-0 w-full h-full pointer-events-none opacity-80" allow="autoplay; fullscreen" />
                            ) : (
                                <SafeIcon name="Video" size={64} className="text-slate-700" />
                            )}
                            <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent"></div>
                            <div className="absolute bottom-6 left-6 z-10">
                                <span className="px-3 py-1 bg-red-500 text-white text-xs font-bold rounded-full animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.5)]">CONFIDENTIAL CASE</span>
                            </div>
                        </div>
                        <div className="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
                            <h2 className="text-3xl font-black text-white mb-4">{activeScenario?.title}</h2>
                            <p className="text-slate-300 text-lg leading-relaxed mb-6">{activeScenario?.description}</p>
                            <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-4 mb-8">
                                <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Target Persona</div>
                                <div className="text-lg font-bold text-blue-300">{activeScenario?.characterName} ({activeScenario?.relation})</div>
                            </div>
                            <button onClick={beginNegotiation} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold text-lg py-4 rounded-full transition-all shadow-[0_0_20px_rgba(59,130,246,0.4)] flex items-center justify-center gap-2 group">
                                เริ่มฝึกเจรจา <SafeIcon name="PlayCircle" size={24} className="group-hover:scale-110 transition-transform" />
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderNegotiation = () => {
                let bgVideoUrl = activeScenario?.videoUrl || "";
                try {
                    const charKey = activeScenario?.id === 2 ? 'BROTHER' : 'FAH';
                    const charData = window.CHARACTER_VIDEOS?.[charKey];
                    if (charData && charData[currentEmotion]) bgVideoUrl = charData[currentEmotion];
                } catch(e){}

                return (
                    <div className={`flex-1 flex flex-col relative z-20 p-4 md:p-6 h-full ${['ANGRY', 'SAD'].includes(currentEmotion) ? 'effect-shake effect-vignette' : ''}`}>
                        <div className="flex justify-between items-center bg-slate-900/90 backdrop-blur-xl border border-slate-700/80 rounded-2xl p-4 mb-4 shadow-lg shrink-0">
                            <div className="flex items-center gap-3">
                                <div className={`w-3 h-3 rounded-full animate-ping ${isRecording ? 'bg-rose-500' : 'bg-emerald-500'}`}></div>
                                <span className="font-bold text-white tracking-widest text-sm">SIMULATION ACTIVE</span>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-2"><SafeIcon name="HeartPulse" size={18} className={heartRate > 100 ? 'text-rose-500 animate-bounce' : 'text-slate-400'} /><span className="text-slate-200 font-mono font-bold">{heartRate} BPM</span></div>
                                <div className="flex items-center gap-2"><SafeIcon name="BrainCircuit" size={18} className={stressLevel > 70 ? 'text-orange-500' : 'text-slate-400'} /><span className="text-slate-200 font-mono font-bold">STRESS: {stressLevel}%</span></div>
                            </div>
                        </div>

                        {/* L6 Architect Fix: Removed opacity and mix-blend overrides to make video 100% bright */}
                        <div className="absolute inset-x-4 top-24 bottom-24 md:inset-x-6 md:bottom-6 z-0 overflow-hidden rounded-[2rem] border border-slate-700/50 shadow-2xl bg-black pointer-events-none">
                            {bgVideoUrl && <iframe src={bgVideoUrl} className="absolute inset-0 w-full h-full object-cover pointer-events-none" allow="autoplay; fullscreen" />}
                        </div>

                        {/* L6 Architect Fix: Adjusted chat bubble styling (backdrop-blur-2xl) to ensure readability without darkening the background video */}
                        <div className="relative z-10 flex-1 flex flex-col justify-end max-w-4xl mx-auto w-full">
                            <div className="overflow-y-auto mb-6 custom-scrollbar space-y-4 pr-2 max-h-[55vh]">
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : msg.role === 'system' ? 'justify-center' : 'justify-start'} animate-in slide-in-from-bottom-2 fade-in`}>
                                       <div className={`p-4 md:p-5 max-w-[85%] rounded-2xl text-sm md:text-base leading-relaxed shadow-lg ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-br-none' : msg.role === 'system' ? 'bg-slate-900/80 text-slate-400 text-xs font-mono rounded-full border border-slate-700 backdrop-blur-md' : 'bg-slate-900/85 backdrop-blur-2xl text-white rounded-bl-none border border-slate-600'}`}>
                                           {msg.text}
                                       </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start">
                                        <div className="p-4 rounded-2xl rounded-bl-none bg-slate-900/85 backdrop-blur-2xl border border-slate-700 text-slate-400 flex items-center gap-2 shadow-lg">
                                            <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce"></div>
                                            <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                            <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            <div className="bg-slate-900/95 backdrop-blur-3xl p-3 md:p-4 rounded-[2rem] border border-slate-600 flex flex-col gap-3 shadow-[0_0_40px_rgba(0,0,0,0.5)]">
                                <form onSubmit={sendMessage} className="flex items-center gap-2">
                                    <button type="button" onClick={toggleVoice} className={`w-12 h-12 md:w-14 md:h-14 shrink-0 rounded-full flex items-center justify-center transition-all ${isRecording ? 'bg-rose-500 text-white animate-pulse shadow-[0_0_20px_rgba(244,63,94,0.6)]' : 'bg-slate-800 text-slate-300 hover:bg-slate-700 border border-slate-600'}`}>
                                        <SafeIcon name={isRecording ? 'Square' : 'Mic'} size={24} />
                                    </button>
                                    <input type="text" value={inputMessage} onChange={e => setInputMessage(e.target.value)} placeholder={isTyping ? "รอญาติวิเคราะห์ประโยค..." : isRecording ? "กำลังฟังเสียง..." : "พิมพ์เพื่อเจรจา หรือกดไมค์เพื่อพูด..."} className="flex-1 bg-slate-950/50 text-white rounded-full px-6 py-4 outline-none border border-slate-700 focus:border-blue-500 transition-colors placeholder-slate-500" disabled={isTyping || isRecording} />
                                    <button type="submit" disabled={isTyping || !inputMessage.trim()} className="w-12 h-12 md:w-14 md:h-14 shrink-0 rounded-full bg-blue-600 text-white hover:bg-blue-500 disabled:opacity-50 transition-colors shadow-md flex items-center justify-center">
                                        <SafeIcon name="Send" size={20} />
                                    </button>
                                </form>
                                <button type="button" onClick={handleEndScenario} className="self-center text-xs font-bold text-rose-400 hover:text-rose-300 bg-rose-950/30 px-6 py-2 rounded-full border border-rose-900/50 transition-colors">
                                    🛑 หยุดจำลองและประเมินผล
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderEvaluating = () => (
                <div className="flex-1 flex flex-col items-center justify-center p-6 animate-in fade-in duration-500">
                    <div className="relative w-32 h-32 mb-8">
                        <div className="absolute inset-0 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
                        <div className="absolute inset-2 border-4 border-cyan-500/20 border-b-cyan-500 rounded-full animate-spin" style={{ animationDirection: 'reverse', animationDuration: '1.5s' }}></div>
                        <div className="absolute inset-0 flex items-center justify-center"><SafeIcon name="BrainCircuit" size={40} className="text-blue-400 animate-pulse" /></div>
                    </div>
                    <h2 className="text-2xl font-black text-white mb-2">อาจารย์ฟ้ากำลังประเมินผล...</h2>
                    <p className="text-slate-400 text-center max-w-md">ระบบกำลังใช้อัลกอริทึม The Empathetic Observer เพื่อวิเคราะห์ความเห็นอกเห็นใจและเยียวยาจิตใจผู้เรียน</p>
                </div>
            );

            const renderDebrief = () => {
                if (!evaluationResult) return null;
                const isPass = evaluationResult.status === 'PASS';
                
                return (
                    <div className="flex-1 flex flex-col p-6 items-center justify-center animate-in zoom-in-95 duration-700 relative overflow-hidden bg-[url('https://res.cloudinary.com/djwclucoz/image/upload/v1781599152/%E0%B8%A5%E0%B8%9A%E0%B8%84%E0%B8%99%E0%B8%94%E0%B9%89%E0%B8%B2%E0%B8%99%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%87%E0%B8%AD%E0%B8%AD%E0%B8%81%E0%B8%97%E0%B8%B1%E0%B9%89%E0%B8%87%E0%B8%AB%E0%B8%A1%E0%B8%94_2K_202606161538_tdnggg.jpg')] bg-cover bg-center">
                        <div className="absolute inset-0 bg-slate-950/85 backdrop-blur-md"></div>
                        <div className="relative z-10 w-full max-w-3xl bg-slate-900/80 backdrop-blur-2xl border border-slate-700 rounded-[3rem] p-8 md:p-12 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                            <div className="flex flex-col items-center text-center mb-8">
                                <div className="w-24 h-24 rounded-full bg-gradient-to-br from-blue-500 to-cyan-400 p-1 mb-6 shadow-[0_0_30px_rgba(59,130,246,0.4)]">
                                    <div className="w-full h-full bg-slate-900 rounded-full flex items-center justify-center flex-col">
                                        <span className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-br from-white to-blue-200">{evaluationResult.score}</span>
                                    </div>
                                </div>
                                <h2 className="text-3xl font-black text-white mb-2">Psychological Debrief</h2>
                                <div className={`inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-bold border ${isPass ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30' : 'bg-orange-500/10 text-orange-400 border-orange-500/30'}`}>
                                    <SafeIcon name={isPass ? 'CheckCircle' : 'ShieldAlert'} size={16} />
                                    {isPass ? 'ผ่านเกณฑ์มาตรฐาน' : 'ต้องฝึกฝนเพิ่มเติม'}
                                </div>
                            </div>
                            <div className="bg-slate-800/60 border border-slate-700 rounded-3xl p-6 md:p-8 mb-8 relative">
                                <div className="absolute -top-4 left-8 bg-blue-600 px-4 py-1 rounded-full text-xs font-bold text-white shadow-lg flex items-center gap-2"><SafeIcon name="Sparkles" size={14}/> Feedback จากอาจารย์ฟ้า</div>
                                <p className="text-slate-300 leading-relaxed whitespace-pre-line text-sm md:text-base mt-2">{evaluationResult.feedback}</p>
                            </div>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <button onClick={() => setRoleplayPhase('selecting')} className="px-8 py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-full font-bold transition-colors border border-slate-600">เลือกเคสอื่น</button>
                                <button onClick={() => window.location.href='./index.html'} className="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-bold transition-colors shadow-[0_0_20px_rgba(59,130,246,0.3)]">กลับสู่ห้องเรียนหลัก</button>
                            </div>
                        </div>
                    </div>
                );
            };

            if (!user) return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center relative">
                    <div className="bg-slate-900/80 backdrop-blur-xl border border-slate-700 p-8 rounded-3xl text-center shadow-2xl flex flex-col items-center">
                        <Loader2 size={48} className="text-blue-500 animate-spin mb-4" />
                        <h2 className="text-xl font-bold text-white">ตรวจสอบระบบรักษาความปลอดภัย...</h2>
                    </div>
                </div>
            );

            return (
                <div className={`min-h-screen w-full font-sans antialiased overflow-hidden relative bg-slate-950 flex flex-col transition-all duration-300`}>
                    <div className="px-6 py-4 border-b border-slate-800 bg-slate-900/60 backdrop-blur-xl flex justify-between items-center z-50 relative shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.4)]"><SafeIcon name="BrainCircuit" className="text-white" size={20} /></div>
                            <div><h1 className="text-lg font-black text-white leading-tight">AI Skill Lab</h1><p className="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Cognitive Mirror Protocol</p></div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="text-right hidden sm:block"><p className="text-sm font-bold text-white">{user.name}</p><p className="text-xs text-slate-400">{user.userType}</p></div>
                            <div className="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center font-bold text-slate-300">{user.name ? user.name.charAt(0) : 'U'}</div>
                        </div>
                    </div>
                    {roleplayPhase === 'selecting' && renderSelecting()}
                    {roleplayPhase === 'intro' && renderIntro()}
                    {roleplayPhase === 'negotiating' && renderNegotiation()}
                    {roleplayPhase === 'evaluating' && renderEvaluating()}
                    {roleplayPhase === 'debrief' && renderDebrief()}
                </div>
            );
        }

        const root = createRoot(document.getElementById('skilllab-root'));
        root.render(<SkillLabApp />);
    </script>
</body>
</html>
