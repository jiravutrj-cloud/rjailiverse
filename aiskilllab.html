        const { ArrowLeft, PlayCircle, Bot, Volume2, X, Send, Mic, Image: ImageIcon, Brain, Target, TrendingUp, CheckCircle2, Lock, Clock, Lightbulb, Activity } = LucideIcons;

        const FAH_IDLE_VIDEO = window.FAH_IDLE_VIDEO || "";

        const SKILL_LAB_SCENARIOS = window.SKILL_LAB_SCENARIOS || [];

        let app, auth, db, appId = 'fah-elearning-prod';
        try {
          const fbP1 = "AIzaSyBs275"; const fbP2 = "NY99gdv1uZdAnb"; const fbP3 = "mx3UlWO8K4o5a0";
          let fbConfig = (typeof __firebase_config !== 'undefined' && __firebase_config)

          app = getApps().length === 0 ? initializeApp(fbConfig) : getApp();

        const appsScriptUrl = 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec';

        const fetchAppsScript = async (payload) => {

        const callGeminiAPI = async (prompt, systemInstruction, base64Image = null) => {
            try {
                const res = await fetchAppsScript({ action: 'callGemini', prompt: prompt, systemInstruction: systemInstruction, base64Image: base64Image });
                if (res.status === 'success' && res.text) return res.text;
                throw new Error(res.message || "ไม่มีข้อมูลตอบกลับจาก AI");
            } catch (e) { return `[ระบบขัดข้อง] ${e.message}`; }
        };

        const callGeminiTTS = async (text, voiceName = "Aoede") => {
            for (let i = 0; i < 3; i++) {
                try {
                    const res = await fetchAppsScript({ action: 'callGeminiTTS', text: text, voiceName: voiceName });
                    if (res.status === 'success' && res.inlineData) return res.inlineData;
                    throw new Error(res.message || 'TTS Error');
                } catch (e) { if (i < 2) await new Promise(r => setTimeout(r, 2000)); else throw e; }
            }
        };

        const pcm16ToWav = (base64PCM, sampleRate = 24000) => {
          const binaryString = window.atob(base64PCM); const bytes = new Uint8Array(binaryString.length); for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
          const buffer = new ArrayBuffer(44 + bytes.length); const view = new DataView(buffer);
          const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
          writeStr(0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, bytes.length, true);
          new Uint8Array(buffer, 44).set(bytes); return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        };

        function GlassCard({ children, className = "", onClick, ...rest }) {
          let radiusClass = 'rounded-[2rem]'; const m = className.match(/rounded-(?:\[.*?\]|\w+)/); if (m) radiusClass = m[0];
          let bgClass = className.replace(/\bbg-(?:white|slate-[12]00)(?:\/\d+)?\b/g, '').replace(/\bborder-white(?:\/\d+)?\b/g, '').replace(/\bbackdrop-blur-(?:sm|md|lg|xl|2xl|3xl)\b/g, '').replace(/\b!border-none\b/g, '').replace(/\bborder-none\b/g, '');
          return (
            <div onClick={onClick} className={`relative overflow-hidden bg-white/10 backdrop-blur-xl border border-white/20 shadow-xl ${radiusClass} transition-all duration-300 ${onClick ? 'cursor-pointer hover:-translate-y-1 hover:bg-white/20' : ''} ${bgClass}`} {...rest}>
              <div className="absolute inset-0 bg-gradient-to-br from-white/20 via-white/5 to-transparent pointer-events-none z-0" />
              <div className="relative z-10 w-full h-full text-white">{children}</div>
            </div>
          );
        }

        function SkillLabApp() {
            const [user, setUser] = useState(null);
            const [selectedScenario, setSelectedScenario] = useState(null);
            const [accessDenied, setAccessDenied] = useState(false); 
            
            // Chatbot States
            const [chatInput, setChatInput] = useState(''); 
            const [isTyping, setIsTyping] = useState(false); 
            const [messages, setMessages] = useState([]); 
            const [isListening, setIsListening] = useState(false); 
            const [isVadMode, setIsVadMode] = useState(false); 
            const [audioLevel, setAudioLevel] = useState(0); 
            const [selectedImage, setSelectedImage] = useState(null);
            const [uiMessage, setUiMessage] = useState({ show: false, text: '', type: 'success' });
            
            // Next-Gen Features States
            const [smartSuggestions, setSmartSuggestions] = useState([]); 
            const [pressureTime, setPressureTime] = useState(20); 
            
            // TTS & Waveform States
            const [isAiSpeaking, setIsAiSpeaking] = useState(false);
            
            // Roleplay States
            const [roleplayPhase, setRoleplayPhase] = useState('none'); 
            const [currentEmotion, setCurrentEmotion] = useState('NEUTRAL');
            const [currentSpeaker, setCurrentSpeaker] = useState('FAH');
            const [scenarioLang, setScenarioLang] = useState('th');
            const [currentScenarioPrompt, setCurrentScenarioPrompt] = useState('');

            const audioContextRef = useRef(null); const analyserRef = useRef(null); const microphoneRef = useRef(null); const vadSilenceTimerRef = useRef(null); const isSpeakingRef = useRef(false); const latestTranscriptRef = useRef('');
            const recognitionRef = useRef(null); const messagesEndRef = useRef(null); const audioRef = useRef(null); const currentSpeechIdRef = useRef(0);
            
            const ttsCanvasRef = useRef(null);
            const ttsAudioCtxRef = useRef(null);
            const ttsAnalyserRef = useRef(null);
            const ttsAnimFrameRef = useRef(null);

            const showMsg = (text, type = 'success') => {
                setUiMessage({ show: true, text, type });
                setTimeout(() => setUiMessage({ show: false, text: '', type }), 3500);
            };

            const safeRedirect = (url) => {
                try { window.location.href = url; } catch (e) { console.warn("Redirect blocked:", url); }
            };

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('elearning_app_state');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.loggedInUser) {
                            const uType = parsed.loggedInUser.userType;
                            if (uType !== 'Masterclass') {
                                setAccessDenied(true);
                                return;
                            }
                            setUser(parsed.loggedInUser);
                            signInAnonymously(auth).catch(e => console.warn(e));
                        } else {
                            safeRedirect('./index.html');
                        }
                    } else {
                        safeRedirect('./index.html');
                    }
                } catch (e) { safeRedirect('./index.html'); }
            }, []);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, smartSuggestions]);

            useEffect(() => {
                let timer;
                if (roleplayPhase === 'negotiating' && !isTyping && !isAiSpeaking && messages.length > 0 && messages[messages.length-1].sender === 'ai') {
                    timer = setInterval(() => {
                        setPressureTime(p => {
                            if (isListening || chatInput.length > 0 || isAiSpeaking) return p; 
                            if (p <= 1) {
                                clearInterval(timer);
                                handleAutoTimeout(); 
                                return 20;
                            }
                            return p - 1;
                        });
                    }, 1000);
                } else {
                    setPressureTime(20); 
                }
                return () => clearInterval(timer);
            }, [roleplayPhase, isTyping, messages, isListening, chatInput, isAiSpeaking]);

            const handleAutoTimeout = () => { handleSendChat(null, "[ผู้เรียนเงียบ ไม่ตอบสนองทันเวลา]"); };

            useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    recognitionRef.current = new SR(); recognitionRef.current.continuous = true; recognitionRef.current.interimResults = true; recognitionRef.current.lang = 'th-TH'; 
                    recognitionRef.current.onresult = (e) => { let finalT = ''; let interT = ''; for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) finalT += e.results[i][0].transcript; else interT += e.results[i][0].transcript; } setChatInput(p => { const newText = p + finalT; latestTranscriptRef.current = newText || interT; return newText || interT; }); };
                    recognitionRef.current.onend = () => { if (isVadMode && isListening) { try { recognitionRef.current.start(); } catch(err){} } else { setIsListening(false); setChatInput(curr => { const corText = curr.trim(); if (corText && corText !== 'พร้อม') handleSendChat(null, corText); return curr; }); } };
                    recognitionRef.current.onerror = (e) => { if(e.error !== 'no-speech') setIsListening(false); };
                }
            }, [selectedScenario, messages, isVadMode, isListening]);

            const processAudio = useCallback(() => {
                if (!analyserRef.current || !isListening || !isVadMode) return;
                const dataArr = new Uint8Array(analyserRef.current.frequencyBinCount); analyserRef.current.getByteFrequencyData(dataArr);
                let sum = 0; for (let i = 0; i < dataArr.length; i++) sum += dataArr[i]; const avg = sum / dataArr.length; setAudioLevel(avg);
                if (avg > 15) { if (!isSpeakingRef.current) isSpeakingRef.current = true; if (vadSilenceTimerRef.current) { clearTimeout(vadSilenceTimerRef.current); vadSilenceTimerRef.current = null; } } else { if (isSpeakingRef.current && !vadSilenceTimerRef.current) { vadSilenceTimerRef.current = setTimeout(() => { isSpeakingRef.current = false; const finalSp = latestTranscriptRef.current.trim(); if (finalSp) { handleSendChat(null, finalSp); setChatInput(''); latestTranscriptRef.current = ''; } vadSilenceTimerRef.current = null; }, 800); } }
                if (isListening && isVadMode) requestAnimationFrame(processAudio);
            }, [isListening, isVadMode]);

            const startVAD = async () => { try { if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("NotSupportedError"); const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)(); analyserRef.current = audioContextRef.current.createAnalyser(); microphoneRef.current = audioContextRef.current.createMediaStreamSource(stream); microphoneRef.current.connect(analyserRef.current); analyserRef.current.fftSize = 256; setIsVadMode(true); setIsListening(true); recognitionRef.current?.start(); processAudio(); showMsg('🎙️ เปิดโหมด VAD'); } catch (err) { showMsg('ไมค์ไม่ทำงาน', 'error'); } };
            const stopVAD = () => { setIsVadMode(false); setIsListening(false); recognitionRef.current?.stop(); if (audioContextRef.current) audioContextRef.current.close(); if (vadSilenceTimerRef.current) clearTimeout(vadSilenceTimerRef.current); showMsg('ปิดไมโครโฟนแล้ว', 'success'); };
            const toggleMic = () => { if (isListening) stopVAD(); else { setChatInput(''); latestTranscriptRef.current = ''; startVAD(); } };

            const stopAudio = useCallback(() => { 
                currentSpeechIdRef.current += 1; 
                setIsAiSpeaking(false);
                if(ttsAnimFrameRef.current) cancelAnimationFrame(ttsAnimFrameRef.current);
                if(ttsCanvasRef.current) ttsCanvasRef.current.getContext('2d').clearRect(0, 0, ttsCanvasRef.current.width, ttsCanvasRef.current.height);
                if (audioRef.current) { audioRef.current.pause(); audioRef.current.removeAttribute('src'); audioRef.current.load(); audioRef.current = null; } 
            }, []);
            
            const speakThai = async (text, onEndCallback = null, speaker = 'FAH', isSystemVoice = false, emotion = 'NEUTRAL') => {
                stopAudio(); currentSpeechIdRef.current += 1; const speechId = currentSpeechIdRef.current; 
                
                let targetVoice = "Aoede"; 
                let cleanSpeakText = text.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').replace(/\*.*?\*/g, '').replace(/#.*?#/g, '').replace(/^(ฟ้า|เมฆ|พี่เอก|เอก|น้องชาย|ลูกสาว|แฟน|แฟนของฟ้า|Fah|Mek|Brother|Sister|Boyfriend|AI)\s*:\s*/i, '').trim();
                let emotionPrompt = "";
                
                if (isListening) { recognitionRef.current?.stop(); setIsListening(false); }
                
                if (isSystemVoice) {
                    targetVoice = "Aoede";
                    emotionPrompt = `[พูดด้วยเสียงผู้ประกาศหญิง น้ำเสียงเป็นทางการ สุภาพ นุ่มนวล ใจดี ให้กำลังใจ ไม่ร้องไห้]: ${cleanSpeakText}`;
                } else {
                    if (speaker === 'BROTHER') { targetVoice = "Charon"; emotionPrompt = `[พูดด้วยเสียงผู้ชายวัยรุ่น 18 ปี กำลังอารมณ์เสียและเศร้าเสียใจ]: ${cleanSpeakText}`; } 
                    else if (speaker === 'BOYFRIEND') { targetVoice = "Charon"; emotionPrompt = `[พูดด้วยเสียงผู้ชายวัยผู้ใหญ่ นุ่มนวล อบอุ่น ใจเย็น สุภาพ และคอยให้กำลังใจ]: ${cleanSpeakText}`; } 
                    else { targetVoice = "Aoede"; emotionPrompt = `[พูดด้วยเสียงผู้หญิงวัยรุ่น 22 ปี กำลังร้องไห้และสับสน]: ${cleanSpeakText}`; }
                }

                try {
                    const inlineData = await callGeminiTTS(emotionPrompt, targetVoice); 
                    if (speechId !== currentSpeechIdRef.current) return;
                    const sampleRate = parseInt(inlineData.mimeType.match(/rate=(\d+)/)?.[1] ?? "24000", 10); 
                    const audioUrl = pcm16ToWav(inlineData.data, sampleRate);
                    const audio = new Audio(audioUrl); 
                    audio.crossOrigin = "anonymous";
                    audioRef.current = audio; 

                    if (!ttsAudioCtxRef.current) {
                        ttsAudioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                        ttsAnalyserRef.current = ttsAudioCtxRef.current.createAnalyser();
                        ttsAnalyserRef.current.fftSize = 512; 
                    }
                    if (ttsAudioCtxRef.current.state === 'suspended') ttsAudioCtxRef.current.resume();

                    const source = ttsAudioCtxRef.current.createMediaElementSource(audio);
                    source.connect(ttsAnalyserRef.current);
                    ttsAnalyserRef.current.connect(ttsAudioCtxRef.current.destination);

                    setIsAiSpeaking(true);

                    const drawWave = () => {
                        if (!ttsCanvasRef.current || !ttsAnalyserRef.current) return;
                        const canvas = ttsCanvasRef.current;
                        const ctx = canvas.getContext('2d');
                        
                        // ระบบคำศัพท์ประมวลผล (Floating Cognitive Data)
                        if (!canvas.floatingData) canvas.floatingData = [];
                        
                        // ระบบเครือข่ายสมอง (Holographic Neural Network)
                        if (!canvas.brainNodes) {
                            canvas.brainNodes = [];
                            for(let i=0; i<80; i++) {
                                let angle = Math.random() * Math.PI * 2;
                                let radiusX = Math.random() * 150;
                                let radiusY = Math.random() * 110;
                                canvas.brainNodes.push({
                                    ox: radiusX * Math.cos(angle),
                                    oy: radiusY * Math.sin(angle),
                                    baseRadius: 1.5 + Math.random() * 2,
                                    pulseSpeed: 0.05 + Math.random() * 0.1,
                                    pulseOffset: Math.random() * Math.PI * 2
                                });
                            }
                        }

                        const freqData = new Uint8Array(ttsAnalyserRef.current.frequencyBinCount);
                        const timeData = new Uint8Array(ttsAnalyserRef.current.frequencyBinCount);
                        
                        ttsAnalyserRef.current.getByteFrequencyData(freqData);
                        ttsAnalyserRef.current.getByteTimeDomainData(timeData);

                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        
                        // 🎨 Emotion Mapped Holographic Colors
                        const holographicColors = {
                            NEUTRAL: ['#00f2fe', '#4facfe', '#b224ef'], // Cyan -> Blue -> Purple
                            ADVISING: ['#00f2fe', '#4facfe', '#b224ef'],
                            ANGRY: ['#ff0844', '#ffb199', '#4a00e0'], // Red -> Orange -> Purple
                            SAD: ['#b224ef', '#7579ff', '#00c6ff'],   // Deep Purple -> Blue -> Cyan
                            CONFUSED: ['#f6d365', '#fda085', '#b224ef'], // Yellow -> Orange -> Purple
                            HESITANT: ['#00c6ff', '#0072ff', '#4a00e0'] // Cool Blue tech
                        };
                        
                        const colors = holographicColors[emotion] || holographicColors['NEUTRAL'];
                        
                        const mainGradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                        mainGradient.addColorStop(0, colors[2]); 
                        mainGradient.addColorStop(0.5, colors[0]); 
                        mainGradient.addColorStop(1, colors[1]); 

                        // กดคลื่นเสียงให้อยู่ต่ำลงมาบริเวณหน้าอก/มือ
                        const waveCenterY = canvas.height * 0.65; 
                        
                        // ตำแหน่งสมองอ้างอิงจากศีรษะผู้หญิงในภาพ
                        const brainCenterX = canvas.width * 0.45;
                        const brainCenterY = canvas.height * 0.28;

                        const now = performance.now() * 0.002;
                        const avgAmp = freqData.reduce((a,b)=>a+b,0)/freqData.length;

                        ctx.globalCompositeOperation = 'screen'; 

                        ctx.save();
                        ctx.translate(brainCenterX, brainCenterY);
                        
                        // วาด Neural Nodes (สมองโฮโลแกรม)
                        ctx.strokeStyle = colors[0];
                        ctx.fillStyle = colors[0];
                        ctx.lineWidth = 1;
                        
                        const pulseIntensity = (avgAmp / 255) * 1.5; 

                        for(let i=0; i<canvas.brainNodes.length; i++) {
                            let node = canvas.brainNodes[i];
                            let jx = Math.sin(now + node.pulseOffset) * 5;
                            let jy = Math.cos(now * 0.8 + node.pulseOffset) * 5;
                            
                            let nx = node.ox + jx;
                            let ny = node.oy + jy;
                            
                            let currentRadius = node.baseRadius + Math.sin(now * node.pulseSpeed + node.pulseOffset) * 1.5 + (pulseIntensity * 3);
                            
                            ctx.globalAlpha = 0.4 + pulseIntensity;
                            ctx.beginPath();
                            ctx.arc(nx, ny, Math.max(0.1, currentRadius), 0, Math.PI * 2);
                            ctx.shadowBlur = 10 + (pulseIntensity * 20);
                            ctx.shadowColor = colors[0];
                            ctx.fill();

                            ctx.globalAlpha = 0.15 + (pulseIntensity * 0.5);
                            ctx.shadowBlur = 0;
                            for(let j=i+1; j<canvas.brainNodes.length; j++) {
                                let node2 = canvas.brainNodes[j];
                                let dx = node.ox - node2.ox;
                                let dy = node.oy - node2.oy;
                                let dist = Math.sqrt(dx*dx + dy*dy);
                                if(dist < 50) { 
                                    ctx.beginPath();
                                    ctx.moveTo(nx, ny);
                                    let nx2 = node2.ox + Math.sin(now + node2.pulseOffset) * 5;
                                    let ny2 = node2.oy + Math.cos(now * 0.8 + node2.pulseOffset) * 5;
                                    ctx.lineTo(nx2, ny2);
                                    ctx.stroke();
                                }
                            }
                        }
                        ctx.restore();

                        // คำศัพท์ Cognitive ลอยฟุ้ง
                        const dataWords = ["SPEAK", "UNDERSTAND", "AI VOICE", "PROCESSING", "EMPATHY", "NEURAL", "DECODING", "SYNTHESIS", "ANALYZING"];
                        
                        if (Math.random() < 0.05 && avgAmp > 20) {
                            canvas.floatingData.push({
                                x: canvas.width * 0.2 + (Math.random() * canvas.width * 0.6), 
                                y: waveCenterY + (Math.random() - 0.5) * 400,
                                text: dataWords[Math.floor(Math.random() * dataWords.length)],
                                alpha: 1,
                                speedY: -0.2 - Math.random() * 0.5, 
                                scale: 0.6 + Math.random() * 0.8
                            });
                        }

                        ctx.textAlign = "center";
                        ctx.font = "bold 16px 'Inter', sans-serif";
                        for (let i = canvas.floatingData.length - 1; i >= 0; i--) {
                            let p = canvas.floatingData[i];
                            p.y += p.speedY;
                            p.alpha -= 0.005; 
                            
                            if (p.alpha <= 0) {
                                canvas.floatingData.splice(i, 1);
                                continue;
                            }
                            
                            ctx.globalAlpha = p.alpha * 0.6;
                            ctx.fillStyle = mainGradient;
                            ctx.shadowBlur = 15;
                            ctx.shadowColor = colors[0];
                            ctx.fillText(p.text, p.x, p.y);
                        }

                        const sliceWidth = canvas.width * 1.0 / timeData.length;

                        // วาดคลื่นเสียง (Voice Wave)
                        const drawStrand = (ampMult, freqMult, speedOffset, lineWidth, strokeColor, shadowBlur, shadowCol, opacity) => {
                            ctx.beginPath();
                            let wx = 0;
                            for(let i = 0; i < timeData.length; i++) {
                                const v = timeData[i] / 128.0; 
                                const envelope = Math.sin((i / timeData.length) * Math.PI); 
                                
                                let yDisp = (v - 1) * (canvas.height * 0.3) * ampMult * envelope;
                                const electricRipple = Math.sin(i * freqMult + now * 4 + speedOffset) * 40 * envelope * (freqData[i%freqData.length]/255);
                                yDisp += electricRipple;

                                let wy = waveCenterY + yDisp;

                                if(i === 0) ctx.moveTo(wx, wy);
                                else ctx.lineTo(wx, wy);
                                
                                wx += sliceWidth;
                            }
                            ctx.lineWidth = lineWidth;
                            ctx.strokeStyle = strokeColor;
                            ctx.globalAlpha = opacity;
                            ctx.shadowBlur = shadowBlur;
                            ctx.shadowColor = shadowCol;
                            ctx.stroke();
                        };

                        drawStrand(0.8, 0.1, 4, 3, '#ffffff', 15, '#ffffff', 0.9); // Center White Light
                        drawStrand(1.5, 0.15, 6, 1.5, colors[1], 10, colors[1], 0.4); // Erratic Neural String
                        drawStrand(0.5, 0.2, 8, 1, colors[0], 5, colors[0], 0.5); // Minor String

                        ctx.globalCompositeOperation = 'source-over'; 
                        ctx.globalAlpha = 1.0;
                        ctx.shadowBlur = 0;

                        ttsAnimFrameRef.current = requestAnimationFrame(drawWave);
                    };

                                    </div>
                                    <h2 className="text-2xl font-black text-white mb-4 drop-shadow-sm text-center lg:text-left">เลือกกรณีศึกษาเพื่อเริ่มฝึกเจรจา</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 overflow-y-auto custom-scrollbar pb-10">
                                        {SKILL_LAB_SCENARIOS.map((sc, idx) => (
                                            <GlassCard key={sc.id} onClick={() => startScenario(sc)} className="p-6 text-center border-t-4 border-t-cyan-500 hover:border-t-cyan-400 group">
                                                <div className={`w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-white shadow-[0_0_20px_rgba(0,0,0,0.5)] ${sc.language === 'en' ? 'bg-gradient-to-br from-indigo-500 to-purple-600' : 'bg-gradient-to-br from-cyan-500 to-blue-600'}`}>
                                                    <span className="text-xl font-black">{sc.language === 'en' ? 'EN' : 'TH'}</span>
                                                </div>
                                                <div className="text-xs font-black text-white/80 bg-white/10 px-3 py-1 rounded-full mx-auto w-fit mb-3 border border-white/20">เคสที่ {idx + 1}</div>
                                                <h3 className="font-extrabold text-xl text-white mb-3 group-hover:text-cyan-400 transition-colors">{sc.title}</h3>
                                                <p className="text-sm text-white/60 line-clamp-3">{sc.description}</p>
                                            </GlassCard>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                        
                            <div className="w-full max-w-[1400px] mx-auto animate-in fade-in zoom-in-95 h-full flex flex-col lg:flex-row relative rounded-[2.5rem] overflow-hidden shadow-[0_30px_60px_rgba(0,0,0,0.8)] border border-slate-600 bg-slate-900 backdrop-blur-3xl">
                                
                                {/* 🌟 NEW: The Full-Screen Holographic Left Panel 🌟 */}
                                <div className="w-full lg:w-[60%] relative bg-slate-950 flex flex-col shrink-0 border-r border-slate-700 h-[50vh] lg:h-full overflow-hidden">
                                    
                                    {/* 1. ภาพฉากหลังหลัก (Background Layer) */}
                                    <div className="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat" style={{ backgroundImage: `url('https://res.cloudinary.com/djwclucoz/image/upload/v1783749430/Gemini_Generated_Image_ps4njwps4njwps4n_neepch.png')` }}></div>
                                    
                                    {/* Dark overlay เพื่อเน้นความสว่างของกราฟิกโฮโลแกรม */}
                                    <div className="absolute inset-0 z-0 bg-slate-950/60 mix-blend-multiply pointer-events-none"></div>

                                    {/* 2. แคนวาสวาดกราฟิกสมองโฮโลแกรมและคลื่นเสียง (Canvas Layer เต็มจอ) */}
                                    <canvas ref={ttsCanvasRef} width="1920" height="1080" className="absolute inset-0 w-full h-full z-10 object-cover mix-blend-screen pointer-events-none"></canvas>
                                </div>

                                <div className="w-full lg:w-[40%] flex flex-col h-[50vh] lg:h-full bg-slate-900/95 backdrop-blur-3xl relative z-10 border-t md:border-t-0 border-slate-700">
                                    <div className="p-4 border-b border-slate-700 flex items-center justify-between shrink-0 bg-slate-800/50 shadow-md">
                                        <div className="flex items-center gap-3"><div><h3 className="font-extrabold text-sm text-white drop-shadow-sm">{selectedScenario.title}</h3><p className="text-[10px] text-cyan-400 font-medium flex items-center gap-1"><SafeIcon icon={Volume2} size={12}/> {currentSpeaker === 'BROTHER' ? 'Charon Neural' : 'Aoede Neural'}</p></div></div>
                                        <button onClick={() => { stopAudio(); setSelectedScenario(null); setMessages([]); setRoleplayPhase('none'); }} className="p-2 rounded-lg hover:bg-rose-500/20 text-slate-400 hover:text-rose-400 transition-colors" title="ยกเลิกและออก"><SafeIcon icon={X} size={20} /></button>
                                    </div>
                                    
                                    <div className="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4 flex flex-col relative">
                                        {messages.map((m, idx) => (
                                            <div key={idx} className={`flex gap-2 ${m.sender === 'user' ? 'justify-end' : 'justify-start'} ${m.isHidden ? 'hidden' : ''}`}>
                                                <div className={`p-3 rounded-2xl max-w-[85%] text-sm leading-relaxed whitespace-pre-wrap ${m.sender === 'ai' ? 'bg-slate-800 border border-slate-600 text-slate-200 shadow-sm rounded-tl-none' : 'bg-blue-600 border border-blue-500 text-white shadow-md font-medium rounded-tr-none'}`}>{m.image && <img src={m.image} className="w-full rounded-lg mb-2 object-cover border border-white/20" />}{m.text}</div>
                                            </div>
                                        ))}
                                        {isTyping && <div className="flex gap-2 justify-start animate-in fade-in"><div className="p-4 rounded-2xl bg-slate-800 border border-slate-600 rounded-tl-none flex gap-1.5"><div className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div><div className="w-1.5 h-1.5 bg-purple-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div></div></div>}
                                        
                                        {!isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                            <div className="flex flex-wrap gap-2 mt-2 animate-in fade-in">
                                                {roleplayPhase === 'negotiating' && <button onClick={endScenarioAndEvaluate} className="text-xs bg-rose-500/10 border border-rose-500/50 text-rose-400 px-4 py-2 rounded-lg hover:bg-rose-500/20 active:scale-95 transition-all font-bold">🛑 จบการเจรจา (ประเมินผล)</button>}
                                                {roleplayPhase === 'evaluating' && <><button onClick={() => startScenario(selectedScenario)} className="text-xs bg-amber-500/10 border border-amber-500/50 text-amber-400 px-4 py-2 rounded-lg hover:bg-amber-500/20 active:scale-95 transition-all font-bold">🔄 ลองฝึกเคสนี้อีกครั้ง</button><button onClick={() => { setSelectedScenario(null); setMessages([]); setRoleplayPhase('none'); }} className="text-xs bg-slate-800 border border-slate-600 text-slate-300 px-4 py-2 rounded-lg hover:bg-slate-700 transition-all font-bold">🔙 กลับไปเลือกเคสอื่น</button></>}
                                            </div>
                                        )}
                                        <div ref={messagesEndRef} />
                                    </div>
                                    
                                    <div className="shrink-0 p-3 md:p-4 bg-slate-900 border-t border-slate-700 relative z-10 pb-safe shadow-[0_-5px_15px_rgba(0,0,0,0.5)]">
                                        {/* ⏱️ Crisis Countdown Bar */}
                                        {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                           <div className="absolute top-0 left-0 w-full h-0.5 bg-slate-800">
                                               <div className={`h-full transition-all duration-1000 ${pressureTime > 10 ? 'bg-cyan-500' : pressureTime > 5 ? 'bg-amber-500 shadow-[0_0_8px_#f59e0b]' : 'bg-rose-500 shadow-[0_0_8px_#f43f5e]'}`} style={{ width: `${(pressureTime/20)*100}%` }}></div>
                                           </div>
                                        )}
                                        
                                        {/* 💡 Smart Suggestions Hooks */}
                                        {roleplayPhase === 'negotiating' && smartSuggestions.length > 0 && !isTyping && (
                                            <div className="flex flex-col gap-2 mb-3 px-1 animate-in fade-in slide-in-from-bottom-2">
                                                <div className="text-[10px] font-bold text-cyan-400 flex items-center gap-1 uppercase tracking-widest"><SafeIcon icon={Lightbulb} size={12}/> AI COACH SUGGESTIONS:</div>
                                                <div className="flex flex-wrap gap-2">
                                                    {smartSuggestions.map((sug, i) => (
                                                        <button key={i} onClick={() => handleSendChat(null, sug)} className="text-xs bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 px-3 py-2 rounded-lg text-left transition-colors active:scale-95 break-words line-clamp-2 shadow-sm">{sug}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {isVadMode && <div className="absolute -top-1 left-8 right-8 h-1 bg-transparent"><div className="h-full bg-cyan-500 transition-all duration-100 rounded-full shadow-[0_0_8px_rgba(34,211,238,0.8)]" style={{ width: `${Math.min(100, audioLevel * 2)}%` }}></div></div>}
                                        {selectedImage && <div className="mb-2 relative inline-block"><img src={selectedImage} alt="Preview" className="h-14 w-14 object-cover rounded-lg border border-slate-600 shadow-sm" /><button onClick={() => setSelectedImage(null)} className="absolute -top-2 -right-2 bg-slate-900 text-white rounded-full p-0.5 border border-slate-700 hover:bg-rose-500"><SafeIcon icon={X} size={14} /></button></div>}
                                        
                                        <form onSubmit={handleSendChat} className={`flex items-center gap-2 bg-slate-950 border border-slate-700 rounded-lg p-1.5 pl-3 transition-colors ${isVadMode ? '!border-cyan-500 bg-cyan-950/30' : ''}`}>
                                            <input type="file" id="ai-image-upload" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                            <label htmlFor="ai-image-upload" className="text-slate-400 hover:text-white cursor-pointer p-1.5"><SafeIcon icon={ImageIcon} size={20} /></label>
                                            <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder={isListening ? "กำลังฟัง..." : "พิมพ์ข้อความ หรือกดไมค์..."} disabled={isTyping || roleplayPhase === 'playing_scenario'} className="flex-1 bg-transparent text-slate-200 placeholder-slate-500 px-1 outline-none text-sm font-medium" />
                                            
                                            {/* Timer Badge */}
                                            {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                                <div className={`text-[10px] font-mono font-bold px-2 py-1 rounded border shrink-0 ${pressureTime <= 5 ? 'text-rose-400 border-rose-500/50 bg-rose-500/10 animate-pulse' : 'text-slate-400 border-slate-700 bg-slate-800'}`}>{pressureTime}s</div>
                                            )}

                                            <button type="button" onClick={toggleMic} disabled={isTyping || roleplayPhase === 'playing_scenario'} className={`w-9 h-9 rounded flex items-center justify-center transition-colors relative shrink-0 ${isListening ? 'bg-cyan-500 text-slate-900 shadow-md' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white border border-slate-700'}`}><SafeIcon icon={Mic} size={16} />{isListening && <span className="absolute inset-0 rounded border-2 border-cyan-400 animate-ping opacity-75"></span>}</button>
                                            <button type="submit" disabled={(!chatInput.trim() && !selectedImage) || isTyping || roleplayPhase === 'playing_scenario'} className="w-9 h-9 rounded bg-blue-600 hover:bg-blue-500 text-white flex items-center justify-center disabled:opacity-50 transition-colors shadow-sm shrink-0"><SafeIcon icon={Send} size={16} /></button>
                                        </form>
                                    </div>
                                </div>
                                
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('skilllab-root'));
        root.render(<SkillLabApp />);
    </script>
</body>
</html>
