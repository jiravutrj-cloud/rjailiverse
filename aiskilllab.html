        import React, { useState, useEffect, useRef, useCallback } from 'react';

        // 🌟 STREAMING_CHUNK: Setting up Error Boundary 🌟
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null, errorInfo: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("Error", error, errorInfo); this.setState({ errorInfo }); }
            render() {
                if (this.state.hasError) return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-rose-950 p-8 text-white z-[9999] relative">
                        <div className="bg-rose-900/50 p-8 rounded-3xl border border-rose-500 max-w-3xl w-full shadow-2xl backdrop-blur-md">
                            <h1 className="text-3xl font-black text-rose-400 mb-4 flex items-center gap-3"><SafeIcon icon={Info} size={32} /> ระบบขัดข้อง (React Crash)</h1>
                            <div className="bg-black/50 p-4 rounded-xl overflow-x-auto text-sm font-mono text-rose-300 border border-rose-500/30">
                                <p className="font-bold">{this.state.error && this.state.error.toString()}</p>
                                <pre className="mt-4 text-xs opacity-70">{this.state.errorInfo && this.state.errorInfo.componentStack}</pre>
                            </div>
                            <button onClick={() => window.location.reload()} className="mt-8 px-6 py-3 bg-white text-rose-900 font-bold rounded-xl hover:bg-rose-100">รีเฟรชหน้าจอใหม่</button>
                        </div>
                    </div>
                );
                return this.props.children;
            }
        }

        function SafeIcon({ icon: Icon, size = 24, className = "" }) { if (!Icon) return null; return <Icon size={size} className={className} />; }

        const SKILL_LAB_SCENARIOS = window.SKILL_LAB_SCENARIOS || [];

        // 🌟 STREAMING_CHUNK: Initializing Firebase and APIs 🌟
        let app, auth, db, appId = 'fah-elearning-prod';
        try {
          const fbP1 = "AIzaSyBs275"; const fbP2 = "NY99gdv1uZdAnb"; const fbP3 = "mx3UlWO8K4o5a0";
          let fbConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) ? JSON.parse(__firebase_config) : { apiKey: fbP1 + fbP2 + fbP3, authDomain: "e-learning-with-fah-ai.firebaseapp.com", projectId: "e-learning-with-fah-ai", storageBucket: "e-learning-with-fah-ai.firebasestorage.app", messagingSenderId: "418946105960", appId: "1:418946105960:web:728e28070790975df231dd" };
          app = getApps().length === 0 ? initializeApp(fbConfig) : getApp();
          auth = getAuth(app); db = getFirestore(app);
        } catch (error) { console.warn("Firebase error", error); }

        const appsScriptUrl = 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec';

        const fetchAppsScript = async (payload) => { try { const res = await fetch(appsScriptUrl, { method: 'POST', body: JSON.stringify(payload) }); return await res.json(); } catch(e) { return { status: 'error', message: e.message }; } };

        const callGeminiAPI = async (prompt, systemInstruction) => {
            try {
                const res = await fetchAppsScript({ action: 'callGemini', prompt: prompt, systemInstruction: systemInstruction });
                if (res.status === 'success' && res.text) return res.text;
                throw new Error(res.message || "ไม่มีข้อมูลตอบกลับจาก AI");
            } catch (e) { return `[ระบบขัดข้อง] ${e.message}`; }
        };

        const callGeminiTTS = async (text, voiceName = "Aoede") => {
            for (let i = 0; i < 3; i++) {
                try {
                    const res = await fetchAppsScript({ action: 'callGeminiTTS', text: text, voiceName: voiceName });
                    if (res.status === 'success' && res.inlineData) return res.inlineData;
                    throw new Error(res.message || 'TTS Error');
                } catch (e) { if (i < 2) await new Promise(r => setTimeout(r, 2000)); else throw e; }
            }
        };

        const pcm16ToWav = (base64PCM, sampleRate = 24000) => {
          const binaryString = window.atob(base64PCM); const bytes = new Uint8Array(binaryString.length); for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
          const buffer = new ArrayBuffer(44 + bytes.length); const view = new DataView(buffer);
          const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
          writeStr(0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, bytes.length, true);
          new Uint8Array(buffer, 44).set(bytes); return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        };

        // 🌟 STREAMING_CHUNK: Defining UI Components 🌟
        function GlassCard({ children, className = "", onClick, ...rest }) {
          let radiusClass = 'rounded-[2rem]'; const m = className.match(/rounded-(?:\[.*?\]|\w+)/); if (m) radiusClass = m[0];
          let bgClass = className.replace(/\bbg-(?:white|slate-[12]00)(?:\/\d+)?\b/g, '').replace(/\bborder-white(?:\/\d+)?\b/g, '').replace(/\bbackdrop-blur-(?:sm|md|lg|xl|2xl|3xl)\b/g, '').replace(/\b!border-none\b/g, '').replace(/\bborder-none\b/g, '');
          return (
            <div onClick={onClick} className={`relative overflow-hidden bg-white/10 backdrop-blur-xl border border-white/30 shadow-2xl ${radiusClass} transition-all duration-300 ${onClick ? 'cursor-pointer hover:-translate-y-1 hover:bg-white/20' : ''} ${bgClass}`} {...rest}>

              <div className="relative z-10 w-full h-full text-white">{children}</div>

        }

        function ConsentFormOverlay({ onClose }) {
            const [showStamp, setShowStamp] = useState(false);

            return (

                    <div className="bg-[#fdfcf8] text-slate-900 p-6 md:p-10 rounded-lg max-w-2xl w-full shadow-[0_20px_60px_rgba(0,0,0,0.8)] relative border border-slate-300 transform rotate-1 overflow-hidden">
                        {showStamp && (
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 pointer-events-none animate-stamp-in opacity-0">
                                <div className="border-4 border-emerald-600 text-emerald-600 px-6 py-2 rounded-lg text-4xl font-black tracking-widest uppercase transform rotate-[-15deg] bg-white/50 backdrop-blur-sm">SUCCESS</div>
                            </div>
                        )}
                        <div className="max-h-[70vh] overflow-y-auto custom-scrollbar pr-2 relative z-0">
                            <h2 className="text-xl md:text-2xl font-bold text-center mb-6 border-b-2 border-slate-800 pb-4 tracking-wide">ใบยินยอมของญาติผู้บริจาคอวัยวะ</h2>
                            <div className="space-y-4 text-sm md:text-base leading-relaxed">
                                <div className="flex justify-end gap-2"><span>วันที่</span> <span className="border-b border-dotted border-slate-500 w-12 text-center text-blue-800 font-[cursive]">{new Date().getDate()}</span> <span>เดือน</span> <span className="border-b border-dotted border-slate-500 w-24 text-center text-blue-800 font-[cursive]">{(new Date()).toLocaleString('th-TH', {month:'long'})}</span></div>
                                <div className="flex flex-wrap gap-2 mt-6"><span>ข้าพเจ้า ชื่อ</span> <span className="border-b border-dotted border-slate-500 flex-1 min-w-[200px] text-blue-800 font-[cursive] pl-4">นางสาว ฟ้า รักดี</span></div>
                                <div className="flex flex-wrap gap-2"><span>มีความสัมพันธ์เป็น</span> <span className="border-b border-dotted border-slate-500 flex-1 min-w-[100px] text-blue-800 font-[cursive] pl-4">บุตรสาว</span></div>
                                <div className="flex flex-wrap gap-2"><span>ของผู้เสียชีวิตชื่อ</span> <span className="border-b border-dotted border-slate-500 flex-1 min-w-[200px] text-blue-800 font-[cursive] pl-4">นาย สมชาย รักดี</span></div>
                                <p className="mt-4 font-bold">มีความประสงค์ที่จะบริจาคอวัยวะต่างๆ ของผู้เสียชีวิต ดังต่อไปนี้ โดยไม่รับค่าตอบแทน</p>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mt-2 mb-6">
                                    <label className="flex items-center gap-2"><div className="w-4 h-4 border border-slate-800 flex items-center justify-center text-blue-600 font-bold">✓</div> หัวใจ</label>
                                    <label className="flex items-center gap-2"><div className="w-4 h-4 border border-slate-800 flex items-center justify-center text-blue-600 font-bold">✓</div> ตับ</label>
                                    <label className="flex items-center gap-2"><div className="w-4 h-4 border border-slate-800 flex items-center justify-center text-blue-600 font-bold">✓</div> ไต</label>
                                    <label className="flex items-center gap-2"><div className="w-4 h-4 border border-slate-800 flex items-center justify-center text-blue-600 font-bold">✓</div> ปอด</label>
                                </div>
                            </div>
                        </div>
                        <div className="mt-8 pt-6 border-t border-slate-200 flex justify-center relative z-20">
                            <button onClick={onClose} className="px-8 py-4 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-black text-lg rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-3"><SafeIcon icon={FileText} size={24} /> เก็บเอกสาร และดูผลประเมิน <SafeIcon icon={ArrowRight} size={20} /></button>
                        </div>
                    </div>
                </div>
            );
        }

        // 🌟 STREAMING_CHUNK: Main Application Logic 🌟
        function SkillLabApp() {
            const [user, setUser] = useState(null);
            const [selectedScenario, setSelectedScenario] = useState(null);
            const [accessDenied, setAccessDenied] = useState(false); 
            
            // Chat State
            const [chatInput, setChatInput] = useState(''); 
            const [isTyping, setIsTyping] = useState(false); 
            const [messages, setMessages] = useState([]); 
            const [isListening, setIsListening] = useState(false); 
            const [uiMessage, setUiMessage] = useState({ show: false, text: '', type: 'success' });
            const [smartSuggestions, setSmartSuggestions] = useState([]); 
            const [pressureTime, setPressureTime] = useState(20); 
            const [isAiSpeaking, setIsAiSpeaking] = useState(false);
            
            // Roleplay Control
            const [roleplayPhase, setRoleplayPhase] = useState('none'); 
            const [currentSpeaker, setCurrentSpeaker] = useState('FAH');
            const [scenarioLang, setScenarioLang] = useState('th');
            const [currentScenarioPrompt, setCurrentScenarioPrompt] = useState('');
            const [showConsentForm, setShowConsentForm] = useState(false);

            const recognitionRef = useRef(null); 
            const messagesEndRef = useRef(null); 
            const audioRef = useRef(null); 
            const currentSpeechIdRef = useRef(0);
            const currentSequenceIdRef = useRef(0);

            const isEn = selectedScenario && selectedScenario.language === 'en';

            const showMsg = (text, type = 'success') => { setUiMessage({ show: true, text, type }); setTimeout(() => setUiMessage({ show: false, text: '', type }), 4000); };
            const safeRedirect = (url) => { try { window.location.href = url; } catch (e) {} };

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('elearning_app_state');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.loggedInUser) {
                            if (parsed.loggedInUser.userType !== 'Masterclass') { setAccessDenied(true); return; }
                            setUser(parsed.loggedInUser);
                            signInAnonymously(auth).catch(e => console.warn(e));
                        } else { safeRedirect('./index.html'); }
                    } else { safeRedirect('./index.html'); }
                } catch (e) { safeRedirect('./index.html'); }
            }, []);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, smartSuggestions]);

            // 🌟 STREAMING_CHUNK: Crisis Countdown & Speech Recognition 🌟
            useEffect(() => {
                let timer;
                if (roleplayPhase === 'negotiating' && !isTyping && !isAiSpeaking && messages.length > 0 && messages[messages.length-1].sender === 'ai') {
                    timer = setInterval(() => {
                        setPressureTime(p => {
                            if (isListening || chatInput.length > 0 || isAiSpeaking) return p; 
                            if (p <= 1) { 
                                clearInterval(timer); 
                                handleSendChat(null, scenarioLang === 'en' ? "[Learner silent, no timely response]" : "[ผู้เรียนเงียบ ไม่ตอบสนองทันเวลา]"); 
                                return 20; 
                            }
                            return p - 1;
                        });
                    }, 1000);
                } else { setPressureTime(20); }
                return () => clearInterval(timer);
            }, [roleplayPhase, isTyping, messages, isListening, chatInput, isAiSpeaking]);

            useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    recognitionRef.current = new SR(); 
                    recognitionRef.current.continuous = false; 
                    recognitionRef.current.interimResults = false; 
                    recognitionRef.current.lang = scenarioLang === 'en' ? 'en-US' : 'th-TH'; 
                    recognitionRef.current.onresult = (e) => { const transcript = e.results[0][0].transcript; setChatInput(prev => prev + " " + transcript); };
                    recognitionRef.current.onend = () => { setIsListening(false); };
                }
            }, [scenarioLang]);

            const toggleMic = () => { if (isListening) { recognitionRef.current?.stop(); setIsListening(false); } else { recognitionRef.current?.start(); setIsListening(true); } };

            const stopAudio = useCallback(() => { 
                currentSpeechIdRef.current += 1; setIsAiSpeaking(false);
                if (audioRef.current) { audioRef.current.pause(); audioRef.current.removeAttribute('src'); audioRef.current.load(); audioRef.current = null; } 
            }, []);
            
            // 🌟 STREAMING_CHUNK: Audio Generation (TTS) 🌟
            const speakThai = async (text, onEndCallback = null, speaker = 'FAH', isSystemVoice = false) => {
                stopAudio(); currentSpeechIdRef.current += 1; const speechId = currentSpeechIdRef.current; 
                let callbackFired = false;
                const safeCallback = () => { if (!callbackFired) { callbackFired = true; if (onEndCallback) onEndCallback(); } };

                let targetVoice = "Aoede"; 
                let cleanSpeakText = text.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').replace(/\*.*?\*/g, '').replace(/#.*?#/g, '').replace(/^(ฟ้า|เมฆ|พี่เอก|เอก|น้องชาย|ลูกสาว|แฟน|แฟนของฟ้า|Fah|Mek|Brother|Sister|Boyfriend|AI|Michael)\s*:\s*/i, '').trim();
                let emotionPrompt = "";
                if (isListening) { recognitionRef.current?.stop(); setIsListening(false); }
                
                if (isSystemVoice) { 
                    targetVoice = "Aoede"; 
                    emotionPrompt = scenarioLang === 'en' ? `[Speak with a professional, warm announcer voice]: ${cleanSpeakText}` : `[พูดด้วยเสียงผู้ประกาศหญิง น้ำเสียงเป็นทางการ สุภาพ]: ${cleanSpeakText}`; 
                } else {
                    if (speaker === 'BROTHER' || speaker === 'MICHAEL') { targetVoice = "Charon"; emotionPrompt = scenarioLang === 'en' ? `[Speak with a vulnerable male voice]: ${cleanSpeakText}` : `[พูดด้วยเสียงผู้ชาย น้ำเสียงตามอารมณ์บริบท]: ${cleanSpeakText}`; } 
                    else if (speaker === 'BOYFRIEND') { targetVoice = "Charon"; emotionPrompt = scenarioLang === 'en' ? `[Speak with a supportive male voice]: ${cleanSpeakText}` : `[พูดด้วยเสียงผู้ชาย นุ่มนวล อบอุ่น คอยให้กำลังใจ]: ${cleanSpeakText}`; } 
                    else { targetVoice = "Aoede"; emotionPrompt = scenarioLang === 'en' ? `[Speak with a 22yo female voice]: ${cleanSpeakText}` : `[พูดด้วยเสียงผู้หญิงวัยรุ่น น้ำเสียงตามอารมณ์บริบท]: ${cleanSpeakText}`; }
                }

                try {
                    const inlineData = await callGeminiTTS(emotionPrompt, targetVoice); 
                    if (speechId !== currentSpeechIdRef.current) return;
                    const sampleRate = parseInt(inlineData.mimeType.match(/rate=(\d+)/)?.[1] ?? "24000", 10); 
                    const audioUrl = pcm16ToWav(inlineData.data, sampleRate);
                    const audio = new Audio(audioUrl); 
                    audioRef.current = audio; 

                    setIsAiSpeaking(true);
                    audio.onended = () => { setIsAiSpeaking(false); safeCallback(); }; 
                    audio.onerror = () => { setIsAiSpeaking(false); safeCallback(); }; 
                    audio.play().catch(e => { setIsAiSpeaking(false); safeCallback(); }); 
                } catch (error) { setIsAiSpeaking(false); safeCallback(); }
            };

            const speakThaiSequence = async (dialogues, seqId, isResolved = false) => {
                for (let i = 0; i < dialogues.length; i++) {
                    if (currentSequenceIdRef.current !== seqId) break; 
                    const dlg = dialogues[i];
                    let spkCode = 'FAH'; let visualSpk = 'FAH';
                    if (dlg.speaker.match(/เมฆ|mek|brother/i)) { spkCode = 'BROTHER'; visualSpk = 'BROTHER'; }
                    if (dlg.speaker.match(/เอก|pek|boyfriend/i)) { spkCode = 'BOYFRIEND'; visualSpk = 'PEK'; }
                    if (dlg.speaker.match(/michael|spouse/i)) { spkCode = 'MICHAEL'; visualSpk = 'MICHAEL'; }
                    setCurrentSpeaker(visualSpk);
                    await new Promise((resolve) => { speakThai(dlg.text, resolve, spkCode, false); });
                }
                if (currentSequenceIdRef.current === seqId && isResolved) { setTimeout(() => setShowConsentForm(true), 500); }
            };

            // ทริกเสียงเงียบเพื่อปลดล็อกสิทธิ์เสียง Autoplay ในเบราว์เซอร์
            const unlockAudio = () => {
                try {
                    const silentAudio = new Audio("data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIwB+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+f//MUZAAAAAGkAAAAAAAAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq");
                    silentAudio.play().catch(e => {}); 
                } catch(e){}
            };

            // 🌟 STREAMING_CHUNK: Managing Scenario Setup 🌟
            const startScenario = (sc) => {
                unlockAudio(); // ปลดล็อกเสียงอัตโนมัติเมื่อกดเริ่ม
                setSelectedScenario(sc); 
                setMessages([]); 
                setSmartSuggestions([]); 
                setScenarioLang(sc.language || 'th'); 
                setPressureTime(20);
                
                const userPosition = user?.position || "บุคลากรทางการแพทย์";
                const dynamicPrompt = sc.systemPrompt.replace(/{{USER_POSITION}}/g, userPosition).replace(/{{PATIENT_GENDER}}/g, 'ชาย').replace(/{{PATIENT_AGE}}/g, `46 ปี`).replace(/{{PATIENT_CAUSE}}/g, 'อุบัติเหตุรถยนต์').replace(/{{PATIENT_RELATION}}/g, 'คนไข้'); 
                const finalPrompt = `[ฐานความรู้เฉพาะทาง]\n${window.CLINICAL_KNOWLEDGE_BASE || ""}\n\n${dynamicPrompt}`;
                setCurrentScenarioPrompt(finalPrompt); 
                setCurrentSpeaker('FAH');
                
                const isEnglish = sc.language === 'en';
                const contextText = isEnglish 
                    ? "Patient is a 46yo male, brain dead from car accident. Relatives: Fah (22), Mek (18), and P'Ek (Fah's Boyfriend, 32). Let's start." 
                    : "ข้อมูลเบื้องต้น: คนไข้ชาย อายุ 46 ปี อุบัติเหตุรถยนต์ ยืนยันภาวะสมองตาย ญาติหน้าห้อง ICU มี ฟ้า (ลูกสาว), เมฆ (น้องชาย) และ แฟนของฟ้า เริ่มการเจรจาได้เลยค่ะ";
                
                setRoleplayPhase('giving_context'); 
                const ctxId = Date.now();
                setMessages([{ id: ctxId, sender: 'ai', text: contextText, isVoiceOnly: false, speakerName: 'ระบบ', isContext: true }]);
                
                speakThai(contextText, () => setRoleplayPhase('ready_to_start'), 'FAH', true);
            };

            const handleStartConversation = () => {
                setRoleplayPhase('negotiating');
                const isEnglish = selectedScenario?.language === 'en';
                const introText = isEnglish ? "Hello... Are you the staff member coming to talk to us about my husband? Who are you?" : "สวัสดีค่ะ... คุณเป็นเจ้าหน้าที่ที่จะมาคุยกับพวกเราเรื่องคุณพ่อหรือเปล่าคะ คุณเป็นใครคะ?";
                const visualSpk = isEnglish ? 'MICHAEL' : 'FAH';
                
                // ใช้ Static ID เพื่อป้องกันข้อความทักทายแรกเบิ้ล 2 ครั้ง
                setMessages(prev => {
                    if (prev.some(m => m.id === 'static_intro')) return prev;
                    return [...prev, { id: 'static_intro', sender: 'ai', text: `(${isEnglish?'Michael':'ฟ้า'}) ${introText}`, isVoiceOnly: true, speakerName: 'ครอบครัว', isHidden: true }];
                });
                
                setCurrentSpeaker(visualSpk);
                speakThai(introText, () => {
                    setMessages(prev => prev.map(m => m.id === 'static_intro' ? { ...m, isVoiceOnly: false, isHidden: false } : m));
                }, visualSpk, false);
            };

            const handleSendChat = async (e, quickActionText = null) => {
                if (e) e.preventDefault(); const userMsg = quickActionText ?? chatInput.trim(); if (!userMsg || isTyping) return;
                stopAudio(); if (roleplayPhase !== 'negotiating') return; 
                if (isListening) { recognitionRef.current?.stop(); setIsListening(false); }
                
                setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: userMsg }]); setChatInput(''); setIsTyping(true); setSmartSuggestions([]); setPressureTime(20);
                
                const historyContext = messages.filter(m => !m.isContext).slice(-10).map(m => `${m.sender === 'user' ? 'ผู้เรียน' : 'ครอบครัว'}: ${m.text}`).join('\n');
                
                let modifiedPrompt = currentScenarioPrompt;
                if (userMsg.match(/(ชื่อ|แนะนำตัว|พยาบาล|หมอ|แพทย์|สวัสดี)/i) && messages.length <= 3) {
                    modifiedPrompt += `\n[กฎระบบแนะนำตัว]: ให้ "ฟ้า" แนะนำตัวเธอและสมาชิกครอบครัวพร้อมกันทั้งหมด`;
                }
                modifiedPrompt += `\n[CRITICAL RULE FOR PING-PONG]: ห้ามพิมพ์ร่ายยาว ตอบโต้สั้นๆ ตรงประเด็น ห้ามแสดงข้อความความคิด (Subtext)\n[SMART HOOKS]: สร้างตัวเลือก [SUGGESTION 1] (ข้อความ) \n[SUGGESTION 2] (ข้อความ) ท้ายสุด`;

                const roleplayPrompt = `${modifiedPrompt}\n\nประวัติ:\n${historyContext}\nผู้เรียน: ${userMsg}\nครอบครัว (ใส่ Tag อารมณ์และชื่อคนพูดก่อนเสมอ):`;
                
                try {
                    let rawResponse = await callGeminiAPI(userMsg, roleplayPrompt); 
                    if (rawResponse.startsWith('[ระบบขัดข้อง]')) { setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: rawResponse, isVoiceOnly: false, speakerName: 'ระบบ', isHidden: false }]); showMsg(rawResponse, 'error'); setIsTyping(false); return; }

                    let aiText = rawResponse; let isResolved = false;
                    if (aiText.includes('[SCENARIO_RESOLVED]')) { isResolved = true; aiText = aiText.replace(/\[SCENARIO_RESOLVED\]/g, '').trim(); }

                    let sug1 = "", sug2 = "";
                    const sug1Match = aiText.match(/\[SUGGESTION 1\](.*?)(?=\[SUGGESTION 2\]|$)/is);
                    const sug2Match = aiText.match(/\[SUGGESTION 2\](.*?)$/is);
                    if (sug1Match) sug1 = sug1Match[1].trim();
                    if (sug2Match) sug2 = sug2Match[1].trim();
                    aiText = aiText.replace(/\[SUGGESTION 1\].*$/is, '').replace(/\[DIALOGUE\]/i, '').trim();
                    setSmartSuggestions([sug1, sug2].filter(Boolean));

                    const dialogues = []; const regex = /(?:\[([A-Z]+)\])?\s*\[(.*?)\]\s*(.*?)(?=(?:\[[A-Z]+\])?\s*\[.*?\]|$)/gis;
                    let match; let found = false;
                    while ((match = regex.exec(aiText)) !== null) { found = true; dialogues.push({ emotion: (match[1] || 'NEUTRAL').toUpperCase(), speaker: match[2].trim(), text: match[3].trim().replace(/[*#]/g, '') }); }
                    if (!found) { const regex2 = /(?:^|\n)(ฟ้า|เมฆ|พี่เอก|michael)\s*:\s*(.*?)(?=(?:\n(?:ฟ้า|เมฆ|พี่เอก|michael)\s*:)|$)/gis; while ((match = regex2.exec(aiText)) !== null) { found = true; dialogues.push({ emotion: 'NEUTRAL', speaker: match[1].trim(), text: match[2].trim().replace(/[*#]/g, '') }); } }
                    if (!found) dialogues.push({ emotion: 'NEUTRAL', speaker: isEn ? 'Michael' : 'ฟ้า', text: aiText.replace(/[*#]/g, '') });
                    
                    const msgId = Date.now() + 1;
                    const displayChatText = dialogues.map(d => `(${d.speaker}) ${d.text}`).join('\n\n');
                    
                    setMessages(prev => [...prev, { id: msgId, sender: 'ai', text: displayChatText, isVoiceOnly: true, speakerName: 'ครอบครัว', isHidden: true }]); 
                    setIsTyping(false); 
                    
                    const seqId = Date.now(); currentSequenceIdRef.current = seqId;
                    speakThaiSequence(dialogues, seqId, isResolved).then(() => {
                        setMessages(prev => prev.map(m => m.id === msgId ? { ...m, isVoiceOnly: false, isHidden: false } : m));
                    });

                } catch (err) { setIsTyping(false); setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: `ข้อผิดพลาด (${err.message})`, isVoiceOnly: false, speakerName: 'ระบบ', isHidden: false }]); }
            };

            const endScenarioAndEvaluate = async () => {
                stopAudio(); setIsTyping(true); setRoleplayPhase('evaluating'); setCurrentSpeaker('FAH'); setShowConsentForm(false);
                setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: isEn ? "🛑 End simulation. Please evaluate my performance." : "🛑 จบการจำลองสถานการณ์ ช่วยประเมินผลการฝึกให้หน่อยค่ะ" }]);
                
                const history = messages.filter(m => !m.isContext).map(m => `${m.sender === 'ai' ? 'ครอบครัว' : 'ผู้เรียน'}: ${m.text}`).join('\n');
                const evalPrompt = `คุณคือ "The Empathetic Observer (อาจารย์พยาบาลผู้เฝ้ามองอย่างเข้าอกเข้าใจ)" ประเมินการเจรจานี้:\nประวัติการสนทนา:\n${history}\n1. ให้คะแนนความเห็นอกเห็นใจ (Empathy Score) จาก 0-100 (ระบุแท็ก [EMPATHY: คะแนน] เสมอ)\n2. หากคะแนนเกิน 60 ถือว่าผ่าน พิมพ์ [PASS] ไม่ผ่านพิมพ์ [FAIL]\n3. สะท้อนจุดพลาดอย่างอ่อนโยน และให้กำลังใจ ใช้น้ำเสียงเป็น "ฟ้า" ที่อบอุ่น ห้ามดุด่าเด็ดขาด!`;
                
                try {
                    const aiResponse = await callGeminiAPI("ประเมินผล", evalPrompt); 
                    if (aiResponse.startsWith('[ระบบขัดข้อง]')) { setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: aiResponse, isVoiceOnly: false, speakerName: 'ระบบ', isHidden: false }]); showMsg(aiResponse, 'error'); setIsTyping(false); return; }
                    
                    const isPass = aiResponse.includes('[PASS]'); 
                    const empathyMatch = aiResponse.match(/\[EMPATHY:\s*(\d+)\]/i); const empathyScore = empathyMatch ? parseInt(empathyMatch[1]) : (isPass ? 80 : 40);
                    let cleanResponse = aiResponse.replace(/\[PASS\]/g, '').replace(/\[FAIL\]/g, '').replace(/\[EMPATHY:\s*\d+\]/gi, '').trim();
                    
                    setMessages(prev => [...prev, { id: Date.now()+1, sender: 'ai', text: cleanResponse, isVoiceOnly: false, speakerName: 'อาจารย์ฟ้า', isHidden: false }]); 
                    showMsg(isEn ? `Result Recorded (Empathy Score: ${empathyScore})` : `บันทึกผลเรียบร้อย (Empathy Score: ${empathyScore})`, 'success'); 
                    speakThai(cleanResponse.replace(/[*#]/g, ''), null, 'FAH', true);
                } catch (e) { setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: `ข้อผิดพลาด: ${e.message}`, isVoiceOnly: false, speakerName: 'ระบบ', isHidden: false }]); }
                setIsTyping(false);
            };

            // 🌟 STREAMING_CHUNK: Rendering the UI Structure 🌟
            if (accessDenied) return (
                <div className="min-h-screen flex items-center justify-center p-4 relative z-50 bg-slate-900">
                    <div className="bg-slate-900/80 backdrop-blur-xl border border-white/20 p-8 rounded-[2.5rem] text-center shadow-2xl max-w-md w-full">
                        <div className="w-20 h-20 bg-rose-500/10 rounded-full flex items-center justify-center mx-auto mb-6"><SafeIcon icon={Lock} size={40} className="text-rose-400" /></div>
                        <h2 className="text-2xl font-black text-white mb-3">Masterclass Restricted</h2>
                        <button onClick={() => safeRedirect('./index.html#dashboard')} className="w-full py-4 rounded-2xl bg-white/10 hover:bg-white/20 text-white font-bold transition-all border border-white/20">Back to Dashboard</button>
                    </div>
                </div>

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center relative bg-slate-900">
                    <div className="bg-black/50 backdrop-blur-xl border border-white/20 p-8 rounded-3xl text-center shadow-2xl">
                        <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>

            return (
                <>
                {/* 🌟 NEW 100% Brightness Background (No black overlay) 🌟 */}

                <div className="min-h-screen w-full font-sans antialiased overflow-hidden relative flex flex-col z-10">
                    
                    {uiMessage.show && <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full font-bold shadow-xl animate-in slide-in-from-top-4 border backdrop-blur-md ${uiMessage.type === 'error' ? 'bg-rose-500/80 text-white border-rose-400' : 'bg-emerald-500/80 text-white border-emerald-400'}`}>{uiMessage.text}</div>}

                    {/* Navbar */}

                        </div>
                        <div className="text-white font-bold text-sm bg-white/20 px-4 py-1.5 rounded-full border border-white/30 shadow-sm hidden sm:flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> {user.name}</div>

                                <div className="flex flex-wrap justify-center gap-8">
                                    {SKILL_LAB_SCENARIOS.map((sc, idx) => (
                                        <GlassCard key={sc.id} onClick={() => startScenario(sc)} className="p-8 text-center border border-white/30 bg-white/10 hover:bg-white/20 shadow-2xl max-w-sm w-full transition-transform duration-300 backdrop-blur-xl">
                                            <div className={`w-24 h-24 rounded-full mx-auto mb-6 flex items-center justify-center text-white shadow-xl ${sc.language === 'en' ? 'bg-gradient-to-br from-indigo-500 to-purple-600' : 'bg-gradient-to-br from-blue-500 to-cyan-500'}`}>
                                                <span className="text-4xl font-black">{sc.language === 'en' ? 'EN' : 'TH'}</span>

                                {/* START BUTTON OVERLAY */}
                                {roleplayPhase === 'ready_to_start' && (
                                    <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm rounded-[2.5rem]">
                                        <button onClick={handleStartConversation} className="px-10 py-5 bg-white text-blue-600 hover:bg-blue-50 rounded-full font-black text-2xl shadow-[0_10px_40px_rgba(255,255,255,0.4)] transition-all hover:scale-105 active:scale-95 flex items-center gap-3 animate-pulse">
                                            <SafeIcon icon={PlayCircle} size={32} /> เริ่มการสนทนา
                                        </button>
                                    </div>

                                {/* Floating Header */}
                                <div className="p-5 flex items-center justify-between shrink-0 border-b border-white/20 bg-white/10 rounded-t-[2.5rem]">
                                    <div className="flex items-center gap-4">
                                        <div>
                                            <h3 className="font-extrabold text-lg text-white drop-shadow-md">{selectedScenario.title}</h3>
                                            <p className="text-xs text-white/80 font-bold flex items-center gap-1 drop-shadow-sm">
                                                <SafeIcon icon={Volume2} size={14}/> {currentSpeaker === 'BROTHER' ? 'Charon Neural' : 'Aoede Neural'}
                                                {isAiSpeaking && <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_#34d399] ml-1"></span>}
                                            </p>

                                    </div>
                                    <button onClick={() => { stopAudio(); setSelectedScenario(null); setMessages([]); setRoleplayPhase('none'); }} className="w-10 h-10 flex items-center justify-center rounded-xl bg-white/20 hover:bg-rose-500 hover:text-white text-white transition-colors shadow-md border border-white/30" title="ออก"><SafeIcon icon={X} size={20} /></button>
                                </div>

                                {/* Messages Area */}
                                <div className="flex-1 p-6 overflow-y-auto custom-scrollbar space-y-6 flex flex-col relative pb-32">
                                    {messages.map((m, idx) => {
                                        if (m.isHidden || (m.sender === 'ai' && roleplayPhase === 'negotiating')) return null;
                                        return (
                                            <div key={idx} className={`flex w-full ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                {/* 🌟 Glassmorphism Chat Bubbles for clear readability over background 🌟 */}
                                                <div className={`p-5 rounded-[1.5rem] max-w-[85%] text-base leading-relaxed shadow-xl backdrop-blur-md border ${m.sender === 'user' ? 'bg-blue-600/90 text-white font-medium border-blue-400/50 rounded-tr-sm' : 'bg-white/80 text-slate-900 border-white/60 rounded-tl-sm font-bold'}`}>
                                                    {m.text}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {isTyping && (
                                        <div className="flex justify-start animate-in fade-in">
                                            <div className="p-5 rounded-[1.5rem] bg-white/80 backdrop-blur-md border border-white/60 rounded-tl-sm flex gap-2 shadow-xl">
                                                <div className="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div>
                                                <div className="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                                <div className="w-2 h-2 bg-cyan-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>

                                {/* Floating Input Area (Pinned to bottom inside the card) */}
                                <div className="absolute bottom-0 left-0 w-full p-6 pt-12 bg-gradient-to-t from-black/40 to-transparent rounded-b-[2.5rem]">
                                    
                                    {/* ⏱️ Crisis Countdown Bar */}
                                    {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                        <div className="absolute top-8 left-8 right-8 h-1.5 bg-white/30 rounded-full overflow-hidden backdrop-blur-sm shadow-inner">
                                            <div className={`h-full transition-all duration-1000 ${pressureTime > 10 ? 'bg-emerald-400 shadow-[0_0_10px_#34d399]' : pressureTime > 5 ? 'bg-amber-400 shadow-[0_0_10px_#fbbf24]' : 'bg-rose-500 shadow-[0_0_10px_#f43f5e]'}`} style={{ width: `${(pressureTime/20)*100}%` }}></div>
                                        </div>

                                    {/* 💡 Smart Suggestions Hooks */}
                                    {roleplayPhase === 'negotiating' && smartSuggestions.length > 0 && !isTyping && (

                                            <div className="flex flex-wrap gap-2">

                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (

                                        </div>

                                        {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                            <div className={`text-xs font-mono font-black px-3 py-1.5 rounded-lg border shrink-0 ${pressureTime <= 5 ? 'text-rose-600 border-rose-500 bg-rose-100 animate-pulse' : 'text-slate-700 border-white/50 bg-white/80'}`}>{pressureTime}s</div>

                                        <button type="submit" disabled={!chatInput.trim() || isTyping || roleplayPhase === 'ready_to_start'} className="w-12 h-12 rounded-xl bg-blue-600 hover:bg-blue-500 text-white flex items-center justify-center disabled:opacity-50 transition-colors shadow-lg shrink-0 border border-blue-400/50"><SafeIcon icon={Send} size={20} /></button>
                                    </form>

                                </div>
                            </div>
                        )}
                    </div>
                </div>
                {showConsentForm && <ConsentFormOverlay onClose={() => { setShowConsentForm(false); endScenarioAndEvaluate(); }} />}
                </>
            );
        }

        const root = createRoot(document.getElementById('skilllab-root'));
