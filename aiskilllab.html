        // 🛡️ Bulletproof Error Boundary
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error", error, errorInfo);
                this.setState({ errorInfo });

        const pcm16ToWav = (base64PCM, sampleRate = 24000) => {
          const binaryString = window.atob(base64PCM); const bytes = new Uint8Array(binaryString.length); for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
          const buffer = new ArrayBuffer(44 + bytes.length); const view = new DataView(buffer);
          const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
          writeStr(0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, bytes.length, true);
          new Uint8Array(buffer, 44).set(bytes); return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));

        // 🌟 Main Application 🌟
        function SkillLabApp() {
            const [user, setUser] = useState(null);
            const [selectedScenario, setSelectedScenario] = useState(null);
            const [accessDenied, setAccessDenied] = useState(false); 
            
            // State
            const [chatInput, setChatInput] = useState(''); 
            const [isTyping, setIsTyping] = useState(false); 
            const [messages, setMessages] = useState([]); 
            const [isListening, setIsListening] = useState(false); 
            const [isVadMode, setIsVadMode] = useState(false); 
            const [audioLevel, setAudioLevel] = useState(0); 
            const [uiMessage, setUiMessage] = useState({ show: false, text: '', type: 'success' });
            
            // Phase: none -> playing_video -> ready_to_start -> negotiating -> evaluating
            const [roleplayPhase, setRoleplayPhase] = useState('none'); 
            const [currentEmotion, setCurrentEmotion] = useState('NEUTRAL');
            const [currentSpeaker, setCurrentSpeaker] = useState('NONE');
            const [scenarioLang, setScenarioLang] = useState('th');
            const [currentScenarioPrompt, setCurrentScenarioPrompt] = useState('');
            const [showConsentForm, setShowConsentForm] = useState(false);
            
            // Refs
            const audioContextRef = useRef(null); const analyserRef = useRef(null); const microphoneRef = useRef(null); const vadSilenceTimerRef = useRef(null); const isSpeakingRef = useRef(false); const latestTranscriptRef = useRef('');
            const recognitionRef = useRef(null); const messagesEndRef = useRef(null); const audioRef = useRef(null); const currentSpeechIdRef = useRef(0);
            
            const ttsCanvasRef = useRef(null);
            const ttsAudioCtxRef = useRef(null);
            const ttsAnalyserRef = useRef(null);
            const ttsAnimFrameRef = useRef(null);
            
            // Real-time Sync Refs
            const currentSpeakerRef = useRef('NONE');
            const currentEmotionRef = useRef('NEUTRAL');
            const isAiSpeakingRef = useRef(false);

            const isEn = selectedScenario && selectedScenario.language === 'en';

            const showMsg = (text, type = 'success') => {
                setUiMessage({ show: true, text, type });
                setTimeout(() => setUiMessage({ show: false, text: '', type }), 4000);
            };

            const safeRedirect = (url) => { try { window.location.href = url; } catch (e) {} };

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('elearning_app_state');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.loggedInUser) {
                            const uType = parsed.loggedInUser.userType;
                            if (uType !== 'Masterclass') { setAccessDenied(true); return; }
                            setUser(parsed.loggedInUser);
                            signInAnonymously(auth).catch(e => console.warn(e));
                        } else { safeRedirect('./index.html'); }
                    } else { safeRedirect('./index.html'); }
                } catch (e) { safeRedirect('./index.html'); }
            }, []);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, isTyping]);
            useEffect(() => { currentSpeakerRef.current = currentSpeaker; }, [currentSpeaker]);
            useEffect(() => { currentEmotionRef.current = currentEmotion; }, [currentEmotion]);

            useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    recognitionRef.current = new SR(); recognitionRef.current.continuous = true; recognitionRef.current.interimResults = true; recognitionRef.current.lang = scenarioLang === 'en' ? 'en-US' : 'th-TH'; 
                    recognitionRef.current.onresult = (e) => { let finalT = ''; let interT = ''; for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) finalT += e.results[i][0].transcript; else interT += e.results[i][0].transcript; } setChatInput(p => { const newText = p + finalT; latestTranscriptRef.current = newText || interT; return newText || interT; }); };
                    recognitionRef.current.onend = () => { if (isVadMode && isListening) { try { recognitionRef.current.start(); } catch(err){} } else { setIsListening(false); setChatInput(curr => { const corText = curr.trim(); if (corText) handleSendChat(null, corText); return curr; }); } };
                    recognitionRef.current.onerror = (e) => { if(e.error !== 'no-speech') setIsListening(false); };
                }
            }, [selectedScenario, messages, isVadMode, isListening, scenarioLang]);

            const processAudio = useCallback(() => {
                if (!analyserRef.current || !isListening || !isVadMode) return;
                const dataArr = new Uint8Array(analyserRef.current.frequencyBinCount); analyserRef.current.getByteFrequencyData(dataArr);
                let sum = 0; for (let i = 0; i < dataArr.length; i++) sum += dataArr[i]; const avg = sum / dataArr.length; setAudioLevel(avg);
                if (avg > 15) { if (!isSpeakingRef.current) isSpeakingRef.current = true; if (vadSilenceTimerRef.current) { clearTimeout(vadSilenceTimerRef.current); vadSilenceTimerRef.current = null; } } else { if (isSpeakingRef.current && !vadSilenceTimerRef.current) { vadSilenceTimerRef.current = setTimeout(() => { isSpeakingRef.current = false; const finalSp = latestTranscriptRef.current.trim(); if (finalSp) { handleSendChat(null, finalSp); setChatInput(''); latestTranscriptRef.current = ''; } vadSilenceTimerRef.current = null; }, 1500); } }
                if (isListening && isVadMode) requestAnimationFrame(processAudio);
            }, [isListening, isVadMode]);

            const startVAD = async () => { try { if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("NotSupportedError"); const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)(); analyserRef.current = audioContextRef.current.createAnalyser(); microphoneRef.current = audioContextRef.current.createMediaStreamSource(stream); microphoneRef.current.connect(analyserRef.current); analyserRef.current.fftSize = 256; setIsVadMode(true); setIsListening(true); recognitionRef.current?.start(); processAudio(); } catch (err) { showMsg('ไมค์ไม่ทำงาน', 'error'); } };
            const stopVAD = () => { setIsVadMode(false); setIsListening(false); recognitionRef.current?.stop(); if (audioContextRef.current) audioContextRef.current.close(); if (vadSilenceTimerRef.current) clearTimeout(vadSilenceTimerRef.current); };
            const toggleMic = () => { if (isListening) stopVAD(); else { setChatInput(''); latestTranscriptRef.current = ''; startVAD(); } };

            const stopAudio = useCallback(() => { 
                currentSpeechIdRef.current += 1; 
                isAiSpeakingRef.current = false;
                setCurrentSpeaker('NONE');
                if(ttsAnimFrameRef.current) cancelAnimationFrame(ttsAnimFrameRef.current);
                if(ttsCanvasRef.current) {
                    const ctx = ttsCanvasRef.current.getContext('2d');
                    if(ctx) ctx.clearRect(0, 0, ttsCanvasRef.current.width, ttsCanvasRef.current.height);
                }
                if (audioRef.current) { audioRef.current.pause(); audioRef.current.removeAttribute('src'); audioRef.current.load(); audioRef.current = null; } 
            }, []);

            useEffect(() => {
                if (['ready_to_start', 'negotiating', 'evaluating'].includes(roleplayPhase)) {
                    if (!ttsAnimFrameRef.current) startContinuousCanvasLoop();
                } else {
                    if (ttsAnimFrameRef.current) { cancelAnimationFrame(ttsAnimFrameRef.current); ttsAnimFrameRef.current = null; }
                }
                return () => { if (ttsAnimFrameRef.current) cancelAnimationFrame(ttsAnimFrameRef.current); };
            }, [roleplayPhase]);

            const startContinuousCanvasLoop = () => {
                const renderFrame = () => {
                    if (!ttsCanvasRef.current) { ttsAnimFrameRef.current = null; return; }
                    const canvas = ttsCanvasRef.current; const ctx = canvas.getContext('2d');
                    
                    if (!canvas.brainNodes) {
                        canvas.brainNodes = { FAH: [], MEK: [], PEK: [] };
                        const createCluster = (arr, ox, oy) => {
                            for(let i=0; i<30; i++) {
                                let angle = Math.random() * Math.PI * 2; let radiusX = Math.random() * 50; let radiusY = Math.random() * 40;

                    const freqData = new Uint8Array(512);

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    const holographicColors = {
                        NEUTRAL: ['#000033', '#8A2BE2', '#FF00FF', '#00FFFF', '#00f2fe'], 
                        ADVISING: ['#0d1b2a', '#1b263b', '#415a77', '#778da9', '#e0e1dd'],
                        ANGRY: ['#ff0844', '#ffb199', '#ff9a9e', '#fecfef', '#f12711'],

                            ctx.globalAlpha = isActive ? (0.12 + (activePulse * 0.2)) : 0.03; ctx.shadowBlur = 0;
                            for(let j=i+1; j<nodes.length; j++) {

                                                </div>
                                                <h3 className="font-extrabold text-2xl text-white mb-3 group-hover:text-cyan-400 transition-colors leading-tight">{sc.title}</h3>
                                                <p className="text-base text-white/60 line-clamp-3 leading-relaxed">{sc.description}</p>
                                            </GlassCard>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : roleplayPhase === 'playing_video' ? (
                            <div className="flex-1 w-full max-w-5xl mx-auto flex flex-col justify-center p-4 relative z-20">
                                <GlassCard className="p-6 border border-white/20 shadow-2xl flex flex-col gap-4">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-xl font-bold text-white">{selectedScenario.title}</h2>
                                        <button onClick={handleVideoEnd} className="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm font-bold flex items-center gap-2">ข้ามวิดีโอ <SafeIcon icon={ArrowRight} size={16} /></button>
                                    </div>
                                    <div className="w-full aspect-video bg-black rounded-xl overflow-hidden relative">
                                        <iframe src={`${selectedScenario.videoUrl}?autoplay=1&title=0&byline=0&portrait=0`} className="absolute inset-0 w-full h-full border-none" allow="autoplay; fullscreen"></iframe>
                                    </div>
                                </GlassCard>
                            </div>
                        ) : (
                            <div className="w-full h-full flex flex-col relative overflow-hidden bg-slate-900 border border-white/10 m-4 rounded-3xl shadow-2xl max-w-[95%] mx-auto mb-8">
                                
                                {/* 🌟 Background Image Layer 🌟 */}
                                <div className="absolute inset-0 z-0 bg-slate-950">
                                    <img src="https://res.cloudinary.com/djwclucoz/image/upload/v1783830896/Gemini_Generated_Image_r508lgr508lgr508_exrlwo.png" className="w-full h-full object-cover object-center opacity-90 pointer-events-none" alt="Cyber background" />
                                </div>

                                {/* Hologram Canvas */}
                                <canvas ref={ttsCanvasRef} width="1920" height="1080" className="absolute inset-0 w-full h-full z-10 object-cover mix-blend-screen pointer-events-none"></canvas>

                                {/* 🌟 START BUTTON OVERLAY 🌟 */}
                                {roleplayPhase === 'ready_to_start' && (
                                    <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/60 backdrop-blur-sm pointer-events-auto">
                                        <button onClick={handleStartConversation} className="px-10 py-5 bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white rounded-full font-black text-2xl shadow-[0_0_40px_rgba(34,211,238,0.6)] transition-all hover:scale-105 active:scale-95 flex items-center gap-3 border border-white/20 animate-pulse">
                                            <SafeIcon icon={PlayCircle} size={32} /> ▶ เริ่มการสนทนา
                                        </button>
                                    </div>
                                )}

                                {/* 🌟 ZERO-GLASS UI: Chat Area 🌟 */}
                                <div className="absolute top-0 right-0 h-full w-full lg:w-[45%] flex flex-col z-30 pointer-events-none">
                                    
                                    <div className="flex justify-end p-4 pointer-events-auto">
                                        <button onClick={() => { stopAudio(); setSelectedScenario(null); setMessages([]); setRoleplayPhase('none'); }} className="p-3 rounded-xl bg-black/40 hover:bg-rose-500/80 text-white/80 hover:text-white transition-colors backdrop-blur-md border border-white/10 shadow-lg" title="ออก"><SafeIcon icon={X} size={20} /></button>
                                    </div>

                                    {/* 🙈 BLINDFOLD MODE: Show ONLY User Messages and Evaluation */}
                                    <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-4 pointer-events-auto pr-4 pb-4 px-4">
                                        {messages.map((m, idx) => {
                                            // BLINDFOLD MODE: Hide AI messages during negotiation
                                            if (m.isContext) return null;
                                            if (m.sender === 'ai' && roleplayPhase === 'negotiating') return null;
                                            
                                            return (
                                                <div key={idx} className={`flex w-full animate-in fade-in slide-in-from-bottom-2 ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                    <div className={`p-4 rounded-3xl max-w-[90%] text-[15px] leading-relaxed shadow-2xl backdrop-blur-md ${m.sender === 'user' ? 'bg-blue-600/90 text-white font-medium border border-blue-400/30 rounded-tr-none' : 'bg-slate-900/90 text-slate-200 border border-slate-600/50 rounded-tl-none font-bold'}`}>
                                                        {m.text}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {isTyping && (
                                            <div className="flex justify-end">
                                                <div className="p-4 rounded-3xl bg-blue-600/50 backdrop-blur-md border border-blue-400/30 rounded-tr-none flex gap-1.5 shadow-lg">
                                                    <div className="w-1.5 h-1.5 bg-white rounded-full animate-bounce"></div>
                                                    <div className="w-1.5 h-1.5 bg-white/70 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                                    <div className="w-1.5 h-1.5 bg-white/40 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                                </div>
                                            </div>
                                        )}
                                        <div ref={messagesEndRef} />
                                    </div>

                                    {/* Controls Area */}
                                    <div className="shrink-0 pointer-events-auto mt-auto flex flex-col gap-3 px-4 pb-4">
                                        {roleplayPhase === 'negotiating' && !isTyping && messages.length > 0 && messages[messages.length-1].sender === 'ai' && (
                                            <div className="flex justify-end">
                                                <button onClick={endScenarioAndEvaluate} className="text-xs bg-rose-600/90 backdrop-blur-md border border-rose-400/50 text-white px-5 py-2.5 rounded-full hover:bg-rose-500 active:scale-95 transition-all font-bold shadow-lg">🛑 จบการเจรจา (ประเมินผล)</button>
                                            </div>
                                        )}
                                        {roleplayPhase === 'evaluating' && !isTyping && (
                                            <div className="flex justify-end gap-2">
                                                <button onClick={() => startScenario(selectedScenario)} className="text-xs bg-cyan-600/90 backdrop-blur-md border border-cyan-400/50 text-white px-5 py-2.5 rounded-full hover:bg-cyan-500 active:scale-95 transition-all font-bold shadow-lg">🔄 ลองเคสนี้อีกครั้ง</button>
                                            </div>
                                        )}

                                        <form onSubmit={handleSendChat} className="flex items-center gap-2 bg-slate-900/80 backdrop-blur-2xl border border-white/20 rounded-full p-2 pl-4 transition-all duration-300 shadow-2xl focus-within:border-cyan-500 w-full">
                                            <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder={isListening ? "กำลังฟัง..." : "พิมพ์ตอบกลับ หรือกดไมค์..."} disabled={isTyping || roleplayPhase === 'ready_to_start'} className="flex-1 bg-transparent text-white placeholder-slate-400 px-2 outline-none text-sm font-medium" />
                                            <button type="button" onClick={toggleMic} disabled={isTyping || roleplayPhase === 'ready_to_start'} className={`w-10 h-10 rounded-full flex items-center justify-center transition-colors relative shrink-0 ${isListening ? 'bg-cyan-500 text-slate-900 shadow-[0_0_15px_#22d3ee]' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white border border-white/10'}`}><SafeIcon icon={Mic} size={18} />{isListening && <span className="absolute inset-0 rounded-full border-2 border-cyan-400 animate-ping opacity-75"></span>}</button>
                                            <button type="submit" disabled={!chatInput.trim() || isTyping || roleplayPhase === 'ready_to_start'} className="w-10 h-10 rounded-full bg-blue-600 hover:bg-blue-500 text-white flex items-center justify-center disabled:opacity-50 transition-colors shadow-lg shrink-0"><SafeIcon icon={Send} size={18} /></button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
                {showConsentForm && <ConsentFormOverlay onClose={() => { setShowConsentForm(false); endScenarioAndEvaluate(); }} />}
                </>
            );
        }

        const root = createRoot(document.getElementById('skilllab-root'));
        root.render(<ErrorBoundary><SkillLabApp /></ErrorBoundary>);
    </script>
</body>
</html>
