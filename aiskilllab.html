        const pcm16ToWav = (base64PCM, sampleRate = 24000) => {
          const binaryString = window.atob(base64PCM); const bytes = new Uint8Array(binaryString.length); for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
          const buffer = new ArrayBuffer(44 + bytes.length); const view = new DataView(buffer);
          const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
          writeStr(0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, bytes.length, true);
          new Uint8Array(buffer, 44).set(bytes); return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        };

        function GlassCard({ children, className = "", onClick, ...rest }) {

          return (
            <div onClick={onClick} className={`relative overflow-hidden bg-white/10 backdrop-blur-xl border border-white/20 shadow-xl ${radiusClass} transition-all duration-300 ${onClick ? 'cursor-pointer hover:-translate-y-1 hover:bg-white/20' : ''} ${bgClass}`} {...rest}>

              <div className="relative z-10 w-full h-full text-white">{children}</div>

        function SkillLabApp() {
            const [user, setUser] = useState(null);
            const [selectedScenario, setSelectedScenario] = useState(null);
            const [accessDenied, setAccessDenied] = useState(false); 
            
            // Chatbot States
            const [chatInput, setChatInput] = useState(''); 
            const [isTyping, setIsTyping] = useState(false); 
            const [messages, setMessages] = useState([]); 
            const [isListening, setIsListening] = useState(false);

            const [audioLevel, setAudioLevel] = useState(0); 
            const [selectedImage, setSelectedImage] = useState(null);
            const [uiMessage, setUiMessage] = useState({ show: false, text: '', type: 'success' });
            
            // Next-Gen Features States
            const [smartSuggestions, setSmartSuggestions] = useState([]); 
            const [pressureTime, setPressureTime] = useState(20); 
            
            // TTS & Waveform States
            const [isAiSpeaking, setIsAiSpeaking] = useState(false);
            
            // Roleplay States
            const [roleplayPhase, setRoleplayPhase] = useState('none'); 
            const [currentEmotion, setCurrentEmotion] = useState('NEUTRAL');
            const [currentSpeaker, setCurrentSpeaker] = useState('FAH');
            const [scenarioLang, setScenarioLang] = useState('th');
            const [currentScenarioPrompt, setCurrentScenarioPrompt] = useState('');

            const audioContextRef = useRef(null); const analyserRef = useRef(null); const microphoneRef = useRef(null); const vadSilenceTimerRef = useRef(null); const isSpeakingRef = useRef(false); const latestTranscriptRef = useRef('');
            const recognitionRef = useRef(null); const messagesEndRef = useRef(null); const audioRef = useRef(null); const currentSpeechIdRef = useRef(0);
            
            const ttsCanvasRef = useRef(null);
            const ttsAudioCtxRef = useRef(null);
            const ttsAnalyserRef = useRef(null);
            const ttsAnimFrameRef = useRef(null);

            const showMsg = (text, type = 'success') => {
                setUiMessage({ show: true, text, type });
                setTimeout(() => setUiMessage({ show: false, text: '', type }), 3500);
            };

            const safeRedirect = (url) => {
                try { window.location.href = url; } catch (e) { console.warn("Redirect blocked:", url); }
            };

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('elearning_app_state');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.loggedInUser) {
                            const uType = parsed.loggedInUser.userType;
                            if (uType !== 'Masterclass') {
                                setAccessDenied(true);

            }, []);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, smartSuggestions]);

            useEffect(() => {
                let checkVimeo;
                if (roleplayPhase === 'playing_video' && selectedScenario?.videoUrl) {
                    checkVimeo = setInterval(() => {
                        const iframe = document.getElementById('scenario-vimeo-player');
                        if (iframe && window.Vimeo) {

                                triggerScenarioNegotiation();
                            });
                        }
                    }, 500);
                }
                return () => clearInterval(checkVimeo);
            }, [roleplayPhase, selectedScenario]);

            useEffect(() => {
                let timer;
                if (roleplayPhase === 'negotiating' && !isTyping && !isAiSpeaking && messages.length > 0 && messages[messages.length-1].sender === 'ai') {
                    timer = setInterval(() => {
                        setPressureTime(p => {
                            if (isListening || chatInput.length > 0 || isAiSpeaking) return p; 
                            if (p <= 1) {
                                clearInterval(timer);
                                handleAutoTimeout(); 
                                return 20;
                            }
                            return p - 1;
                        });
                    }, 1000);
                } else {
                    setPressureTime(20); 
                }
                return () => clearInterval(timer);
            }, [roleplayPhase, isTyping, messages, isListening, chatInput, isAiSpeaking]);

            const handleAutoTimeout = () => { handleSendChat(null, "[ผู้เรียนเงียบ ไม่ตอบสนองทันเวลา]"); };

            useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    recognitionRef.current = new SR(); recognitionRef.current.continuous = true; recognitionRef.current.interimResults = true; recognitionRef.current.lang = 'th-TH'; 
                    recognitionRef.current.onresult = (e) => { let finalT = ''; let interT = ''; for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) finalT += e.results[i][0].transcript; else interT += e.results[i][0].transcript; } setChatInput(p => { const newText = p + finalT; latestTranscriptRef.current = newText || interT; return newText || interT; }); };
                    recognitionRef.current.onend = () => { if (isVadMode && isListening) { try { recognitionRef.current.start(); } catch(err){} } else { setIsListening(false); setChatInput(curr => { const corText = curr.trim(); if (corText && corText !== 'พร้อม') handleSendChat(null, corText); return curr; }); } };
                    recognitionRef.current.onerror = (e) => { if(e.error !== 'no-speech') setIsListening(false); };
                }
            }, [selectedScenario, messages, isVadMode, isListening]);

            const processAudio = useCallback(() => {
                if (!analyserRef.current || !isListening || !isVadMode) return;
                const dataArr = new Uint8Array(analyserRef.current.frequencyBinCount); analyserRef.current.getByteFrequencyData(dataArr);
                let sum = 0; for (let i = 0; i < dataArr.length; i++) sum += dataArr[i]; const avg = sum / dataArr.length; setAudioLevel(avg);
                if (avg > 15) { if (!isSpeakingRef.current) isSpeakingRef.current = true; if (vadSilenceTimerRef.current) { clearTimeout(vadSilenceTimerRef.current); vadSilenceTimerRef.current = null; } } else { if (isSpeakingRef.current && !vadSilenceTimerRef.current) { vadSilenceTimerRef.current = setTimeout(() => { isSpeakingRef.current = false; const finalSp = latestTranscriptRef.current.trim(); if (finalSp) { handleSendChat(null, finalSp); setChatInput(''); latestTranscriptRef.current = ''; } vadSilenceTimerRef.current = null; }, 800); } }
                if (isListening && isVadMode) requestAnimationFrame(processAudio);
            }, [isListening, isVadMode]);

            const startVAD = async () => { try { if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("NotSupportedError"); const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)(); analyserRef.current = audioContextRef.current.createAnalyser(); microphoneRef.current = audioContextRef.current.createMediaStreamSource(stream); microphoneRef.current.connect(analyserRef.current); analyserRef.current.fftSize = 256; setIsVadMode(true); setIsListening(true); recognitionRef.current?.start(); processAudio(); showMsg('🎙️ เปิดโหมด VAD'); } catch (err) { showMsg('ไมค์ไม่ทำงาน', 'error'); } };
            const stopVAD = () => { setIsVadMode(false); setIsListening(false); recognitionRef.current?.stop(); if (audioContextRef.current) audioContextRef.current.close(); if (vadSilenceTimerRef.current) clearTimeout(vadSilenceTimerRef.current); showMsg('ปิดไมโครโฟนแล้ว', 'success'); };
            const toggleMic = () => { if (isListening) stopVAD(); else { setChatInput(''); latestTranscriptRef.current = ''; startVAD(); } };

            const stopAudio = useCallback(() => { 
                currentSpeechIdRef.current += 1; 
                setIsAiSpeaking(false);
                if(ttsAnimFrameRef.current) cancelAnimationFrame(ttsAnimFrameRef.current);
                if(ttsCanvasRef.current) ttsCanvasRef.current.getContext('2d').clearRect(0, 0, ttsCanvasRef.current.width, ttsCanvasRef.current.height);
                if (audioRef.current) { audioRef.current.pause(); audioRef.current.removeAttribute('src'); audioRef.current.load(); audioRef.current = null; } 
            }, []);
            
            const speakThai = async (text, onEndCallback = null, speaker = 'FAH', isSystemVoice = false, emotion = 'NEUTRAL') => {
                stopAudio(); currentSpeechIdRef.current += 1; const speechId = currentSpeechIdRef.current; 
                
                let targetVoice = "Aoede"; 
                let cleanSpeakText = text.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').replace(/\*.*?\*/g, '').replace(/#.*?#/g, '').replace(/^(ฟ้า|เมฆ|พี่เอก|เอก|น้องชาย|ลูกสาว|แฟน|แฟนของฟ้า|Fah|Mek|Brother|Sister|Boyfriend|AI)\s*:\s*/i, '').trim();

                if (isListening) { recognitionRef.current?.stop(); setIsListening(false); }
                
                if (isSystemVoice) {

                    else if (speaker === 'BOYFRIEND') { targetVoice = "Charon"; emotionPrompt = `[พูดด้วยเสียงผู้ชายวัยผู้ใหญ่ นุ่มนวล อบอุ่น ใจเย็น สุภาพ และคอยให้กำลังใจ]: ${cleanSpeakText}`; } 
                    else { targetVoice = "Aoede"; emotionPrompt = `[พูดด้วยเสียงผู้หญิงวัยรุ่น 22 ปี กำลังร้องไห้และสับสน]: ${cleanSpeakText}`; }
                }

                try {
                    const inlineData = await callGeminiTTS(emotionPrompt, targetVoice); 
                    if (speechId !== currentSpeechIdRef.current) return;
                    const sampleRate = parseInt(inlineData.mimeType.match(/rate=(\d+)/)?.[1] ?? "24000", 10); 
                    const audioUrl = pcm16ToWav(inlineData.data, sampleRate);
                    const audio = new Audio(audioUrl); 
                    audio.crossOrigin = "anonymous";
                    audioRef.current = audio; 

                    if (!ttsAudioCtxRef.current) {
                        ttsAudioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                        ttsAnalyserRef.current = ttsAudioCtxRef.current.createAnalyser();
                        ttsAnalyserRef.current.fftSize = 512; 
                    }

                    const source = ttsAudioCtxRef.current.createMediaElementSource(audio);

                    ttsAnalyserRef.current.connect(ttsAudioCtxRef.current.destination);

                    setIsAiSpeaking(true);

                    // 🌊 The Quantum Particle Wave & Aurora Beams Algorithm
                    const drawWave = () => {
                        if (!ttsCanvasRef.current || !ttsAnalyserRef.current) return;
                        const canvas = ttsCanvasRef.current;
                        const ctx = canvas.getContext('2d');
                        
                        if (!canvas.beams) canvas.beams = [];
                        if (!canvas.particles) canvas.particles = [];

                        const freqData = new Uint8Array(ttsAnalyserRef.current.frequencyBinCount);
                        ttsAnalyserRef.current.getByteFrequencyData(freqData);
                        
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        
                        // 🎨 Multi-Color Emotion Palettes (Rich Gradients)
                        const multiColors = {
                            NEUTRAL: ['#8A2BE2', '#4B0082', '#00BFFF', '#FF1493', '#FF00FF'], // Purple, Indigo, Cyan, Pink, Magenta
                            SAD: ['#00008B', '#0000CD', '#4169E1', '#87CEFA', '#4B0082'],     // Deep Blues, Indigo
                            ANGRY: ['#FF0000', '#DC143C', '#FF4500', '#FF8C00', '#FF1493'],    // Reds, Oranges, Deep Pink
                            ADVISING: ['#00FA9A', '#00CED1', '#20B2AA', '#48D1CC', '#00FFFF'],   // Teals, Cyans, Emerald
                            CONFUSED: ['#FFD700', '#FFA500', '#FF69B4', '#9370DB', '#8A2BE2'],   // Gold, Orange, Pink, Purple
                            HESITANT: ['#DDA0DD', '#E6E6FA', '#B0C4DE', '#87CEEB', '#FFB6C1']    // Pastel Plums, Blues, Pinks
                        };
                        const colors = multiColors[emotion] || multiColors['NEUTRAL'];
                        
                        const hexToRgbA = (hex, alpha) => {
                            let r = parseInt(hex.slice(1, 3), 16),
                                g = parseInt(hex.slice(3, 5), 16),
                                b = parseInt(hex.slice(5, 7), 16);
                            return `rgba(${r},${g},${b},${alpha})`;
                        };

                        const avgAmp = freqData.reduce((a,b)=>a+b,0)/freqData.length;
                        const time = performance.now() * 0.001;
                        
                        // กะระยะให้อยู่บริเวณหน้าอก และชิดซ้าย/ขวาตามความเหมาะสม
                        const centerY = canvas.height * 0.65;
                        const centerX = canvas.width * 0.5;
                        const fov = 350;

                        // 1. Draw Aurora Beams (Vertical Pillars of Light)
                        if (avgAmp > 20 && Math.random() < 0.15) {
                            canvas.beams.push({
                                x: centerX + (Math.random() - 0.5) * 1200,
                                y: centerY + (Math.random() - 0.5) * 400,
                                width: 1 + Math.random() * 4,
                                life: 1.0,
                                color: colors[Math.floor(Math.random() * colors.length)]
                            });
                        }

                        for (let i = canvas.beams.length - 1; i >= 0; i--) {
                            let b = canvas.beams[i];
                            b.life -= 0.015;
                            if (b.life <= 0) { canvas.beams.splice(i, 1); continue; }

                            let grad = ctx.createLinearGradient(b.x, 0, b.x, canvas.height);
                            grad.addColorStop(0, hexToRgbA(b.color, 0));
                            grad.addColorStop(Math.max(0.1, Math.min(0.9, b.y / canvas.height)), hexToRgbA(b.color, b.life * (0.4 + (avgAmp/255)*0.6)));
                            grad.addColorStop(1, hexToRgbA(b.color, 0));

                            ctx.fillStyle = grad;
                            ctx.fillRect(b.x - b.width/2, 0, b.width, canvas.height);

                            // Draw glowing star at the core of the beam
                            ctx.fillStyle = '#ffffff';
                            ctx.shadowBlur = 20;
                            ctx.shadowColor = b.color;
                            ctx.beginPath();
                            ctx.arc(b.x, b.y, b.width * 1.5, 0, Math.PI*2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }

                        // 2. Draw 3D Particle Wave (Fluid Mesh)
                        // วาดจากหลังมาหน้า (Back to Front) เพื่อ Layering ที่ถูกต้อง
                        for (let z = 800; z > 0; z -= 30) {
                            ctx.beginPath();
                            let depthRatio = 1 - (z / 800); // 0 at back, 1 at front
                            let colorIndex = Math.floor(Math.abs(z + time * 50) / 100) % colors.length;
                            let ribbonColor = hexToRgbA(colors[colorIndex], depthRatio * (0.2 + (avgAmp/255) * 0.8));
                            
                            ctx.strokeStyle = ribbonColor;
                            ctx.lineWidth = 1.5 * depthRatio;

                            let isFirst = true;
                            for (let x = -1000; x <= 1000; x += 40) {
                                // Smooth wave formula combining sines and cosines
                                let waveX = x * 0.002 + time * 0.4;
                                let waveZ = z * 0.003 - time * 0.6;
                                
                                // Base undulating wave
                                let y = Math.sin(waveX) * Math.cos(waveZ) * 150;
                                
                                // Audio reactive displacement (create peaks corresponding to voice)
                                let audioIdx = Math.floor(Math.abs(x) / 1000 * 64) % freqData.length;
                                let a = (freqData[audioIdx] || 0) / 255;
                                y -= a * 200 * Math.sin(waveX * 3 + waveZ * 3); // Spikes push upwards

                                // 3D Projection to 2D
                                let scale = fov / (fov + z);
                                let px = centerX + x * scale;
                                let py = centerY + y * scale;

                                if (isFirst) {
                                    ctx.moveTo(px, py);
                                    isFirst = false;
                                } else {
                                    ctx.lineTo(px, py);
                                }

                                // Draw floating star particles on the wave crests
                                if (Math.random() < 0.15) {
                                    ctx.fillStyle = hexToRgbA('#ffffff', depthRatio * a * 1.5);
                                    ctx.beginPath();
                                    ctx.arc(px, py, 1.5 * depthRatio, 0, Math.PI*2);
                                    ctx.fill();
                                }
                            }
                            ctx.shadowBlur = 15;
                            ctx.shadowColor = colors[colorIndex];
                            ctx.stroke();
                            ctx.shadowBlur = 0;
                        }

                        ctx.globalCompositeOperation = 'source-over';
                        ttsAnimFrameRef.current = requestAnimationFrame(drawWave);

                <div className="min-h-screen w-full font-sans antialiased overflow-hidden relative">
                    <div className="sky-bg"></div><div className="clouds-wrapper"><div className="cloud-layer layer-1"></div><div className="cloud-layer layer-2"></div><div className="cloud-layer layer-3"></div></div>
                    
                    {uiMessage.show && <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full font-bold shadow-xl animate-in slide-in-from-top-4 border backdrop-blur-md ${uiMessage.type === 'error' ? 'bg-rose-500/20 text-rose-300 border-rose-500/50' : 'bg-emerald-500/20 text-emerald-300 border-emerald-500/50'}`}>{uiMessage.text}</div>}

                    {/* Navbar */}
                    <div className="px-6 py-4 border-b border-white/10 bg-black/40 backdrop-blur-md flex justify-between items-center z-20 relative shadow-md">
                        <div className="flex items-center gap-4">
                            <button onClick={() => { stopAudio(); safeRedirect('./index.html#dashboard'); }} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors border border-white/20 shadow-sm text-white"><SafeIcon icon={ArrowLeft} size={20} /></button>
                            <h1 className="text-xl md:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 flex items-center gap-2"><SafeIcon icon={Bot} className="text-cyan-400" size={24} /> AI Skill Lab</h1>
                        </div>
                        <div className="text-white/80 font-bold text-sm bg-white/10 px-4 py-1.5 rounded-full border border-white/20 shadow-sm hidden sm:flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> {user.name}</div>
                    </div>

                    <div className="p-4 md:p-6 lg:p-8 h-[calc(100vh-73px)] w-full relative z-10 flex">
                        
                        {!selectedScenario ? (
                            <div className="w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-6 h-full animate-in fade-in zoom-in-95">
                                <div className="w-full lg:w-1/3 flex flex-col gap-6 h-full">
                                    <GlassCard className="!p-0 overflow-hidden h-full max-h-[600px] w-full max-w-[350px] mx-auto relative bg-black/60 shadow-2xl flex items-center justify-center border border-white/20">
                                        <iframe src={FAH_IDLE_VIDEO} className="absolute inset-0 w-full h-full border-none pointer-events-none" allow="autoplay; fullscreen" />
                                    </GlassCard>
                                </div>
                                <div className="w-full lg:w-2/3 flex flex-col gap-4">
                                    <div className="p-4 bg-blue-500/10 border border-blue-500/30 rounded-xl mb-4 backdrop-blur-md">
                                        <p className="text-sm md:text-base font-bold text-blue-200 flex gap-2 leading-relaxed"><SafeIcon icon={Target} size={24} className="shrink-0 text-blue-400 mt-0.5" /><span><strong>คำชี้แจง:</strong> พื้นที่นี้คือสถานการณ์จำลอง AI ไม่มีผลต่อการตัดคะแนนสอบ ขอให้ผู้เรียนนำความรู้เรื่องการเจรจา (B.A.L.I.) มาประยุกต์ใช้อย่างเต็มที่ค่ะ</span></p>
                                    </div>
                                    <h2 className="text-2xl font-black text-white mb-4 drop-shadow-sm text-center lg:text-left">เลือกกรณีศึกษาเพื่อเริ่มฝึกเจรจา</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 overflow-y-auto custom-scrollbar pb-10">
                                        {SKILL_LAB_SCENARIOS.map((sc, idx) => (
                                            <GlassCard key={sc.id} onClick={() => startScenario(sc)} className="p-6 text-center border-t-4 border-t-cyan-500 hover:border-t-cyan-400 group">
                                                <div className={`w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-white shadow-[0_0_20px_rgba(0,0,0,0.5)] ${sc.language === 'en' ? 'bg-gradient-to-br from-indigo-500 to-purple-600' : 'bg-gradient-to-br from-cyan-500 to-blue-600'}`}>
                                                    <span className="text-xl font-black">{sc.language === 'en' ? 'EN' : 'TH'}</span>
                                                </div>
                                                <div className="text-xs font-black text-white/80 bg-white/10 px-3 py-1 rounded-full mx-auto w-fit mb-3 border border-white/20">เคสที่ {idx + 1}</div>
                                                <h3 className="font-extrabold text-xl text-white mb-3 group-hover:text-cyan-400 transition-colors">{sc.title}</h3>
                                                <p className="text-sm text-white/60 line-clamp-3">{sc.description}</p>
                                            </GlassCard>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                        
                            <div className="w-full max-w-[1400px] mx-auto animate-in fade-in zoom-in-95 h-full flex flex-col lg:flex-row relative rounded-[2.5rem] overflow-hidden shadow-[0_30px_60px_rgba(0,0,0,0.8)] border border-slate-600 bg-slate-900 backdrop-blur-3xl">
                                
                                {/* 🌟 1. ภาพฉากหลังหลัก (Unified Background Layer) 🌟 */}
                                {/* เป็นพื้นหลังผืนเดียวกันทั้งจอ สว่าง 100% จัดชิดซ้าย */}
                                <div className="absolute inset-0 z-0 bg-cover bg-left bg-no-repeat pointer-events-none" style={{ backgroundImage: `url('https://res.cloudinary.com/djwclucoz/image/upload/v1783850123/Gemini_Generated_Image_a1b2c3a1b2c3a1b2_xy98zt.jpg')` }}></div>

                                {/* 🌟 2. วิดีโอจำลองสถานการณ์ (Video Overlay) 🌟 */}
                                {roleplayPhase === 'playing_video' && selectedScenario?.videoUrl && (
                                    <div className="absolute inset-0 z-[100] bg-black flex flex-col items-center justify-center animate-in fade-in">
                                        <iframe
                                            id="scenario-vimeo-player"
                                            src={`${selectedScenario.videoUrl}?autoplay=1`}
                                            className="w-full h-full border-none"
                                            allow="autoplay; fullscreen"
                                            allowFullScreen
                                        ></iframe>
                                        <button onClick={triggerScenarioNegotiation} className="absolute bottom-6 right-6 px-6 py-3 bg-white/20 hover:bg-white/30 backdrop-blur-md text-white rounded-full font-bold transition-all z-[110] border border-white/40 shadow-lg">ข้ามวิดีโอ (Skip) &gt;</button>
                                    </div>
                                )}

                                {/* 🌟 3. พื้นที่ฝั่งซ้าย (Holographic Particle Canvas) 🌟 */}
                                <div className={`w-full lg:w-[60%] relative flex flex-col shrink-0 h-[50vh] lg:h-full overflow-hidden z-10 pointer-events-none ${roleplayPhase === 'playing_video' ? 'hidden' : ''}`}>
                                    {/* แคนวาสวาดกราฟิกสมองโฮโลแกรมและคลื่นเสียง */}
                                    <canvas ref={ttsCanvasRef} width="1920" height="1080" className="absolute inset-0 w-full h-full z-10 object-cover mix-blend-screen pointer-events-none"></canvas>
                                </div>

                                {/* 🌟 4. พื้นที่ฝั่งขวา กล่องแชทแบบกระจกใส (Glassmorphism Chat Box) 🌟 */}
                                <div className={`w-full lg:w-[40%] flex flex-col h-[50vh] lg:h-full bg-black/20 backdrop-blur-md relative z-10 border-t md:border-t-0 md:border-l border-white/10 pointer-events-auto shadow-[-10px_0_30px_rgba(0,0,0,0.2)] ${roleplayPhase === 'playing_video' ? 'hidden' : ''}`}>
                                    
                                    <div className="p-4 border-b border-white/10 flex items-center justify-between shrink-0 bg-white/5 shadow-sm">
                                        <div className="flex items-center gap-3"><div><h3 className="font-extrabold text-sm text-white drop-shadow-sm">{selectedScenario.title}</h3><p className="text-[10px] text-cyan-300 font-medium flex items-center gap-1"><SafeIcon icon={Volume2} size={12}/> {currentSpeaker === 'BROTHER' ? 'Charon Neural' : 'Aoede Neural'}</p></div></div>
                                        <button onClick={() => { stopAudio(); setSelectedScenario(null); setMessages([]); setRoleplayPhase('none'); }} className="p-2 rounded-lg hover:bg-rose-500/20 text-slate-300 hover:text-rose-400 transition-colors" title="ยกเลิกและออก"><SafeIcon icon={X} size={20} /></button>
                                    </div>
                                    
                                    <div className="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4 flex flex-col relative">
                                        {messages.map((m, idx) => (
                                            <div key={idx} className={`flex gap-2 ${m.sender === 'user' ? 'justify-end' : 'justify-start'} ${m.isHidden ? 'hidden' : ''}`}>
                                                <div className={`p-3 rounded-2xl max-w-[85%] text-sm leading-relaxed whitespace-pre-wrap shadow-sm backdrop-blur-md border ${m.sender === 'ai' ? 'bg-white/10 border-white/20 text-white rounded-tl-none' : 'bg-blue-600/60 border-blue-400/30 text-white rounded-tr-none'}`}>
                                                    {m.image && <img src={m.image} className="w-full rounded-lg mb-2 object-cover border border-white/20" />}
                                                    {m.text}
                                                </div>
                                            </div>
                                        ))}
                                        {isTyping && <div className="flex gap-2 justify-start animate-in fade-in"><div className="p-4 rounded-2xl bg-white/10 border border-white/20 rounded-tl-none flex gap-1.5 backdrop-blur-md"><div className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div><div className="w-1.5 h-1.5 bg-purple-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div></div></div>}
                                        
                                        {!isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                            <div className="flex flex-wrap gap-2 mt-2 animate-in fade-in">
                                                {roleplayPhase === 'negotiating' && <button onClick={endScenarioAndEvaluate} className="text-xs bg-rose-500/20 border border-rose-500/50 text-rose-300 px-4 py-2 rounded-lg hover:bg-rose-500/40 active:scale-95 transition-all font-bold backdrop-blur-sm">🛑 จบการเจรจา (ประเมินผล)</button>}
                                                {roleplayPhase === 'evaluating' && <><button onClick={() => startScenario(selectedScenario)} className="text-xs bg-amber-500/20 border border-amber-500/50 text-amber-300 px-4 py-2 rounded-lg hover:bg-amber-500/40 active:scale-95 transition-all font-bold backdrop-blur-sm">🔄 ลองฝึกเคสนี้อีกครั้ง</button><button onClick={() => { setSelectedScenario(null); setMessages([]); setRoleplayPhase('none'); }} className="text-xs bg-white/10 border border-white/20 text-white px-4 py-2 rounded-lg hover:bg-white/20 transition-all font-bold backdrop-blur-sm">🔙 กลับไปเลือกเคสอื่น</button></>}
                                            </div>
                                        )}
                                        <div ref={messagesEndRef} />
                                    </div>
                                    
                                    <div className="shrink-0 p-3 md:p-4 bg-black/30 backdrop-blur-xl border-t border-white/10 relative z-10 pb-safe shadow-[0_-5px_15px_rgba(0,0,0,0.1)]">
                                        {/* ⏱️ Crisis Countdown Bar */}
                                        {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                           <div className="absolute top-0 left-0 w-full h-0.5 bg-white/10">
                                               <div className={`h-full transition-all duration-1000 ${pressureTime > 10 ? 'bg-cyan-500' : pressureTime > 5 ? 'bg-amber-500 shadow-[0_0_8px_#f59e0b]' : 'bg-rose-500 shadow-[0_0_8px_#f43f5e]'}`} style={{ width: `${(pressureTime/20)*100}%` }}></div>
                                           </div>
                                        )}
                                        
                                        {/* 💡 Smart Suggestions Hooks */}
                                        {roleplayPhase === 'negotiating' && smartSuggestions.length > 0 && !isTyping && (
                                            <div className="flex flex-col gap-2 mb-3 px-1 animate-in fade-in slide-in-from-bottom-2">
                                                <div className="text-[10px] font-bold text-cyan-300 flex items-center gap-1 uppercase tracking-widest"><SafeIcon icon={Lightbulb} size={12}/> AI COACH SUGGESTIONS:</div>
                                                <div className="flex flex-wrap gap-2">
                                                    {smartSuggestions.map((sug, i) => (
                                                        <button key={i} onClick={() => handleSendChat(null, sug)} className="text-xs bg-white/10 hover:bg-white/20 border border-white/20 text-white px-3 py-2 rounded-lg text-left transition-colors active:scale-95 break-words line-clamp-2 shadow-sm backdrop-blur-sm">{sug}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {isVadMode && <div className="absolute -top-1 left-8 right-8 h-1 bg-transparent"><div className="h-full bg-cyan-500 transition-all duration-100 rounded-full shadow-[0_0_8px_rgba(34,211,238,0.8)]" style={{ width: `${Math.min(100, audioLevel * 2)}%` }}></div></div>}
                                        {selectedImage && <div className="mb-2 relative inline-block"><img src={selectedImage} alt="Preview" className="h-14 w-14 object-cover rounded-lg border border-white/20 shadow-sm" /><button onClick={() => setSelectedImage(null)} className="absolute -top-2 -right-2 bg-black/50 backdrop-blur-sm text-white rounded-full p-0.5 border border-white/30 hover:bg-rose-500"><SafeIcon icon={X} size={14} /></button></div>}
                                        
                                        <form onSubmit={handleSendChat} className={`flex items-center gap-2 bg-black/40 border border-white/20 backdrop-blur-2xl rounded-lg p-1.5 pl-3 transition-colors ${isVadMode ? '!border-cyan-500 bg-cyan-900/40' : ''}`}>
                                            <input type="file" id="ai-image-upload" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                            <label htmlFor="ai-image-upload" className="text-slate-300 hover:text-white cursor-pointer p-1.5"><SafeIcon icon={ImageIcon} size={20} /></label>
                                            <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder={isListening ? "กำลังฟัง..." : "พิมพ์ข้อความ หรือกดไมค์..."} disabled={isTyping || roleplayPhase === 'playing_scenario'} className="flex-1 bg-transparent text-white placeholder-slate-400 px-1 outline-none text-sm font-medium" />
                                            
                                            {/* Timer Badge */}
                                            {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                                <div className={`text-[10px] font-mono font-bold px-2 py-1 rounded border shrink-0 ${pressureTime <= 5 ? 'text-rose-200 border-rose-500/50 bg-rose-500/30 animate-pulse' : 'text-slate-200 border-white/20 bg-white/10'}`}>{pressureTime}s</div>
                                            )}

                                            <button type="button" onClick={toggleMic} disabled={isTyping || roleplayPhase === 'playing_scenario'} className={`w-9 h-9 rounded flex items-center justify-center transition-colors relative shrink-0 ${isListening ? 'bg-cyan-500 text-slate-900 shadow-md' : 'bg-white/10 text-white hover:bg-white/20 border border-white/20'}`}><SafeIcon icon={Mic} size={16} />{isListening && <span className="absolute inset-0 rounded border-2 border-cyan-400 animate-ping opacity-75"></span>}</button>
                                            <button type="submit" disabled={(!chatInput.trim() && !selectedImage) || isTyping || roleplayPhase === 'playing_scenario'} className="w-9 h-9 rounded bg-blue-600 hover:bg-blue-500 text-white flex items-center justify-center disabled:opacity-50 transition-colors shadow-sm shrink-0"><SafeIcon icon={Send} size={16} /></button>
                                        </form>
                                    </div>
                                </div>
                                
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('skilllab-root'));
        root.render(<SkillLabApp />);
    </script>
</body>
</html>
