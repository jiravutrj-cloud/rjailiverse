        const pcm16ToWav = (base64PCM, sampleRate = 24000) => {
          const binaryString = window.atob(base64PCM); const bytes = new Uint8Array(binaryString.length); for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
          const buffer = new ArrayBuffer(44 + bytes.length); const view = new DataView(buffer);
          const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
          writeStr(0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, bytes.length, true);

        function SkillLabApp() {
            const [user, setUser] = useState(null);
            const [selectedScenario, setSelectedScenario] = useState(null);
            const [accessDenied, setAccessDenied] = useState(false); 
            
            const [chatInput, setChatInput] = useState(''); 
            const [isTyping, setIsTyping] = useState(false); 
            const [messages, setMessages] = useState([]); 
            const [isListening, setIsListening] = useState(false); 
            const [isVadMode, setIsVadMode] = useState(false); 
            const [audioLevel, setAudioLevel] = useState(0); 
            const [selectedImage, setSelectedImage] = useState(null);
            const [uiMessage, setUiMessage] = useState({ show: false, text: '', type: 'success' });
            
            const [smartSuggestions, setSmartSuggestions] = useState([]); 
            const [pressureTime, setPressureTime] = useState(20); 
            const [isAiSpeaking, setIsAiSpeaking] = useState(false);
            
            // Phase: 'none', 'watching_video', 'ready_to_start', 'negotiating', 'evaluating'
            const [roleplayPhase, setRoleplayPhase] = useState('none'); 
            const [currentEmotion, setCurrentEmotion] = useState('NEUTRAL');
            const [currentSpeaker, setCurrentSpeaker] = useState('FAH');
            const [scenarioLang, setScenarioLang] = useState('th');
            const [currentScenarioPrompt, setCurrentScenarioPrompt] = useState('');
            
            const [showConsentForm, setShowConsentForm] = useState(false);
            
            const [silenceWarning, setSilenceWarning] = useState(false);
            const [isPacingFast, setIsPacingFast] = useState(false);
            const lastAiSpeakEndRef = useRef(Date.now());
            const highVolCountRef = useRef(0);

            // Audio & VAD Refs
            const audioContextRef = useRef(null); const analyserRef = useRef(null); const microphoneRef = useRef(null); const vadSilenceTimerRef = useRef(null); const isSpeakingRef = useRef(false); const latestTranscriptRef = useRef('');
            const recognitionRef = useRef(null); const messagesEndRef = useRef(null); const audioRef = useRef(null); 
            const currentSequenceIdRef = useRef(0);
            
            // Canvas Hologram Refs
            const ttsCanvasRef = useRef(null);
            const ttsAudioCtxRef = useRef(null);
            const ttsAnalyserRef = useRef(null);
            const ttsAnimFrameRef = useRef(null);
            const shouldAnimateCanvas = useRef(false);
            const isAiSpeakingRef = useRef(false);
            const currentEmotionRef = useRef('NEUTRAL');

            const showMsg = (text, type = 'success') => {
                setUiMessage({ show: true, text, type });
                setTimeout(() => setUiMessage({ show: false, text: '', type }), 4000);
            };

            const safeRedirect = (url) => {
                try { window.location.href = url; } catch (e) { console.warn("Redirect blocked:", url); }
            };

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('elearning_app_state');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.loggedInUser) {
                            const uType = parsed.loggedInUser.userType;
                            if (uType !== 'Masterclass') { setAccessDenied(true); return; }
                            setUser(parsed.loggedInUser);
                            signInAnonymously(auth).catch(e => console.warn(e));
                        } else { safeRedirect('./index.html'); }
                    } else { safeRedirect('./index.html'); }
                } catch (e) { safeRedirect('./index.html'); }
            }, []);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, smartSuggestions]);
            useEffect(() => { isAiSpeakingRef.current = isAiSpeaking; }, [isAiSpeaking]);
            useEffect(() => { currentEmotionRef.current = currentEmotion; }, [currentEmotion]);

            // Timer Logic
            useEffect(() => {
                let timer;
                if (roleplayPhase === 'negotiating' && !isTyping && !isAiSpeaking && messages.length > 0 && messages[messages.length-1].sender === 'ai') {
                    timer = setInterval(() => {
                        setPressureTime(p => {
                            if (isListening || chatInput.length > 0 || isAiSpeaking) return p; 
                            if (p <= 1) { clearInterval(timer); handleAutoTimeout(); return 20; }
                            return p - 1;
                        });
                    }, 1000);
                } else { setPressureTime(20); }
                return () => clearInterval(timer);
            }, [roleplayPhase, isTyping, messages, isListening, chatInput, isAiSpeaking]);

            const handleAutoTimeout = () => { handleSendChat(null, "[ผู้เรียนเงียบ ไม่ตอบสนองทันเวลา]"); };

            useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    recognitionRef.current = new SR(); recognitionRef.current.continuous = true; recognitionRef.current.interimResults = true; 
                    // Support English scenario recognition
                    recognitionRef.current.lang = scenarioLang === 'en' ? 'en-US' : 'th-TH'; 
                    recognitionRef.current.onresult = (e) => { 
                        let finalT = ''; let interT = ''; 
                        for (let i = e.resultIndex; i < e.results.length; ++i) { 
                            if (e.results[i].isFinal) finalT += e.results[i][0].transcript; 
                            else interT += e.results[i][0].transcript; 
                        } 
                        setChatInput(p => { const newText = p + finalT; latestTranscriptRef.current = newText || interT; return newText || interT; }); 
                    };
                    recognitionRef.current.onend = () => { 
                        if (isVadMode && isListening) { try { recognitionRef.current.start(); } catch(err){} } 
                        else { setIsListening(false); } 
                    };
                    recognitionRef.current.onerror = (e) => { if(e.error !== 'no-speech') setIsListening(false); };
                }
            }, [selectedScenario, messages, isVadMode, isListening, scenarioLang]);

            const processAudio = useCallback(() => {
                if (!analyserRef.current || !isListening || !isVadMode) return;
                const dataArr = new Uint8Array(analyserRef.current.frequencyBinCount); analyserRef.current.getByteFrequencyData(dataArr);
                let sum = 0; for (let i = 0; i < dataArr.length; i++) sum += dataArr[i]; const avg = sum / dataArr.length; setAudioLevel(avg);
                
                if (avg > 45) { highVolCountRef.current++; } else { highVolCountRef.current = 0; }
                if (highVolCountRef.current > 40) { setIsPacingFast(true); } else { setIsPacingFast(false); }

                if (avg > 15) { 
                    if (!isSpeakingRef.current) isSpeakingRef.current = true; 
                    if (vadSilenceTimerRef.current) { clearTimeout(vadSilenceTimerRef.current); vadSilenceTimerRef.current = null; } 
                } else { 
                    if (isSpeakingRef.current && !vadSilenceTimerRef.current) { 
                        vadSilenceTimerRef.current = setTimeout(() => { 
                            isSpeakingRef.current = false; 
                            const finalSp = latestTranscriptRef.current.trim(); 
                            if (finalSp) { handleSendChat(null, finalSp); setChatInput(''); latestTranscriptRef.current = ''; } 
                            vadSilenceTimerRef.current = null; 
                        }, 1800); 
                    } 
                }
                if (isListening && isVadMode) requestAnimationFrame(processAudio);
            }, [isListening, isVadMode]);

            const startVAD = async () => { try { if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("NotSupportedError"); const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)(); analyserRef.current = audioContextRef.current.createAnalyser(); microphoneRef.current = audioContextRef.current.createMediaStreamSource(stream); microphoneRef.current.connect(analyserRef.current); analyserRef.current.fftSize = 256; setIsVadMode(true); setIsListening(true); recognitionRef.current?.start(); processAudio(); } catch (err) { showMsg('ไมค์ไม่ทำงาน', 'error'); } };
            const stopVAD = () => { setIsVadMode(false); setIsListening(false); setIsPacingFast(false); recognitionRef.current?.stop(); if (audioContextRef.current) audioContextRef.current.close(); if (vadSilenceTimerRef.current) clearTimeout(vadSilenceTimerRef.current); showMsg('ปิดไมโครโฟนแล้ว', 'success'); };
            const toggleMic = () => { if (isListening) stopVAD(); else { setChatInput(''); latestTranscriptRef.current = ''; startVAD(); } };

            const stopAudio = useCallback(() => {

                                            {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                               <div className="absolute top-0 left-0 w-full h-0.5 bg-slate-800">
                                                   <div className={`h-full transition-all duration-1000 ${pressureTime > 10 ? 'bg-cyan-500' : pressureTime > 5 ? 'bg-amber-500 shadow-[0_0_8px_#f59e0b]' : 'bg-rose-500 shadow-[0_0_8px_#f43f5e]'}`} style={{ width: `${(pressureTime/20)*100}%` }}></div>
                                               </div>
                                            )}
                                            
                                            {roleplayPhase === 'negotiating' && smartSuggestions.length > 0 && !isTyping && (
                                                <div className="flex flex-col gap-2 mb-3 px-1 animate-in fade-in slide-in-from-bottom-2">
                                                    <div className="text-[10px] font-bold text-cyan-400 flex items-center gap-1 uppercase tracking-widest"><SafeIcon icon={Lightbulb} size={12}/> AI COACH SUGGESTIONS:</div>
                                                    <div className="flex flex-col gap-2">
                                                        {smartSuggestions.map((sug, i) => (
                                                            <button key={i} onClick={() => handleSendChat(null, sug)} className="text-xs bg-slate-800/80 backdrop-blur-md hover:bg-slate-700 border border-white/10 text-slate-200 px-3 py-2.5 rounded-lg text-left transition-colors active:scale-95 shadow-sm leading-relaxed">{sug}</button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {roleplayPhase === 'negotiating' && !isTyping && (
                                                <div className="flex gap-2 mb-3 overflow-x-auto custom-scrollbar pb-1 pt-1 animate-in fade-in">
                                                    <button type="button" onClick={() => setChatInput(p => p + ' *(ยื่นกระดาษทิชชู่ให้)* ')} className="text-[10px] bg-slate-800/80 border border-slate-600/50 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-full flex items-center gap-1.5 shrink-0 transition-colors shadow-sm"><span className="text-sm">🧻</span> ยื่นทิชชู่</button>
                                                    <button type="button" onClick={() => setChatInput(p => p + ' *(วาดรูปอธิบายก้านสมอง)* ')} className="text-[10px] bg-slate-800/80 border border-slate-600/50 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-full flex items-center gap-1.5 shrink-0 transition-colors shadow-sm"><span className="text-sm">🧠</span> วาดรูปอธิบาย</button>
                                                    <button type="button" onClick={() => setChatInput(p => p + ' *(แสดงท่าทีรับฟังอย่างสงบ)* ')} className="text-[10px] bg-slate-800/80 border border-slate-600/50 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-full flex items-center gap-1.5 shrink-0 transition-colors shadow-sm"><span className="text-sm">🤝</span> รับฟังอย่างสงบ</button>
                                                </div>
                                            )}

                                            {isVadMode && <div className="absolute -top-1 left-8 right-8 h-1 bg-transparent"><div className="h-full bg-cyan-500 transition-all duration-100 rounded-full shadow-[0_0_10px_rgba(34,211,238,1)]" style={{ width: `${Math.min(100, audioLevel * 2)}%` }}></div></div>}
                                            {selectedImage && <div className="mb-2 relative inline-block"><img src={selectedImage} alt="Preview" className="h-14 w-14 object-cover rounded-lg border border-slate-600 shadow-sm" /><button onClick={() => setSelectedImage(null)} className="absolute -top-2 -right-2 bg-slate-900 text-white rounded-full p-0.5 border border-slate-700 hover:bg-rose-500"><SafeIcon icon={X} size={14} /></button></div>}
                                            
                                            <form onSubmit={handleSendChat} className={`flex items-center gap-2 bg-slate-950/80 border rounded-xl p-1.5 pl-3 transition-all duration-300 shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)] focus-within:border-cyan-500 focus-within:shadow-[0_0_20px_rgba(34,211,238,0.3)] ${isListening ? 'border-cyan-500 shadow-[0_0_20px_rgba(34,211,238,0.5)]' : 'border-white/10'}`}>
                                                <input type="file" id="ai-image-upload" accept="image/*" className="hidden" onChange={handleImageUpload} disabled={isInputDisabled} />
                                                <label htmlFor="ai-image-upload" className={`p-1.5 hidden md:block ${isInputDisabled ? 'text-slate-600 cursor-not-allowed' : 'text-slate-400 hover:text-white cursor-pointer'}`}><SafeIcon icon={ImageIcon} size={20} /></label>
                                                
                                                <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder={inputPlaceholder} disabled={isInputDisabled} className="flex-1 bg-transparent text-slate-200 placeholder-slate-500 px-1 outline-none text-sm font-medium disabled:opacity-50" />
                                                
                                                {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                                    <div className={`text-[10px] font-mono font-bold px-2 py-1 rounded border shrink-0 ${pressureTime <= 5 ? 'text-rose-400 border-rose-500/50 bg-rose-500/10 animate-pulse' : 'text-slate-400 border-white/10 bg-slate-800/80'}`}>{pressureTime}s</div>
                                                )}

                                                <button type="button" onClick={toggleMic} disabled={isInputDisabled} className={`w-10 h-10 rounded-lg flex items-center justify-center transition-colors relative shrink-0 disabled:opacity-50 ${isListening ? 'bg-cyan-500 text-slate-900 shadow-[0_0_15px_#22d3ee]' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white border border-white/10'}`}><SafeIcon icon={Mic} size={18} />{isListening && <span className="absolute inset-0 rounded-lg border-2 border-cyan-400 animate-ping opacity-75"></span>}</button>
                                                <button type="submit" disabled={(!chatInput.trim() && !selectedImage) || isInputDisabled} className="w-10 h-10 rounded-lg bg-blue-600 hover:bg-blue-500 text-white flex items-center justify-center disabled:opacity-50 transition-colors shadow-sm shrink-0 border border-blue-400/30"><SafeIcon icon={Send} size={18} /></button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    {showConsentForm && <ConsentFormOverlay onClose={endScenarioAndEvaluate} />}
                </>
            );
        }

        const root = createRoot(document.getElementById('skilllab-root'));
        root.render(<SkillLabApp />);
    </script>
</body>
</html>
