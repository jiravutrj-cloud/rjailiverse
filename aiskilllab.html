    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as LucideIcons from 'lucide-react';
        import { initializeApp, getApps, getApp } from 'firebase/app';
        import { getAuth, signInAnonymously } from 'firebase/auth';
        import { getFirestore, doc, setDoc } from 'firebase/firestore';

        const { ArrowLeft, PlayCircle, Bot, Volume2, X, Send, Mic, Image: ImageIcon, Target, Lock, ArrowRight, FileText, CheckCircle, Info, Lightbulb, SkipForward } = LucideIcons;

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error", error, errorInfo);
                this.setState({ errorInfo });
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex flex-col items-center justify-center bg-rose-950 p-8 text-white font-sans z-[9999] relative">
                            <div className="bg-rose-900/50 p-8 rounded-3xl border border-rose-500 max-w-3xl w-full shadow-2xl backdrop-blur-md">
                                <h1 className="text-3xl font-black text-rose-400 mb-4 flex items-center gap-3"><SafeIcon icon={Info} size={32} /> ระบบขัดข้อง (React Crash)</h1>
                                <p className="mb-6 text-rose-200">กรุณาก๊อปปี้ข้อความสีแดงด้านล่างนี้ ส่งให้ AI เพื่อแก้ไขครับ</p>
                                <div className="bg-black/50 p-4 rounded-xl overflow-x-auto text-sm font-mono text-rose-300 border border-rose-500/30">
                                    <p className="font-bold">{this.state.error && this.state.error.toString()}</p>
                                    <pre className="mt-4 text-xs opacity-70">{this.state.errorInfo && this.state.errorInfo.componentStack}</pre>
                                </div>
                                <button onClick={() => window.location.reload()} className="mt-8 px-6 py-3 bg-white text-rose-900 font-bold rounded-xl hover:bg-rose-100 transition-colors shadow-lg">รีเฟรชหน้าจอใหม่</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function SafeIcon({ icon: Icon, size = 24, className = "" }) {
          if (!Icon) return null;
          return <Icon size={size} className={className} />;
        }

        const SKILL_LAB_SCENARIOS = window.SKILL_LAB_SCENARIOS || [];

        let app, auth, db, appId = 'fah-elearning-prod';
        try {
          const fbP1 = "AIzaSyBs275"; const fbP2 = "NY99gdv1uZdAnb"; const fbP3 = "mx3UlWO8K4o5a0";
          let fbConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
            ? JSON.parse(__firebase_config) : { apiKey: fbP1 + fbP2 + fbP3, authDomain: "e-learning-with-fah-ai.firebaseapp.com", projectId: "e-learning-with-fah-ai", storageBucket: "e-learning-with-fah-ai.firebasestorage.app", messagingSenderId: "418946105960", appId: "1:418946105960:web:728e28070790975df231dd" };
          app = getApps().length === 0 ? initializeApp(fbConfig) : getApp();
          auth = getAuth(app); db = getFirestore(app);
        } catch (error) { console.warn("Firebase init error", error); }

        const appsScriptUrl = 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec';

        const fetchAppsScript = async (payload) => { 
            try { const res = await fetch(appsScriptUrl, { method: 'POST', body: JSON.stringify(payload) }); return await res.json(); } catch(e) { return { status: 'error', message: e.message }; } 
        };

        const callGeminiAPI = async (prompt, systemInstruction, base64Image = null) => {
            try {
                const res = await fetchAppsScript({ action: 'callGemini', prompt: prompt, systemInstruction: systemInstruction, base64Image: base64Image });
                if (res.status === 'success' && res.text) return res.text;
                throw new Error(res.message || "ไม่มีข้อมูลตอบกลับจาก AI");
            } catch (e) { return `[ระบบขัดข้อง] ${e.message}`; }
        };

        const callGeminiTTS = async (text, voiceName = "Aoede") => {
            for (let i = 0; i < 3; i++) {
                try {
                    const res = await fetchAppsScript({ action: 'callGeminiTTS', text: text, voiceName: voiceName });
                    if (res.status === 'success' && res.inlineData) return res.inlineData;
                    throw new Error(res.message || 'TTS Error');
                } catch (e) { if (i < 2) await new Promise(r => setTimeout(r, 2000)); else throw e; }
            }
        };

        const pcm16ToWav = (base64PCM, sampleRate = 24000) => {
          const binaryString = window.atob(base64PCM); const bytes = new Uint8Array(binaryString.length); for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
          const buffer = new ArrayBuffer(44 + bytes.length); const view = new DataView(buffer);
          const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
          writeStr(0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, bytes.length, true);
          new Uint8Array(buffer, 44).set(bytes); return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        };

        function GlassCard({ children, className = "", onClick, ...rest }) {
          let radiusClass = 'rounded-[2rem]'; const m = className.match(/rounded-(?:\[.*?\]|\w+)/); if (m) radiusClass = m[0];
          let bgClass = className.replace(/\bbg-(?:white|slate-[12]00)(?:\/\d+)?\b/g, '').replace(/\bborder-white(?:\/\d+)?\b/g, '').replace(/\bbackdrop-blur-(?:sm|md|lg|xl|2xl|3xl)\b/g, '').replace(/\b!border-none\b/g, '').replace(/\bborder-none\b/g, '');
          return (
            <div onClick={onClick} className={`relative overflow-hidden bg-white/10 backdrop-blur-xl border border-white/20 shadow-[0_15px_40px_rgba(0,0,0,0.4)] ${radiusClass} transition-all duration-300 ${onClick ? 'cursor-pointer hover:-translate-y-1 hover:bg-white/20' : ''} ${bgClass}`} {...rest}>
              <div className="absolute inset-0 bg-gradient-to-br from-white/20 via-white/5 to-transparent pointer-events-none z-0" />
              <div className="relative z-10 w-full h-full text-white">{children}</div>
            </div>
          );
        }

        function SkillLabApp() {
            const [user, setUser] = useState(null);
            const [selectedScenario, setSelectedScenario] = useState(null);
            const [accessDenied, setAccessDenied] = useState(false); 
            
            // Chatbot States
            const [chatInput, setChatInput] = useState(''); 
            const [isTyping, setIsTyping] = useState(false); 
            const [messages, setMessages] = useState([]); 
            const [isListening, setIsListening] = useState(false); 
            const [isVadMode, setIsVadMode] = useState(false); 
            const [audioLevel, setAudioLevel] = useState(0); 
            const [selectedImage, setSelectedImage] = useState(null);
            const [uiMessage, setUiMessage] = useState({ show: false, text: '', type: 'success' });
            
            // Features States
            const [smartSuggestions, setSmartSuggestions] = useState([]); 
            const [pressureTime, setPressureTime] = useState(20); 
            const [isAiSpeaking, setIsAiSpeaking] = useState(false);
            
            // Roleplay States
            const [roleplayPhase, setRoleplayPhase] = useState('none'); 
            const [currentEmotion, setCurrentEmotion] = useState('NEUTRAL');
            const [currentSpeaker, setCurrentSpeaker] = useState('FAH');
            const [scenarioLang, setScenarioLang] = useState('th');
            const [currentScenarioPrompt, setCurrentScenarioPrompt] = useState('');

            // Define isEn variable correctly in component scope!
            const isEn = selectedScenario?.language === 'en';

            // Refs
            const audioContextRef = useRef(null); const analyserRef = useRef(null); const microphoneRef = useRef(null); const vadSilenceTimerRef = useRef(null); const isSpeakingRef = useRef(false); const latestTranscriptRef = useRef('');
            const recognitionRef = useRef(null); const messagesEndRef = useRef(null); const audioRef = useRef(null); const currentSpeechIdRef = useRef(0);

            const showMsg = (text, type = 'success') => {
                setUiMessage({ show: true, text, type });
                setTimeout(() => setUiMessage({ show: false, text: '', type }), 3500);
            };

            const safeRedirect = (url) => { try { window.location.href = url; } catch (e) {} };

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('elearning_app_state');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.loggedInUser) {
                            const uType = parsed.loggedInUser.userType;
                            // Masterclass restriction
                            if (uType !== 'Masterclass') {
                                setAccessDenied(true);
                                return;
                            }
                            setUser(parsed.loggedInUser);
                            signInAnonymously(auth).catch(e => console.warn(e));
                        } else {
                            safeRedirect('./index.html');
                        }
                    } else {
                        safeRedirect('./index.html');
                    }
                } catch (e) { safeRedirect('./index.html'); }
            }, []);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, smartSuggestions]);

            useEffect(() => {
                let timer;
                if (roleplayPhase === 'negotiating' && !isTyping && !isAiSpeaking && messages.length > 0 && messages[messages.length-1].sender === 'ai') {
                    timer = setInterval(() => {
                        setPressureTime(p => {
                            if (isListening || chatInput.length > 0 || isAiSpeaking) return p; 
                            if (p <= 1) {
                                clearInterval(timer);
                                handleAutoTimeout(); 
                                return 20;
                            }
                            return p - 1;
                        });
                    }, 1000);
                } else {
                    setPressureTime(20); 
                }
                return () => clearInterval(timer);
            }, [roleplayPhase, isTyping, messages, isListening, chatInput, isAiSpeaking]);

            const handleAutoTimeout = () => { 
                const timeoutText = isEn ? "[Learner silent, no timely response]" : "[ผู้เรียนเงียบ ไม่ตอบสนองทันเวลา]";
                handleSendChat(null, timeoutText); 
            };

            useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    recognitionRef.current = new SR(); recognitionRef.current.continuous = true; recognitionRef.current.interimResults = true; recognitionRef.current.lang = scenarioLang === 'en' ? 'en-US' : 'th-TH'; 
                    recognitionRef.current.onresult = (e) => { let finalT = ''; let interT = ''; for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) finalT += e.results[i][0].transcript; else interT += e.results[i][0].transcript; } setChatInput(p => { const newText = p + finalT; latestTranscriptRef.current = newText || interT; return newText || interT; }); };
                    recognitionRef.current.onend = () => { if (isVadMode && isListening) { try { recognitionRef.current.start(); } catch(err){} } else { setIsListening(false); setChatInput(curr => { const corText = curr.trim(); if (corText && corText !== 'พร้อม') handleSendChat(null, corText); return curr; }); } };
                    recognitionRef.current.onerror = (e) => { if(e.error !== 'no-speech') setIsListening(false); };
                }
            }, [selectedScenario, messages, isVadMode, isListening, scenarioLang]);

            const processAudio = useCallback(() => {
                if (!analyserRef.current || !isListening || !isVadMode) return;
                const dataArr = new Uint8Array(analyserRef.current.frequencyBinCount); analyserRef.current.getByteFrequencyData(dataArr);
                let sum = 0; for (let i = 0; i < dataArr.length; i++) sum += dataArr[i]; const avg = sum / dataArr.length; setAudioLevel(avg);
                if (avg > 15) { if (!isSpeakingRef.current) isSpeakingRef.current = true; if (vadSilenceTimerRef.current) { clearTimeout(vadSilenceTimerRef.current); vadSilenceTimerRef.current = null; } } else { if (isSpeakingRef.current && !vadSilenceTimerRef.current) { vadSilenceTimerRef.current = setTimeout(() => { isSpeakingRef.current = false; const finalSp = latestTranscriptRef.current.trim(); if (finalSp) { handleSendChat(null, finalSp); setChatInput(''); latestTranscriptRef.current = ''; } vadSilenceTimerRef.current = null; }, 800); } }
                if (isListening && isVadMode) requestAnimationFrame(processAudio);
            }, [isListening, isVadMode]);

            const startVAD = async () => { try { if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("NotSupportedError"); const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)(); analyserRef.current = audioContextRef.current.createAnalyser(); microphoneRef.current = audioContextRef.current.createMediaStreamSource(stream); microphoneRef.current.connect(analyserRef.current); analyserRef.current.fftSize = 256; setIsVadMode(true); setIsListening(true); recognitionRef.current?.start(); processAudio(); showMsg(isEn ? '🎙️ VAD Mic Active' : '🎙️ เปิดโหมด VAD'); } catch (err) { showMsg(isEn ? 'Mic Error' : 'ไมค์ไม่ทำงาน', 'error'); } };
            const stopVAD = () => { setIsVadMode(false); setIsListening(false); recognitionRef.current?.stop(); if (audioContextRef.current) audioContextRef.current.close(); if (vadSilenceTimerRef.current) clearTimeout(vadSilenceTimerRef.current); showMsg(isEn ? 'Mic Suspended' : 'ปิดไมโครโฟนแล้ว', 'success'); };
            const toggleMic = () => { if (isListening) stopVAD(); else { setChatInput(''); latestTranscriptRef.current = ''; startVAD(); } };

            const stopAudio = useCallback(() => { 
                currentSpeechIdRef.current += 1; 
                setIsAiSpeaking(false);
                if (audioRef.current) { audioRef.current.pause(); audioRef.current.removeAttribute('src'); audioRef.current.load(); audioRef.current = null; } 
            }, []);
            
            const speakThai = async (text, onEndCallback = null, speaker = 'FAH', isSystemVoice = false, emotion = 'NEUTRAL') => {
                stopAudio(); currentSpeechIdRef.current += 1; const speechId = currentSpeechIdRef.current; 
                let callbackFired = false;
                
                const safeCallback = () => {
                    if (!callbackFired) {
                        callbackFired = true;
                        if (onEndCallback) onEndCallback();
                    }
                };

                let targetVoice = "Aoede"; 
                // ทำความสะอาดข้อความ ลบ Tag ชื่อก่อนส่งให้ TTS
                let cleanSpeakText = text.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').replace(/\*.*?\*/g, '').replace(/#.*?#/g, '');
                cleanSpeakText = cleanSpeakText.replace(/^(ฟ้า|เมฆ|พี่เอก|เอก|น้องชาย|ลูกสาว|แฟน|แฟนของฟ้า|Fah|Mek|Brother|Sister|Boyfriend|AI|Michael)\s*:\s*/i, '');
                cleanSpeakText = cleanSpeakText.replace(/^\[(ฟ้า|เมฆ|พี่เอก|เอก|น้องชาย|ลูกสาว|แฟน|แฟนของฟ้า|Fah|Mek|Brother|Sister|Boyfriend|AI|Michael)\]\s*/i, '').trim();

                let emotionPrompt = "";
                
                if (isListening) { recognitionRef.current?.stop(); setIsListening(false); }
                
                if (isSystemVoice) {
                    targetVoice = "Aoede";
                    emotionPrompt = scenarioLang === 'en' 
                      ? `[Speak with a professional, warm, and highly supportive female announcer voice]: ${cleanSpeakText}`
                      : `[พูดด้วยเสียงผู้ประกาศหญิง น้ำเสียงเป็นทางการ สุภาพ นุ่มนวล ใจดี ให้กำลังใจ ไม่ร้องไห้]: ${cleanSpeakText}`;
                } else {
                    if (speaker === 'BROTHER' || speaker === 'MICHAEL') { 
                        targetVoice = "Charon"; 
                        emotionPrompt = scenarioLang === 'en'
                          ? `[Speak with a vulnerable, sad, or frustrated male voice according to context]: ${cleanSpeakText}`
                          : `[พูดด้วยเสียงผู้ชาย น้ำเสียงตามอารมณ์บริบท]: ${cleanSpeakText}`; 
                    } 
                    else if (speaker === 'BOYFRIEND') { 
                        targetVoice = "Charon"; 
                        emotionPrompt = scenarioLang === 'en'
                          ? `[Speak with an adult male voice, supportive, calm, and comforting]: ${cleanSpeakText}`
                          : `[พูดด้วยเสียงผู้ชายวัยผู้ใหญ่ นุ่มนวล อบอุ่น ใจเย็น สุภาพ และคอยให้กำลังใจ]: ${cleanSpeakText}`; 
                    } 
                    else { 
                        targetVoice = "Aoede"; 
                        emotionPrompt = scenarioLang === 'en'
                          ? `[Speak with a 22-year-old female voice, emotionally charged according to context]: ${cleanSpeakText}`
                          : `[พูดด้วยเสียงผู้หญิงวัยรุ่น 22 ปี น้ำเสียงตามอารมณ์บริบท]: ${cleanSpeakText}`; 
                    }
                }

                try {
                    const inlineData = await callGeminiTTS(emotionPrompt, targetVoice); 
                    if (speechId !== currentSpeechIdRef.current) return;
                    const sampleRate = parseInt(inlineData.mimeType.match(/rate=(\d+)/)?.[1] ?? "24000", 10); 
                    const audioUrl = pcm16ToWav(inlineData.data, sampleRate);
                    const audio = new Audio(audioUrl); 
                    audio.crossOrigin = "anonymous";
                    audioRef.current = audio; 

                    setIsAiSpeaking(true);

                    audio.onended = () => { setIsAiSpeaking(false); safeCallback(); }; 
                    audio.onerror = () => { setIsAiSpeaking(false); safeCallback(); }; 
                    
                    audio.play().catch(e => { console.error("Audio Play Error:", e); setIsAiSpeaking(false); safeCallback(); }); 
                } catch (error) { 
                    if (speechId === currentSpeechIdRef.current) { setIsAiSpeaking(false); safeCallback(); } 
                }
            };

            const triggerScenarioNegotiation = () => {
                const isEnglish = selectedScenario?.language === 'en';
                const contextText = isEnglish 
                    ? "Initial Case Data: Patient is a 46yo male, car accident. Brain stem reflexes and apnea test performed, confirming brain death. Relatives outside ICU include Michael (Spouse). The negotiation has started." 
                    : "ข้อมูลเบื้องต้น: คนไข้ชาย อายุ 46 ปี ประสบอุบัติเหตุรถยนต์ แพทย์ประเมินก้านสมองและทดสอบการหายใจแล้ว ยืนยันภาวะสมองตาย ญาติหน้าห้อง ICU มี ฟ้า (ลูกสาว), เมฆ (น้องชาย) และ พี่เอก (แฟนของฟ้า) เริ่มการเจรจาได้เลยค่ะ";
                
                setRoleplayPhase('giving_context'); setCurrentEmotion('NEUTRAL'); setCurrentSpeaker('FAH');
                const contextMsgId = Date.now(); 
                
                setMessages([{ id: contextMsgId, sender: 'ai', text: contextText, isVoiceOnly: false, speakerName: 'System', isContext: true }]);
                
                // The Intro-Hook
                const introHookText = isEnglish
                    ? "Hello... Are you the staff member coming to talk to me about my wife?"
                    : "สวัสดีค่ะ... คุณเป็นเจ้าหน้าที่ที่จะมาคุยกับพวกเราเรื่องคุณพ่อหรือเปล่าคะ?";
                const introSpeaker = isEnglish ? 'MICHAEL' : 'FAH';

                speakThai(contextText, () => {
                    setRoleplayPhase('negotiating');
                    
                    const introMsgId = 'static-intro-hook-msg'; // Static ID ป้องกันบั๊กเบิ้ล
                    const visualSpeakerName = isEnglish ? 'Michael' : 'ฟ้า';
                    
                    setMessages(prev => {
                        if(prev.some(m => m.id === introMsgId)) return prev;
                        return [...prev, { id: introMsgId, sender: 'ai', text: `(${visualSpeakerName}) ${introHookText}`, isVoiceOnly: true, speakerName: visualSpeakerName }]
                    });
                    
                    setCurrentEmotion('CONFUSED');
                    setCurrentSpeaker(introSpeaker);

                                <div className="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4 flex flex-col relative z-30">
                                    {messages.map((m, idx) => (
                                        <div key={idx} className={`flex w-full ${m.sender === 'user' ? 'justify-end' : 'justify-start'} ${m.isHidden ? 'hidden' : ''}`}>
                                            <div className={`p-3.5 rounded-2xl max-w-[85%] text-sm leading-relaxed whitespace-pre-wrap shadow-lg backdrop-blur-md border ${m.sender === 'ai' ? 'bg-white/60 border-white/50 text-slate-900 font-bold rounded-tl-none' : 'bg-blue-600/90 border-blue-400/50 text-white font-medium rounded-tr-none'}`}>
                                                {m.image && <img src={m.image} className="w-full rounded-lg mb-2 object-cover border border-white/20" />}
                                                {m.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && (
                                        <div className="flex justify-start animate-in fade-in">
                                            <div className="p-4 rounded-2xl bg-white/60 backdrop-blur-md border border-white/50 rounded-tl-none flex gap-1.5 shadow-lg">
                                                <div className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce"></div>
                                                <div className="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                                <div className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                            </div>
                                        </div>
                                    )}
                                    
                                    {/* Actions after AI response */}
                                    {!isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                        <div className="flex flex-wrap justify-end gap-2 mt-2 animate-in fade-in">
                                            {roleplayPhase === 'negotiating' && <button onClick={endScenarioAndEvaluate} className="text-[11px] bg-rose-600/90 backdrop-blur-md border border-rose-400 text-white px-4 py-2 rounded-full hover:bg-rose-500 active:scale-95 transition-all font-bold shadow-lg">{isEn ? "🛑 End Simulation (Evaluate)" : "🛑 จบการเจรจา (ประเมินผล)"}</button>}
                                            {roleplayPhase === 'evaluating' && <><button onClick={() => startScenario(selectedScenario)} className="text-[11px] bg-cyan-600/90 backdrop-blur-md border border-cyan-400 text-white px-4 py-2 rounded-full hover:bg-cyan-500 active:scale-95 transition-all font-bold shadow-lg">{isEn ? "🔄 Retry This Case" : "🔄 ลองฝึกเคสนี้อีกครั้ง"}</button></>}
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>
                                
                                {/* Input Area */}
                                <div className="shrink-0 p-4 bg-white/5 border-t border-white/20 relative z-30 pb-safe rounded-b-[2rem]">
                                    
                                    {/* ⏱️ Crisis Countdown Bar */}
                                    {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                       <div className="absolute top-0 left-0 w-full h-1 bg-white/10">
                                           <div className={`h-full transition-all duration-1000 ${pressureTime > 10 ? 'bg-emerald-400 shadow-[0_0_8px_#34d399]' : pressureTime > 5 ? 'bg-amber-400 shadow-[0_0_8px_#fbbf24]' : 'bg-rose-500 shadow-[0_0_10px_#f43f5e]'}`} style={{ width: `${(pressureTime/20)*100}%` }}></div>
                                       </div>
                                    )}
                                    
                                    {/* 💡 Smart Suggestions Hooks */}
                                    {roleplayPhase === 'negotiating' && smartSuggestions.length > 0 && !isTyping && (
                                        <div className="flex flex-col gap-2 mb-3 px-1 animate-in fade-in slide-in-from-bottom-2">
                                            <div className="flex flex-col gap-2">
                                                {smartSuggestions.map((sug, i) => (
                                                    <button key={i} onClick={() => handleSendChat(null, sug)} className="text-xs bg-white/80 hover:bg-white backdrop-blur-md border border-white/50 text-slate-800 font-medium px-4 py-2.5 rounded-xl text-left transition-colors active:scale-95 break-words line-clamp-2 shadow-lg shadow-black/10">{sug}</button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {isVadMode && <div className="absolute -top-1 left-8 right-8 h-1 bg-transparent"><div className="h-full bg-cyan-400 transition-all duration-100 rounded-full shadow-[0_0_8px_rgba(34,211,238,1)]" style={{ width: `${Math.min(100, audioLevel * 2)}%` }}></div></div>}
                                    {selectedImage && <div className="mb-2 relative inline-block"><img src={selectedImage} alt="Preview" className="h-14 w-14 object-cover rounded-xl border border-white/40 shadow-lg" /><button onClick={() => setSelectedImage(null)} className="absolute -top-2 -right-2 bg-slate-900 text-white rounded-full p-0.5 border border-slate-700 hover:bg-rose-500"><SafeIcon icon={X} size={14} /></button></div>}
                                    
                                    <form onSubmit={handleSendChat} className={`flex items-center gap-2 bg-white/20 backdrop-blur-xl border border-white/40 rounded-2xl p-1.5 pl-3 transition-colors shadow-[0_5px_15px_rgba(0,0,0,0.2)] ${isVadMode ? '!border-cyan-400 bg-cyan-900/40' : ''}`}>
                                        <input type="file" id="ai-image-upload" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                        <label htmlFor="ai-image-upload" className="text-white hover:text-white/80 cursor-pointer p-1.5"><SafeIcon icon={ImageIcon} size={20} /></label>
                                        <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder={isListening ? (isEn ? "Listening..." : "กำลังฟัง...") : (isEn ? "Type a message..." : "พิมพ์ตอบกลับ หรือกดไมค์...")} disabled={isTyping || roleplayPhase === 'playing_scenario'} className="flex-1 bg-transparent text-white placeholder-white/70 px-1 outline-none text-sm font-bold drop-shadow-sm" />
                                        
                                        {/* Timer Badge */}
                                        {roleplayPhase === 'negotiating' && !isTyping && messages[messages.length-1]?.sender === 'ai' && (
                                            <div className={`text-[10px] font-mono font-black px-2 py-1 rounded-lg shrink-0 shadow-inner border ${pressureTime <= 5 ? 'text-rose-600 bg-rose-200 border-rose-400 animate-pulse' : 'text-slate-700 bg-white/80 border-white/50'}`}>{pressureTime}s</div>
                                        )}

                                        <button type="button" onClick={toggleMic} disabled={isTyping || roleplayPhase === 'playing_scenario'} className={`w-9 h-9 rounded-xl flex items-center justify-center transition-all relative shrink-0 ${isListening ? 'bg-rose-500 text-white shadow-lg shadow-rose-500/50' : 'bg-white/20 text-white hover:bg-white/30 border border-white/30'}`}><SafeIcon icon={Mic} size={16} />{isListening && <span className="absolute inset-0 rounded-xl border-2 border-rose-300 animate-ping opacity-75"></span>}</button>
                                        <button type="submit" disabled={(!chatInput.trim() && !selectedImage) || isTyping || roleplayPhase === 'playing_scenario'} className="w-9 h-9 rounded-xl bg-blue-600 hover:bg-blue-500 text-white flex items-center justify-center disabled:opacity-50 transition-colors shadow-lg shrink-0"><SafeIcon icon={Send} size={16} /></button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('skilllab-root'));
        root.render(<ErrorBoundary><SkillLabApp /></ErrorBoundary>);
    </script>
</body>
</html>
