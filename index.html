        // --- 2. UTILS ---
        function recursiveShuffle(arr) { 
            if (!arr || arr.length <= 1) return arr; 
            const idx = Math.floor(Math.random() * arr.length); 
            const rest = [...arr]; 
            rest.splice(idx, 1); 
            return [arr[idx], ...recursiveShuffle(rest)]; 
        }
        
        function formatQuestions(qs) { 
            return qs.map(q => { 
                const correctAnswerText = q.options[q.answer]; 
                const shuffledOpts = recursiveShuffle([...q.options]); 
                return { ...q, options: shuffledOpts, answer: shuffledOpts.indexOf(correctAnswerText) }; 
            }); 
        }
        
        function parseRawExams(raw) { 
            return raw.map((str, idx) => { 
                const parts = str.split('|').map(s => s.trim()); 
                return { id: idx + 1, question: parts[0].replace(/^[0-9]+\.\s*/, ''), options: parts.slice(1, parts.length - 1), answer: parseInt(parts[parts.length - 1].replace(/[^0-9]/g, ''), 10) }; 
            }); 
        }
        
        const FULL_EXAMS = [recursiveShuffle(formatQuestions(parseRawExams(QUIZ_QUESTIONS_RAW)))];

        const correctMedicalTerms = (text) => { 
            if (!text) return text; 
            let corrected = text; 
            const dict = { "แอบเนีย": "Apnea", "แอปเนีย": "Apnea", "ดีคัปปิ้ง": "Decoupling", "ดีคับปลิ้ง": "Decoupling", "เบรนเดส": "Brain Death", "สมองตาย": "Brain Death" }; 
            Object.keys(dict).forEach(key => corrected = corrected.replace(new RegExp(key, "g"), dict[key])); 
            return corrected; 
        };

        const fetchWithRetry = async (url, options) => {
          const delays = [500, 1000]; 
          for (let i = 0; i < delays.length; i++) {
            try {
              const res = await fetch(url, options);
              if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
              return await res.json();
            } catch (error) {
              if (i === delays.length - 1) throw error;
              await new Promise(res => setTimeout(res, delays[i]));
            }
          }
        };

        const callGeminiAPI = async (prompt, systemInstruction, base64Image = null) => {
          const apiKey = "AQ.Ab8RN6KJITz9uFnCtAF6TAgEeDPfKZoIvdYvl2MFmfYb6ok4cQ"; 
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;
          try {
            const parts = [{ text: prompt }];
            if (base64Image) {
              const mimeType = base64Image.match(/data:(.*?);base64/)[1];
              const data = base64Image.split(',')[1];
              parts.push({ inlineData: { mimeType, data } });
            }
            const payload = { contents: [{ parts }], systemInstruction: { parts: [{ text: systemInstruction }] } };
            const data = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            return data.candidates?.[0]?.content?.parts?.[0]?.text ?? "ขออภัยค่ะ ฟ้าไม่สามารถหาคำตอบได้ในขณะนี้";

        const pcm16ToWav = (base64PCM, sampleRate = 24000) => {
          const binaryString = window.atob(base64PCM); 
          const bytes = Uint8Array.from([...binaryString].map(c => c.charCodeAt(0))); 
          const buffer = new ArrayBuffer(44 + bytes.length); 
          const view = new DataView(buffer);
          
          const writeString = (v, offset, string) => { for (let i = 0; i < string.length; i++) v.setUint8(offset + i, string.charCodeAt(i)); };
          writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true); writeString(view, 8, 'WAVE'); 
          writeString(view, 12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); 
          view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); 
          view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(view, 36, 'data'); view.setUint32(40, bytes.length, true);
          new Uint8Array(buffer, 44).set(bytes); 
          return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        };

        // --- 5. CHATBOT COMPONENT ---
        function GlobalAIChatbot({ store }) {
          const [isOpen, setIsOpen] = useState(false); 
          const [chatInput, setChatInput] = useState(''); 
          const [isTyping, setIsTyping] = useState(false); 
          const [messages, setMessages] = useState([]); 
          const [isRoleplay, setIsRoleplay] = useState(false); 
          const [currentScenarioPrompt, setCurrentScenarioPrompt] = useState(""); 
          const [isListening, setIsListening] = useState(false); 
          const [leftDockEl, setLeftDockEl] = useState(null); 
          const [rightDockEl, setRightDockEl] = useState(null); 
          const [selectedImage, setSelectedImage] = useState(null);
          
          const [isVadMode, setIsVadMode] = useState(false); 
          const [audioLevel, setAudioLevel] = useState(0); 
          const audioContextRef = useRef(null); 
          const analyserRef = useRef(null); 
          const microphoneRef = useRef(null); 
          const vadSilenceTimerRef = useRef(null); 
          const isSpeakingRef = useRef(false); 
          const latestTranscriptRef = useRef('');
          
          // Adaptive Layout States
          const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
          const [fabPos, setFabPos] = useState({ x: window.innerWidth - 80, y: window.innerHeight - 100 }); 
          const [isDraggingFab, setIsDraggingFab] = useState(false); 
          const [hasMoved, setHasMoved] = useState(false); 
          const dragStartFab = useRef({ x: 0, y: 0, cx: 0, cy: 0 });

          useEffect(() => { 
              const handleResize = () => { 
                  setIsMobile(window.innerWidth < 768);
                  setFabPos(prev => ({ x: Math.min(prev.x, window.innerWidth - 74), y: Math.min(prev.y, window.innerHeight - 74) })); 
              }; 
              window.addEventListener('resize', handleResize); 
              return () => window.removeEventListener('resize', handleResize); 
          }, []);

          const handleFabPointerDown = (e) => { 
              setIsDraggingFab(true); 
              setHasMoved(false); 
              const clientX = e.touches ? e.touches[0].clientX : e.clientX; 
              const clientY = e.touches ? e.touches[0].clientY : e.clientY; 
              dragStartFab.current = { x: clientX - fabPos.x, y: clientY - fabPos.y, cx: clientX, cy: clientY }; 
          };

          useEffect(() => {
              const handlePointerMove = (e) => { 
                  if (!isDraggingFab) return; 
                  e.preventDefault(); 
                  const clientX = e.touches ? e.touches[0].clientX : e.clientX; 
                  const clientY = e.touches ? e.touches[0].clientY : e.clientY; 
                  if (Math.abs(clientX - dragStartFab.current.cx) > 5 || Math.abs(clientY - dragStartFab.current.cy) > 5) setHasMoved(true); 
                  let newX = Math.max(10, Math.min(clientX - dragStartFab.current.x, window.innerWidth - 74)); 
                  let newY = Math.max(10, Math.min(clientY - dragStartFab.current.y, window.innerHeight - 74)); 
                  setFabPos({ x: newX, y: newY }); 
              };
              const handlePointerUp = () => setIsDraggingFab(false);
              
              if (isDraggingFab) { 
                  window.addEventListener('mousemove', handlePointerMove, { passive: false }); 
                  window.addEventListener('mouseup', handlePointerUp); 
                  window.addEventListener('touchmove', handlePointerMove, { passive: false }); 
                  window.addEventListener('touchend', handlePointerUp); 
              }
              return () => { 
                  window.removeEventListener('mousemove', handlePointerMove); 
                  window.removeEventListener('mouseup', handlePointerUp); 
                  window.removeEventListener('touchmove', handlePointerMove); 
                  window.removeEventListener('touchend', handlePointerUp); 
              };
          }, [isDraggingFab]);

          const recognitionRef = useRef(null); 
          const messagesEndRef = useRef(null); 
          const audioRef = useRef(null); 
          const currentSpeechIdRef = useRef(0);
          
          const isActiveRoleplay = store.currentScreen === 'dashboard' && store.activeTab === 'skill_lab' && store.selectedLabId !== null;
          const isDocked = isActiveRoleplay && !isMobile;
          const isShortsMode = isActiveRoleplay && isMobile;

          const { roleplayPhase, currentSpeaker, currentEmotion } = store;
          const userPosition = store.loggedInUser?.position || "บุคลากรทางการแพทย์";

          useEffect(() => { 
              let timeoutId; 
              const findDock = () => { 
                  const rightEl = document.getElementById('chat-dock-target'); 
                  const leftEl = document.getElementById('scenario-video-target'); 
                  if (rightEl && leftEl) { setRightDockEl(rightEl); setLeftDockEl(leftEl); } 
                  else { timeoutId = setTimeout(findDock, 100); } 
              }; 
              if (isDocked) findDock(); 
              else { setRightDockEl(null); setLeftDockEl(null); } 
              return () => clearTimeout(timeoutId); 
          }, [isDocked, store.selectedLabId]);

          const toggleChat = () => { 
              if (!isOpen && !isRoleplay) globalStore.setState({ currentSpeaker: 'FAH', currentEmotion: 'NEUTRAL' }); 
              setIsOpen(prev => !prev); 
          };

          const stopAudio = useCallback(() => { 
              currentSpeechIdRef.current += 1; 
              stopSpeaking(); 
              if (audioRef.current) { 
                  audioRef.current.pause(); 
                  audioRef.current.removeAttribute('src'); 
                  audioRef.current.load(); 
                  audioRef.current = null; 
              } 
          }, []);
          
          useEffect(() => stopAudio(), [store.activeTab, store.currentScreen, store.currentVideoId, stopAudio]);

          useEffect(() => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
              recognitionRef.current = new SpeechRecognition(); 
              recognitionRef.current.continuous = true; 
              recognitionRef.current.interimResults = true; 
              recognitionRef.current.lang = 'th-TH'; 
              
              recognitionRef.current.onresult = (event) => { 
                  let finalT = ''; 
                  let interimTranscript = ''; 
                  for (let i = event.resultIndex; i < event.results.length; ++i) { 
                      if (event.results[i].isFinal) finalT += event.results[i][0].transcript; 
                      else interimTranscript += event.results[i][0].transcript; 
                  } 
                  setChatInput(prev => { 
                      const newText = prev + finalT; 
                      latestTranscriptRef.current = newText || interimTranscript; 
                      return newText || interimTranscript; 
                  }); 
              };
              
              recognitionRef.current.onend = () => { 
                  if (isVadMode && isListening) { 
                      try { recognitionRef.current.start(); } catch(e){} 
                  } else { 
                      setIsListening(false); 
                      setChatInput(current => { 
                          const correctedText = correctMedicalTerms(current.trim()); 
                          if (correctedText && correctedText !== 'พร้อม') handleSendChat(null, correctedText); 
                          return current; 
                      }); 
                  } 
              };
              
              recognitionRef.current.onerror = (e) => { 
                  if(e.error !== 'no-speech') setIsListening(false); 
              };
            }
          }, [currentScenarioPrompt, messages, isVadMode, isListening]);

          const processAudio = useCallback(() => {
              if (!analyserRef.current || !isListening || !isVadMode) return;
              const dataArray = new Uint8Array(analyserRef.current.frequencyBinCount); 
              analyserRef.current.getByteFrequencyData(dataArray);
              
              let sum = 0; 
              for (let i = 0; i < dataArray.length; i++) { sum += dataArray[i]; } 
              const average = sum / dataArray.length; 
              setAudioLevel(average);
              
              if (average > 15) { 
                  if (!isSpeakingRef.current) isSpeakingRef.current = true; 
                  if (vadSilenceTimerRef.current) { 
                      clearTimeout(vadSilenceTimerRef.current); 
                      vadSilenceTimerRef.current = null; 
                  } 
              } else { 
                  if (isSpeakingRef.current && !vadSilenceTimerRef.current) { 
                      vadSilenceTimerRef.current = setTimeout(() => { 
                          isSpeakingRef.current = false; 
                          const finalSpeech = latestTranscriptRef.current.trim(); 
                          if (finalSpeech) { 
                              handleSendChat(null, correctMedicalTerms(finalSpeech)); 
                              setChatInput(''); 
                              latestTranscriptRef.current = ''; 
                          } 
                          vadSilenceTimerRef.current = null; 
                      }, 800); 
                  } 
              }
              if (isListening && isVadMode) requestAnimationFrame(processAudio);
          }, [isListening, isVadMode]);

          const startVAD = async () => {

                  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("NotSupportedError"); 
                  const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
                  audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)(); 
                  analyserRef.current = audioContextRef.current.createAnalyser(); 
                  microphoneRef.current = audioContextRef.current.createMediaStreamSource(stream); 
                  microphoneRef.current.connect(analyserRef.current); 
                  analyserRef.current.fftSize = 256; 
                  
                  setIsVadMode(true); 
                  setIsListening(true); 
                  recognitionRef.current?.start(); 
                  processAudio(); 
                  actions.showMsg('🎙️ เปิดโหมด VAD'); 
              } catch (err) { 
                  actions.showMsg('ไมค์ไม่ทำงาน หรือเบราว์เซอร์ไม่รองรับ', 'error'); 
              } 
          };
          
          const stopVAD = () => { 
              setIsVadMode(false); 
              setIsListening(false); 
              recognitionRef.current?.stop(); 
              if (audioContextRef.current) audioContextRef.current.close(); 
              if (vadSilenceTimerRef.current) clearTimeout(vadSilenceTimerRef.current); 
              actions.showMsg('ปิดไมโครโฟนแล้ว', 'success'); 
          };
          
          const toggleMic = () => { 
              if (isListening) stopVAD(); 
              else { setChatInput(''); latestTranscriptRef.current = ''; startVAD(); } 
          };
          
          const handleImageUpload = (e) => { 
              const file = e.target.files[0]; 
              if (!file) return; 
              const reader = new FileReader(); 
              reader.onloadend = () => setSelectedImage(reader.result); 
              reader.readAsDataURL(file); 
          };
          
          const playSampleVoice = (speaker) => { 
              if (['speaking_intro', 'playing_scenario', 'giving_context'].includes(roleplayPhase)) return actions.showMsg('รอจบวิดีโอจำลองสถานการณ์ก่อนนะคะ', 'error'); 
              if (speaker === 'FAH') speakThai("สวัสดีค่ะ ฟ้าเองนะคะ นี่คือเสียงโหมดจำลองสถานการณ์ค่ะ", null, false, 'FAH'); 
              else speakThai("สวัสดีครับ ผมเมฆนะครับ นี่คือเสียงของผมครับ", null, false, 'BROTHER'); 
          };

          const speakThai = async (text, onEndCallback = null, forceStandard = false, speaker = 'FAH') => {
            stopAudio(); 
            currentSpeechIdRef.current += 1; 
            const speechId = currentSpeechIdRef.current; 
            let targetVoice = "Aoede"; 
            
            let cleanSpeakText = text.replace(/\[.*?\]/g, '').replace(/\*.*?\*/g, '').replace(/#.*?#/g, '').replace(/^(ฟ้า|เมฆ|น้องชาย|ลูกสาว|Fah|Mek|Brother|Sister|AI)\s*:\s*/i, '').trim();
            let emotionPrompt = `พูดด้วยน้ำเสียงธรรมชาติ: ${cleanSpeakText}`;
            
            if (isListening) { recognitionRef.current?.stop(); setIsListening(false); }
            
            if (isRoleplay && !forceStandard) { 
                if (speaker === 'BROTHER') { 
                    targetVoice = "Charon"; 
                    emotionPrompt = `เสียงผู้ชายวัยรุ่น 18 ปี อารมณ์เศร้าขุ่นเคือง: ${cleanSpeakText}`; 
                } else { 
                    targetVoice = "Aoede"; 
                    emotionPrompt = `เสียงผู้หญิงวัยรุ่น เศร้าเสียใจ: ${cleanSpeakText}`; 
                } 
            } else { 
                targetVoice = "Aoede"; 
                emotionPrompt = `เสียงผู้หญิงร่าเริง 22 ปี: ${cleanSpeakText}`; 
            }
            
            const fallbackTTS = () => {
                if (!('speechSynthesis' in window)) { if (onEndCallback) onEndCallback(); return; }
                const utterance = new SpeechSynthesisUtterance(cleanSpeakText);
                utterance.lang = 'th-TH'; 
                utterance.rate = 1.0; 
                utterance.pitch = speaker === 'BROTHER' ? 0.8 : 1.2;
                utterance.onend = () => { if (onEndCallback) onEndCallback(); };
                utterance.onerror = (e) => { if (onEndCallback) onEndCallback(); };
                window.speechSynthesis.speak(utterance);
            };

            try {
                const result = await callGeminiTTS(emotionPrompt, targetVoice); 
                if (speechId !== currentSpeechIdRef.current) return;
                
                const inlineData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                if (inlineData?.data) { 
                    const sampleRate = parseInt(inlineData.mimeType.match(/rate=(\d+)/)?.[1] ?? "24000", 10); 
                    const audio = new Audio(pcm16ToWav(inlineData.data, sampleRate));

                    audio.onended = () => { if (onEndCallback) onEndCallback(); }; 
                    audio.onerror = () => { fallbackTTS(); };
