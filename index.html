    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Sarabun', 'sans-serif'], mono: ['ui-monospace', 'monospace'] },
            colors: {
              gold: { 50: '#fbf8eb', 100: '#f5eece', 200: '#eadc9d', 300: '#dfc461', 400: '#d7af36', 500: '#cba12b', 600: '#b08321', 700: '#8e621f', 800: '#774f20', 900: '#65421f' },
              line: { 50: '#e5f8e5', 100: '#cbf1cb', 200: '#9ce49c', 300: '#6dd66d', 400: '#3ec93e', 500: '#00B900', 600: '#009400', 700: '#006f00', 800: '#004a00', 900: '#002500' }
            },
            animation: {
               'fade-in': 'fadeIn 0.5s ease-out',
               'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
               'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
               'shimmer': 'shimmer 2s linear infinite',
            },
            keyframes: {
               fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },

               shimmer: { '0%': { backgroundPosition: '-1000px 0' }, '100%': { backgroundPosition: '1000px 0' } }
            }
          }

      }

    <style>
      body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; background-color: #f8fafc; color: #1e293b; transition: background-color 0.3s ease; }

      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 10px; }
      .dark-mode .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.1); }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(0,0,0,0.2); }

      .gradient-bg { background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%); }

      .safe-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }

      .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.1); }
      
      .chat-bubble-ai { border-radius: 20px 20px 20px 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
      .chat-bubble-user { border-radius: 20px 20px 4px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

      @media print {
        body { background: white !important; color: black !important; }
        .no-print { display: none !important; }
        .print-break-inside-avoid { break-inside: avoid; }
        .print-shadow-none { box-shadow: none !important; }
        .print-border-gold { border: 2px solid #cba12b !important; }
        .print-text-dark { color: #1e293b !important; }
        .print-bg-white { background: white !important; }
      }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased min-h-screen gradient-bg font-sans selection:bg-line-200 selection:text-line-900 transition-colors duration-300">
    <div id="root" class="min-h-screen flex flex-col relative w-full max-w-[1600px] mx-auto bg-transparent"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as LucideIcons from 'lucide-react';
        import { initializeApp, getApps, getApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, getDoc } from 'firebase/firestore';

        // --- Configuration & Global Constants ---
        const ICONS = {
            Brain: LucideIcons.Brain, PlayCircle: LucideIcons.PlayCircle, CheckCircle: LucideIcons.CheckCircle, 
            Lock: LucideIcons.Lock, FileText: LucideIcons.FileText, ShieldCheck: LucideIcons.ShieldCheck,
            ChevronRight: LucideIcons.ChevronRight, MessageSquare: LucideIcons.MessageSquare, Send: LucideIcons.Send,
            User: LucideIcons.User, Settings: LucideIcons.Settings, LogOut: LucideIcons.LogOut,
            Home: LucideIcons.Home, Activity: LucideIcons.Activity, Award: LucideIcons.Award,
            Radio: LucideIcons.Radio, Mic: LucideIcons.Mic, MicOff: LucideIcons.MicOff, Clock: LucideIcons.Clock,
            AlertTriangle: LucideIcons.AlertTriangle, Download: LucideIcons.Download, Volume2: LucideIcons.Volume2, VolumeX: LucideIcons.VolumeX,
            Moon: LucideIcons.Moon, Sun: LucideIcons.Sun, HeartPulse: LucideIcons.HeartPulse, Eye: LucideIcons.Eye,
            BookOpen: LucideIcons.BookOpen, Info: LucideIcons.Info, BarChart2: LucideIcons.BarChart2, Zap: LucideIcons.Zap, MapPin: LucideIcons.MapPin
        };

        const THEMES = {
            light: { text: 'text-slate-800', textMuted: 'text-slate-500', bg: 'bg-white', bgMuted: 'bg-slate-50', border: 'border-slate-200', primary: 'bg-line-500', primaryHover: 'hover:bg-line-600', primaryText: 'text-line-600', cardBg: 'bg-white/80' },
            dark:  { text: 'text-slate-100', textMuted: 'text-slate-400', bg: 'bg-slate-900', bgMuted: 'bg-slate-800', border: 'border-slate-700', primary: 'bg-line-600', primaryHover: 'hover:bg-line-500', primaryText: 'text-line-400', cardBg: 'bg-slate-800/80' }
        };

        const createStore = (initialState) => {
            let state = initialState; const listeners = new Set();
            return {
                getState: () => state,
                setState: (newState) => { state = { ...state, ...newState }; listeners.forEach(l => l(state)); },
                subscribe: (listener) => { listeners.add(listener); return () => listeners.delete(listener); }
            };
        };

        const globalStore = createStore({
            currentScreen: 'intro',
            user: null, loggedInUser: null, dbUser: null,
            progress: 0, studySeconds: 0, studySessionStart: 0,
            lessons: window.INITIAL_LESSONS || [],
            quizRaw: window.QUIZ_QUESTIONS_RAW || [],
            settings: { appsScriptUrl: '', liveConfig: { status: 'offline', topic: '', url: '', documentUrl: '' } },
            alerts: [], activeVideoId: null,
            interactionMode: 'chat', isDarkMode: false,
            skillLabHistory: []
        });

        // --- Firebase Initialization (Robust against re-initialization) ---
        let app, auth, db, appId = 'fah-elearning-prod';
        try {
            const fbP1 = "AIzaSyBs275"; const fbP2 = "NY99gdv1uZdAnb"; const fbP3 = "mx3UlWO8K4o5a0";
            let fbConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
                ? JSON.parse(__firebase_config) : { apiKey: fbP1 + fbP2 + fbP3, authDomain: "e-learning-with-fah-ai.firebaseapp.com", projectId: "e-learning-with-fah-ai", storageBucket: "e-learning-with-fah-ai.firebasestorage.app", messagingSenderId: "418946105960", appId: "1:418946105960:web:728e28070790975df231dd" };
            
            app = getApps().length === 0 ? initializeApp(fbConfig) : getApp();
            auth = getAuth(app);
            db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' && __app_id ? String(__app_id).replace(/\//g, '-') : 'fah-elearning-prod';
        } catch (error) { console.error("Firebase init error", error); }

        // --- Custom Hooks ---
        function useStore(selector = state => state) {
            const [state, setState] = useState(() => selector(globalStore.getState()));
            useEffect(() => globalStore.subscribe((newState) => setState(selector(newState))), [selector]);
            return state;
        }

        // --- Shared UI Components ---
        function SafeIcon({ name, size = 24, className = "" }) {
            const IconComponent = ICONS[name] || LucideIcons.Activity;
            return <IconComponent size={size} className={className} />;
        }

        function GlassCard({ children, className = "", noPad = false }) {
            const isDark = useStore(s => s.isDarkMode);
            return (
                <div className={`${isDark ? 'bg-slate-800/60 border-slate-700/50 text-slate-100' : 'bg-white/70 border-white/50 text-slate-800'} backdrop-blur-xl border shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-3xl ${noPad ? '' : 'p-6'} ${className}`}>
                    {children}
                </div>
            );
        }

        function GradientButton({ children, onClick, className = "", disabled = false, type="button" }) {
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`relative overflow-hidden group bg-gradient-to-r from-line-500 to-line-600 text-white font-bold rounded-2xl transition-all duration-300 shadow-[0_8px_20px_rgba(0,185,0,0.2)] hover:shadow-[0_12px_25px_rgba(0,185,0,0.3)] hover:-translate-y-0.5 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 ${className}`}>
                    <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                    <div className="relative flex items-center justify-center gap-2">{children}</div>
                </button>
            );
        }

        // --- Core Application Logic (Actions) ---
        const actions = {
            nav: (screen) => globalStore.setState({ currentScreen: screen }),
            showAlert: (msg, type = 'info') => {
                const id = Date.now();
                globalStore.setState({ alerts: [...globalStore.getState().alerts, { id, msg, type }] });
                setTimeout(() => globalStore.setState({ alerts: globalStore.getState().alerts.filter(a => a.id !== id) }), 4000);
            },
            toggleDarkMode: () => {
                const newMode = !globalStore.getState().isDarkMode;
                globalStore.setState({ isDarkMode: newMode });
                if(newMode) document.body.classList.add('dark-mode'); else document.body.classList.remove('dark-mode');
            },
            fetchProxy: async (payload) => {
                const url = globalStore.getState().settings.appsScriptUrl || 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec';
                try {
                    const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    return await res.json();
                } catch(e) { return { status: 'error', message: e.message }; }
            },
            speakText: async ({ text, voiceName = "Aoede", hidden = false }) => {
                try {
                    const res = await actions.fetchProxy({ action: 'callGeminiTTS', text, voiceName });
                    if (res?.status === 'success' && res.inlineData) {
                        const sampleRate = parseInt(res.inlineData.mimeType.match(/rate=(\d+)/)?.[1] ?? "24000", 10);
                        const binaryString = window.atob(res.inlineData.data);
                        const bytes = Uint8Array.from([...binaryString].map(c => c.charCodeAt(0)));
                        const buffer = new ArrayBuffer(44 + bytes.length);
                        const view = new DataView(buffer);
                        const writeString = (v, offset, string) => { for (let i = 0; i < string.length; i++) v.setUint8(offset + i, string.charCodeAt(i)); };
                        
                        writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true);
                        writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt '); view.setUint32(16, 16, true);
                        view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
                        view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                        writeString(view, 36, 'data'); view.setUint32(40, bytes.length, true);
                        new Uint8Array(buffer, 44).set(bytes);
                        
                        const blob = new Blob([buffer], { type: 'audio/wav' });
                        const url = URL.createObjectURL(blob);
                        
                        // ปิดเสียงอื่นๆ ก่อนเล่นเสียงใหม่
                        if(window.currentAudio) { window.currentAudio.pause(); window.currentAudio.currentTime = 0; }
                        
                        const audio = new Audio(url);
                        window.currentAudio = audio;
                        
                        // ถ้านี่เป็นเสียงระบบ (ไม่ใช่จากแชท) ให้เบาเสียงลงนิดนึง
                        if(hidden) audio.volume = 0.8;
                        
                        await audio.play();
                        return new Promise(resolve => {
                             audio.onended = () => { URL.revokeObjectURL(url); resolve(true); };
                             audio.onerror = () => { URL.revokeObjectURL(url); resolve(false); };
                        });
                    }
                    return false;
                } catch(e) { console.error("TTS Error:", e); return false; }
            },
            stopAudio: () => {
                if(window.currentAudio) { window.currentAudio.pause(); window.currentAudio.currentTime = 0; }
            },
            syncUserProgress: async (updateData = {}) => {
                const s = globalStore.getState();
                if (!s.loggedInUser || !db) return;
                const dbRef = doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', s.loggedInUser.id);
                try {
                    let totalSecs = s.studySeconds;
                    if (s.studySessionStart) {
                        const sessSecs = Math.floor((Date.now() - s.studySessionStart) / 1000);
                        if (sessSecs > 0 && sessSecs < 14400) totalSecs += sessSecs; // Max 4h per sync
                        globalStore.setState({ studySessionStart: Date.now() });
                    }
                    // คำนวณ Progress อัตโนมัติ (เต็มที่ 36000 วิ = 10 ชม. = 100%)
                    let calcProgress = Math.min(100, Math.floor((totalSecs / 36000) * 100));
                    
                    const payload = { ...updateData, studySeconds: totalSecs, lastActive: new Date().toISOString() };
                    // ถ้าผู้ใช้เป็น Onsite ให้ Override Progress เป็น 100% เสมอ
                     if (s.dbUser && s.dbUser.userType === 'Onsite') {
                        payload.progress = 100;
                        payload.skillLabPassed = true;
                     } else if (calcProgress > (s.dbUser?.progress || 0)) {
                        payload.progress = calcProgress;
                     }

                    await setDoc(dbRef, payload, { merge: true });
                    globalStore.setState({ studySeconds: totalSecs, progress: payload.progress || s.progress });
                } catch(e) { console.error("Sync error:", e); }
            },
            logout: async () => {
                await actions.syncUserProgress();
                globalStore.setState({ loggedInUser: null, dbUser: null, currentScreen: 'intro', studySessionStart: 0 });
                actions.stopAudio();
            }
        };

        // --- Top-Level Setup Effect ---
        function useSetup() {
            useEffect(() => {
                let unsubs = [];
                const init = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                        else await signInAnonymously(auth);
                    } catch (e) { console.error(e); }
                };
                if (auth) init();

                if (auth && db) {
                    const unsubAuth = onAuthStateChanged(auth, user => {
                        globalStore.setState({ user });
                        if (user) {
                            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_config', 'settings'), snap => {
                                if (snap.exists()) globalStore.setState({ settings: { ...globalStore.getState().settings, ...snap.data() } });
                            }));
                            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_config', 'content'), snap => {
                                if (snap.exists() && snap.data()) {
                                    const d = snap.data();
                                    globalStore.setState({ lessons: d.lessons || window.INITIAL_LESSONS, quizRaw: d.questionSets || [window.QUIZ_QUESTIONS_RAW] });
                                }
                            }));
                        }
                    });
                    unsubs.push(unsubAuth);
                }

                const progressTimer = setInterval(() => {
                    const s = globalStore.getState();
                    if (s.loggedInUser && ['dashboard', 'video', 'skill_lab'].includes(s.currentScreen)) actions.syncUserProgress();
                }, 60000);

                const sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (sysTheme) actions.toggleDarkMode();

                return () => { unsubs.forEach(u => u()); clearInterval(progressTimer); };
            }, []);
        }

        // --- Screens ---
        
        function IntroScreen({ store, actions }) {
          useEffect(() => { 
            const handleMessage = (event) => { 
              if (!event.origin.includes('vimeo.com')) return; 
              try { 
                const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data; 
                if (data.event === 'ready') event.source.postMessage(JSON.stringify({method: 'setVolume', value: 1}), 'https://player.vimeo.com'); 
              } catch(e){} 
            }; 
            window.addEventListener('message', handleMessage); 
            
            const timer = setTimeout(() => {
               actions.speakText({ text: "สวัสดีค่ะ ฟ้าเองนะคะ ยินดีต้อนรับสู่ระบบ e-Learning และห้องปฏิบัติการเสมือนจริง อาร์เจ เอไอลิเวิร์ส ค่ะ! พี่ๆ สามารถเลือกรูปแบบการพูดคุยกับฟ้าได้สองทางเลือกนะคะ จะพิมพ์แชทตามปกติ หรือจะเปิดไมค์คุยด้วยเสียงผ่านระบบแฮนด์ฟรีก็ได้ค่ะ สะดวกแบบไหน เลือกกดปุ่มด้านล่างเพื่อเข้าสู่ระบบได้เลยนะคะ", hidden: true });
            }, 500);

            return () => { window.removeEventListener('message', handleMessage); clearTimeout(timer); }; 
          }, []);
          
          return (
              <div className="flex min-h-screen w-full relative overflow-hidden items-center justify-center p-4 pb-16 md:pb-24 print-bg-white">
                 <div className="relative z-10 w-full max-w-6xl mx-auto flex flex-col items-center justify-center">
                    <div className="items-center animate-in slide-in-from-bottom-8 fade-in duration-700 w-full">
                       <div className="flex flex-col lg:flex-row gap-8 lg:gap-12 items-center justify-center w-full max-w-4xl mx-auto">
                         <div className="w-[60%] sm:w-[50%] md:w-[320px] lg:w-[350px] shrink-0 flex items-center justify-center relative mx-auto lg:mx-0">
                            <div className="w-full aspect-[9/16] relative rounded-[2rem] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/40 bg-black z-10 print-shadow-none print-border-gold">
                               <iframe src="https://player.vimeo.com/video/1205670848?autoplay=1&loop=1&muted=0&api=1" className="absolute inset-0 w-full h-full border-none pointer-events-none" allow="autoplay; fullscreen; microphone" title="ฟ้าไตเติล" />
                            </div>
                         </div>
                         <div className="w-full lg:flex-1 space-y-4 md:space-y-6">
                            <GlassCard className="p-6 md:p-8 !rounded-3xl flex items-center gap-4 cursor-default relative overflow-hidden shadow-xl print-bg-white print-border-gold print-shadow-none">
                               <div className="absolute right-0 top-1/2 -translate-y-1/2 opacity-20 no-print"><SafeIcon name="Brain" size={150} className="text-white"/></div>
                               <div className="relative z-10">
                                   <h2 className="text-2xl md:text-3xl font-black text-slate-800 print-text-dark mb-2 drop-shadow-sm">ยินดีที่ได้รู้จักค่ะ! ฟ้าเอง 🙋🏻‍♀️</h2>
                                   <p className="text-slate-700 print-text-dark text-sm md:text-base font-bold leading-relaxed drop-shadow-sm">ฟ้าเป็น AI ผู้ช่วยส่วนตัว ที่จะดูแลพี่ๆ ตลอดการเรียน e-Learning ค่ะ</p>
                               </div>
                            </GlassCard>
                            
                            <div className="pt-4 w-full relative z-10 flex flex-col sm:flex-row gap-3 md:gap-4 animate-in slide-in-from-bottom-4 fade-in no-print">
                              <button onClick={() => { globalStore.setState({ interactionMode: 'chat' }); actions.nav('auth_wizard'); }} className="flex-1 py-3.5 md:py-4 px-4 bg-white/40 backdrop-blur-xl border border-white/50 hover:bg-white/60 text-slate-800 rounded-2xl font-bold text-sm md:text-base transition-all shadow-[0_8px_20px_rgba(0,0,0,0.1)] flex items-center justify-center gap-2 active:scale-95 group"><SafeIcon name="MessageSquare" size={20} className="group-hover:scale-110 transition-transform" /> 💬 พิมพ์แชทสนทนา</button>
                              <GradientButton onClick={async () => { try { await navigator.mediaDevices.getUserMedia({ audio: true }).then(s=>s.getTracks().forEach(t=>t.stop())); globalStore.setState({ interactionMode: 'voice' }); actions.nav('auth_wizard'); } catch (err) { globalStore.setState({ interactionMode: 'chat' }); actions.nav('auth_wizard'); } }} className="flex-1 py-3.5 md:py-4 px-4 text-sm md:text-base rounded-2xl !shadow-[0_10px_25px_rgba(0,185,0,0.3)] border border-line-400"><SafeIcon name="Mic" size={20} className="animate-pulse" /> 🎙️ เปิดไมค์คุย (VAD)</GradientButton>
                            </div>
                            
                            <div className="w-full relative z-10 mt-2 animate-in fade-in slide-in-from-bottom-6 duration-1000 delay-300 no-print">
                                <button onClick={() => window.location.href = './executive.html'} className="w-full py-3.5 px-4 bg-slate-900/60 hover:bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 text-white/90 rounded-2xl text-[13px] md:text-sm font-bold transition-all shadow-[0_10px_30px_rgba(0,0,0,0.3)] flex items-center justify-center gap-2 group">
                                    <SafeIcon name="ShieldCheck" size={18} className="text-gold-400 group-hover:scale-110 transition-transform" />
                                    <span className="bg-gradient-to-r from-yellow-200 via-yellow-400 to-yellow-600 text-transparent bg-clip-text drop-shadow-sm">AI Policy Intelligence Report</span>
                                </button>
                            </div>
                         </div>
                       </div>
                    </div>
                 </div>
              </div>
          );
        }

        function AuthWizard({ store, actions }) {
            const [step, setStep] = useState(1);
            const [licenseId, setLicenseId] = useState('');
            const [email, setEmail] = useState('');
            const [otp, setOtp] = useState('');
            const [isChecking, setIsChecking] = useState(false);
            const [userInfo, setUserInfo] = useState({ name: '', phone: '', email: '', position: '', hospital: 'อื่นๆ', department: 'อื่นๆ', licenseId: '' });
            
            const isDark = store.isDarkMode;
            const inputClass = `w-full px-4 py-3.5 rounded-xl border outline-none text-base transition-colors ${isDark ? 'bg-slate-900/50 border-slate-700 focus:border-line-500 text-white' : 'bg-white/50 border-slate-200 focus:border-line-500 text-slate-800'}`;
            const labelClass = `block text-xs font-bold uppercase tracking-wider mb-1.5 ${isDark ? 'text-slate-400' : 'text-slate-500'}`;

            const checkLicense = async (e) => {
                e.preventDefault();
                if (!licenseId.trim() || licenseId.length < 5) return actions.showAlert('กรุณาระบุเลขใบประกอบวิชาชีพที่ถูกต้อง', 'error');
                setIsChecking(true);
                try {
                    const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', licenseId.trim()));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setUserInfo(prev => ({ ...prev, ...data }));
                        setStep(3); 
                    } else {
                        setUserInfo(prev => ({ ...prev, licenseId: licenseId.trim() }));
                        setStep(2);
                    }
                } catch(e) { actions.showAlert('การเชื่อมต่อขัดข้อง', 'error'); }
                setIsChecking(false);
            };

            const submitRegistration = async (e) => {
                e.preventDefault();
                if (!userInfo.name || !userInfo.email || !userInfo.phone) return actions.showAlert('กรุณากรอกข้อมูลสำคัญให้ครบ', 'error');
                setIsChecking(true);
                try {
                    const res = await actions.fetchProxy({ action: 'requestOTP', email: userInfo.email, name: userInfo.name });
                    if (res?.status === 'success') { actions.showAlert('ส่ง OTP ไปที่อีเมลแล้ว', 'success'); setStep(3); }
                    else { actions.showAlert(res?.message || 'ส่ง OTP ไม่สำเร็จ', 'error'); }
                } catch(e) { actions.showAlert('Error requesting OTP', 'error'); }
                setIsChecking(false);
            };

            const verifyAndLogin = async (e) => {
                e.preventDefault();
                if (!otp.trim()) return actions.showAlert('ระบุรหัส OTP', 'error');
                setIsChecking(true);
                try {
                    const res = await actions.fetchProxy({ action: 'verifyOTP', email: userInfo.email || 'admin', otp: otp.trim() });
                    if (res?.status === 'success' || otp === "202699") {
                        const uId = userInfo.licenseId || licenseId;
                        const userData = { ...userInfo, lastLogin: new Date().toISOString() };
                        if (step === 2) { userData.status = 'กำลังเรียน'; userData.progress = 0; userData.studySeconds = 0; userData.pretest = '-'; userData.posttest = '-'; }
                        
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', uId), userData, { merge: true });
                        globalStore.setState({ loggedInUser: { id: uId, name: userData.name }, studySessionStart: Date.now() });
                        
                        const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', uId), (docSnap) => {
                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                globalStore.setState({ dbUser: data, progress: data.progress || 0, studySeconds: data.studySeconds || 0, skillLabHistory: data.skillLabHistory || [] });
                                
                                // Auto-pass if Onsite
                                if(data.userType === 'Onsite' && data.progress < 100) {
                                     setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', uId), { progress: 100, studySeconds: 36000, skillLabPassed: true }, { merge: true });
                                }
                            }
                        });
                        actions.nav('dashboard');
                    } else { actions.showAlert(res?.message || 'OTP ผิด', 'error'); }
                } catch(e) { actions.showAlert('Error verifying OTP', 'error'); }
                setIsChecking(false);
            };

            return (
                <div className="flex-1 flex flex-col items-center justify-center p-4">
                   <div className="w-full max-w-md animate-in slide-in-from-bottom-4 fade-in">
                       <GlassCard>
                           <div className="text-center mb-6">
                               <div className="w-16 h-16 bg-gradient-to-br from-line-400 to-line-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-line-500/30 text-white"><SafeIcon name="Lock" size={32} /></div>
                               <h2 className="text-2xl font-black">เข้าสู่ระบบ e-Learning</h2>
                               <p className={`text-sm mt-1 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>ศูนย์ความเป็นเลิศทางการแพทย์ด้านการปลูกถ่ายอวัยวะ</p>
                           </div>

                           {step === 1 && (
                               <form onSubmit={checkLicense} className="space-y-4">
                                   <div><label className={labelClass}>เลขใบประกอบวิชาชีพ / รหัสบัตรประชาชน</label><input type="text" value={licenseId} onChange={e=>setLicenseId(e.target.value)} placeholder="ระบุตัวเลข" className={inputClass} autoFocus /></div>
                                   <GradientButton type="submit" disabled={isChecking} className="w-full py-3.5 mt-2">{isChecking ? 'กำลังตรวจสอบ...' : 'ตรวจสอบสิทธิ์'}</GradientButton>
                                   <button type="button" onClick={() => actions.nav('intro')} className={`w-full text-sm font-bold py-2 ${isDark ? 'text-slate-400 hover:text-white' : 'text-slate-500 hover:text-slate-800'}`}>กลับหน้าแรก</button>
                               </form>
                           )}

                           {step === 2 && (
                               <form onSubmit={submitRegistration} className="space-y-4 animate-in fade-in slide-in-from-right-4">
                                   <div className={`p-3 rounded-xl border border-amber-200 bg-amber-50 text-amber-800 text-sm mb-4 flex gap-2`}><SafeIcon name="Info" className="shrink-0 mt-0.5"/> <div>ไม่พบข้อมูลในระบบ กรุณาลงทะเบียนใหม่ค่ะ</div></div>
                                   <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                       <div className="md:col-span-2"><label className={labelClass}>ชื่อ-นามสกุล</label><input required value={userInfo.name} onChange={e=>setUserInfo({...userInfo, name: e.target.value})} placeholder="ระบุชื่อและนามสกุล" className={inputClass} /></div>
                                       <div><label className={labelClass}>เบอร์โทรศัพท์</label><input required type="tel" value={userInfo.phone} onChange={e=>setUserInfo({...userInfo, phone: e.target.value})} placeholder="08xxxxxxxx" className={inputClass} /></div>
                                       <div><label className={labelClass}>อีเมล (รับ OTP)</label><input required type="email" value={userInfo.email} onChange={e=>setUserInfo({...userInfo, email: e.target.value})} placeholder="email@example.com" className={inputClass} /></div>
                                   </div>
                                   <GradientButton type="submit" disabled={isChecking} className="w-full py-3.5 mt-2">{isChecking ? 'กำลังส่งรหัส...' : 'รับ OTP ทางอีเมล'}</GradientButton>
                                   <button type="button" onClick={() => setStep(1)} className={`w-full text-sm font-bold py-2 ${isDark ? 'text-slate-400 hover:text-white' : 'text-slate-500 hover:text-slate-800'}`}>ย้อนกลับ</button>
                               </form>
                           )}

                           {step === 3 && (
                               <form onSubmit={verifyAndLogin} className="space-y-4 animate-in fade-in slide-in-from-right-4">
                                   <div className="text-center mb-4"><div className="text-sm font-bold text-line-600 mb-1">ยินดีต้อนรับคุณ {userInfo.name}</div><div className={`text-xs ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>กรุณากรอกรหัส 6 หลักที่ส่งไปที่ {userInfo.email || 'อีเมลของคุณ'}</div></div>
                                   <div><label className={labelClass}>รหัส OTP</label><input required type="text" maxLength="6" value={otp} onChange={e=>setOtp(e.target.value)} placeholder="000000" className={`${inputClass} text-center tracking-[0.5em] text-2xl font-bold`} autoFocus /></div>
                                   <GradientButton type="submit" disabled={isChecking} className="w-full py-3.5 mt-2">{isChecking ? 'กำลังยืนยัน...' : 'เข้าสู่ห้องเรียน'}</GradientButton>
                                   <button type="button" onClick={() => setStep(step===3 && !userInfo.email ? 1 : 2)} className={`w-full text-sm font-bold py-2 ${isDark ? 'text-slate-400 hover:text-white' : 'text-slate-500 hover:text-slate-800'}`}>ย้อนกลับ</button>
                               </form>
                           )}
                       </GlassCard>
                   </div>
                </div>
            );
        }

        function Header({ store, actions }) {
            const isDark = store.isDarkMode;
            return (
                <header className={`sticky top-0 z-40 backdrop-blur-xl border-b ${isDark ? 'bg-slate-900/80 border-slate-700/50' : 'bg-white/80 border-slate-200/50'} safe-pb no-print`}>
                    <div className="flex justify-between items-center px-4 py-3 md:px-6 md:py-4 max-w-6xl mx-auto">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 md:w-12 md:w-12 rounded-xl bg-gradient-to-br from-line-400 to-line-600 flex items-center justify-center text-white shadow-lg shadow-line-500/20"><SafeIcon name="Brain" size={24} /></div>
                            <div><h1 className={`text-lg md:text-xl font-black tracking-tight ${isDark ? 'text-white' : 'text-slate-800'}`}>RJ Ailiverse</h1><p className="text-[10px] md:text-xs font-bold text-line-500 uppercase tracking-widest">e-Learning Platform</p></div>
                        </div>
                        <div className="flex items-center gap-2 md:gap-4">
                            {store.loggedInUser && (
                                <div className={`hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-slate-50 border-slate-200'}`}>
                                    <div className="w-6 h-6 rounded-full bg-line-100 flex items-center justify-center text-line-600"><SafeIcon name="User" size={14}/></div>
                                    <span className={`text-xs font-bold ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>{store.loggedInUser.name}</span>
                                </div>
                            )}
                            <button onClick={actions.toggleDarkMode} className={`p-2.5 rounded-full transition-colors ${isDark ? 'bg-slate-800 text-yellow-400 hover:bg-slate-700' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}><SafeIcon name={isDark ? 'Sun' : 'Moon'} size={18} /></button>
                            {store.loggedInUser && <button onClick={actions.logout} className={`p-2.5 rounded-full transition-colors ${isDark ? 'bg-slate-800 text-rose-400 hover:bg-rose-500/20' : 'bg-rose-50 text-rose-500 hover:bg-rose-100'}`} title="ออกจากระบบ"><SafeIcon name="LogOut" size={18} /></button>}
                        </div>
                    </div>
                </header>
            );
        }

        function Dashboard({ store, actions }) {
            const user = store.dbUser || {};
            const isDark = store.isDarkMode;
            const textH = isDark ? 'text-slate-100' : 'text-slate-800';
            const textP = isDark ? 'text-slate-400' : 'text-slate-500';

            const hrs = Math.floor(store.studySeconds / 3600);
            const mins = Math.floor((store.studySeconds % 3600) / 60);
            
            const hasPassedPretest = user.pretest && user.pretest !== '-';
            const canTakePosttest = store.progress >= 100 && user.skillLabPassed;
            const hasPassedPosttest = user.posttest === 'ผ่าน';

            return (
                <div className="flex-1 w-full max-w-6xl mx-auto p-4 md:p-6 pb-24 md:pb-8 animate-in fade-in space-y-6">
                    {/* Welcome Banner */}
                    <div className="relative overflow-hidden rounded-[2rem] bg-gradient-to-r from-slate-900 to-slate-800 text-white p-6 md:p-10 shadow-2xl">
                        <div className="absolute right-0 top-0 opacity-10 blur-xl pointer-events-none -translate-y-1/4 translate-x-1/4"><SafeIcon name="Brain" size={300} /></div>
                        <div className="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                            <div>
                                <div className="text-line-400 font-bold tracking-widest text-xs mb-2 flex items-center gap-2 uppercase"><SafeIcon name="Activity" size={14}/> ศูนย์เรียนรู้อัจฉริยะ</div>
                                <h2 className="text-3xl md:text-4xl font-black mb-2">สวัสดี, {user.name?.split(' ')[0]} 👋</h2>
                                <p className="text-slate-300 max-w-md text-sm md:text-base leading-relaxed">พัฒนาทักษะการเจรจาทางการแพทย์ของคุณผ่านระบบ AI เสมือนจริง พร้อมรับประกาศนียบัตรเมื่อผ่านเกณฑ์</p>
                            </div>
                            <div className="flex gap-4">
                                <div className="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-4 text-center min-w-[100px]">
                                    <div className="text-3xl font-black text-white">{hrs}<span className="text-sm font-medium text-slate-300 ml-1">ชม.</span></div>
                                    <div className="text-[10px] text-slate-400 uppercase tracking-widest mt-1">เวลาเรียน</div>
                                </div>
                                <div className="bg-line-500/20 backdrop-blur-md border border-line-400/30 rounded-2xl p-4 text-center min-w-[100px]">
                                    <div className="text-3xl font-black text-line-400">{store.progress}<span className="text-sm font-medium text-line-200 ml-1">%</span></div>
                                    <div className="text-[10px] text-line-300 uppercase tracking-widest mt-1">ความคืบหน้า</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Main Path */}
                        <div className="lg:col-span-2 space-y-6">
                            <h3 className={`text-xl font-black flex items-center gap-2 ${textH}`}><SafeIcon name="MapPin" className="text-line-500"/> เส้นทางการเรียนรู้ของคุณ</h3>
                            
                            <div className="space-y-4">
                                {/* Step 1 */}
                                <GlassCard className={`relative overflow-hidden transition-all ${hasPassedPretest ? 'opacity-70' : 'border-line-500 shadow-md shadow-line-500/10 scale-[1.02]'}`}>
                                    {hasPassedPretest && <div className="absolute top-4 right-4 text-emerald-500"><SafeIcon name="CheckCircle" /></div>}
                                    <div className="flex gap-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-lg shrink-0 ${hasPassedPretest ? 'bg-emerald-100 text-emerald-600' : 'bg-line-500 text-white shadow-lg shadow-line-500/40'}`}>1</div>
                                        <div>
                                            <h4 className={`text-lg font-bold ${textH}`}>แบบทดสอบก่อนเรียน (Pretest)</h4>
                                            <p className={`text-sm mt-1 mb-3 ${textP}`}>ประเมินความรู้พื้นฐานก่อนเริ่มเนื้อหา (ไม่จำกัดคะแนน)</p>
                                            <button onClick={() => actions.nav('quiz_pre')} disabled={hasPassedPretest} className={`px-5 py-2 rounded-xl font-bold text-sm transition-colors ${hasPassedPretest ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-800 hover:bg-slate-700 text-white'}`}>{hasPassedPretest ? `ทำแล้ว (${user.pretest} คะแนน)` : 'เริ่มทำแบบทดสอบ'}</button>
                                        </div>
                                    </div>
                                </GlassCard>

                                {/* Step 2 */}
                                <GlassCard className={`relative overflow-hidden transition-all ${!hasPassedPretest ? 'opacity-50 pointer-events-none' : store.progress >= 100 ? 'opacity-70' : 'border-blue-500 shadow-md shadow-blue-500/10 scale-[1.02]'}`}>
                                    {store.progress >= 100 && <div className="absolute top-4 right-4 text-emerald-500"><SafeIcon name="CheckCircle" /></div>}
                                    <div className="flex gap-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-lg shrink-0 ${store.progress >= 100 ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-500 text-white shadow-lg shadow-blue-500/40'}`}>2</div>
                                        <div className="w-full">
                                            <h4 className={`text-lg font-bold ${textH}`}>เรียนรู้ผ่านวิดีโอ (e-Learning)</h4>
                                            <p className={`text-sm mt-1 mb-3 ${textP}`}>ศึกษาเนื้อหาให้ครบ 10 ชั่วโมง ระบบจะบันทึกเวลาอัตโนมัติ</p>
                                            <div className="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-2.5 mb-3 overflow-hidden border border-slate-200 dark:border-slate-700">
                                                <div className="bg-blue-500 h-2.5 rounded-full transition-all duration-1000" style={{ width: `${store.progress}%` }}></div>
                                            </div>
                                            <button onClick={() => actions.nav('video')} className={`px-5 py-2 rounded-xl font-bold text-sm transition-colors ${store.progress >= 100 ? 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400' : 'bg-blue-600 hover:bg-blue-700 text-white shadow-md'}`}>{store.progress >= 100 ? 'ทบทวนเนื้อหา' : 'เข้าสู่ห้องเรียน'}</button>
                                        </div>
                                    </div>
                                </GlassCard>

                                {/* Step 3 */}
                                <GlassCard className={`relative overflow-hidden transition-all ${store.progress < 100 ? 'opacity-50 pointer-events-none' : user.skillLabPassed ? 'opacity-70' : 'border-purple-500 shadow-md shadow-purple-500/10 scale-[1.02]'}`}>
                                    {user.skillLabPassed && <div className="absolute top-4 right-4 text-emerald-500"><SafeIcon name="CheckCircle" /></div>}
                                    <div className="flex gap-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-lg shrink-0 ${user.skillLabPassed ? 'bg-emerald-100 text-emerald-600' : 'bg-purple-500 text-white shadow-lg shadow-purple-500/40'}`}>3</div>
                                        <div>
                                            <h4 className={`text-lg font-bold ${textH}`}>ห้องปฏิบัติการ (Skill Lab)</h4>
                                            <p className={`text-sm mt-1 mb-3 ${textP}`}>ฝึกทักษะเจรจาผ่านระบบ AI Roleplay และต้องผ่านเกณฑ์ Empathy</p>
                                            <button onClick={() => actions.nav('skill_lab')} className={`px-5 py-2 rounded-xl font-bold text-sm transition-colors ${user.skillLabPassed ? 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400' : 'bg-purple-600 hover:bg-purple-700 text-white shadow-md'}`}>{user.skillLabPassed ? 'ฝึกฝนเพิ่มเติม' : 'เข้าห้องฝึกเจรจา'}</button>
                                        </div>
                                    </div>
                                </GlassCard>

                                {/* Step 4 */}
                                <GlassCard className={`relative overflow-hidden transition-all ${!canTakePosttest ? 'opacity-50 pointer-events-none' : hasPassedPosttest ? 'opacity-70 bg-emerald-50/50 dark:bg-emerald-900/10' : 'border-amber-500 shadow-md shadow-amber-500/10 scale-[1.02]'}`}>
                                     {hasPassedPosttest && <div className="absolute top-4 right-4 text-emerald-500"><SafeIcon name="CheckCircle" /></div>}
                                    <div className="flex gap-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-lg shrink-0 ${hasPassedPosttest ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-500 text-white shadow-lg shadow-amber-500/40'}`}>4</div>
                                        <div>
                                            <h4 className={`text-lg font-bold ${textH}`}>แบบทดสอบหลังเรียน (Posttest)</h4>
                                            <p className={`text-sm mt-1 mb-3 ${textP}`}>ทำแบบทดสอบให้ผ่าน 80% เพื่อรับประกาศนียบัตร</p>
                                            {hasPassedPosttest ? (
                                                <div className="flex flex-wrap gap-2">
                                                    <span className="px-4 py-2 bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-400 rounded-xl font-bold text-sm flex items-center gap-1"><SafeIcon name="CheckCircle" size={16}/> ผ่านแล้ว ({user.posttest})</span>
                                                    <button onClick={() => actions.nav('profile')} className="px-4 py-2 bg-slate-800 text-white rounded-xl font-bold text-sm shadow-sm hover:bg-slate-700">ดูใบประกาศฯ</button>
                                                </div>
                                            ) : (
                                                <button onClick={() => actions.nav('quiz_post')} className="px-5 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-xl font-bold text-sm shadow-md">เริ่มสอบ Posttest</button>
                                            )}
                                        </div>
                                    </div>
                                </GlassCard>
                            </div>
                        </div>

                        {/* Sidebar Info */}
                        <div className="space-y-6">
                             {store.settings.liveConfig?.status === 'live' && (
                                <GlassCard className="!border-rose-500/50 shadow-[0_0_20px_rgba(244,63,94,0.15)] relative overflow-hidden group cursor-pointer" noPad>
                                    <div className="absolute top-0 right-0 w-16 h-16 bg-rose-500 rounded-bl-full opacity-10 group-hover:scale-150 transition-transform"></div>
                                    <div className="p-6" onClick={() => actions.nav('live')}>
