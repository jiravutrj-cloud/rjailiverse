        function QuizScreen({ store, actions, type }) {
            const isPre = type === 'pre';
            const [qIndex, setQIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [timeLeft, setTimeLeft] = useState(1800); // 30 mins
            const isDark = store.isDarkMode;
            const textH = isDark ? 'text-slate-100' : 'text-slate-800';
            const textP = isDark ? 'text-slate-400' : 'text-slate-500';

            const rawSet = store.quizRaw && store.quizRaw.length > 0 ? store.quizRaw[0] : [];
            const questions = useMemo(() => {
                if(!rawSet || rawSet.length === 0) return [];
                // แบบดึง Raw จาก Admin เลย ไม่ต้อง Parse ซ้ำถ้ามันเป็น Object แล้ว
                return rawSet.map(q => ({
                    id: q.id, question: q.question, options: q.options, answer: q.answer
                })).sort(() => 0.5 - Math.random()).slice(0, 40);
            }, [rawSet]);

            useEffect(() => {
                const timer = setInterval(() => setTimeLeft(p => p > 0 ? p - 1 : 0), 1000);
                return () => clearInterval(timer);
            }, []);

            if (questions.length === 0) return <div className="flex-1 flex items-center justify-center p-4"><div className="text-center text-slate-500"><SafeIcon name="AlertTriangle" size={48} className="mx-auto mb-4 opacity-50"/><p>ไม่พบชุดข้อสอบในระบบ</p><button onClick={()=>actions.nav('dashboard')} className="mt-4 px-4 py-2 bg-slate-200 rounded-lg text-sm font-bold">กลับ</button></div></div>;

            const q = questions[qIndex];
            const isLast = qIndex === questions.length - 1;
            const allAnswered = Object.keys(answers).length === questions.length;

            const handleSubmit = async () => {
                if(isSubmitting) return;
                setIsSubmitting(true);
                let score = 0;
                questions.forEach((qu, i) => { if (answers[i] === qu.answer) score++; });
                const percentage = Math.round((score / questions.length) * 100);
                const passed = percentage >= 80;
                const resultText = `${score}/${questions.length} (${percentage}%)`;

                try {
                    const payload = isPre ? { pretest: resultText } : { posttest: passed ? 'ผ่าน' : 'ไม่ผ่าน', posttestScore: resultText };
                    if (!isPre && passed) { payload.status = 'ผ่าน'; payload.certDate = new Date().toISOString(); }
                    await actions.syncUserProgress(payload);
                    actions.showAlert(`ส่งคำตอบสำเร็จ! คุณได้ ${score} คะแนน`, passed ? 'success' : 'info');
                    actions.nav(isPre ? 'dashboard' : (passed ? 'profile' : 'dashboard'));
                } catch(e) { actions.showAlert('ส่งคำตอบไม่สำเร็จ', 'error'); setIsSubmitting(false); }
            };

            return (
                <div className="flex-1 w-full max-w-3xl mx-auto p-4 md:p-8 pb-24 animate-in fade-in flex flex-col h-full">
                    <div className="flex justify-between items-end mb-6">
                        <div>
                            <h2 className={`text-2xl font-black ${textH}`}>แบบทดสอบ{isPre ? 'ก่อน' : 'หลัง'}เรียน</h2>
                            <p className={`text-sm ${textP}`}>ข้อที่ {qIndex + 1} จาก {questions.length}</p>
                        </div>
                        <div className={`px-4 py-2 rounded-xl font-mono font-bold text-lg shadow-sm border ${timeLeft < 300 ? 'bg-rose-50 text-rose-600 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800' : isDark ? 'bg-slate-800 text-line-400 border-slate-700' : 'bg-white text-line-600 border-slate-200'}`}>
                            <SafeIcon name="Clock" size={16} className="inline mr-2 -mt-1"/>{Math.floor(timeLeft / 60).toString().padStart(2, '0')}:{(timeLeft % 60).toString().padStart(2, '0')}
                        </div>
                    </div>

                    <div className="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5 mb-8 overflow-hidden"><div className="bg-line-500 h-1.5 rounded-full transition-all duration-300" style={{ width: `${((qIndex + 1) / questions.length) * 100}%` }}></div></div>

                    <GlassCard className="flex-1 flex flex-col justify-between !p-6 md:!p-10 mb-6 shadow-xl">
                        <div>
                            <h3 className={`text-lg md:text-xl font-bold leading-relaxed mb-8 ${textH}`}>{q.question}</h3>
                            <div className="space-y-3">
                                {q.options.map((opt, i) => {
                                    const isSel = answers[qIndex] === i;
                                    return (
                                        <button key={i} onClick={() => setAnswers(p => ({...p, [qIndex]: i}))} className={`w-full text-left p-4 rounded-2xl border-2 transition-all flex items-start gap-4 group ${isSel ? 'border-line-500 bg-line-50 dark:bg-line-900/20 shadow-md' : isDark ? 'border-slate-700 hover:border-slate-500 bg-slate-800/50' : 'border-slate-200 hover:border-slate-300 bg-white/50'}`}>
                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 mt-0.5 transition-colors ${isSel ? 'border-line-500 bg-line-500' : isDark ? 'border-slate-600' : 'border-slate-300'}`}>{isSel && <div className="w-2.5 h-2.5 bg-white rounded-full"></div>}</div>
                                            <span className={`text-sm md:text-base font-medium leading-relaxed ${isSel ? 'text-line-700 dark:text-line-300 font-bold' : textH}`}>{opt}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </GlassCard>

                    <div className="flex justify-between items-center shrink-0">
                        <button onClick={() => setQIndex(p => Math.max(0, p - 1))} disabled={qIndex === 0} className="px-6 py-3 rounded-xl font-bold text-sm disabled:opacity-30 transition-opacity bg-slate-200 text-slate-600 dark:bg-slate-800 dark:text-slate-400">ก่อนหน้า</button>
                        {isLast ? (
                            <GradientButton onClick={handleSubmit} disabled={!allAnswered || isSubmitting} className="px-8 py-3 text-sm">{isSubmitting ? 'กำลังตรวจ...' : 'ส่งคำตอบ'}</GradientButton>
                        ) : (
                            <button onClick={() => setQIndex(p => Math.min(questions.length - 1, p + 1))} className="px-8 py-3 rounded-xl font-bold text-sm bg-slate-800 text-white hover:bg-slate-700 shadow-md">ถัดไป</button>
                        )}
                    </div>
                </div>
            );
        }

        // --- SKILL LAB COMPONENT ---
        function SkillLab({ store, actions }) {
            const [step, setStep] = useState(1);
            const [scenario, setScenario] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [stressLevel, setStressLevel] = useState(50);
            const [heartRate, setHeartRate] = useState(85);
            const [result, setResult] = useState(null);
            const [systemContext, setSystemContext] = useState('');
            
            const isDark = store.isDarkMode;
            const textH = isDark ? 'text-slate-100' : 'text-slate-800';
            const textP = isDark ? 'text-slate-400' : 'text-slate-500';
            
            const messagesEndRef = useRef(null);
            const recRef = useRef(null);
            const iframeRef = useRef(null);
            const containerRef = useRef(null);
            
            const isVoiceMode = store.interactionMode === 'voice';

            useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    recRef.current = new SR();
                    recRef.current.continuous = true; // ให้ฟังต่อเนื่องในโหมด Voice
                    recRef.current.interimResults = true;
                    recRef.current.lang = scenario?.language === 'en' ? 'en-US' : 'th-TH';
                    
                    let finalTranscript = '';
                    let timeoutId = null;

                    recRef.current.onresult = (e) => {
                        let interim = '';
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
                            else interim += e.results[i][0].transcript;
                        }
                        setInput(finalTranscript + interim);
                        
                        // ถ้าระบบหยุดพูดเกิน 2 วินาทีในโหมด Voice ให้ Auto Send
                        if (isVoiceMode && finalTranscript.trim()) {
                            clearTimeout(timeoutId);
                            timeoutId = setTimeout(() => {
                                if(!isTyping) { handleSend(finalTranscript.trim()); finalTranscript = ''; setInput(''); }
                            }, 2000);
                        }
                    };
                    recRef.current.onend = () => { if(isVoiceMode && step === 2 && !isTyping) { try{recRef.current.start()}catch(e){} } else { setIsListening(false); } };
                    recRef.current.onerror = () => setIsListening(false);
                }
                return () => { if(recRef.current) { recRef.current.stop(); } actions.stopAudio(); };
            }, [scenario, isVoiceMode, step, isTyping]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isTyping]);

            useEffect(() => {
                if (step === 2) {
                   const hrTimer = setInterval(() => { setHeartRate(prev => { const base = 70 + (stressLevel * 0.5); return Math.floor(base + (Math.random() * 6 - 3)); }); }, 2000);
                   return () => clearInterval(hrTimer);
                }
            }, [step, stressLevel]);

            const changeVideo = (vidUrl) => {
                if(iframeRef.current && vidUrl) {
                    const currSrc = iframeRef.current.src;
                    if(!currSrc.includes(vidUrl.split('?')[0])) iframeRef.current.src = vidUrl;
                }
            };

            const startScenario = async (s) => {
                setScenario(s); 
                const u = store.loggedInUser || { name: 'หมอ/พยาบาล' };
                const ctx = s.systemPrompt.replace(/{{USER_POSITION}}/g, u.name).replace(/{{PATIENT_RELATION}}/g, 'คุณพ่อ').replace(/{{PATIENT_GENDER}}/g, 'ชาย').replace(/{{PATIENT_AGE}}/g, '58 ปี').replace(/{{PATIENT_CAUSE}}/g, 'อุบัติเหตุรถชน');
                setSystemContext(ctx);
                setMessages([]); setStressLevel(80); setHeartRate(110); setResult(null); setStep(2);
                
                changeVideo(window.FAH_IDLE_VIDEO);
                const introMsg = s.language === 'en' ? "Hello, Doctor... Please tell me my dad is okay." : "คุณหมอคะ... คุณพ่อหนูเป็นยังไงบ้างคะ?";
                setMessages([{ id: 'init', role: 'ai', text: introMsg, char: 'ฟ้า', emotion: 'SAD' }]);
                
                if (isVoiceMode) {
                    await actions.speakText({ text: introMsg, voiceName: "Aoede" });
                    setIsListening(true); try{recRef.current?.start();}catch(e){}
                }
            };

            const handleSend = async (textOverride = null) => {
                const text = typeof textOverride === 'string' ? textOverride : input;
                if (!text.trim() || isTyping) return;
                setInput(''); setIsTyping(true); setIsListening(false); if(recRef.current) recRef.current.stop(); actions.stopAudio();
                
                const newMsgs = [...messages, { id: Date.now(), role: 'user', text: text.trim() }];
                setMessages(newMsgs);
                
                let prompt = `${systemContext}\n\nประวัติแชท:\n${newMsgs.slice(-6).map(m => `${m.role === 'user' ? 'ผู้เรียน' : 'AI'}: ${m.text}`).join('\n')}\n\nAI:`;
                
                try {
                    const res = await actions.fetchProxy({ action: 'callGemini', prompt, systemInstruction: "Output FORMAT: [EMOTION] [NAME] Text. EMOTION must be one of: SAD, ANGRY, CONFUSED, HESITANT, NEUTRAL, ADVISING. Example: [SAD] [ฟ้า] ฮือๆ พ่อหนูเป็นอะไร" });
                    if (res?.status === 'success') {
                        let aiText = res.text.replace(/[*#]/g, '');
                        let tagMatch = aiText.match(/^\[(.*?)\]\s*\[(.*?)\]/);
                        let emotion = 'NEUTRAL', char = 'ฟ้า', cleanText = aiText;
                        
                        if (tagMatch) { emotion = tagMatch[1]; char = tagMatch[2]; cleanText = aiText.replace(tagMatch[0], '').trim(); }
                        else {
                            let singleTag = aiText.match(/^\[(.*?)\]/);
                            if(singleTag) { emotion = singleTag[1]; cleanText = aiText.replace(singleTag[0], '').trim(); }
                        }
                        
                        setMessages(p => [...p, { id: Date.now()+1, role: 'ai', text: cleanText, char, emotion }]);
                        
                        // Stress Calc
                        let stressMod = 0;
                        if(emotion === 'ANGRY') stressMod = 15; else if(emotion === 'SAD' || emotion === 'CONFUSED') stressMod = 5; else if(emotion === 'HESITANT') stressMod = -10; else if(emotion === 'NEUTRAL' || emotion === 'ADVISING') stressMod = -20;
                        setStressLevel(p => Math.max(10, Math.min(100, p + stressMod)));

                        // Video & Voice
                        const videos = char.includes('เมฆ') ? window.CHARACTER_VIDEOS?.BROTHER : window.CHARACTER_VIDEOS?.FAH;
                        changeVideo(videos?.[emotion] || window.FAH_IDLE_VIDEO);
                        const vName = char.includes('เมฆ') ? 'Charon' : 'Aoede';
                        
                        if (isVoiceMode) {
                            await actions.speakText({ text: cleanText, voiceName: vName });
                            setIsListening(true); try{recRef.current?.start();}catch(e){}
                        } else {
                            // Chat mode can also play audio if wanted, but auto-play might be annoying. We'll leave a play button on messages.
                        }
                    } else { actions.showAlert('AI ไม่ตอบสนอง', 'error'); }
                } catch(e) { actions.showAlert('การเชื่อมต่อขัดข้อง', 'error'); }
                setIsTyping(false);
            };

            const endScenario = async () => {
                if(!window.confirm('ต้องการจบการสนทนาและให้ AI ประเมินผลใช่หรือไม่?')) return;
                setIsTyping(true); setIsListening(false); if(recRef.current) recRef.current.stop(); actions.stopAudio();
                
                const log = messages.map(m => `${m.role === 'user' ? 'Nurse' : m.char}: ${m.text}`).join('\n');
                const prompt = `ประเมิน Empathy การเจรจานี้ตามหลัก B.A.L.I (Listen, Acknowledge, Validate, Support) หรือ SPIKES\n\nLog:\n${log}\n\nให้คะแนน 0-100 และสรุปสั้นๆ (จุดแข็ง 1 ข้อ, จุดที่ควรปรับปรุง 1 ข้อ)`;
                
                try {
                    const res = await actions.fetchProxy({ action: 'callGemini', prompt, systemInstruction: "คุณคือ Medical Evaluator ตอบเป็นภาษาไทย ให้คะแนนชัดเจนบรรทัดแรก เช่น 'Score: 85' ตามด้วยคำอธิบายสั้นๆ" });
                    let score = 0; let match = res.text?.match(/Score:\s*(\d+)/i);
                    if (match) score = parseInt(match[1]); else score = stressLevel < 40 ? 80 : 40;
                    
                    setResult({ score, text: res.text || 'การประเมินเสร็จสิ้น', passed: score >= 60 });
                    setStep(3);
                    
                    const newHist = [...(store.skillLabHistory || []), { scenarioId: scenario.id, scenarioTitle: scenario.title, score, timestamp: new Date().toISOString() }];
                    const pLoad = { skillLabHistory: newHist };
                    if (score >= 60) pLoad.skillLabPassed = true;
                    actions.syncUserProgress(pLoad);
                    
                } catch(e) { actions.showAlert('การประเมินล้มเหลว', 'error'); setStep(1); }
                setIsTyping(false);
            };

            // --- Views ---
            if (step === 1) return (
                <div className="flex-1 w-full max-w-5xl mx-auto p-4 md:p-6 pb-24 animate-in fade-in space-y-6">
                    <div className="text-center max-w-2xl mx-auto mb-8">
                        <div className="w-16 h-16 bg-gradient-to-br from-purple-400 to-purple-600 rounded-full flex items-center justify-center mx-auto mb-4 text-white shadow-lg shadow-purple-500/30"><SafeIcon name="MessageSquare" size={32}/></div>
                        <h2 className={`text-3xl font-black mb-2 ${textH}`}>Skill Lab</h2>
                        <p className={`text-sm ${textP}`}>ห้องฝึกทักษะเจรจาเสมือนจริง (AI Roleplay Simulator) โหมด: <span className="font-bold text-line-500">{isVoiceMode ? '🎙️ คุยด้วยเสียง (VAD)' : '💬 พิมพ์แชท'}</span></p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {(window.SKILL_LAB_SCENARIOS || []).map(s => (
                            <GlassCard key={s.id} className="relative overflow-hidden group hover:border-purple-400/50 cursor-pointer flex flex-col h-full" onClick={() => startScenario(s)}>
                                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-110 transition-transform"><SafeIcon name="Brain" size={60}/></div>
                                <h3 className={`text-lg font-black mb-1 ${textH}`}>{s.title}</h3>
                                <p className={`text-xs ${textP} mb-4 flex-1 line-clamp-3`}>{s.description}</p>
                                <div className="flex items-center gap-2 mb-4"><span className="px-2.5 py-1 bg-slate-100 dark:bg-slate-800 rounded-md text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase">👤 {s.characterName}</span><span className="px-2.5 py-1 bg-slate-100 dark:bg-slate-800 rounded-md text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase">💬 {s.language.toUpperCase()}</span></div>
                                <GradientButton className="w-full py-3 !from-purple-500 !to-indigo-600 shadow-purple-500/20 hover:shadow-purple-500/30 text-sm">เริ่มสถานการณ์จำลอง</GradientButton>
                            </GlassCard>
                        ))}
                    </div>
                    <div className="text-center mt-6">
                        <button onClick={() => { globalStore.setState({ interactionMode: isVoiceMode ? 'chat' : 'voice' }); }} className={`text-xs font-bold underline ${textP}`}>สลับโหมดเป็น {isVoiceMode ? 'พิมพ์แชท' : 'คุยด้วยเสียง'}</button>
                    </div>
                </div>
            );

            if (step === 3 && result) return (
                <div className="flex-1 flex items-center justify-center p-4 animate-in zoom-in-95 duration-500 pb-24">
                    <GlassCard className="max-w-md w-full text-center py-8">
                        <div className={`w-24 h-24 rounded-full mx-auto flex items-center justify-center mb-6 text-4xl shadow-xl ${result.passed ? 'bg-emerald-100 text-emerald-500 shadow-emerald-500/20' : 'bg-rose-100 text-rose-500 shadow-rose-500/20'}`}>
                            {result.passed ? <SafeIcon name="CheckCircle" size={48}/> : <SafeIcon name="AlertTriangle" size={48}/>}
                        </div>
                        <h2 className={`text-3xl font-black mb-2 ${textH}`}>{result.score} / 100</h2>
                        <div className={`text-sm font-bold uppercase tracking-widest mb-6 ${result.passed ? 'text-emerald-500' : 'text-rose-500'}`}>Empathy Score - {result.passed ? 'PASSED' : 'FAILED'}</div>
                        <div className={`p-4 rounded-xl text-left text-sm whitespace-pre-line leading-relaxed border ${isDark ? 'bg-slate-800/50 border-slate-700/50 text-slate-300' : 'bg-slate-50 border-slate-200 text-slate-700'} mb-6`}>{result.text}</div>
                        <div className="flex gap-3"><button onClick={() => setStep(1)} className="flex-1 py-3 bg-slate-200 dark:bg-slate-800 rounded-xl font-bold text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-700">ฝึกเคสอื่น</button><GradientButton onClick={() => actions.nav('dashboard')} className="flex-1 py-3 text-sm">กลับหน้าหลัก</GradientButton></div>
                    </GlassCard>
                </div>
            );

            return (
                <div className="flex-1 w-full max-w-6xl mx-auto flex flex-col h-[calc(100vh-64px)] pb-16 md:pb-0" ref={containerRef}>
                    <div className={`flex flex-col md:flex-row flex-1 overflow-hidden ${isDark ? 'bg-slate-900' : 'bg-slate-100'} rounded-none md:rounded-3xl shadow-none md:shadow-2xl border-0 md:border md:my-4 md:mx-4 border-slate-200 dark:border-slate-800 relative`}>
                        
                        {/* Vital Signs Overlay (Mobile Top, Desktop Absolute) */}
                        <div className="absolute top-2 right-2 md:top-6 md:right-6 z-20 flex gap-2 pointer-events-none">
                            <div className="bg-slate-900/80 backdrop-blur border border-slate-700/50 px-3 py-1.5 rounded-lg flex items-center gap-2 shadow-lg"><SafeIcon name="HeartPulse" size={14} className={heartRate > 100 ? 'text-rose-500 animate-pulse' : 'text-emerald-500'} /><span className="text-white font-mono font-bold text-xs">{heartRate} bpm</span></div>
                            <div className="bg-slate-900/80 backdrop-blur border border-slate-700/50 px-3 py-1.5 rounded-lg flex items-center gap-2 shadow-lg"><div className="w-16 h-1.5 bg-slate-700 rounded-full overflow-hidden"><div className={`h-full transition-all duration-500 ${stressLevel > 70 ? 'bg-rose-500' : stressLevel > 40 ? 'bg-amber-500' : 'bg-emerald-500'}`} style={{width: `${stressLevel}%`}}></div></div><span className="text-white font-mono font-bold text-[10px]">STRESS</span></div>
                        </div>

                        {/* Video Panel */}
                        <div className="w-full md:w-1/2 lg:w-[55%] h-[35vh] md:h-full bg-black relative shrink-0">
                            <iframe ref={iframeRef} src={window.FAH_IDLE_VIDEO} className="absolute inset-0 w-full h-full border-none pointer-events-none" allow="autoplay; fullscreen" />
                            {/* Gradient Fade to Chat */}
                            <div className="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-black/80 to-transparent md:hidden"></div>
                        </div>

                        {/* Chat Panel */}
                        <div className={`w-full md:w-1/2 lg:w-[45%] h-[calc(65vh-64px)] md:h-full flex flex-col bg-transparent md:bg-white md:dark:bg-slate-900/95 relative z-10 -mt-6 md:mt-0 rounded-t-3xl md:rounded-none overflow-hidden`}>
                            
                            {/* Header */}
                            <div className={`p-4 border-b flex justify-between items-center bg-white/90 dark:bg-slate-900/90 backdrop-blur-md sticky top-0 z-10 ${isDark ? 'border-slate-800' : 'border-slate-100'}`}>
                                <div><h3 className={`font-black text-sm ${textH}`}>{scenario?.title}</h3><p className="text-[10px] text-purple-500 font-bold uppercase tracking-widest mt-0.5">Roleplay Active</p></div>
                                <button onClick={endScenario} disabled={isTyping} className="px-3 py-1.5 bg-rose-50 hover:bg-rose-100 text-rose-600 dark:bg-rose-500/20 dark:text-rose-400 dark:hover:bg-rose-500/40 text-[10px] font-bold rounded-lg border border-rose-200 dark:border-rose-500/30 transition-colors shadow-sm">🛑 จบเคส / ประเมิน</button>
                            </div>

                            {/* Messages */}
                            <div className="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm">
                                {messages.map((m, i) => (
                                    <div key={m.id} className={`flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'} animate-in slide-in-from-bottom-2 fade-in`}>
                                        {m.role === 'ai' && <div className="text-[10px] font-bold text-slate-400 mb-1 ml-1 flex items-center gap-1">{m.char} <span className="opacity-50 font-mono">[{m.emotion}]</span> {isVoiceMode && i===messages.length-1 && <button onClick={()=>actions.speakText({text: m.text, voiceName: m.char.includes('เมฆ')?'Charon':'Aoede'})} className="hover:text-blue-500"><SafeIcon name="Volume2" size={12}/></button>}</div>}
                                        <div className={`p-3 max-w-[85%] text-sm leading-relaxed ${m.role === 'user' ? 'bg-line-500 text-white chat-bubble-user' : 'bg-slate-100 text-slate-800 dark:bg-slate-800 dark:text-slate-200 border border-slate-200 dark:border-slate-700 chat-bubble-ai'}`}>{m.text}</div>
                                    </div>
                                ))}
                                {isTyping && <div className="flex items-start"><div className={`p-3 rounded-2xl ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-slate-100 border-slate-200'} border flex gap-1`}><span className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span><span className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></span><span className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></span></div></div>}
                                <div ref={messagesEndRef} className="h-2"></div>
                            </div>

                            {/* Input Area */}
                            <div className={`p-3 md:p-4 border-t bg-white/95 dark:bg-slate-900/95 backdrop-blur-md ${isDark ? 'border-slate-800' : 'border-slate-100'} pb-safe`}>
                                {isVoiceMode ? (
                                    <div className="flex flex-col items-center">
                                        <div className="text-[10px] font-mono text-slate-400 mb-3 h-4 px-4 text-center line-clamp-1">{input || (isListening ? 'กำลังฟัง...' : 'รอเสียง...')}</div>
                                        <div className="flex justify-center gap-4 w-full">
                                            <button onClick={() => { if(isListening) { recRef.current?.stop(); setIsListening(false); } else { recRef.current?.start(); setIsListening(true); } }} className={`w-14 h-14 rounded-full flex items-center justify-center transition-all shadow-lg ${isListening ? 'bg-rose-500 text-white shadow-rose-500/40 animate-pulse' : 'bg-slate-200 text-slate-500 dark:bg-slate-800 dark:text-slate-400'}`}><SafeIcon name={isListening ? "Mic" : "MicOff"} size={24}/></button>
                                            <button onClick={() => handleSend()} disabled={!input.trim() || isTyping} className="w-14 h-14 rounded-full bg-line-500 text-white flex items-center justify-center disabled:opacity-30 transition-opacity shadow-lg shadow-line-500/30"><SafeIcon name="Send" size={20}/></button>
                                        </div>
                                        <p className="text-[9px] text-slate-400 mt-3 text-center uppercase tracking-widest font-bold">Voice Activity Detection Active</p>
                                    </div>
                                ) : (
                                    <form onSubmit={(e)=>{e.preventDefault(); handleSend();}} className="flex items-end gap-2">
                                        <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); handleSend();}}} placeholder="พิมพ์ประโยคเจรจา..." className={`flex-1 max-h-32 min-h-[44px] rounded-xl px-4 py-3 outline-none resize-none text-sm transition-colors border ${isDark ? 'bg-slate-800 border-slate-700 focus:border-line-500 text-white' : 'bg-slate-50 border-slate-200 focus:border-line-500 text-slate-800'}`} disabled={isTyping} />
                                        <button type="submit" disabled={!input.trim() || isTyping} className="w-12 h-12 rounded-xl bg-line-500 text-white flex items-center justify-center shrink-0 disabled:opacity-30 transition-opacity shadow-md shadow-line-500/20"><SafeIcon name="Send" size={18} /></button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function ProfileScreen({ store }) {
            const user = store.dbUser || {};
            const isDark = store.isDarkMode;
            const textH = isDark ? 'text-slate-100' : 'text-slate-800';
            const textP = isDark ? 'text-slate-400' : 'text-slate-500';
            
            const certUrl = user.status === 'ผ่าน' ? `https://res.cloudinary.com/djwclucoz/image/upload/v1783149499/rj_cert_template.jpg` : null; // Placeholder template
            
            return (
                <div className="flex-1 w-full max-w-4xl mx-auto p-4 md:p-8 pb-24 animate-in fade-in space-y-6">
                    <h2 className={`text-2xl font-black mb-6 ${textH}`}>โปรไฟล์และประกาศนียบัตร</h2>
                    
                    <GlassCard className="flex flex-col md:flex-row gap-8 items-center md:items-start text-center md:text-left">
                        <div className="w-24 h-24 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center shrink-0 border-4 border-white dark:border-slate-800 shadow-xl overflow-hidden relative">
                             {user.profilePic ? <img src={user.profilePic} className="w-full h-full object-cover"/> : <SafeIcon name="User" size={40} className="text-slate-400" />}
                        </div>
                        <div className="flex-1 space-y-2 w-full">
                            <h3 className={`text-2xl font-black ${textH}`}>{user.name}</h3>
                            <div className="flex flex-col md:flex-row md:items-center gap-2 md:gap-4 text-sm font-medium">
                                <span className={`px-3 py-1 rounded-full ${isDark ? 'bg-slate-800 text-line-400' : 'bg-slate-100 text-line-600'} border border-line-500/20`}>ID: {user.licenseId || user.id}</span>
                                <span className={textP}>{user.position}</span>
                                <span className={textP}>• {user.hospital}</span>
                            </div>
                        </div>
                    </GlassCard>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                         <GlassCard className="!p-5 text-center">
                            <SafeIcon name="Clock" size={24} className="mx-auto mb-2 text-blue-500"/>
                            <div className={`text-2xl font-black ${textH}`}>{Math.floor(store.studySeconds / 3600)} ชม.</div>
                            <div className={`text-xs uppercase tracking-widest ${textP}`}>เวลาเรียน</div>
                         </GlassCard>
                         <GlassCard className="!p-5 text-center">
                            <SafeIcon name="MessageSquare" size={24} className="mx-auto mb-2 text-purple-500"/>
                            <div className={`text-2xl font-black ${textH}`}>{store.skillLabHistory?.length || 0} ครั้ง</div>
                            <div className={`text-xs uppercase tracking-widest ${textP}`}>ฝึกเจรจา</div>
                         </GlassCard>
                         <GlassCard className="!p-5 text-center">
                            <SafeIcon name="Award" size={24} className={`mx-auto mb-2 ${user.status === 'ผ่าน' ? 'text-emerald-500' : 'text-slate-400'}`}/>
                            <div className={`text-2xl font-black ${user.status === 'ผ่าน' ? 'text-emerald-500' : textH}`}>{user.status === 'ผ่าน' ? 'PASS' : store.progress + '%'}</div>
                            <div className={`text-xs uppercase tracking-widest ${textP}`}>สถานะการเรียน</div>
                         </GlassCard>
                    </div>

                    <GlassCard>
                        <h3 className={`text-lg font-black mb-4 flex items-center gap-2 ${textH}`}><SafeIcon name="Award" className="text-amber-500"/> ประกาศนียบัตร (Certificate)</h3>
                        {user.status === 'ผ่าน' ? (
                            <div className="space-y-4">
                                <div className="p-4 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800 rounded-xl text-emerald-800 dark:text-emerald-400 text-sm font-bold flex items-center gap-2"><SafeIcon name="CheckCircle" size={18}/> ยินดีด้วย! คุณผ่านเกณฑ์การอบรมเรียบร้อยแล้ว</div>
                                <div className="w-full aspect-[1.414] bg-slate-200 dark:bg-slate-800 rounded-lg overflow-hidden border-2 border-amber-200 dark:border-amber-700/50 shadow-inner relative flex items-center justify-center">
                                     <div className="absolute inset-0 bg-white dark:bg-slate-900 p-8 flex flex-col items-center justify-center text-center">
                                         <SafeIcon name="Award" size={60} className="text-amber-400 mb-4 opacity-20 absolute top-8"/>
                                         <h1 className="text-3xl font-black text-slate-800 dark:text-white mb-2 font-serif">CERTIFICATE OF COMPLETION</h1>
                                         <p className="text-sm text-slate-500 mb-6 uppercase tracking-widest">This certifies that</p>
                                         <h2 className="text-2xl font-bold text-line-600 dark:text-line-400 mb-6 border-b-2 border-slate-200 dark:border-slate-700 pb-2 inline-block px-8">{user.name}</h2>
                                         <p className="text-sm text-slate-600 dark:text-slate-400 max-w-md mx-auto leading-relaxed">Has successfully completed the comprehensive training program including e-Learning and AI Clinical Empathy Simulation at RJ Ailiverse.</p>
                                         <div className="mt-8 text-xs font-mono text-slate-400">ID: {user.licenseId} | Date: {new Date(user.certDate || Date.now()).toLocaleDateString('en-GB')}</div>
                                     </div>
                                </div>
                                <button onClick={() => window.print()} className="w-full py-3 bg-amber-500 hover:bg-amber-600 text-white rounded-xl font-bold shadow-md flex items-center justify-center gap-2"><SafeIcon name="Download" size={18}/> พิมพ์ / บันทึกเป็น PDF</button>
                            </div>
                        ) : (
                            <div className="text-center py-12 px-4 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl">
                                <SafeIcon name="Lock" size={48} className="mx-auto mb-4 text-slate-300 dark:text-slate-600"/>
                                <h4 className={`font-bold mb-2 ${textH}`}>ยังไม่ปลดล็อค</h4>
                                <p className={`text-sm ${textP} max-w-sm mx-auto`}>คุณต้องเรียนผ่านวิดีโอ 10 ชั่วโมง, สอบผ่าน Skill Lab และทำ Posttest ให้ผ่าน 80% ขึ้นไป เพื่อรับประกาศนียบัตร</p>
                            </div>
                        )}
                    </GlassCard>
                </div>
            );
        }

        // --- Main App Container ---
        function App() {
            useSetup();
            const store = useStore();
            const { currentScreen, loggedInUser, alerts, isDarkMode } = store;
            
            const renderScreen = () => {
                if (currentScreen === 'intro') return <IntroScreen store={store} actions={actions} />;
                if (currentScreen === 'auth_wizard') return <AuthWizard store={store} actions={actions} />;
                if (!loggedInUser) return <div className="min-h-screen flex items-center justify-center"><div className="w-10 h-10 border-4 border-line-500 border-t-transparent rounded-full animate-spin"></div></div>;
                
                switch (currentScreen) {
                    case 'dashboard': return <Dashboard store={store} actions={actions} />;
                    case 'video': return <VideoPlayer store={store} actions={actions} />;
                    case 'live': return <LiveStream store={store} actions={actions} />;
                    case 'quiz_pre': return <QuizScreen store={store} actions={actions} type="pre" />;
                    case 'quiz_post': return <QuizScreen store={store} actions={actions} type="post" />;
                    case 'skill_lab': return <SkillLab store={store} actions={actions} />;
                    case 'profile': return <ProfileScreen store={store} actions={actions} />;
                    default: return <Dashboard store={store} actions={actions} />;
                }
            };

            const BottomNav = () => {
                if (!loggedInUser || ['intro', 'auth_wizard', 'quiz_pre', 'quiz_post'].includes(currentScreen)) return null;
                const tabs = [
                    { id: 'dashboard', icon: 'Home', label: 'หน้าหลัก' },
                    { id: 'video', icon: 'BookOpen', label: 'ห้องเรียน' },
                    { id: 'skill_lab', icon: 'MessageSquare', label: 'ฝึกเจรจา' },
                    { id: 'profile', icon: 'User', label: 'โปรไฟล์' }
                ];
                return (
                    <nav className={`fixed bottom-0 left-0 w-full z-50 backdrop-blur-xl border-t safe-pb no-print ${isDarkMode ? 'bg-slate-900/90 border-slate-800' : 'bg-white/90 border-slate-200'} md:hidden`}>
                        <div className="flex justify-around items-center p-2">
                            {tabs.map(t => {
                                const active = currentScreen === t.id;
                                return (
                                    <button key={t.id} onClick={() => actions.nav(t.id)} className={`flex flex-col items-center justify-center w-full py-2 rounded-xl transition-all ${active ? 'text-line-600 dark:text-line-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'}`}>
                                        <SafeIcon name={t.icon} size={20} className={active ? 'mb-1 animate-in zoom-in' : 'mb-1'} />
                                        <span className={`text-[9px] font-bold ${active ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>{t.label}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </nav>
                );
            };

            return (
                <div className={`min-h-screen flex flex-col transition-colors duration-300 ${isDarkMode ? 'dark bg-slate-950' : 'bg-slate-50'}`}>
                    <Header store={store} actions={actions} />
                    
                    <main className="flex-1 flex flex-col relative">
                        {renderScreen()}
                    </main>
                    
                    <BottomNav />
                    
                    {/* Alerts Overlay */}
                    <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none no-print">
                        {alerts.map(a => (
                            <div key={a.id} className={`p-4 rounded-2xl shadow-lg border flex items-center gap-3 animate-in fade-in slide-in-from-top-4 pointer-events-auto backdrop-blur-md ${a.type === 'error' ? (isDarkMode ? 'bg-rose-900/90 border-rose-700 text-rose-100' : 'bg-rose-50 border-rose-200 text-rose-800') : (isDarkMode ? 'bg-slate-800/90 border-line-700 text-line-100' : 'bg-white border-line-200 text-slate-800')}`}>
                                <SafeIcon name={a.type === 'error' ? 'AlertTriangle' : 'Info'} className={a.type === 'error' ? 'text-rose-500' : 'text-line-500'} />
                                <span className="text-sm font-bold">{a.msg}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
