    <!-- Custom Styles for Parallax Clouds & Glassmorphism -->

        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Sarabun', sans-serif;

        }

        /* --- Parallax Background --- */
        .sky-bg { position: fixed; inset: 0; z-index: 0; }
        .clouds-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .cloud-layer { position: absolute; bottom: 0; left: 0; width: 200%; height: 100%; background-repeat: repeat-x; background-size: auto 100%; animation: drift linear infinite; }
        .layer-1 { opacity: 0.9; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png'); animation-duration: 150s; }
        .layer-2 { opacity: 0.6; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog2.png'); animation-duration: 200s; transform: scale(1.1); }
        .layer-3 { opacity: 0.4; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png'); animation-duration: 250s; transform: scale(1.2); }

        @keyframes drift { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* --- UI Utilities --- */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.4); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(255,255,255,0.6); }
        
        /* Padding for safe areas (Notches/Home indicators) */
        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { createPortal } from 'react-dom';
        import * as LucideIcons from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc } from 'firebase/firestore';

        // ============================================================================
        // 1. CONFIGURATIONS & DATA CONSTANTS (ดึงตัวแปรมาจากไฟล์ data.js)
        // ============================================================================
        const FAH_IDLE_VIDEO = window.FAH_IDLE_VIDEO || "";
        const CHARACTER_VIDEOS = window.CHARACTER_VIDEOS || {};
        const FAH_PROFILE_PIC = window.FAH_PROFILE_PIC || "";
        
        const HOSPITAL_MAPPING = window.HOSPITAL_MAPPING || {};
        const INITIAL_LESSONS = window.INITIAL_LESSONS || [];
        const SKILL_LAB_SCENARIOS = window.SKILL_LAB_SCENARIOS || [];
        const QUIZ_QUESTIONS_RAW = window.QUIZ_QUESTIONS_RAW || [];

        const ICONS = {
          Play: LucideIcons.Play, Clock: LucideIcons.Clock, LogIn: LucideIcons.LogIn, Lock: LucideIcons.Lock, Users: LucideIcons.Users, 
          MonitorPlay: LucideIcons.MonitorPlay, Radio: LucideIcons.Radio, User: LucideIcons.User, ArrowLeft: LucideIcons.ArrowLeft, 
          Mail: LucideIcons.Mail, Check: LucideIcons.Check, LogOut: LucideIcons.LogOut, FileText: LucideIcons.FileText, 
          Plus: LucideIcons.Plus, Trash2: LucideIcons.Trash2, Database: LucideIcons.Database, RefreshCw: LucideIcons.RefreshCw, 
          Info: LucideIcons.Info, Award: LucideIcons.Award, ChevronRight: LucideIcons.ChevronRight, PauseCircle: LucideIcons.PauseCircle, 
          Save: LucideIcons.Save, History: LucideIcons.History, Volume2: LucideIcons.Volume2, VolumeX: LucideIcons.VolumeX, 
          ShieldCheck: LucideIcons.ShieldCheck, Download: LucideIcons.Download, Target: LucideIcons.Target, 
          CheckSquare: LucideIcons.CheckSquare, CheckCircle: LucideIcons.CheckCircle, Sparkles: LucideIcons.Sparkles, 
          LayoutDashboard: LucideIcons.LayoutDashboard, Activity: LucideIcons.Activity, BookOpen: LucideIcons.BookOpen, 
          Upload: LucideIcons.Upload, MessageSquare: LucideIcons.MessageSquare, Send: LucideIcons.Send, X: LucideIcons.X,
          ImageIcon: LucideIcons.Image, Mic: LucideIcons.Mic, Brain: LucideIcons.Brain, ArrowRight: LucideIcons.ArrowRight, 
          Bot: LucideIcons.Bot, PlayCircle: LucideIcons.PlayCircle, Camera: LucideIcons.Camera, Eye: LucideIcons.Eye,
          Settings2: LucideIcons.Settings2, Search: LucideIcons.Search, CloudLightning: LucideIcons.CloudLightning,
          Globe: LucideIcons.Globe, Heart: LucideIcons.Heart, TrendingUp: LucideIcons.TrendingUp, MapPin: LucideIcons.MapPin
        };

        function SafeIcon({ name, size = 24, className = "", strokeWidth = 2, ...rest }) {
          const IconComponent = ICONS[name] || ICONS['Sparkles'];
          return <IconComponent size={size} className={className} strokeWidth={strokeWidth} {...rest} />;
        }

        let app, auth, db, appId;
        try {
          const fbP1 = "AIzaSyBs275"; const fbP2 = "NY99gdv1uZdAnb"; const fbP3 = "mx3UlWO8K4o5a0";
          let fbConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
            ? JSON.parse(__firebase_config) : { apiKey: fbP1 + fbP2 + fbP3, authDomain: "e-learning-with-fah-ai.firebaseapp.com", projectId: "e-learning-with-fah-ai", storageBucket: "e-learning-with-fah-ai.firebasestorage.app", messagingSenderId: "418946105960", appId: "1:418946105960:web:728e28070790975df231dd" };
          if (fbConfig && Object.keys(fbConfig).length > 0) {
            app = initializeApp(fbConfig); auth = getAuth(app); db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? String(__app_id).replace(/\//g, '-') : 'fah-elearning-prod';
          }
        } catch (error) { console.warn("Firebase init error", error); }

        // --- 2. UTILS ---
        function recursiveShuffle(arr) { if (!arr || arr.length <= 1) return arr; const idx = Math.floor(Math.random() * arr.length); const rest = [...arr]; rest.splice(idx, 1); return [arr[idx], ...recursiveShuffle(rest)]; }
        function formatQuestions(qs) { return qs.map(q => { const correctAnswerText = q.options[q.answer]; const shuffledOpts = recursiveShuffle([...q.options]); return { ...q, options: shuffledOpts, answer: shuffledOpts.indexOf(correctAnswerText) }; }); }
        function parseRawExams(raw) { return raw.map((str, idx) => { const parts = str.split('|').map(s => s.trim()); return { id: idx + 1, question: parts[0].replace(/^[0-9]+\.\s*/, ''), options: parts.slice(1, parts.length - 1), answer: parseInt(parts[parts.length - 1].replace(/[^0-9]/g, ''), 10) }; }); }
        const FULL_EXAMS = [recursiveShuffle(formatQuestions(parseRawExams(QUIZ_QUESTIONS_RAW)))];
        const formatTime = (secs) => !secs ? "0 ชม. 0 นาที" : `${Math.floor(secs / 3600)} ชม. ${Math.floor((secs % 3600) / 60)} นาที`.trim();
        const calcProgress = (secs, totalSecs) => Math.min(100, Math.round(((secs||0) / (totalSecs||1)) * 100));
        const generateSessionId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);
        const calculateScore = (questions, answers) => questions.reduce((acc, q) => acc + +(answers[q.id] === q.answer), 0);
        const correctMedicalTerms = (text) => { if (!text) return text; let corrected = text; const dict = { "แอบเนีย": "Apnea", "แอปเนีย": "Apnea", "ดีคัปปิ้ง": "Decoupling", "ดีคับปลิ้ง": "Decoupling", "เบรนเดส": "Brain Death", "สมองตาย": "Brain Death" }; Object.keys(dict).forEach(key => corrected = corrected.replace(new RegExp(key, "g"), dict[key])); return corrected; };
        
        const fetchWithRetry = async (url, options) => { 
            const delays = [2000, 4000, 8000, 16000, 32000]; 
            for (let i = 0; i <= delays.length; i++) { 
                try { 
                    const res = await fetch(url, options); 
                    if (!res.ok) { 
                        if (res.status === 429) {
                            console.warn(`[429] ลิมิต API รอ ${delays[i]/1000} วินาที (ครั้งที่ ${i+1})`);
                            if (i === delays.length) throw new Error("ระบบหนาแน่นเกินไป กรุณาลองใหม่ในอีกสักครู่ค่ะ");
                            throw new Error("429_RETRY");
                        }
                        throw new Error(`HTTP ${res.status}`); 
                    } 
                    return await res.json(); 
                } catch (error) { 
                    if (error.message !== "429_RETRY" && i === delays.length) throw error; 
                    await new Promise(res => setTimeout(res, delays[i] || 5000)); 
                } 
            } 
        };

        const GEMINI_PROXY_URL = "https://script.google.com/macros/s/AKfycby_Z0eS21NE_jWN-Q-4g-PO3IdftYg5VgSFQNEZG2zd_oDxqvisxnaHgPoZWy-AassWnw/exec";

        const callGeminiAPI = async (prompt, systemInstruction, base64Image = null) => {
            try {
                const parts = [{ text: prompt }];
                if (base64Image) {
                    const mimeType = base64Image.match(/data:(.*?);base64/)[1];
                    const data = base64Image.split(',')[1];
                    parts.push({ inlineData: { mimeType, data } });
                }
                const safetySettings = [
                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                ];
                const geminiPayload = { contents: [{ parts }], systemInstruction: { parts: [{ text: systemInstruction }] }, safetySettings };
                const data = await fetchWithRetry(GEMINI_PROXY_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'generateText', payload: geminiPayload }) });
                if (data.status === 'error' && String(data.message).includes('429')) throw new Error("ระบบผู้ใช้งานหนาแน่น กรุณาลองอีกครั้งค่ะ");
                if (data.status === 'success' && data.data.candidates) return data.data.candidates?.[0]?.content?.parts?.[0]?.text ?? "ขออภัยค่ะ ฟ้าไม่สามารถหาคำตอบได้ในขณะนี้";
                else return "ระบบขัดข้องชั่วคราว กรุณาลองใหม่อีกครั้งค่ะ";
            } catch (e) { return "ระบบขัดข้องชั่วคราว กรุณาลองใหม่อีกครั้งค่ะ"; }
        };

        const callGeminiTTS = async (text, voiceName = "Aoede") => {
            const geminiPayload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } } },
                safetySettings: [{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }]
            };
            try {
                const responseData = await fetchWithRetry(GEMINI_PROXY_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'generateTTS', payload: geminiPayload }) });
                if (responseData.status === 'error') throw new Error(responseData.message);
                const inlineData = responseData.data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                if (!inlineData || !inlineData.data) throw new Error("Google API ไม่ได้ส่งข้อมูลเสียงกลับมา");
                return inlineData; 
            } catch (e) { throw e; }
        };

        const pcm16ToWav = (base64PCM, sampleRate = 24000) => {
          const binaryString = window.atob(base64PCM); const bytes = Uint8Array.from([...binaryString].map(c => c.charCodeAt(0))); 
          const buffer = new ArrayBuffer(44 + bytes.length); const view = new DataView(buffer);
          const writeString = (v, offset, string) => { for (let i = 0; i < string.length; i++) v.setUint8(offset + i, string.charCodeAt(i)); };
          writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true); writeString(view, 8, 'WAVE'); 
          writeString(view, 12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); 
          view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(view, 36, 'data'); view.setUint32(40, bytes.length, true);
          new Uint8Array(buffer, 44).set(bytes); 
          return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        };

        // --- 3. STATE MANAGEMENT ---
        const createGlobalStore = (initialState) => {
          let savedState = null;
          try { savedState = JSON.parse(localStorage.getItem('elearning_app_state') ?? 'null'); } catch (e) {}
          let state = Object.assign({ isAuthReady: false, fbUser: null, syncQueue: [], isFetchingMaster: false, syncState: { isSyncing: false, text: 'ส่งข้อมูลเข้า Google Sheets', lastSync: null } }, initialState, savedState ?? {});
          const listeners = new Set();
          return {
            getState: () => state,
            setState: (updater) => { 
              state = Object.assign({}, state, typeof updater === 'function' ? updater(state) : updater);
              try { const { currentScreen, loggedInUser, activeTab, currentVideoId, selectedLabId, studySeconds, chatTrigger } = state; 
                if (!['landing', 'intro', 'welcome', 'auth_wizard'].includes(currentScreen)) { localStorage.setItem('elearning_app_state', JSON.stringify({ currentScreen, loggedInUser, activeTab, currentVideoId, selectedLabId, studySeconds, chatTrigger })); }
              } catch(e) {}
              listeners.forEach(l => l(state)); 
            },
            subscribe: (l) => { listeners.add(l); return () => listeners.delete(l); }
          };
        };

        const globalStore = createGlobalStore({
          currentScreen: 'landing', uiMessage: { type: '', text: '', visible: false }, tempLicense: '', authStep: 'check_license',
          registrationData: { name: '', email: '', phone: '', position: '', licenseId: '', department: '', hospital: '', customHospital: '', province: '', userType: '', isPrefilled: false },
          otpData: { input: '', isSending: false, error: '' }, fallbackOtp: null, loggedInUser: null, currentSessionId: null, studySeconds: 0,
          quizData: { type: 'pretest', questions: FULL_EXAMS[0] || [], currentIndex: 0, answers: {}, score: 0, isFinished: false },
          activeTab: 'video', currentVideoId: 1, isLiveCheckedIn: false,
          liveConfig: { status: 'offline', days: 1, hours: 10, allowPosttest: false, topic: 'บรรยายพิเศษ', url: 'https://www.canva.com/design/DAHLSXAISSw/D6KdfmIaWm_qsEVr3Msf4Q/view?embed', documentUrl: '' },
          lookerStudioUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQx-jhRcJFjIK4nfSzCHdtJ5nSXJTJCmKDxlUHq4xpa7kEVxXFGZSaMWQBzmXOvwYLoQlGTQp5xLqrs/pubhtml?gid=1285992394&single=true&widget=true&headers=false',
          liveChatMessages: [{ sender: 'ai', text: 'สวัสดีค่ะพี่ๆ นักเรียน! สงสัยตรงไหนพิมพ์ถามฟ้าได้เลยนะคะ ✨' }], 
          appsScriptUrl: 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec', certScriptUrl: 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec',
          dbUsers: [], lessons: INITIAL_LESSONS, questionSets: FULL_EXAMS, hasWelcomedSession: false, chatTrigger: null, speakTextTrigger: null, selectedLabId: null, scenarioState: {},
          roleplayPhase: 'none', currentSpeaker: 'FAH', currentEmotion: 'NEUTRAL'
        });

        function useGlobalState() { const [s, setS] = useState(globalStore.getState()); useEffect(() => globalStore.subscribe(setS), []); return [s, globalStore.setState]; }

        const actions = {
          nav: (sc) => { window.location.hash = sc; globalStore.setState({ currentScreen: sc }); window.scrollTo(0, 0); },
          showMsg: (t, type = 'success') => { globalStore.setState({ uiMessage: { type, text: String(t), visible: true } }); setTimeout(() => globalStore.setState(p => ({ uiMessage: { ...p.uiMessage, visible: false } })), 3500); },
          speakText: (text) => globalStore.setState({ speakTextTrigger: text }),
          fetchAppsScript: async (payload, specificUrl = null) => { 
              try { const url = specificUrl || globalStore.getState().appsScriptUrl; if(!url) return { status: 'error' }; const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) }); return await res.json(); } catch(e) { return { status: 'error' }; } 
          },
          enqueueSync: (payload) => globalStore.setState(p => ({ syncQueue: [...p.syncQueue, { id: Date.now(), payload, retries: 0 }] })),
          saveUserToDB: async (u) => { if (db && globalStore.getState().fbUser) { try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', u.id), u, { merge: true }); } catch (e) { } } },
          
          handleAdminClick: () => { 
              const count = globalStore.getState().adminClickCount ?? 0; 
              if (count + 1 >= 3) { 
                  globalStore.setState({ adminClickCount: 0 }); 
                  window.location.href = './admin.html';
              } else { 
                  globalStore.setState({ adminClickCount: count + 1 }); 
              } 
          },

          handleLogout: () => { const { loggedInUser: u, studySeconds: s, liveConfig: lc } = globalStore.getState(); if (u) { const up = { ...u, studySeconds: s, progress: calcProgress(s, (lc?.hours ?? 1) * 3600) }; actions.enqueueSync({ action: 'upsertUser', user: up }); actions.saveUserToDB(up); } globalStore.setState({ loggedInUser: null, studySeconds: 0, isLiveCheckedIn: false, currentSessionId: null, currentScreen: 'welcome' }); localStorage.removeItem('elearning_app_state'); actions.showMsg('ออกจากระบบแล้ว'); },
          submitQuiz: () => { const { quizData, loggedInUser: u, dbUsers } = globalStore.getState(); if (quizData.isFinished) return; const score = calculateScore(quizData.questions, quizData.answers); const isPretest = quizData.type === 'pretest'; const isPassed = score >= Math.ceil(quizData.questions.length * 0.8); const upUser = { ...u, ...(isPretest ? { pretest: `${score}/${quizData.questions.length}` } : { posttest: `${score}/${quizData.questions.length}`, status: isPassed ? 'ผ่าน' : 'ไม่ผ่าน' }) }; actions.saveUserToDB(upUser); actions.enqueueSync({ action: 'upsertUser', user: upUser }); globalStore.setState({ loggedInUser: upUser, dbUsers: dbUsers.map(x => x.id === upUser.id ? upUser : x), quizData: { ...quizData, score, isFinished: true }, currentScreen: isPretest ? 'quiz_result' : isPassed ? 'cert_confirm' : 'quiz_fail' }); },
          startSkillLabRoleplay: (scenario) => globalStore.setState({ chatTrigger: { id: Date.now(), scenario } })
        };
        window.showGlobalMsg = actions.showMsg;

        // --- 4. SHARED UI ---
        function GlassCard({ children, className = "", onClick, ...rest }) {
          let radiusClass = 'rounded-[2rem]'; const m = className.match(/rounded-(?:\[.*?\]|\w+)/); if (m) radiusClass = m[0];
          let bgClass = className.replace(/\bbg-(?:white|slate-[12]00)(?:\/\d+)?\b/g, '').replace(/\bborder-white(?:\/\d+)?\b/g, '').replace(/\bbackdrop-blur-(?:sm|md|lg|xl|2xl|3xl)\b/g, '').replace(/\b!border-none\b/g, '').replace(/\bborder-none\b/g, '');
          return (
            <div onClick={onClick} className={`relative overflow-hidden bg-white/20 backdrop-blur-2xl backdrop-saturate-[1.2] border border-white/40 shadow-[0_8px_32px_rgba(0,0,0,0.15)] ${radiusClass} transition-all duration-300 ${onClick ? 'cursor-pointer hover:-translate-y-1 hover:bg-white/30' : ''} ${bgClass}`} {...rest}>
              <div className="absolute inset-0 bg-gradient-to-br from-white/40 via-white/10 to-transparent pointer-events-none z-0" />
              <div className="relative z-10 w-full h-full text-slate-800">{children}</div>
            </div>
          );
        }
        function GradientButton({ children, disabled, className = "", ...rest }) {
          return (
              <button disabled={disabled} className={`px-6 py-4 md:px-8 rounded-2xl font-bold text-white text-base md:text-lg transition-all duration-300 flex items-center justify-center gap-2 relative overflow-hidden active:scale-95 group shadow-[0_8px_20px_rgba(0,185,0,0.3)] ${disabled ? 'bg-white/40 cursor-not-allowed shadow-none text-slate-500 border border-white/50 backdrop-blur-md' : 'bg-line-500 hover:bg-line-600 hover:scale-105 border border-line-400'} ${className}`} {...rest}>
                  <span className="relative z-10 flex items-center gap-2 drop-shadow-md">{children}</span>
              </button>
          );
        }
        function FormInput({ label, disabled, className="", ...props }) {
          return (

                  setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: "🛑 จบการจำลองสถานการณ์ ประเมินให้หน่อยค่ะ" }]);
                  
                  const history = messages.slice(-12).map(m => `${m.sender === 'ai' ? 'ญาติ' : 'ผู้เรียน'}: ${m.text}`).join('\n');
                  const evalPrompt = `คุณคือฟ้า ประเมินการเจรจาผู้เรียน ประวัติ:\n${history}\nให้คะแนนความเห็นอกเห็นใจ (Empathy Score) จาก 0-100 บอกข้อดี ข้อเสนอแนะตามหลัก B=MAP หากคะแนนเกิน 60 ถือว่าผ่านให้พิมพ์ [PASS] ถ้าไม่ผ่านพิมพ์ [FAIL] และต้องแนบแท็ก [EMPATHY: ระบุคะแนน] มาด้วยเสมอ`;
                  
                  try {
                      const aiResponse = await callGeminiAPI("ประเมินการเจรจาหน่อย", evalPrompt); 
                      const isPass = aiResponse.includes('[PASS]'); 
                      const empathyMatch = aiResponse.match(/\[EMPATHY:\s*(\d+)\]/i);
                      const empathyScore = empathyMatch ? parseInt(empathyMatch[1]) : (isPass ? 80 : 40);
                      
                      let cleanResponse = aiResponse.replace(/\[PASS\]/g, '').replace(/\[FAIL\]/g, '').replace(/\[EMPATHY:\s*\d+\]/gi, '').trim();
                      
                      setMessages(prev => [...prev, { id: Date.now()+1, sender: 'ai', text: cleanResponse, isVoiceOnly: false }]); 
                      
                      const u = store.loggedInUser; 
                      if (u) { 
                          const evalRecord = { timestamp: new Date().toISOString(), scenarioId: store.selectedLabId, passed: isPass, score: empathyScore, evaluation: cleanResponse, chatLog: history }; 
                          const upUser = { ...u, skillLabPassed: u.skillLabPassed || isPass, skillLabHistory: [...(u.skillLabHistory || []), evalRecord] }; 
                          globalStore.setState(p => ({ loggedInUser: upUser, dbUsers: p.dbUsers.map(x => x.id === upUser.id ? upUser : x) })); 
                          actions.saveUserToDB(upUser); 
                      }
                      actions.showMsg(`บันทึกผลเรียบร้อย (Empathy Score: ${empathyScore})`, 'success'); 
                      speakThai(cleanResponse.replace(/[*#]/g, ''), null, true);
                  } catch (e) { 
                      setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: `ข้อผิดพลาด: ${e.message}`, isVoiceOnly: false }]); 
                  }
              } else if (actionType === 'return_to_dashboard') {
                  setIsRoleplay(false); 
                  globalStore.setState({ roleplayPhase: 'none', selectedLabId: null, currentEmotion: 'NEUTRAL', currentSpeaker: 'FAH' });
                  setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: "กลับสู่ห้องเรียนเรียบร้อยค่ะ", isVoiceOnly: false }]); 
                  speakThai("กลับสู่ห้องเรียนเรียบร้อยค่ะ", null, true);
              } else if (actionType === 'resume_journey') {
                  const u = store.loggedInUser; 
                  const lc = store.liveConfig; 
                  const isTimeMet = u?.userType === 'Onsite' || u?.progress >= 80 || lc?.allowPosttest;
                  
                  globalStore.setState({ activeTab: u?.posttest !== '-' ? 'profile' : (isTimeMet && u?.skillLabPassed) ? 'video' : isTimeMet ? 'skill_lab' : 'video', currentScreen: 'dashboard' });
                  if (isTimeMet && u?.skillLabPassed && u?.posttest === '-') globalStore.setState({ currentScreen: 'quiz' }); 
                  setIsOpen(false);
              } else if (actionType === 'adaptive_learning') {
                  const { questions, answers } = store.quizData; 
                  const wrongQs = questions.filter(q => answers[q.id] !== q.answer); 
                  const wrongText = wrongQs.map(q => q.question).join(" | ");
                  
                  globalStore.setState({ currentEmotion: 'ADVISING', currentSpeaker: 'FAH' }); 
                  setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: "ช่วยวิเคราะห์ข้อที่ผิดหน่อยค่ะ" }]);
                  
                  const adaptivePrompt = `คุณคือฟ้า วิเคราะห์ข้อที่ตอบผิด: "${wrongText}" ให้กำลังใจ แนะนำให้ไปดูวิดีโอบทไหน ไม่ต้องเฉลยคำตอบ`;
                  try { 
                      const aiResponse = await callGeminiAPI("วิเคราะห์ข้อสอบ", adaptivePrompt); 
                      setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: aiResponse, isVoiceOnly: false }]); 
                      speakThai(aiResponse.replace(/[*#]/g, '')); 
                  } catch (e) { 
                      setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: `เกิดข้อผิดพลาด (${e.message})`, isVoiceOnly: false }]); 
                  }
              }
              setIsTyping(false);
          };

          const handleSendChat = async (e, quickActionText = null) => {
              if (e) e.preventDefault(); 
              const userMsg = quickActionText ?? chatInput.trim(); 
              if ((!userMsg && !selectedImage) || isTyping) return;
              
              stopAudio(); 
              if (isRoleplay && ['speaking_intro', 'playing_scenario'].includes(roleplayPhase)) return; 
              
              setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: userMsg, image: selectedImage }]); 
              setChatInput(''); 
              const imageToSend = selectedImage; 
              setSelectedImage(null); 
              setIsTyping(true);
              
              const historyContext = messages.filter(m => !m.isWelcome).slice(-10).map(m => `${m.sender === 'user' ? 'ผู้เรียน' : 'ฟ้า'}: ${m.text}`).join('\n');
              
              const generalPrompt = `คุณคือ "ฟ้า" AI ผู้ช่วยสอน อายุ 22 ปี เป็นมิตร สุภาพ ลงท้ายด้วย "ค่ะ"\n[กฎเหล็กสูงสุดระดับชาติ]: ห้ามคุกคามทางเพศหรือหยาบคาย\nเรียกคู่สนทนาตามชื่อหรืออาชีพที่เขาแนะนำ ประวัติ:\n${historyContext}\nผู้เรียน: ${userMsg}\nฟ้า:`;
              const roleplayPrompt = `${currentScenarioPrompt}\n\nประวัติ:\n${historyContext}\nผู้เรียน: ${userMsg}\nญาติ (ใส่ Tag อารมณ์และชื่อคนพูดก่อนเสมอ):`;
              const systemPrompt = isRoleplay ? roleplayPrompt : generalPrompt;
              
              try {
                  let rawResponse = await callGeminiAPI(userMsg || "ช่วยแปลสไลด์หน่อย", systemPrompt, imageToSend); 
                  let spk = 'FAH'; 
                  let cleanText = rawResponse; 
                  const checkStr = cleanText.substring(0, 150).toLowerCase();
                  
                  if (checkStr.match(/\[\s*(เมฆ|น้องชาย|mek|brother)\s*\]|(^|\s)(เมฆ|น้องชาย|mek|brother)\s*:/)) spk = 'BROTHER'; 
                  else if (checkStr.match(/\[\s*(ฟ้า|ลูกสาว|fah|sister)\s*\]|(^|\s)(ฟ้า|ลูกสาว|fah|sister)\s*:/)) spk = 'FAH';
                  
                  let foundEmotion = "SAD"; 
                  const emotionsList = ["SAD", "HESITANT", "CONFUSED", "ANGRY", "ADVISING", "NEUTRAL"]; 
                  for (const em of emotionsList) { 
                      if (new RegExp(`\\[\\s*${em}\\s*\\]`, 'i').test(checkStr)) { foundEmotion = em; break; } 
                  }
                  
                  globalStore.setState({ currentSpeaker: spk, currentEmotion: foundEmotion });
                  cleanText = cleanText.replace(/\[.*?\]/g, '').replace(/^(ฟ้า|เมฆ|น้องชาย|ลูกสาว|Fah|Mek|Brother|Sister)\s*:\s*/i, '').replace(/[*#]/g, '').trim();
                  
                  const isVoiceOnly = isRoleplay && roleplayPhase === 'negotiating'; 
                  const speakerName = spk === 'BROTHER' ? 'เมฆ' : 'ฟ้า'; 
                  const msgId = Date.now() + 1;
                  
                  setMessages(prev => [...prev, { id: msgId, sender: 'ai', text: cleanText, isVoiceOnly, speakerName }]); 
                  setIsTyping(false); 
                  
                  speakThai(cleanText, () => setMessages(prev => prev.map(m => m.id === msgId ? { ...m, isVoiceOnly: false, isHidden: isRoleplay && roleplayPhase === 'negotiating' } : m)), false, spk);
              } catch (err) { 
                  setIsTyping(false); 
                  setMessages(prev => [...prev, { id: Date.now(), sender: 'ai', text: `ข้อผิดพลาด (${err.message})`, isVoiceOnly: false, speakerName: 'ฟ้า' }]); 
              }
          };

          const [pos, setPos] = useState({ x: 0, y: 0 }); 
          const [isDragging, setIsDragging] = useState(false); 
          const startPos = useRef({ x: 0, y: 0 });
          
          const handlePointerDown = (e) => { 
              if (e.target.closest('.no-drag') || window.innerWidth < 768) return; 
              setIsDragging(true); 
              const { clientX, clientY } = e.touches ? e.touches[0] : e; 
              startPos.current = { x: clientX - pos.x, y: clientY - pos.y }; 
          };

          const isChaos = store.currentEmotion === 'ANGRY' || store.currentEmotion === 'CONFUSED' || store.currentEmotion === 'HESITANT';
          const hrRate = isRoleplay ? (isChaos ? (Math.floor(Math.random() * 20) + 115) : (Math.floor(Math.random() * 10) + 75)) : 0; 
          const spo2 = isRoleplay ? (isChaos ? 94 : 98) : 0;
          
          const emotionStressMap = { ANGRY: 95, CONFUSED: 75, HESITANT: 60, SAD: 50, NEUTRAL: 20, ADVISING: 10 };
          const stressLevel = isRoleplay ? (emotionStressMap[store.currentEmotion] || 20) : 0;
          const stressColor = stressLevel > 70 ? 'bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.8)]' : stressLevel > 40 ? 'bg-amber-400 shadow-[0_0_10px_rgba(251,191,36,0.8)]' : 'bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.8)]';

          useEffect(() => {
            const handlePointerMove = (e) => { 
                if (!isDragging) return; 
                const { clientX, clientY } = e.touches ? e.touches[0] : e; 
                setPos({ x: clientX - startPos.current.x, y: clientY - startPos.current.y }); 
            };
            const handlePointerUp = () => setIsDragging(false);
            
            if (isDragging) { 
                window.addEventListener('mousemove', handlePointerMove, { passive: false }); 
                window.addEventListener('mouseup', handlePointerUp); 
                window.addEventListener('touchmove', handlePointerMove, { passive: false }); 
                window.addEventListener('touchend', handlePointerUp); 
            }
            return () => { 
                window.removeEventListener('mousemove', handlePointerMove); 
                window.removeEventListener('mouseup', handlePointerUp); 
                window.removeEventListener('touchmove', handlePointerMove); 
                window.removeEventListener('touchmove', handlePointerUp); 
            };
          }, [isDragging]);

          if (['welcome', 'auth_wizard', 'intro', 'landing'].includes(store.currentScreen)) return null;

          const scenario = SKILL_LAB_SCENARIOS.find(s => s.id === store.selectedLabId);
          
          // 💻 Desktop UI View (Glassmorphism Dashboard)
          const leftVideoContent = (
              <div className="w-full h-full flex flex-col md:flex-row overflow-hidden shadow-[inset_-10px_0_20px_rgba(0,0,0,0.2)] md:rounded-l-[2.5rem]">
                 <div className={`w-full md:w-[42%] h-[80px] md:h-full flex flex-row md:flex-col py-2 md:py-6 px-4 bg-slate-900/40 backdrop-blur-xl border-b md:border-b-0 md:border-r border-white/20 shrink-0 relative z-20 shadow-xl transition-colors duration-500 ${isChaos ? 'border-l-4 border-l-rose-500 bg-rose-950/40 animate-pulse' : ''}`}>
                    <div className="flex md:flex-col items-center gap-2 md:gap-4 w-auto md:w-full">
                        <button onClick={() => { stopAudio(); stopVAD(); globalStore.setState({ selectedLabId: null, chatTrigger: null, roleplayPhase: 'none' }); setMessages([]); }} className="w-10 h-10 md:w-full md:py-3 bg-white/10 hover:bg-rose-500/80 border border-white/20 text-white font-bold text-xs rounded-full md:rounded-xl transition-all shadow-sm active:scale-95 flex items-center justify-center gap-2 backdrop-blur-md">
                           <SafeIcon name="ArrowLeft" size={16} /> <span className="hidden md:inline">EXIT</span>
                        </button>
                    </div>

                    {isRoleplay && roleplayPhase !== 'speaking_intro' && (
                        <div className="flex-1 flex flex-row md:flex-col justify-center items-center gap-4 md:gap-6 w-auto md:w-full overflow-x-auto custom-scrollbar md:overflow-visible px-2 md:px-0">
                            <div className="hidden md:block w-full text-center mt-4 mb-2">
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-line-300 to-line-500 font-black tracking-[0.2em] uppercase text-base drop-shadow-md">Ailiverse</span>
                            </div>

                            <div className="flex flex-row md:flex-col gap-4 md:gap-6 w-full px-2">
                                <div className="flex flex-col text-green-300 w-full">
                                    <div className="text-[10px] md:text-xs font-bold tracking-widest flex justify-between opacity-80"><span>HR</span><span>bpm</span></div>
                                    <div className={`text-3xl md:text-6xl font-black font-mono leading-none tracking-tighter text-center mt-1 drop-shadow-[0_0_15px_rgba(74,222,128,0.3)] ${isChaos ? 'text-rose-500 animate-pulse drop-shadow-[0_0_15px_rgba(244,63,94,0.6)]' : ''}`}>{hrRate}</div>
                                </div>
                                <div className="flex flex-col text-cyan-300 w-full">
                                    <div className="text-[10px] md:text-xs font-bold tracking-widest flex justify-between opacity-80"><span>SpO2</span><span>%</span></div>
                                    <div className="text-3xl md:text-5xl font-black font-mono leading-none tracking-tighter text-center mt-1 drop-shadow-[0_0_15px_rgba(34,211,238,0.3)]">{spo2}</div>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex flex-col w-full mt-2 px-2">
                                <div className="text-[10px] font-bold tracking-widest flex justify-between text-slate-200 mb-1">
                                    <span className="flex items-center gap-1"><SafeIcon name="TrendingUp" size={12}/> STRESS LEVEL</span>
                                    <span>{stressLevel}%</span>
                                </div>
                                <div className="w-full h-2 bg-slate-800/80 rounded-full overflow-hidden border border-slate-600/50">
                                    <div className={`h-full rounded-full transition-all duration-700 ease-in-out ${stressColor}`} style={{ width: `${stressLevel}%` }}></div>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex flex-col w-full mt-4 p-4 bg-indigo-500/20 border border-indigo-400/40 rounded-2xl relative z-10 transition-all shadow-[inset_0_0_20px_rgba(99,102,241,0.15)] backdrop-blur-md">
                                <div className="flex items-center gap-2 mb-2 text-indigo-300"><SafeIcon name="Brain" size={16} className="animate-pulse" /><span className="text-xs font-extrabold tracking-widest uppercase">AI Guide</span></div>
                                <p className="text-sm text-indigo-100 font-medium leading-relaxed">{isChaos ? "อารมณ์ญาติกำลังพุ่งสูง หลีกเลี่ยงการโต้เถียง รับฟังด้วยความสงบ" : "ใช้ทักษะ Active Listening และเจรจาด้วยหลัก B.A.L.I."}</p>
                            </div>
                        </div>
                    )}
                 </div>
                 
                 <div className="w-full md:w-[58%] relative bg-black/80 flex items-center justify-center shrink-0 border-l border-r border-white/20">
                     {isChaos && <div className="absolute inset-0 bg-rose-500/20 mix-blend-overlay z-10 pointer-events-none animate-pulse"></div>}
                     
                     {roleplayPhase === 'playing_scenario' && (
                         <button onClick={triggerScenarioNegotiation} className="absolute bottom-4 right-4 md:bottom-8 md:right-8 z-50 bg-white/20 hover:bg-white/40 backdrop-blur-md text-white px-4 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-sm font-bold border border-white/50 transition-colors shadow-lg">
                             ข้ามวิดีโอ (Skip) ⏭️
                         </button>
                     )}

                     {roleplayPhase === 'playing_scenario' ? <iframe key="vid_scenario" src={`${scenario?.videoUrl}?autoplay=1&muted=0&api=1&player_id=scenario_vid&loop=0`} className="absolute inset-0 w-full h-full border-none pointer-events-auto transition-opacity duration-700 animate-in fade-in" allow="autoplay; fullscreen" title="Scenario Video" /> : <iframe key={`vid_char_${currentSpeaker}_${currentEmotion}`} src={CHARACTER_VIDEOS[currentSpeaker]?.[currentEmotion] || CHARACTER_VIDEOS.FAH.NEUTRAL} allow="autoplay; fullscreen" className="absolute inset-0 w-full h-full border-none pointer-events-none transition-opacity duration-700 animate-in fade-in" title="Character Video" />}
                 </div>
              </div>
          );

          const chatInterface = (
            <div className={`flex-1 flex flex-col relative z-10 min-h-0 ${isDocked ? 'w-full h-full bg-white/40 backdrop-blur-2xl backdrop-saturate-[1.5] md:rounded-[2.5rem] md:rounded-l-none' : 'h-[60vh] md:h-[600px] md:w-[400px] bg-white/40 backdrop-blur-2xl backdrop-saturate-[1.5] shadow-[0_15px_50px_rgba(0,0,0,0.2)] rounded-t-[2.5rem] md:rounded-[2.5rem] border border-white/50'}`}>
                <div className="absolute inset-0 bg-gradient-to-br from-white/60 via-white/30 to-transparent pointer-events-none rounded-[inherit] z-0" />
                {!isDocked && (
                    <div onPointerDown={handlePointerDown} className={`hidden md:flex p-4 shrink-0 items-center justify-between shadow-sm border-b border-white/50 relative z-10 cursor-grab active:cursor-grabbing`}>
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full overflow-hidden border border-white"><img src={FAH_PROFILE_PIC} alt="Fah" className="w-full h-full object-cover scale-110" /></div>
                            <div><h3 className={`font-extrabold text-sm text-slate-800 drop-shadow-sm`}>{isRoleplay ? 'ครอบครัวผู้ป่วย' : 'ฟ้า (Tutor)'}</h3><p className="text-[10px] text-slate-700 font-medium">เสียง: Aoede</p></div>
                        </div>
                        <div className="flex gap-2 items-center">
                            {isRoleplay && <div className="flex gap-1 mr-2"><button onPointerDown={e => e.stopPropagation()} onClick={() => playSampleVoice('FAH')} className="flex items-center gap-1 bg-white/60 hover:bg-white/80 text-pink-600 px-2 py-1.5 rounded-md text-[10px] font-bold border border-white/60 transition-colors"><SafeIcon name="Volume2" size={12} /> ฟ้า</button><button onPointerDown={e => e.stopPropagation()} onClick={() => playSampleVoice('BROTHER')} className="flex items-center gap-1 bg-white/60 hover:bg-white/80 text-blue-600 px-2 py-1.5 rounded-md text-[10px] font-bold border border-white/60 transition-colors"><SafeIcon name="Volume2" size={12} /> เมฆ</button></div>}
                            <button onClick={() => setIsOpen(false)} className="text-slate-600 hover:text-slate-900 p-1 bg-white/60 hover:bg-white/80 border border-white/60 rounded-full transition-colors"><SafeIcon name="X" size={20} /></button>
                        </div>
                    </div>
                )}
                {isDocked && (
                    <div className="p-4 md:p-5 pb-3 md:pb-4 border-b border-white/50 flex items-center justify-between shrink-0 relative z-10">
                        <div className="flex items-center gap-4"><div className="w-10 h-10 md:w-12 md:h-12 rounded-full overflow-hidden border-2 border-white shadow-md"><img src={FAH_PROFILE_PIC} className="w-full h-full object-cover scale-110" /></div><div><h3 className="font-extrabold text-slate-800 text-sm md:text-lg drop-shadow-sm">ครอบครัวผู้ป่วย</h3><p className="text-[10px] md:text-xs text-slate-700 font-medium">เสียง: {currentSpeaker === 'BROTHER' ? 'Charon' : 'Aoede'}</p></div></div>
                        {isRoleplay && <div className="flex gap-1 md:gap-2"><button onClick={() => playSampleVoice('FAH')} className="flex items-center gap-1 bg-white/50 hover:bg-white text-pink-600 px-2 py-1.5 md:px-3 md:py-2 rounded-lg text-[10px] md:text-xs font-bold border border-white/60 shadow-sm transition-colors"><SafeIcon name="Volume2" size={14} /> ฟ้า</button><button onClick={() => playSampleVoice('BROTHER')} className="flex items-center gap-1 bg-white/50 hover:bg-white text-blue-600 px-2 py-1.5 md:px-3 md:py-2 rounded-lg text-[10px] md:text-xs font-bold border border-white/60 shadow-sm transition-colors"><SafeIcon name="Volume2" size={14} /> เมฆ</button></div>}
                    </div>
                )}
                <div className="flex-1 p-3 md:p-5 overflow-y-auto custom-scrollbar space-y-4 flex flex-col relative z-10 pt-6 md:pt-4">
                    {messages.map((m, idx) => (
                        <div key={idx} className={`flex gap-2 md:gap-3 ${m.sender === 'user' ? 'justify-end' : 'justify-start'} ${m.isHidden ? 'hidden' : ''}`}>
                            {m.sender === 'ai' ? (
                               <div className={`p-3 md:p-4 rounded-2xl max-w-[85%] md:max-w-[80%] text-sm leading-relaxed whitespace-pre-wrap shadow-sm bg-white/80 backdrop-blur-md border border-white/60 text-slate-800 rounded-tl-none`}>
                                  {m.image && <img src={m.image} alt="Upload" className="w-full rounded-lg mb-2 object-cover border border-slate-200" />}
                                  {m.isVoiceOnly && !m.isContext ? <div className={`flex items-center gap-3 font-bold px-2 py-1 ${m.speakerName === 'เมฆ' ? 'text-blue-600' : 'text-pink-600'}`}><SafeIcon name="Volume2" size={16} className="animate-pulse" /> <span>{m.speakerName || 'ฟ้า'}กำลังพูด...</span></div> : m.text}
                               </div>
                            ) : (
                               <div className={`p-3 md:p-4 rounded-2xl max-w-[85%] md:max-w-[80%] text-sm leading-relaxed whitespace-pre-wrap shadow-sm bg-line-100/90 backdrop-blur-md border border-line-300 text-slate-900 font-medium rounded-tr-none`}>{m.image && <img src={m.image} className="w-full rounded-lg mb-2 object-cover" />}{m.text}</div>
                            )}
                        </div>
                    ))}
                    {isTyping && <div className="flex gap-2 md:gap-3 justify-start animate-in fade-in"><div className="p-4 rounded-2xl bg-white/80 backdrop-blur-md border border-white/60 rounded-tl-none shadow-sm flex gap-1.5"><div className="w-1.5 h-1.5 bg-line-400 rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-line-300 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div><div className="w-1.5 h-1.5 bg-line-500 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div></div></div>}
                    {!isTyping && messages[messages.length-1]?.sender === 'ai' && (
                        <div className="flex flex-wrap gap-2 mt-2 ml-11 animate-in fade-in">
                            {isRoleplay && roleplayPhase === 'negotiating' && <button onClick={() => handleQuickAction('end_roleplay')} className="text-xs bg-rose-500/90 text-white px-4 py-2 rounded-full font-bold border border-rose-400 hover:bg-rose-600 shadow-sm backdrop-blur-md">🛑 จบการจำลองสถานการณ์</button>}

                    <form onSubmit={handleSendChat} className={`flex items-center gap-2 md:gap-3 bg-white/60 border border-white/80 backdrop-blur-2xl rounded-full p-2 pl-3 md:pl-4 w-full shadow-lg transition-colors ${isVadMode ? '!border-green-400' : ''}`}>

                        <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder={isListening ? (isSpeakingRef.current ? "กำลังฟัง..." : "พูดได้เลย...") : "ถามฟ้า หรืออัปโหลดสไลด์..."} disabled={isTyping || roleplayPhase === 'playing_scenario'} className="flex-1 bg-transparent text-slate-800 placeholder-slate-600 px-1 outline-none text-sm md:text-base font-medium drop-shadow-sm" />
                        <button type="button" onClick={toggleMic} disabled={isTyping || roleplayPhase === 'playing_scenario'} className={`relative flex items-center justify-center w-10 h-10 rounded-full transition-colors ${isListening ? 'bg-rose-500 text-white shadow-md border-rose-400' : 'text-slate-600 bg-white/80 hover:bg-white border border-white/80'}`}><SafeIcon name="Mic" size={20} />{isListening && <span className="absolute inset-0 rounded-full border border-rose-400 animate-ping opacity-75"></span>}</button>
                        <button type="submit" disabled={(!chatInput.trim() && !selectedImage) || isTyping || roleplayPhase === 'playing_scenario'} className="w-9 h-9 md:w-10 md:h-10 shrink-0 rounded-full bg-line-500 hover:bg-line-600 text-white flex items-center justify-center disabled:opacity-50 shadow-md border border-line-400"><SafeIcon name="Send" size={16} /></button>
                    </form>
                </div>
            </div>
          );

          // 📱 Mobile Shorts UI View (Clean & Floating)
          const shortsModeUI = (
              <div className="fixed inset-0 z-[9999] bg-black flex flex-col animate-in fade-in overflow-hidden">
                  <div className="absolute inset-0 z-0" onClick={() => setIsOpen(false)}>
                      {/* Dark gradient for text readability ONLY at bottom */}
                      <div className="absolute inset-x-0 bottom-0 h-[65%] bg-gradient-to-t from-black via-black/50 to-transparent z-10 pointer-events-none"></div>
                      
                      {isChaos && <div className="absolute inset-0 bg-rose-500/20 mix-blend-overlay z-10 pointer-events-none animate-pulse"></div>}

                      {roleplayPhase === 'playing_scenario' ?
                          <iframe key="vid_scenario_mobile" src={`${scenario?.videoUrl}?autoplay=1&muted=0&api=1&player_id=scenario_vid_m&loop=0`} className="absolute inset-0 w-full h-full border-none z-0 object-cover pointer-events-none" allow="autoplay; fullscreen" title="Scenario Video Mobile" /> :
                          <iframe key={`vid_char_m_${currentSpeaker}_${currentEmotion}`} src={CHARACTER_VIDEOS[currentSpeaker]?.[currentEmotion] || CHARACTER_VIDEOS.FAH.NEUTRAL} className="absolute inset-0 w-full h-full border-none pointer-events-none z-0 object-cover" allow="autoplay; fullscreen" title="Character Video Mobile" />
                      }
                  </div>

                  {/* Top Navigation Floating (Room Switching) */}
                  <div className="absolute top-safe pt-2 left-0 right-0 px-4 flex justify-between items-center z-20 overflow-x-auto gap-4 custom-scrollbar">
                      {[{t:'video', i:'MonitorPlay'}, {t:'live', i:'Radio'}, {t:'skill_lab', i:'Globe'}, {t:'leaderboard', i:'Award'}, {t:'profile', i:'User'}].map(({t, i}) => (
                          <button key={t} onClick={() => { stopAudio(); stopVAD(); globalStore.setState({ activeTab: t, selectedLabId: null, roleplayPhase: 'none' }); setMessages([]); setIsOpen(false); }} className={`text-white drop-shadow-md active:scale-95 transition-all flex-shrink-0 ${store.activeTab === t ? 'scale-110 opacity-100 text-line-400' : 'opacity-50 hover:opacity-100'}`}>
                              <SafeIcon name={i} size={28} strokeWidth={1.5} />
                          </button>
                      ))}
                  </div>

                  {/* Floating Vitals for Mobile (Toggleable) */}
                  {roleplayPhase !== 'speaking_intro' && showMobileVitals && (
                      <div className="absolute left-4 top-24 z-20 flex flex-col gap-2 w-[110px] animate-in fade-in slide-in-from-left-4 duration-500">
                          <div className={`bg-slate-900/40 backdrop-blur-md rounded-2xl p-2.5 border border-white/20 shadow-[0_5px_15px_rgba(0,0,0,0.3)] transition-colors duration-500 ${isChaos ? 'border-rose-500/50 bg-rose-950/40' : ''}`}>
                              <div className="flex flex-col gap-1.5">
                                  <div className="flex justify-between items-baseline">
                                      <span className="text-[10px] font-bold text-green-400 opacity-90">HR</span>
                                      <span className={`text-lg font-black font-mono leading-none drop-shadow-md ${isChaos ? 'text-rose-400 animate-pulse' : 'text-green-50'}`}>{hrRate}</span>
                                  </div>
                                  <div className="flex justify-between items-baseline">
                                      <span className="text-[10px] font-bold text-cyan-400 opacity-90">SpO2</span>
                                      <span className="text-lg font-black font-mono leading-none text-cyan-50 drop-shadow-md">{spo2}</span>
                                  </div>
                                  <div className="mt-1">
                                      <div className="text-[8px] font-bold tracking-wider flex justify-between text-slate-300 mb-1">
                                          <span>STRESS</span><span>{stressLevel}%</span>
                                      </div>
                                      <div className="w-full h-1.5 bg-slate-800/80 rounded-full overflow-hidden border border-slate-600/50">
                                          <div className={`h-full rounded-full transition-all duration-700 ease-in-out ${stressColor}`} style={{ width: `${stressLevel}%` }}></div>
                                      </div>
                                  </div>
                              </div>
                          </div>
                      </div>

                  {/* Right Action Bar (Vertical Floating - Pure Icons without Glass Cards) */}
                  <div className="absolute right-4 top-safe pt-16 flex flex-col gap-6 items-center z-20">
                      <button onClick={() => { stopAudio(); stopVAD(); globalStore.setState({ selectedLabId: null, chatTrigger: null, roleplayPhase: 'none' }); setMessages([]); setIsOpen(false); }} className="text-white/60 hover:text-white drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)] flex flex-col items-center gap-1 active:scale-95 transition-all mb-4">
                          <SafeIcon name="X" size={28} strokeWidth={1.5} />
                      </button>
                  </div>

                  <div className="absolute right-4 bottom-24 flex flex-col gap-5 items-center z-20">
                      {/* TH/EN Switcher */}
                      <div className="flex flex-col gap-2 mb-2 bg-black/40 p-1.5 rounded-full backdrop-blur-md border border-white/20">
                          <button onClick={() => { if(store.selectedLabId !== 1) { stopAudio(); stopVAD(); setMessages([]); setIsOpen(false); actions.startSkillLabRoleplay(SKILL_LAB_SCENARIOS[0]); } }} className={`w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black transition-colors ${store.selectedLabId === 1 ? 'bg-line-500 text-white shadow-sm' : 'text-white/60 hover:text-white'}`}>TH</button>
                          <button onClick={() => { if(store.selectedLabId !== 2) { stopAudio(); stopVAD(); setMessages([]); setIsOpen(false); actions.startSkillLabRoleplay(SKILL_LAB_SCENARIOS[1]); } }} className={`w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black transition-colors ${store.selectedLabId === 2 ? 'bg-teal-500 text-white shadow-sm' : 'text-white/60 hover:text-white'}`}>EN</button>
                      </div>
                      
                      {/* Vitals Toggle */}
                      <button onClick={() => setShowMobileVitals(!showMobileVitals)} className={`${showMobileVitals ? 'text-green-400 scale-110 drop-shadow-[0_0_8px_rgba(74,222,128,0.8)]' : 'text-white/70 hover:text-white'} drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)] flex flex-col items-center gap-1 active:scale-95 transition-all`}>
                          <SafeIcon name="Activity" size={30} strokeWidth={1.5} />
                      </button>

                      {/* Caption Toggle */}
                      <button onClick={() => setShowMobileCaption(!showMobileCaption)} className={`${showMobileCaption ? 'text-white scale-110 drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]' : 'text-white/50 hover:text-white/80'} drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)] flex flex-col items-center gap-1 active:scale-95 transition-all`}>
                          <SafeIcon name="Eye" size={30} strokeWidth={1.5} />
                      </button>

                      {/* Full Chat Toggle */}
                      <button onClick={() => setIsOpen(true)} className="text-white/90 hover:text-white drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)] flex flex-col items-center gap-1 active:scale-95 transition-transform hover:scale-110">
                          <SafeIcon name="MessageSquare" size={30} strokeWidth={1.5} />
                      </button>

                      {/* Mic Toggle */}
                      <button onClick={toggleMic} className={`${isListening ? 'text-rose-500 scale-110' : 'text-white'} drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)] flex flex-col items-center gap-1 active:scale-95 relative transition-transform hover:scale-110`}>
                          <SafeIcon name="Mic" size={30} strokeWidth={1.5} />
                          {isListening && <span className="absolute inset-0 rounded-full border-2 border-rose-500 animate-ping opacity-75"></span>}
                      </button>

                      {/* Skip Video */}
                      {roleplayPhase === 'playing_scenario' && (
                          <button onClick={triggerScenarioNegotiation} className="text-white drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)] flex flex-col items-center gap-1 active:scale-95 transition-all animate-pulse mt-2">
                              <SafeIcon name="PlayCircle" size={30} strokeWidth={1.5} />
                          </button>
                      )}
                  </div>

                  {/* Bottom Left Floating Profile & Caption (Toggleable via showMobileCaption) */}
                  <div onClick={() => setIsOpen(true)} className={`absolute left-4 bottom-24 z-20 flex gap-3 items-end w-[75%] transition-opacity duration-300 cursor-pointer ${isOpen || !showMobileCaption ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                      <div className="w-12 h-12 rounded-full overflow-hidden border-[2.5px] border-white drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)] shrink-0 shadow-lg">
                          <img src={FAH_PROFILE_PIC} className="w-full h-full object-cover scale-110" alt="Fah AI" />
                      </div>
                      <div className="flex flex-col text-white drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)] w-full">
                          <h3 className="font-extrabold text-sm mb-1 tracking-wide">@SkillLab_bot</h3>
                          <p className="text-sm font-medium line-clamp-2 leading-snug opacity-95">
                              {messages[messages.length-1]?.text || 'พร้อมเจรจา เปิดไมค์พูดหรือพิมพ์แชทได้เลยค่ะ'}
                          </p>
                      </div>
                  </div>

                  {/* Floating Chat Overlay (Replaces Solid Bottom Sheet) */}
                  <div className={`absolute inset-x-0 bottom-0 z-30 flex flex-col transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] ${isOpen ? 'translate-y-0 opacity-100 h-[70vh]' : 'translate-y-10 opacity-0 pointer-events-none h-[70vh]'}`}>
                      {/* Invisible backdrop to close chat when tapping empty area */}
                      <div className="absolute inset-0 z-0" onClick={() => setIsOpen(false)}></div>
                      
                      <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3 custom-scrollbar relative z-10">
                          <div className="mt-auto"></div>
                          {messages.map((m, idx) => (
                             <div key={idx} className={`flex gap-2 ${m.sender === 'user' ? 'justify-end' : 'justify-start'} ${m.isHidden ? 'hidden' : ''}`}>
                               {m.sender === 'ai' ? (
                                 <div className="p-3.5 rounded-2xl max-w-[85%] text-sm leading-relaxed whitespace-pre-wrap bg-white/10 text-white border border-white/20 rounded-tl-none shadow-sm backdrop-blur-md">
                                   {m.image && <img src={m.image} className="w-full rounded-lg mb-2 object-cover border border-white/20" />}
                                   {m.isVoiceOnly && !m.isContext ? <div className={`flex items-center gap-2 font-bold px-1 ${m.speakerName === 'เมฆ' ? 'text-blue-400' : 'text-pink-400'}`}><SafeIcon name="Volume2" size={16} className="animate-pulse" /> <span>{m.speakerName || 'ฟ้า'}กำลังพูด...</span></div> : m.text}
                                 </div>
                               ) : (
                                 <div className="p-3.5 rounded-2xl max-w-[85%] text-sm leading-relaxed whitespace-pre-wrap bg-line-500 text-white font-medium rounded-tr-none shadow-md border border-line-400">
                                   {m.image && <img src={m.image} className="w-full rounded-lg mb-2 object-cover" />}
                                   {m.text}
                                 </div>
                               )}
                             </div>
                          ))}
                          {isTyping && <div className="flex gap-2 justify-start animate-in fade-in"><div className="p-3.5 rounded-2xl bg-white/10 border border-white/20 rounded-tl-none flex gap-1.5 backdrop-blur-md"><div className="w-1.5 h-1.5 bg-white/60 rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-white/60 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div><div className="w-1.5 h-1.5 bg-white/60 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div></div></div>}
                          {!isTyping && messages[messages.length-1]?.sender === 'ai' && (
                             <div className="flex flex-wrap gap-2 mt-1 animate-in fade-in">
                                 {roleplayPhase === 'negotiating' && <button onClick={() => handleQuickAction('end_roleplay')} className="text-xs bg-rose-500/90 text-white px-4 py-2.5 rounded-full font-bold shadow-lg border border-rose-400 backdrop-blur-md">🛑 จบการเจรจา</button>}
                             </div>
                          )}
                          <div ref={messagesEndRef} />
                      </div>
                      <div className="shrink-0 px-4 pb-safe pt-2 mb-4 relative z-40">
                          {isVadMode && <div className="absolute -top-1 left-8 right-8 h-1 bg-transparent w-auto"><div className="h-full bg-green-500 transition-all duration-100 shadow-[0_0_8px_rgba(34,197,94,0.8)] rounded-full" style={{ width: `${Math.min(100, audioLevel * 2)}%` }}></div></div>}
                          <form onSubmit={handleSendChat} className={`flex items-center gap-2 bg-black/50 border border-white/20 rounded-full p-1.5 pl-4 w-full transition-colors backdrop-blur-xl shadow-[0_5px_15px_rgba(0,0,0,0.5)] ${isVadMode ? '!border-green-400 bg-green-900/50' : ''}`}>
                              <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder={isListening ? "กำลังฟัง..." : "พิมพ์ข้อความ..."} disabled={isTyping || roleplayPhase === 'playing_scenario'} className="flex-1 bg-transparent text-white placeholder-white/60 px-1 outline-none text-sm font-medium" />
                              <button type="submit" disabled={(!chatInput.trim() && !selectedImage) || isTyping || roleplayPhase === 'playing_scenario'} className="w-10 h-10 shrink-0 rounded-full bg-line-500 text-white flex items-center justify-center disabled:opacity-50 border border-line-400 shadow-sm"><SafeIcon name="Send" size={18} strokeWidth={1.5} /></button>
                          </form>
                      </div>
                  </div>
              </div>
          );

          if (isShortsMode) return createPortal(shortsModeUI, document.body);
          if (isDocked && rightDockEl && leftDockEl) return <>{createPortal(leftVideoContent, leftDockEl)}{createPortal(chatInterface, rightDockEl)}</>;

          return (
            <div className={`fixed inset-0 pointer-events-none z-[100] ${isDocked || isShortsMode ? 'hidden' : ''}`}>
              <div className={`absolute transition-all duration-500 z-50 flex ${isOpen ? 'bottom-4 right-4' : 'bottom-6 right-6'}`} style={{ transform: isOpen && !isMobile ? `translate(${pos.x}px, ${pos.y}px)` : 'none' }}>
                <div className={`transition-all duration-500 pointer-events-auto ${isOpen ? 'opacity-100' : 'opacity-0 hidden'}`}>
                  {chatContent}
                </div>
                {!isOpen && !isDocked && (
                  <div onPointerDown={handleFabPointerDown} className="pointer-events-auto w-16 h-16 rounded-full bg-white/40 p-1 cursor-grab shadow-2xl">
                     <button onClick={() => { if(!hasMoved) toggleChat(); }} className="w-full h-full rounded-full overflow-hidden border border-white">
                        <img src={FAH_PROFILE_PIC} className="w-full h-full object-cover scale-110" />
                     </button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // --- 6. SCREENS ---
        function LandingScreen({ store, actions }) {
          return (
            <div className="flex min-h-screen w-full relative overflow-hidden items-center justify-center bg-transparent z-50">
               <div className="relative z-10 w-full max-w-[400px] flex flex-col items-center justify-center p-6 gap-6 animate-in fade-in slide-in-from-bottom-8 duration-1000">
                   <div className="w-full rounded-[2.5rem] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.3)] hover:scale-105 transition-transform duration-700 bg-white/30 backdrop-blur-xl border border-white/50 p-2">
                       <img 
                           src="https://res.cloudinary.com/djwclucoz/image/upload/v1782792861/AZ8WufoVnd5y8BdefqZZDQ-AZ8WufoV2pQOEFuonIDLYA_rhkffa.jpg" 
                           alt="RJ Ailiverse Cover" 
                           className="w-full h-auto object-contain rounded-[2rem] bg-white/80"
                       />
                   </div>
                   
                   <div className="w-full">
                       <GradientButton onClick={() => {
                           try {
                               const silentAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA");
                               silentAudio.play().catch(e=>{});
                               if ('speechSynthesis' in window) {
                                   const dummyUtterance = new SpeechSynthesisUtterance('');
                                   dummyUtterance.volume = 0;
                                   window.speechSynthesis.speak(dummyUtterance);
                               }
                           } catch(e){}
                           actions.nav('intro');
                       }} className="w-full py-4 text-lg md:text-xl shadow-[0_10px_30px_rgba(0,185,0,0.4)] hover:shadow-[0_15px_40px_rgba(0,185,0,0.6)] border border-white/40 backdrop-blur-md">
                           เข้าสู่ระบบ e-Learning <SafeIcon name="ArrowRight" size={24} />
                       </GradientButton>
                   </div>
               </div>
            </div>
          );
        }

        function IntroScreen({ store, actions }) {
          const [showReport, setShowReport] = useState(false);
          const [activeRegion, setActiveRegion] = useState(null);
          
          // 🇹🇭 โครงสร้างพิกัด 12 เขตสุขภาพ + กทม. (พิกัดคงที่สำหรับแสดงผลบนแผนที่)
          const baseRegions = [
            { id: 'R1', name: 'เขตสุขภาพที่ 1', desc: 'เชียงใหม่และภาคเหนือตอนบน', x: 28, y: 15 },
            { id: 'R2', name: 'เขตสุขภาพที่ 2', desc: 'พิษณุโลกและภาคเหนือตอนล่าง', x: 34, y: 32 },
            { id: 'R3', name: 'เขตสุขภาพที่ 3', desc: 'นครสวรรค์และภาคกลางตอนบน', x: 38, y: 44 },
            { id: 'R4', name: 'เขตสุขภาพที่ 4', desc: 'สระบุรีและภาคกลางตอนบน', x: 44, y: 50 },
            { id: 'R5', name: 'เขตสุขภาพที่ 5', desc: 'ราชบุรีและภาคตะวันตก', x: 32, y: 58 },
            { id: 'R6', name: 'เขตสุขภาพที่ 6', desc: 'ชลบุรีและภาคตะวันออก', x: 58, y: 60 },
            { id: 'R7', name: 'เขตสุขภาพที่ 7', desc: 'ขอนแก่นและอีสานตอนกลาง', x: 62, y: 38 },
            { id: 'R8', name: 'เขตสุขภาพที่ 8', desc: 'อุดรธานีและอีสานตอนบน', x: 74, y: 26 },
            { id: 'R9', name: 'เขตสุขภาพที่ 9', desc: 'นครราชสีมาและอีสานตอนล่าง', x: 62, y: 48 },
            { id: 'R10', name: 'เขตสุขภาพที่ 10', desc: 'อุบลราชธานีและอีสานตอนล่าง', x: 82, y: 48 },
            { id: 'R11', name: 'เขตสุขภาพที่ 11', desc: 'สุราษฎร์ธานีและภาคใต้ตอนบน', x: 28, y: 78 },
            { id: 'R12', name: 'เขตสุขภาพที่ 12', desc: 'สงขลาและภาคใต้ตอนล่าง', x: 38, y: 92 },
            { id: 'BKK', name: 'กรุงเทพมหานคร', desc: 'ศูนย์กลางการแพทย์และสาธารณสุข', x: 48, y: 56 },
          ];

          // 🔥 ดึงข้อมูลผู้ใช้งานจริงจากฐานข้อมูลมาคำนวณแบบ Real-time 🔥
          const regionStats = {};
          baseRegions.forEach(r => { regionStats[r.id] = { ...r, users: 0, learning: 0, lab: 0, passed: 0 }; });

          (store.dbUsers || []).forEach(user => {
              let rId = null;
              const dept = user.department || '';
              
              if (dept.startsWith('เขตสุขภาพที่ ')) {
                  const num = dept.replace('เขตสุขภาพที่ ', '').trim();
                  rId = `R${num}`;
              } else if (['กรมการแพทย์', 'สำนักการแพทย์ กรุงเทพฯ', 'สำนักอนามัย กรุงเทพฯ', 'อื่นๆ'].includes(dept)) {
                  rId = 'BKK'; 
              }

              if (rId && regionStats[rId]) {
                  regionStats[rId].users += 1;
                  if (user.status === 'กำลังเรียน') regionStats[rId].learning += 1;
                  if (user.skillLabHistory && user.skillLabHistory.length > 0) regionStats[rId].lab += 1;
                  if (user.status === 'ผ่าน') regionStats[rId].passed += 1;
              }
          });

          const REGION_DATA = Object.values(regionStats);

          const totalStats = REGION_DATA.reduce((acc, curr) => ({

        function AuthWizard({ store, actions }) {
          const { authStep, tempLicense, registrationData: d, otpData } = store; 
          const [isChecking, setIsChecking] = useState(false); 
          const [hasVerified, setHasVerified] = useState(false); 
          const [selectedUserType, setSelectedUserType] = useState('เรียนใหม่');
          
          const deptList = Object.keys(HOSPITAL_MAPPING).filter(k => k !== 'อื่นๆ'); 
          const rawHospList = d.department && HOSPITAL_MAPPING[d.department] ? HOSPITAL_MAPPING[d.department].map(h => h.name) : []; 
          const hospList = [...new Set([...rawHospList, 'อื่นๆ'])];
          
          const renderForm = () => {
            if (authStep === 'check_license') {
              const handleVerify = async (e) => {
                e.preventDefault(); if (!tempLicense) return; setIsChecking(true);
                const license = tempLicense.trim(); const existUser = store.dbUsers.find(u => String(u.license || '').trim() === license || String(u.id || '').trim() === license);
                let processedData = {};
                if (existUser) { 
                    processedData = { ...existUser }; 
                    let hosp = processedData.hospital || ''; 
                    let customHosp = ''; 
                    if (processedData.department && HOSPITAL_MAPPING[processedData.department]) { 
                        const knownHospitals = HOSPITAL_MAPPING[processedData.department].map(h => h.name); 
                        if (hosp && !knownHospitals.includes(hosp)) { 
                            if (hosp.startsWith('ศูนย์บริการสาธารณสุข ')) { customHosp = hosp.replace('ศูนย์บริการสาธารณสุข ', ''); hosp = 'ศูนย์บริการสาธารณสุข'; } 
                            else { customHosp = hosp; hosp = 'อื่นๆ'; } 
                        } 
                    } 
                    processedData.hospital = hosp; processedData.customHospital = customHosp; setSelectedUserType('เข้าเรียนต่อ'); 
                } else { 
                    setSelectedUserType('เรียนใหม่'); processedData.userType = 'เรียนใหม่'; 
                }
                globalStore.setState({ registrationData: Object.assign({ ...store.registrationData, licenseId: license, isPrefilled: !!existUser }, processedData) });
                setTimeout(() => { setIsChecking(false); setHasVerified(true); }, 500);
              };
              
              const handleContinue = (e) => { 
                  e.preventDefault(); 
                  if (hasVerified) { 
                      let finalUserType = store.registrationData.userType || 'เรียนใหม่'; 
                      if (selectedUserType === 'เข้าเรียนต่อ' && finalUserType === 'เรียนใหม่') finalUserType = 'Online'; 
                      else if (selectedUserType === 'เรียนใหม่') finalUserType = 'เรียนใหม่'; 
                      globalStore.setState(p => ({ registrationData: { ...p.registrationData, userType: finalUserType }, authStep: 'register' })); 
                  } 
              };
              
              const options = store.registrationData.isPrefilled ? ['เข้าเรียนต่อ', 'แก้ไขสิทธิ์'] : ['เรียนใหม่', 'Onsite / Online'];

              return (
                <div className="flex flex-col h-full animate-in fade-in slide-in-from-right-8 justify-center">

                            type="text"

                            placeholder="ระบุตัวเลข"

                setScrollLeft(sliderRef.current.scrollLeft);

            };

                if (!isDraggingSlider) return;

                const x = e.pageX - sliderRef.current.offsetLeft;

        function QuizScreen({ store, actions }) {
          const { quizData: { questions, currentIndex, answers, type, isFinished } } = store; const q = questions[currentIndex]; const isAns = q && answers[q.id] !== undefined; const [timeLeft, setTimeLeft] = useState(2700); const timerRef = useRef(null); 
          useEffect(() => { if (isFinished) return; const tmr = setInterval(() => setTimeLeft(p => { if (p <= 1) { clearInterval(tmr); actions.submitQuiz(); return 0; } return p - 1; }), 1000); return () => clearInterval(tmr); }, [isFinished]);
          if (!q) return <div className="min-h-screen flex items-center justify-center p-4"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-line-600 drop-shadow-lg"></div></div>;

          return (
            <div className="min-h-screen flex flex-col items-center justify-center p-4 z-10 relative">
              <GlassCard className="w-full max-w-3xl relative z-10 mt-6 flex flex-col p-6 md:p-10 pb-8 md:pb-10">
                <div className="flex flex-wrap justify-between items-center mb-6 gap-4">
                  <h2 className="text-xl md:text-2xl font-extrabold text-slate-800 drop-shadow-md">แบบทดสอบ{type === 'pretest' ? 'ก่อน' : 'หลัง'}เรียน</h2>
                  <div className="flex items-center gap-2">
                     <button onClick={() => globalStore.setState(p => ({ quizData: { ...p.quizData, currentIndex: Math.max(0, currentIndex - 1) } }))} disabled={currentIndex === 0} className="bg-white/80 text-slate-700 hover:bg-white px-3 py-2 rounded-xl font-bold text-sm border border-white shadow-sm backdrop-blur-md disabled:opacity-30 flex items-center justify-center active:scale-95 transition-all"><SafeIcon name="ArrowLeft" size={18}/></button>
                     <div className="px-3 sm:px-4 py-2 rounded-xl font-black text-sm border shadow-sm backdrop-blur-md flex items-center bg-white/60 border-white/80 text-slate-800"><SafeIcon name="Clock" size={16} className="mr-1.5 hidden sm:block"/> {Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,'0')}</div>
                     <div className="bg-white/80 text-line-700 px-3 sm:px-4 py-2 rounded-xl font-bold text-sm border border-white shadow-sm backdrop-blur-md">{currentIndex + 1} / {questions.length}</div>
                  </div>
                </div>
                <div className="w-full bg-slate-200/50 h-2 rounded-full overflow-hidden mb-8 shadow-inner border border-white/50">
                  <div className="bg-gradient-to-r from-line-400 to-line-500 h-full transition-all duration-300" style={{ width: `${((currentIndex + 1) / questions.length) * 100}%` }} />
                </div>
                <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-8 drop-shadow-sm leading-relaxed"><span className="text-line-600 mr-2">{currentIndex + 1}.</span>{q.question}</h3>
                <div className="space-y-4">
                  {q.options.map((opt, idx) => {
                    const sel = answers[q.id] === idx;
                    return (<label key={idx} onClick={() => { globalStore.setState(p => ({ quizData: { ...p.quizData, answers: { ...p.quizData.answers, [q.id]: idx } } })); if (currentIndex < questions.length - 1 && !isAns) timerRef.current = setTimeout(() => globalStore.setState(p => ({ quizData: { ...p.quizData, currentIndex: currentIndex + 1 } })), 300); }} className={`flex items-center gap-3 md:gap-4 p-4 md:p-5 rounded-xl md:rounded-2xl border cursor-pointer transition-all duration-300 backdrop-blur-sm ${sel ? 'bg-white/80 border-white shadow-md md:scale-[1.02]' : 'hover:bg-white/60 hover:border-white/80 bg-white/40 border-white/50'}`}><div className={`w-5 h-5 rounded-full flex items-center justify-center border-2 shrink-0 ${sel ? 'border-line-500 bg-white' : 'border-white/80 bg-white/50'}`}>{sel && <div className="w-2.5 h-2.5 bg-line-500 rounded-full shadow-sm" />}</div><span className={`text-sm md:text-base font-medium drop-shadow-sm ${sel ? 'text-line-800 font-bold' : 'text-slate-800'}`}>{opt}</span></label>);
                  })}
                </div>
                {currentIndex === questions.length - 1 && (
                  <div className="mt-8 flex justify-center w-full animate-in fade-in zoom-in duration-500">
                    <GradientButton onClick={actions.submitQuiz} disabled={!isAns} className="w-full md:w-auto px-10 py-4 text-lg border border-white/40"><SafeIcon name="CheckSquare" size={24}/> ยืนยันส่งคำตอบ</GradientButton>
                  </div>
                )}
              </GlassCard>
            </div>
          );
        }

        function QuizResultScreen({ store: { quizData }, actions }) { 
            return (
                <ScreenWrapper title="บันทึกคำตอบเรียบร้อย!" subtitle="ระบบได้บันทึกคะแนนของคุณเข้าสู่ฐานข้อมูลแล้ว" maxWidth="max-w-lg">
                    <div className="bg-white/50 backdrop-blur-xl rounded-3xl p-8 mb-8 mt-4 border border-white/60 shadow-inner">

        }
        
        function QuizFailScreen({ store, actions }) { 
            return (
                <ScreenWrapper title="ผลการทดสอบ" maxWidth="max-w-lg">
                    <div className="text-center mt-4 relative z-10">
