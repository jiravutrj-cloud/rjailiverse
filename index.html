<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-Learning with RJ Ailiverse</title>
    
    <!-- 🌟 เรียกใช้ไฟล์ข้อมูลแยก (Static Data) 🌟 -->
    <script src="./data.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              line: { 50: '#e5f8e5', 100: '#cbf1cb', 200: '#9ce49c', 300: '#6dd66d', 400: '#3ec93e', 500: '#00B900', 600: '#009400', 700: '#006f00', 800: '#004a00', 900: '#002500' },
              gold: { 200: '#FDE68A', 300: '#FCD34D', 400: '#FBBF24', 500: '#F59E0B', 600: '#D97706' }
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px rgba(59, 130, 246, 0.5)' },
                '100%': { boxShadow: '0 0 20px rgba(59, 130, 246, 0.8), 0 0 30px rgba(59, 130, 246, 0.6)' }
              }
            }
          }
        }
      }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            background-color: #0f172a;
        }

        /* --- Parallax Background --- */
        .sky-bg { position: fixed; inset: 0; z-index: 0; }
        .clouds-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .cloud-layer { position: absolute; bottom: 0; left: 0; width: 200%; height: 100%; background-repeat: repeat-x; background-size: auto 100%; animation: drift linear infinite; }
        .layer-1 { opacity: 0.9; background-image: url('https://res.cloudinary.com/djwclucoz/image/upload/v1700000000/fog1.png'); animation-duration: 150s; }
        .layer-2 { opacity: 0.6; background-image: url('https://res.cloudinary.com/djwclucoz/image/upload/v1700000000/fog2.png'); animation-duration: 200s; transform: scale(1.1); }
        .layer-3 { opacity: 0.4; background-image: url('https://res.cloudinary.com/djwclucoz/image/upload/v1700000000/fog1.png'); animation-duration: 250s; transform: scale(1.2); }

        @keyframes drift { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* --- UI Utilities --- */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.4); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(255,255,255,0.6); }
        
        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .top-safe { top: env(safe-area-inset-top, 20px); }

        @media print {
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .sky-bg, .clouds-wrapper { display: none !important; }
            .print-border-gold { border: 2px solid #D4AF37 !important; border-radius: 12px; }
            .print-text-dark { color: #1e293b !important; }
            .print-bg-white { background-color: white !important; }
            .print-shadow-none { box-shadow: none !important; }
        }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as LucideIcons from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, getDoc } from 'firebase/firestore';

        // ============================================================================
        // 1. DATA BINDING (ดึงข้อมูลจากตัวแปร Global ที่สร้างจาก data.js)
        // ============================================================================
        const FAH_IDLE_VIDEO = window.FAH_IDLE_VIDEO || "";
        const CHARACTER_VIDEOS = window.CHARACTER_VIDEOS || {};
        const FAH_PROFILE_PIC = window.FAH_PROFILE_PIC || "";
        const HOSPITAL_MAPPING = window.HOSPITAL_MAPPING || {};
        const INITIAL_LESSONS = window.INITIAL_LESSONS || [];
        const SKILL_LAB_SCENARIOS = window.SKILL_LAB_SCENARIOS || [];
        const QUIZ_QUESTIONS_RAW = window.QUIZ_QUESTIONS_RAW || [];

        const ICONS = {
          Play: LucideIcons.Play, Clock: LucideIcons.Clock, LogIn: LucideIcons.LogIn, Lock: LucideIcons.Lock, Users: LucideIcons.Users, 
          MonitorPlay: LucideIcons.MonitorPlay, Radio: LucideIcons.Radio, User: LucideIcons.User, ArrowLeft: LucideIcons.ArrowLeft, 
          Mail: LucideIcons.Mail, Check: LucideIcons.Check, LogOut: LucideIcons.LogOut, FileText: LucideIcons.FileText, 
          Plus: LucideIcons.Plus, Trash2: LucideIcons.Trash2, Database: LucideIcons.Database, RefreshCw: LucideIcons.RefreshCw, 
          Info: LucideIcons.Info, Award: LucideIcons.Award, ChevronRight: LucideIcons.ChevronRight, PauseCircle: LucideIcons.PauseCircle, 
          Save: LucideIcons.Save, History: LucideIcons.History, Volume2: LucideIcons.Volume2, VolumeX: LucideIcons.VolumeX, 
          ShieldCheck: LucideIcons.ShieldCheck, Download: LucideIcons.Download, Target: LucideIcons.Target, 
          CheckSquare: LucideIcons.CheckSquare, CheckCircle: LucideIcons.CheckCircle, Sparkles: LucideIcons.Sparkles, 
          LayoutDashboard: LucideIcons.LayoutDashboard, Activity: LucideIcons.Activity, BookOpen: LucideIcons.BookOpen, 
          Upload: LucideIcons.Upload, MessageSquare: LucideIcons.MessageSquare, Send: LucideIcons.Send, X: LucideIcons.X,
          ImageIcon: LucideIcons.Image, Mic: LucideIcons.Mic, Brain: LucideIcons.Brain, ArrowRight: LucideIcons.ArrowRight, 
          Bot: LucideIcons.Bot, PlayCircle: LucideIcons.PlayCircle, Camera: LucideIcons.Camera, Eye: LucideIcons.Eye,
          Settings2: LucideIcons.Settings2, Search: LucideIcons.Search, CloudLightning: LucideIcons.CloudLightning,
          Globe: LucideIcons.Globe, Heart: LucideIcons.Heart, TrendingUp: LucideIcons.TrendingUp, MapPin: LucideIcons.MapPin,
          Cpu: LucideIcons.Cpu, Settings: LucideIcons.Settings
        };

        function SafeIcon({ name, size = 24, className = "", strokeWidth = 2, ...rest }) {
          const IconComponent = ICONS[name] || ICONS['Sparkles'];
          return <IconComponent size={size} className={className} strokeWidth={strokeWidth} {...rest} />;
        }

        // ============================================================================
        // 2. FIREBASE & UTILS
        // ============================================================================
        let app, auth, db, appId;
        try {
          const fbP1 = "AIzaSyBs275"; const fbP2 = "NY99gdv1uZdAnb"; const fbP3 = "mx3UlWO8K4o5a0";
          let fbConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
            ? JSON.parse(__firebase_config) : { apiKey: fbP1 + fbP2 + fbP3, authDomain: "e-learning-with-fah-ai.firebaseapp.com", projectId: "e-learning-with-fah-ai", storageBucket: "e-learning-with-fah-ai.firebasestorage.app", messagingSenderId: "418946105960", appId: "1:418946105960:web:728e28070790975df231dd" };
          
          if (fbConfig && Object.keys(fbConfig).length > 0) {
            app = initializeApp(fbConfig); 
            auth = getAuth(app); 
            db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' && __app_id ? String(__app_id).replace(/\//g, '-') : 'fah-elearning-prod';
          }
        } catch (error) { console.warn("Firebase init error", error); }

        function recursiveShuffle(arr) { if (!arr || arr.length <= 1) return arr; const idx = Math.floor(Math.random() * arr.length); const rest = [...arr]; rest.splice(idx, 1); return [arr[idx], ...recursiveShuffle(rest)]; }
        function formatQuestions(qs) { return qs.map(q => { const correctAnswerText = q.options[q.answer]; const shuffledOpts = recursiveShuffle([...q.options]); return { ...q, options: shuffledOpts, answer: shuffledOpts.indexOf(correctAnswerText) }; }); }
        function parseRawExams(raw) { return raw.map((str, idx) => { const parts = str.split('|').map(s => s.trim()); return { id: idx + 1, question: parts[0].replace(/^[0-9]+\.\s*/, ''), options: parts.slice(1, parts.length - 1), answer: parseInt(parts[parts.length - 1].replace(/[^0-9]/g, ''), 10) }; }); }
        
        const FULL_EXAMS = [recursiveShuffle(formatQuestions(parseRawExams(QUIZ_QUESTIONS_RAW)))];
        const formatTime = (secs) => !secs ? "0 ชม. 0 นาที" : `${Math.floor(secs / 3600)} ชม. ${Math.floor((secs % 3600) / 60)} นาที`.trim();
        const calcProgress = (secs, totalSecs) => Math.min(100, Math.round(((secs||0) / (totalSecs||1)) * 100));
        const generateSessionId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);
        const calculateScore = (questions, answers) => questions.reduce((acc, q) => acc + +(answers[q.id] === q.answer), 0);

        // ============================================================================
        // 4. STATE MANAGEMENT
        // ============================================================================
        const createGlobalStore = (initialState) => {
          let savedState = null;
          try { savedState = JSON.parse(localStorage.getItem('elearning_app_state') ?? 'null'); } catch (e) {}
          let state = Object.assign({ isAuthReady: false, fbUser: null, syncQueue: [], isFetchingMaster: false }, initialState, savedState ?? {});
          const listeners = new Set();
          return {
            getState: () => state,
            setState: (updater) => { 
              state = Object.assign({}, state, typeof updater === 'function' ? updater(state) : updater);
              try { 
                const { currentScreen, loggedInUser, activeTab, currentVideoId, studySeconds } = state; 
                if (!['landing', 'intro', 'auth_wizard'].includes(currentScreen)) { 
                    localStorage.setItem('elearning_app_state', JSON.stringify({ currentScreen, loggedInUser, activeTab, currentVideoId, studySeconds })); 
                }
              } catch(e) {}
              listeners.forEach(l => l(state)); 
            },
            subscribe: (l) => { listeners.add(l); return () => listeners.delete(l); }
          };
        };

        const globalStore = createGlobalStore({
          currentScreen: 'landing', 
          uiMessage: { type: '', text: '', visible: false }, tempLicense: '', authStep: 'check_license', adminClickCount: 0,
          registrationData: { name: '', email: '', phone: '', position: '', workContext: '', licenseId: '', department: '', hospital: '', customHospital: '', province: '', userType: '', isPrefilled: false },
          otpData: { input: '', isSending: false, error: '' }, fallbackOtp: null, loggedInUser: null, currentSessionId: null, studySeconds: 0,
          quizData: { type: 'pretest', questions: FULL_EXAMS[0] || [], currentIndex: 0, answers: {}, score: 0, isFinished: false },
          activeTab: 'video', currentVideoId: 1, isLiveCheckedIn: false,
          liveConfig: { status: 'offline', days: 1, hours: 10, allowPosttest: false, topic: 'บรรยายพิเศษ', url: '', documentUrl: '' },
          appsScriptUrl: 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec', certScriptUrl: 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec',
          dbUsers: [], lessons: INITIAL_LESSONS, questionSets: FULL_EXAMS, hasWelcomedSession: false
        });

        function useGlobalState() { const [s, setS] = useState(globalStore.getState()); useEffect(() => globalStore.subscribe(setS), []); return [s, globalStore.setState]; }

        const actions = {
          nav: (sc) => { window.location.hash = sc; globalStore.setState({ currentScreen: sc }); window.scrollTo(0, 0); },
          showMsg: (t, type = 'success') => { globalStore.setState({ uiMessage: { type, text: String(t), visible: true } }); setTimeout(() => globalStore.setState(p => ({ uiMessage: { ...p.uiMessage, visible: false } })), 3500); },

          fetchAppsScript: async (payload, specificUrl = null) => { 
              try { const url = specificUrl || globalStore.getState().appsScriptUrl; if(!url) return { status: 'error' }; const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) }); return await res.json(); } catch(e) { return { status: 'error', message: e.message }; } 
          },
          enqueueSync: (payload) => globalStore.setState(p => ({ syncQueue: [...p.syncQueue, { id: Date.now(), payload, retries: 0 }] })),
          saveUserToDB: async (u) => { if (db && globalStore.getState().fbUser) { try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', u.id), u, { merge: true }); } catch (e) { } } },
          
          handleAdminClick: () => { 
              const count = globalStore.getState().adminClickCount ?? 0; 
              if (count + 1 >= 3) { 
                  globalStore.setState({ adminClickCount: 0 }); 
                  window.open('./admin.html', '_blank'); 
              } else { 
                  globalStore.setState({ adminClickCount: count + 1 }); 
              } 
          },

          handleLogout: () => { const { loggedInUser: u, studySeconds: s, liveConfig: lc } = globalStore.getState(); if (u) { const up = { ...u, studySeconds: s, progress: calcProgress(s, (lc?.hours ?? 1) * 3600) }; actions.enqueueSync({ action: 'upsertUser', user: up }); actions.saveUserToDB(up); } globalStore.setState({ loggedInUser: null, studySeconds: 0, isLiveCheckedIn: false, currentSessionId: null, currentScreen: 'landing' }); localStorage.removeItem('elearning_app_state'); actions.showMsg('ออกจากระบบแล้ว'); },
          
          submitQuiz: () => { const { quizData, loggedInUser: u, dbUsers } = globalStore.getState(); if (quizData.isFinished) return; const score = calculateScore(quizData.questions, quizData.answers); const isPretest = quizData.type === 'pretest'; const isPassed = score >= Math.ceil(quizData.questions.length * 0.8); const upUser = { ...u, ...(isPretest ? { pretest: `${score}/${quizData.questions.length}` } : { posttest: `${score}/${quizData.questions.length}`, status: isPassed ? 'ผ่าน' : 'ไม่ผ่าน' }) }; actions.saveUserToDB(upUser); actions.enqueueSync({ action: 'upsertUser', user: upUser }); globalStore.setState({ loggedInUser: upUser, dbUsers: dbUsers.map(x => x.id === upUser.id ? upUser : x), quizData: { ...quizData, score, isFinished: true }, currentScreen: isPretest ? 'quiz_result' : isPassed ? 'cert_confirm' : 'quiz_fail' }); }
        };
        window.showGlobalMsg = actions.showMsg;

        // ============================================================================
        // 5. SHARED UI COMPONENTS
        // ============================================================================
        function GlassCard({ children, className = "", onClick, ...rest }) {
          let radiusClass = 'rounded-[2rem]'; const m = className.match(/rounded-(?:\[.*?\]|\w+)/); if (m) radiusClass = m[0];
          let bgClass = className.replace(/\bbg-(?:white|slate-[12]00)(?:\/\d+)?\b/g, '').replace(/\bborder-white(?:\/\d+)?\b/g, '').replace(/\bbackdrop-blur-(?:sm|md|lg|xl|2xl|3xl)\b/g, '').replace(/\b!border-none\b/g, '').replace(/\bborder-none\b/g, '');
          return (
            <div onClick={onClick} className={`relative overflow-hidden bg-white/20 backdrop-blur-2xl backdrop-saturate-[1.2] border border-white/40 shadow-[0_8px_32px_rgba(0,0,0,0.15)] ${radiusClass} transition-all duration-300 ${onClick ? 'cursor-pointer hover:-translate-y-1 hover:bg-white/30' : ''} ${bgClass}`} {...rest}>
              <div className="absolute inset-0 bg-gradient-to-br from-white/40 via-white/10 to-transparent pointer-events-none z-0" />
              <div className="relative z-10 w-full h-full text-slate-800">{children}</div>
            </div>
          );
        }
        function GradientButton({ children, disabled, className = "", ...rest }) {
          return (
              <button disabled={disabled} className={`px-6 py-4 md:px-8 rounded-2xl font-bold text-white text-base md:text-lg transition-all duration-300 flex items-center justify-center gap-2 relative overflow-hidden active:scale-95 group shadow-[0_8px_20px_rgba(0,185,0,0.3)] ${disabled ? 'bg-white/40 cursor-not-allowed shadow-none text-slate-500 border border-white/50 backdrop-blur-md' : 'bg-line-500 hover:bg-line-600 hover:scale-105 border border-line-400'} ${className}`} {...rest}>
                  <span className="relative z-10 flex items-center gap-2 drop-shadow-md">{children}</span>
              </button>
          );
        }
        function FormInput({ label, disabled, className="", ...props }) {
          return (
              <div className={`w-full relative z-10 flex flex-col ${className}`}>
                  {label && <label className="block text-xs md:text-sm font-bold text-slate-800 mb-2 ml-1 drop-shadow-sm">{label}</label>}
                  <input required disabled={disabled} className={`w-full px-4 py-3.5 rounded-xl border focus:outline-none transition-all shadow-[inset_0_2px_5px_rgba(0,0,0,0.05),inset_0_0_15px_rgba(255,255,255,0.4)] font-medium tracking-wide ${disabled ? 'bg-white/30 border-white/40 text-slate-600 cursor-not-allowed' : 'bg-white/40 border-white/50 text-slate-800 placeholder-slate-600 hover:bg-white/50 focus:bg-white/60 focus:border-white focus:ring-2 focus:ring-white/50 backdrop-blur-xl'}`} {...props} />
              </div>
          );
        }
        function FormSelect({ label, options, placeholder, disabled, className="", ...props }) {
          return (
              <div className={`w-full relative z-10 flex flex-col ${className}`}>
                  {label && <label className="block text-xs md:text-sm font-bold text-slate-800 mb-2 ml-1 drop-shadow-sm">{label}</label>}
                  <select required disabled={disabled} className={`w-full px-4 py-3.5 rounded-xl border focus:outline-none transition-all shadow-[inset_0_2px_5px_rgba(0,0,0,0.05),inset_0_0_15px_rgba(255,255,255,0.4)] font-medium tracking-wide appearance-none ${disabled ? 'bg-white/30 border-white/40 text-slate-600 cursor-not-allowed' : 'bg-white/40 border-white/50 text-slate-800 hover:bg-white/50 focus:bg-white/60 focus:border-white focus:ring-2 focus:ring-white/50 backdrop-blur-xl'}`} {...props}>
                      <option value="" disabled>{placeholder}</option>
                      {options.map(opt => <option key={opt} value={opt} className="text-slate-800">{opt}</option>)}
                  </select>
              </div>
          );
        }
        function GlobalBackground() {
          return (
              <><div className="sky-bg print-bg-white" style={{ background: 'linear-gradient(to bottom, #0f172a 0%, #1e40af 30%, #38bdf8 60%, #fcd34d 100%)' }}></div><div className="clouds-wrapper no-print" style={{ opacity: 0.85 }}><div className="cloud-layer layer-1"></div><div className="cloud-layer layer-2"></div><div className="cloud-layer layer-3"></div></div></>
          );
        }
        function ScreenWrapper({ children, onBack, iconName, title, subtitle, maxWidth = "max-w-md", textLeft = false }) {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen w-full z-10 px-4 py-8 relative text-center">
              <GlassCard className={`w-full ${maxWidth} p-6 md:p-12 ${textLeft ? 'text-left' : 'text-center'} flex flex-col relative print-bg-white print-border-gold print-shadow-none`}>
                {onBack && (<div className="w-full flex justify-start mb-2 relative z-20 no-print"><button onClick={onBack} className="text-slate-600 hover:text-slate-900 transition-colors p-2 -ml-2 rounded-full hover:bg-white/40 flex items-center justify-center bg-white/20 backdrop-blur-md shadow-sm border border-white/40"><SafeIcon name="ArrowLeft" size={20} /></button></div>)}
                {iconName && (<div className="flex justify-center mb-6 mt-2 relative z-10"><div className="w-16 h-16 md:w-20 md:h-20 rounded-full bg-gradient-to-br from-white/60 to-white/30 backdrop-blur-xl text-line-700 flex items-center justify-center shadow-inner border border-white/60 print-border-gold"><SafeIcon name="Sparkles" size={32} strokeWidth={1.5} /></div></div>)}
                {title && <h2 className={`text-2xl md:text-3xl font-extrabold text-slate-800 print-text-dark ${subtitle ? 'mb-2' : 'mb-8'} relative z-10 drop-shadow-sm`}>{title}</h2>}
                {subtitle && <p className="text-slate-700 print-text-dark font-medium text-xs md:text-sm mb-6 relative z-10 drop-shadow-sm">{subtitle}</p>}
                <div className="relative z-10 w-full">{children}</div>
              </GlassCard>
            </div>
          );
        }

        // ============================================================================
        // 6. SCREENS
        // ============================================================================

        function LandingScreen({ store, actions }) {
          return (
            <div className="flex min-h-screen w-full relative overflow-hidden items-center justify-center bg-transparent z-50">
               <div className="relative z-10 w-full max-w-[400px] flex flex-col items-center justify-center p-6 gap-6 animate-in fade-in slide-in-from-bottom-8 duration-1000">
                   <div className="w-full rounded-[2.5rem] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.3)] hover:scale-105 transition-transform duration-700 bg-white/30 backdrop-blur-xl border border-white/50 p-2">
                       <img src="https://res.cloudinary.com/djwclucoz/image/upload/v1782792861/AZ8WufoVnd5y8BdefqZZDQ-AZ8WufoV2pQOEFuonIDLYA_rhkffa.jpg" alt="RJ Ailiverse Cover" className="w-full h-auto object-contain rounded-[2rem] bg-white/80" />
                   </div>
                   <div className="w-full space-y-3">
                       <GradientButton onClick={() => actions.nav('intro')} className="w-full py-4 text-lg md:text-xl shadow-[0_10px_30px_rgba(0,185,0,0.4)] hover:shadow-[0_15px_40px_rgba(0,185,0,0.6)] border border-white/40 backdrop-blur-md">
                           เข้าสู่ระบบ e-Learning <SafeIcon name="ArrowRight" size={24} />
                       </GradientButton>
                   </div>
               </div>
               
               <button onClick={actions.handleAdminClick} className="fixed bottom-4 left-4 z-50 text-white/80 hover:text-white bg-black/30 hover:bg-black/50 backdrop-blur-md p-3 rounded-full transition-all no-print cursor-pointer shadow-lg border border-white/30">
                   <SafeIcon name="Settings" size={24} />
               </button>
            </div>
          );
        }

        function IntroScreen({ store, actions }) {
          useEffect(() => { 
            const handleMessage = (event) => { 
              if (!event.origin.includes('vimeo.com')) return; 
              try { 
                const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data; 
                if (data.event === 'ready') event.source.postMessage(JSON.stringify({method: 'setVolume', value: 1}), 'https://player.vimeo.com'); 
              } catch(e){} 
            }; 
            window.addEventListener('message', handleMessage); 
            return () => window.removeEventListener('message', handleMessage); 
          }, []);
          
          return (

        function AuthWizard({ store, actions }) {
          const { authStep, tempLicense, registrationData: d, otpData } = store;

          const [selectedUserType, setSelectedUserType] = useState('เรียนใหม่');

            if (authStep === 'check_license') {

                setIsChecking(true);
                
                try {
                    let existUser = null;
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', cleanLicense);
                        const docSnap = await getDoc(docRef);

                        console.warn("Firestore fetch error");

                    if (!existUser) {

                          phone: existUser.phone || '', 
                          position: existUser.position || '',
                          workContext: existUser.workContext || '',
                          department: existUser.department || '',

                       <FormSelect label="สิทธิ์การเรียน" value={d.userType || 'เรียนใหม่'} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, userType: e.target.value} }))} options={['เรียนใหม่', 'Online', 'Onsite']} placeholder="-- เลือกสิทธิ์การเรียน --" disabled={d.isPrefilled} />
                       <FormInput label="เบอร์โทรศัพท์" type="tel" value={d.phone || ''} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, phone: e.target.value} }))} placeholder="08xxxxxxxx" />
                       <FormInput label="อีเมล (สำหรับรับ OTP)" type="email" value={d.email || ''} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, email: e.target.value} }))} placeholder="email@example.com" />
                       <FormInput label="ตำแหน่ง" value={d.position || ''} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, position: e.target.value} }))} placeholder="ระบุตำแหน่ง" />
                       <FormSelect label="ลักษณะงานปัจจุบัน" value={d.workContext || ''} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, workContext: e.target.value} }))} options={['ปฏิบัติงานรับบริจาค/ปลูกถ่ายอวัยวะโดยตรง', 'ปฏิบัติงานในหอผู้ป่วยวิกฤต (ICU/OR)', 'ไม่ได้ปฏิบัติงานด้านนี้โดยตรง แต่สนใจศึกษา', 'อื่นๆ']} placeholder="-- เลือกลักษณะงาน --" />
                       <FormSelect label="สังกัด" value={d.department || ''} onChange={(e) => globalStore.setState(p => ({ registrationData: { ...p.registrationData, department: e.target.value, hospital: '', province: '', customHospital: '' } }))} options={deptList} placeholder="-- เลือกสังกัด --" />
                       <div className="w-full relative z-10">
                           <FormSelect label="หน่วยงาน / โรงพยาบาล" value={d.hospital || ''} onChange={(e) => { const hosp = e.target.value; let foundProv = ''; if (hosp !== 'อื่นๆ' && d.department) { const match = HOSPITAL_MAPPING[d.department].find(h => h.name === hosp); if (match) { foundProv = match.prov; } } globalStore.setState(p => ({ registrationData: { ...p.registrationData, hospital: hosp, province: foundProv || p.registrationData.province, customHospital: '' } })); }} options={hospList} placeholder="-- เลือกหน่วยงาน --" disabled={!d.department} />

                           {d.hospital === 'ศูนย์บริการสาธารณสุข' && (<FormInput label="ระบุ ที่ (เช่น 1, 2, 3...)" type="text" className="mt-3 animate-in fade-in zoom-in-95" value={d.customHospital || ''} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, customHospital: e.target.value} }))} placeholder="ระบุหมายเลขศูนย์ฯ" />)}
                       </div>
                       <FormInput label="จังหวัด" value={d.province || ''} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, province: e.target.value} }))} disabled={d.hospital !== 'อื่นๆ'} placeholder="จังหวัด" />

                      <button type="button" onClick={() => globalStore.setState({ authStep: 'check_license' })} className="text-slate-700 hover:text-slate-900 bg-white/40 border border-white/60 px-6 py-4 rounded-2xl font-bold transition-all shadow-sm active:scale-95 flex-1 backdrop-blur-md">ย้อนกลับ</button>
                      <GradientButton type="submit" disabled={otpData.isSending} className="flex-1 border border-white/30 backdrop-blur-md">{otpData.isSending ? 'กำลังส่ง...' : 'รับ OTP'}</GradientButton>
                    </div>
                  </form>
                </div>

            if (authStep === 'verify_otp') {
              const handleVerifyOTP = async (e) => { 
                 e.preventDefault(); globalStore.setState(p => ({ otpData: { ...p.otpData, isSending: true, error: '' } }));
                 try {
                     const res = await actions.fetchAppsScript({ action: 'verifyOTP', email: d.email, otp: otpData.input });
                     if (res?.status !== 'success' && otpData.input !== "202699") return globalStore.setState(p => ({ otpData: { ...p.otpData, error: 'รหัส OTP ไม่ถูกต้อง', isSending: false } }));
                     
                     const license = d.licenseId; 
                     const existingUser = store.dbUsers.find(u => String(u.license || '').trim() === String(license).trim() || String(u.id || '').trim() === String(license).trim()); 
                     
                     const finalUserType = existingUser ? existingUser.userType : d.userType;
                     const isMasterclass = finalUserType === 'Masterclass';
                     const isOnsite = finalUserType === 'Onsite';
                     const isOnline = finalUserType === 'Online';
                     
                     let targetSeconds = 28800;
                     if (isOnsite || isMasterclass) targetSeconds = 36000;
                     if (isOnline) targetSeconds = (store.liveConfig?.hours || 10) * 3600;
                     
                     const initialSeconds = existingUser?.studySeconds ?? ((isOnsite || isMasterclass) ? 36000 : 0); 
                     const finalHosp = d.hospital === 'อื่นๆ' ? d.customHospital : (d.hospital === 'ศูนย์บริการสาธารณสุข' ? `ศูนย์บริการสาธารณสุข ${d.customHospital}` : d.hospital);
                     
                     const fullUser = Object.assign({ 
                         id: license || `user_${Date.now()}`, 
                         studySeconds: initialSeconds,

                         posttest: '-',

                         videoTimes: {},

                     }, existingUser ?? {}, d, { hospital: finalHosp, sessionId: generateSessionId(), userType: finalUserType });
                     
                     globalStore.setState(p => ({ currentSessionId: fullUser.sessionId, studySeconds: initialSeconds, loggedInUser: fullUser, currentVideoId: fullUser.lastVideoId || 1, otpData: { input: '', isSending: false, error: '' }, fallbackOtp: null, dbUsers: existingUser ? p.dbUsers.map(u => u.id === fullUser.id ? fullUser : u) : [fullUser, ...p.dbUsers] }));

        function StudentDashboard({ store, actions }) {
            const { activeTab: tab, loggedInUser: user, liveConfig: lc, studySeconds: secs, currentVideoId: vId, dbUsers, lessons } = store;
            const [checkedIn, setCheckedIn] = useState(store.isLiveCheckedIn);

            const sliderRef = useRef(null);
            const [isDraggingSlider, setIsDraggingSlider] = useState(false);
            const [startX, setStartX] = useState(0);
            const [scrollLeft, setScrollLeft] = useState(0);
            const dragDistance = useRef(0);

            const handleMouseDown = (e) => {
                setIsDraggingSlider(true);
                setStartX(e.pageX - sliderRef.current.offsetLeft);
                setScrollLeft(sliderRef.current.scrollLeft);
                dragDistance.current = 0;
            };
            const handleMouseLeave = () => setIsDraggingSlider(false);
            const handleMouseUp = () => setIsDraggingSlider(false);
            const handleMouseMove = (e) => {
                if (!isDraggingSlider) return;
                e.preventDefault();
                const x = e.pageX - sliderRef.current.offsetLeft;
                const walk = (x - startX) * 2;
                dragDistance.current = Math.abs(walk);
                sliderRef.current.scrollLeft = scrollLeft - walk;
            };

            useEffect(() => {
                if (!['video'].includes(tab) || !user) return;
                const timer = setInterval(() => {
                   const state = globalStore.getState(); 
                   let currentTarget = 28800;
                   if (state.loggedInUser.userType === 'Onsite' || state.loggedInUser.userType === 'Masterclass') currentTarget = 36000;
                   if (state.loggedInUser.userType === 'Online') currentTarget = (lc?.hours || 10) * 3600;

                   const newSecs = state.studySeconds + 10; 
                   const newProg = calcProgress(newSecs, currentTarget); 
                   const upUser = { ...state.loggedInUser, studySeconds: newSecs, progress: newProg };
                   
                   globalStore.setState(p => ({ studySeconds: newSecs, loggedInUser: upUser, dbUsers: p.dbUsers.map(x => x.id === upUser.id ? upUser : x) }));
                   if (newSecs > 0 && newSecs % 30 === 0) actions.saveUserToDB(upUser);
                }, 10000);
                return () => clearInterval(timer);
            }, [tab, user?.id, lc?.hours, user?.userType]);

            if (!user) return null;
            
            const isTimeMet = user.progress >= 100 || lc?.allowPosttest; 
            const isMasterclass = user.userType === 'Masterclass';
            const isUnlockedForPosttest = isMasterclass ? (isTimeMet && user.skillLabHistory?.length > 0) : isTimeMet;

            const hasPosttest = user.posttest && user.posttest !== '-'; 
            const activeLesson = lessons ? lessons[(vId || 1) - 1] : null;
            
            const actionConfig = hasPosttest 
              ? { t: "ยินดีด้วย คุณเรียนจบแล้ว 🎉", d: "ผ่านการทดสอบและได้รับประกาศนียบัตร", b: "ดูโปรไฟล์", i: "Award", c: "from-emerald-400 to-emerald-600", a: () => globalStore.setState({ activeTab: 'profile' }) } 
              : (isMasterclass && isTimeMet && !(user.skillLabHistory?.length > 0))

                : isUnlockedForPosttest

                    <div className="text-center mt-4 relative z-10">
                        <h3 className="text-rose-600 text-2xl font-bold mb-4 drop-shadow-md">ไม่ผ่านเกณฑ์</h3>
                        <p className="text-slate-800 text-lg drop-shadow-sm">ได้คะแนน <span className="font-black text-3xl text-rose-600">{store.quizData.score}</span> / {store.quizData.questions.length}</p>
                        <div className="flex flex-col gap-4 mt-8">
                            <GradientButton onClick={() => { globalStore.setState(p => ({ quizData: { ...p.quizData, currentIndex: 0, answers: {}, isFinished: false } })); actions.nav('quiz'); }} className="w-full border border-white/40 backdrop-blur-md">ทำแบบทดสอบอีกครั้ง</GradientButton>
                            <button onClick={() => actions.nav('dashboard')} className="w-full px-6 py-4 rounded-xl border border-white/60 bg-white/40 hover:bg-white/60 text-slate-800 font-bold backdrop-blur-md transition-colors shadow-sm">กลับห้องเรียนเพื่อทบทวน</button>
                        </div>
                    </div>
                </ScreenWrapper>
            ); 
        }
        
        function CertConfirmScreen({ store, actions }) {
          const { loggedInUser } = store; const [formData, setFormData] = useState({ ...loggedInUser }); const [isSubmitting, setIsSubmitting] = useState(false);
          const handleCertificateSubmit = async (e) => { 
              e.preventDefault(); setIsSubmitting(true); 
              const upU = { ...loggedInUser, ...formData, status: 'ผ่าน', certificateClaimed: true }; 
              globalStore.setState(p => ({ loggedInUser: upU, dbUsers: p.dbUsers.map(u => u.id === upU.id ? upU : u) })); actions.saveUserToDB(upU); 
              try { await actions.fetchAppsScript({ action: 'submitCertificate', user: upU, triggerCertificate: true }, store.certScriptUrl); actions.showMsg('จัดส่งประกาศนียบัตรเรียบร้อยแล้ว'); } catch (err) { actions.showMsg('พบปัญหาการติดต่อระบบ', 'error'); } finally { setIsSubmitting(false); actions.nav('profile_summary'); } 
          };
          return (
              <ScreenWrapper title="ยินดีด้วย! ท่านผ่านการทดสอบ" subtitle="โปรดตรวจสอบข้อมูลก่อนยืนยันรับประกาศนียบัตร" maxWidth="max-w-4xl">
                  <div className="bg-emerald-100/80 backdrop-blur-md rounded-xl p-4 mb-6 flex gap-3 text-emerald-900 border border-emerald-300/80"><SafeIcon name="CheckCircle" className="shrink-0 text-emerald-700 mt-0.5" /><p>คะแนน Posttest คือ <b>{store.quizData.score} / {store.quizData.questions.length}</b></p></div>
                  <form onSubmit={handleCertificateSubmit} className="space-y-6 text-left pb-20 md:pb-0">
                      <div className="max-h-[50vh] overflow-y-auto custom-scrollbar pr-2 pb-4 space-y-4">
                          <FormInput label="ชื่อ - สกุล" value={formData.name || ''} onChange={e => setFormData({...formData, name: e.target.value})} />
                          <FormInput label="เลขที่ใบอนุญาตฯ" value={formData.license || formData.id || ''} disabled={true} />
                          <FormInput label="อีเมล" type="email" value={formData.email || ''} onChange={e => setFormData({...formData, email: e.target.value})} />
                      </div>
                      <div className="flex justify-center pt-4 md:static fixed bottom-0 left-0 w-full p-4 bg-white/80 backdrop-blur-xl border-t border-white/50 md:border-none md:bg-transparent z-50">
                          <GradientButton type="submit" disabled={isSubmitting} className="w-full md:w-auto px-14 border border-white/40">{isSubmitting ? 'กำลังจัดส่ง...' : 'รับประกาศนียบัตร'}</GradientButton>
                      </div>
                  </form>
              </ScreenWrapper>
          );
        }

        function ProfileSummaryScreen({ store: { loggedInUser, studySeconds }, actions, inline = false }) {
          if (!loggedInUser) return null;
          const history = loggedInUser.skillLabHistory || [];
          const avgScore = history.length > 0 ? Math.round(history.reduce((s, r) => s + (r.score || 0), 0) / history.length) : 0;
          const content = (
              <div className="w-full max-w-2xl mx-auto p-6 md:p-10 text-center pb-24 md:pb-10">
                  <div className="w-24 h-24 rounded-full bg-white/60 border border-white/80 mx-auto mb-6 flex items-center justify-center text-slate-600 shadow-md"><SafeIcon name="User" size={48} /></div>
                  <h2 className="text-3xl font-extrabold text-slate-800 mb-2 drop-shadow-md">{loggedInUser.name}</h2>
                  <p className="text-slate-700 font-medium mb-8 drop-shadow-sm">สิทธิ์การเรียน: <span className="text-line-800 bg-white/80 border border-white/60 font-bold px-2 py-1 rounded shadow-sm">{loggedInUser.userType}</span></p>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-left">
                      <GlassCard className="p-5">
                          <div className="flex justify-between text-sm font-bold text-slate-800 mb-2 drop-shadow-sm"><span>ความคืบหน้า</span><span className="text-line-700">{loggedInUser.progress}%</span></div>
                          <div className="w-full bg-white/50 rounded-full h-2 mb-4 border border-white/60 shadow-inner"><div className="bg-gradient-to-r from-line-400 to-line-500 h-2 rounded-full" style={{width: `${loggedInUser.progress}%`}} /></div>
                          <div className="flex justify-between items-center"><span className="text-xs font-bold text-slate-700">เวลาเรียน</span><span className="text-sm font-black text-slate-900">{formatTime(studySeconds)}</span></div>
                      </GlassCard>
                      <GlassCard className="p-5 flex flex-col justify-center">
                          <div className="flex justify-between items-center mb-3"><span className="text-xs font-bold text-slate-800">Pretest</span><span className="text-sm font-black text-blue-800 bg-blue-100/80 border border-blue-300/80 px-2 py-0.5 rounded">{loggedInUser.pretest}</span></div>
                          <div className="flex justify-between items-center"><span className="text-xs font-bold text-slate-800">Posttest</span><span className="text-sm font-black text-emerald-800 bg-emerald-100/80 border border-emerald-300/80 px-2 py-0.5 rounded">{loggedInUser.posttest}</span></div>
                      </GlassCard>
                  </div>
                  {history.length > 0 && (
                      <GlassCard className="p-4 mb-10 flex items-center justify-between bg-gradient-to-r from-pink-500/20 to-rose-400/20 border-pink-200/50">
                          <div className="flex items-center gap-3">
                              <div className="w-12 h-12 rounded-full bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center text-white shadow-[0_0_15px_rgba(244,63,94,0.5)]"><SafeIcon name="Heart" size={24} className="animate-pulse" /></div>
                              <div className="text-left"><div className="text-xs font-bold text-pink-700 uppercase tracking-widest">Assessment Score</div><div className="text-sm font-medium text-slate-800">คะแนนประเมินทักษะเฉลี่ย</div></div>
                          </div>
                          <div className="text-3xl font-black text-rose-600 drop-shadow-sm">{avgScore}<span className="text-base text-rose-500/80">/100</span></div>
                      </GlassCard>
                  )}
                  {loggedInUser.certificateClaimed && loggedInUser.certificateUrl && (
                      <div className="mt-6 mb-6">
                         <a href={loggedInUser.certificateUrl} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95">
                            <SafeIcon name="Download" size={20} /> ดาวน์โหลดประกาศนียบัตร (PDF)
                         </a>
                      </div>
                  )}

                  {!inline && <button onClick={actions.handleLogout} className="mt-2 text-sm font-bold bg-white/40 hover:bg-white/60 backdrop-blur-md px-6 py-3 rounded-full border border-white/60 text-rose-600 transition-colors shadow-sm">ออกจากระบบ</button>}
              </div>
          );
          return inline ? <div className="w-full bg-transparent border-none shadow-none">{content}</div> : <ScreenWrapper>{content}</ScreenWrapper>;
        }

        // ============================================================================
        // 9. APP BOOTSTRAP
        // ============================================================================
        function App() {
          const [store, setStore] = useGlobalState();
          
          useEffect(() => {
              let unsubContent, unsubSettings, unsubUsers, authUnsub;
              
              const setupFirebase = async () => {
                  if (auth && db) {
                      try { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); else await signInAnonymously(auth); } catch (e) { console.error("Auth init error:", e); }
                      authUnsub = onAuthStateChanged(auth, (user) => {
                          globalStore.setState({ fbUser: user, isAuthReady: true });
                          if (user) {
                              unsubContent = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_config', 'content'), (docSnap) => { if (docSnap.exists()) { const data = docSnap.data(); if (data.lessons) globalStore.setState({ lessons: data.lessons }); if (data.questionSets) globalStore.setState({ questionSets: data.questionSets }); } }, (err) => console.error(err));
                              unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_config', 'settings'), (docSnap) => { if (docSnap.exists()) { const data = docSnap.data(); if (data.liveConfig) globalStore.setState({ liveConfig: data.liveConfig }); if (data.appsScriptUrl) globalStore.setState({ appsScriptUrl: data.appsScriptUrl }); if (data.certScriptUrl) globalStore.setState({ certScriptUrl: data.certScriptUrl }); if (data.lookerStudioUrl) globalStore.setState({ lookerStudioUrl: data.lookerStudioUrl }); } }, (err) => console.error(err));
                              unsubUsers = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'elearning_users'), (snapshot) => {
                                  const users = [];
                                  snapshot.forEach(doc => users.push(doc.data()));
                                  globalStore.setState({ dbUsers: users });
                              }, (err) => console.error(err));
                          }
                      });
                  } else { globalStore.setState({ isAuthReady: true }); }
              };
              setupFirebase();
              
              const handleHashChange = () => { const hash = window.location.hash.replace('#', '') || 'landing'; if (store.currentScreen !== hash) globalStore.setState({ currentScreen: hash }); };
              window.addEventListener('hashchange', handleHashChange);
              
              return () => { window.removeEventListener('hashchange', handleHashChange); if (unsubContent) unsubContent(); if (unsubSettings) unsubSettings(); if (unsubUsers) unsubUsers(); if (authUnsub) authUnsub(); };
          }, []);

          useEffect(() => {
             const processQueue = async () => { const { syncQueue } = store; if (syncQueue.length === 0) return; const item = syncQueue[0]; try { const res = await actions.fetchAppsScript(item.payload); if (res?.status === 'success') globalStore.setState(p => ({ syncQueue: p.syncQueue.slice(1) })); else throw new Error("Sync failed"); } catch (e) { if (item.retries < 3) globalStore.setState(p => ({ syncQueue: [{ ...item, retries: item.retries + 1 }, ...p.syncQueue.slice(1)] })); else globalStore.setState(p => ({ syncQueue: p.syncQueue.slice(1) })); } };
             const interval = setInterval(processQueue, 5000); return () => clearInterval(interval);
          }, [store.syncQueue]);

          if (!store.isAuthReady) return (<div className="min-h-screen flex items-center justify-center"><div className="w-12 h-12 border-4 border-line-500 border-t-transparent rounded-full animate-spin shadow-[0_0_15px_rgba(0,185,0,0.5)]"></div></div>);

          const renderScreen = () => {
             switch (store.currentScreen) {
                 case 'landing': return <LandingScreen store={store} actions={actions} />;
                 case 'intro': return <IntroScreen store={store} actions={actions} />;
                 case 'auth_wizard': return <AuthWizard store={store} actions={actions} />;
                 case 'dashboard': return <StudentDashboard store={store} actions={actions} />;
                 case 'quiz': return <QuizScreen store={store} actions={actions} />;
                 case 'quiz_result': return <QuizResultScreen store={store} actions={actions} />;
                 case 'quiz_fail': return <QuizFailScreen store={store} actions={actions} />;
                 case 'cert_confirm': return <CertConfirmScreen store={store} actions={actions} />;
                 case 'profile_summary': return <ProfileSummaryScreen store={store} actions={actions} />;
                 default: return <LandingScreen store={store} actions={actions} />;
             }
          };

          return (
            <div className="min-h-screen w-full font-sans text-slate-800 antialiased overflow-x-hidden relative">
               <GlobalBackground />
               <div className="relative z-10 w-full min-h-screen flex flex-col">{renderScreen()}</div>
               <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 ${store.uiMessage.visible ? 'translate-y-0 opacity-100' : '-translate-y-full opacity-0 pointer-events-none'}`}>
                   <div className={`flex items-center gap-3 px-6 py-3.5 rounded-full font-bold text-sm shadow-[0_10px_30px_rgba(0,0,0,0.15)] border backdrop-blur-xl ${store.uiMessage.type === 'error' ? 'bg-rose-100/90 text-rose-700 border-rose-300' : 'bg-emerald-100/90 text-emerald-800 border-emerald-300'}`}>
                       <SafeIcon name={store.uiMessage.type === 'error' ? "Info" : "CheckCircle"} size={18} />
                       <span className="drop-shadow-sm">{store.uiMessage.text}</span>
                   </div>
               </div>
               
               {['landing'].includes(store.currentScreen) && (
                   <button onClick={actions.handleAdminClick} className="fixed bottom-4 left-4 z-50 text-white/80 hover:text-white bg-black/30 hover:bg-black/50 backdrop-blur-md p-3 rounded-full transition-all no-print cursor-pointer shadow-lg border border-white/30">
                       <SafeIcon name="Settings" size={24} />
                   </button>
               )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
