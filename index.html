<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-Learning - RJ Ailiverse</title>
    
    <script src="./data.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; margin: 0; overflow-x: hidden; background-color: #0f172a; color: white; }
        
        /* Background & Clouds (Shared with Skill Lab) */
        .sky-bg { position: fixed; inset: 0; z-index: 0; background: linear-gradient(to bottom, #0f172a 0%, #1e40af 30%, #38bdf8 60%, #fcd34d 100%); }
        .clouds-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; opacity: 0.85; }
        .cloud-layer { position: absolute; bottom: 0; left: 0; width: 200%; height: 100%; background-repeat: repeat-x; background-size: auto 100%; animation: drift linear infinite; }
        .layer-1 { opacity: 0.9; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png'); animation-duration: 150s; }
        .layer-2 { opacity: 0.6; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog2.png'); animation-duration: 200s; transform: scale(1.1); }
        .layer-3 { opacity: 0.4; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png'); animation-duration: 250s; transform: scale(1.2); }
        @keyframes drift { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); border-radius: 1.5rem; }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as LucideIcons from 'lucide-react';
        import { initializeApp, getApps, getApp } from 'firebase/app';
        import { getAuth, signInAnonymously } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc } from 'firebase/firestore';

        const { User, Mail, ShieldCheck, LogOut, ArrowRight, BookOpen, CheckCircle2, PlayCircle, Download, Award, Loader2, Pencil, X, Save } = LucideIcons;

        // ==========================================
        // FIREBASE SETUP
        // ==========================================
        let app, auth, db, appId = 'fah-elearning-prod';
        try {
          const fbP1 = "AIzaSyBs275"; const fbP2 = "NY99gdv1uZdAnb"; const fbP3 = "mx3UlWO8K4o5a0";
          let fbConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
            ? JSON.parse(__firebase_config) : { apiKey: fbP1 + fbP2 + fbP3, authDomain: "e-learning-with-fah-ai.firebaseapp.com", projectId: "e-learning-with-fah-ai", storageBucket: "e-learning-with-fah-ai.firebasestorage.app", messagingSenderId: "418946105960", appId: "1:418946105960:web:728e28070790975df231dd" };
          app = getApps().length === 0 ? initializeApp(fbConfig) : getApp();
          auth = getAuth(app); db = getFirestore(app);
          appId = typeof __app_id !== 'undefined' && __app_id ? String(__app_id).replace(/\//g, '-') : 'fah-elearning-prod';
        } catch (error) { console.warn("Firebase init error", error); }

        const appsScriptUrl = 'https://script.google.com/macros/s/AKfycbwt9H-GVs2aijX_sgzjlpGP9314ereuA9ZECNs4Uc00VLz5rFcJm7aYmkduEMiFVKjA/exec';

        // ==========================================
        // MAIN APP COMPONENT
        // ==========================================
        function MainApp() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            
            // Login States
            const [email, setEmail] = useState('');
            const [name, setName] = useState('');
            const [otp, setOtp] = useState('');
            const [step, setStep] = useState('email'); // email -> otp
            const [isSubmitting, setIsSubmitting] = useState(false);
            
            // Edit Profile States
            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState({ name: '', hospital: '', department: '', province: '' });
            
            // Cert State
            const [isGeneratingCert, setIsGeneratingCert] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('elearning_app_state');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.loggedInUser) {
                        setUser(parsed.loggedInUser);
                        signInAnonymously(auth).catch(e => console.warn("Auth error", e));
                    }
                }
                setLoading(false);
            }, []);

            const updateLocalStorage = (userData) => {
                const lState = JSON.parse(localStorage.getItem('elearning_app_state') || '{}');
                lState.loggedInUser = userData;
                localStorage.setItem('elearning_app_state', JSON.stringify(lState));
            };

            const handleRequestOTP = async (e) => {
                e.preventDefault();
                if (!email || !name) return alert("กรุณากรอกอีเมลและชื่อ-นามสกุลให้ครบถ้วน");
                setIsSubmitting(true);
                try {
                    const res = await fetch(appsScriptUrl, { method: 'POST', body: JSON.stringify({ action: 'requestOTP', email, name }) }).then(r => r.json());
                    if (res.status === 'success') setStep('otp');
                    else alert(res.message);
                } catch(err) { alert("เกิดข้อผิดพลาดในการส่ง OTP"); }
                setIsSubmitting(false);
            };

            const handleVerifyOTP = async (e) => {
                e.preventDefault();
                if (!otp) return alert("กรุณากรอกรหัส OTP");
                setIsSubmitting(true);
                try {
                    const res = await fetch(appsScriptUrl, { method: 'POST', body: JSON.stringify({ action: 'verifyOTP', email, otp }) }).then(r => r.json());
                    if (res.status === 'success') {
                        // ดึงข้อมูลเก่าจาก Firebase หรือสร้างใหม่
                        let userData = { id: email.replace(/[^a-zA-Z0-9]/g, '_'), email, name, role: 'user', lastLogin: new Date().toISOString() };
                        try {
                            await signInAnonymously(auth);
                            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', userData.id);
                            const docSnap = await getDoc(docRef);
                            if (docSnap.exists()) userData = { ...docSnap.data(), lastLogin: new Date().toISOString() };
                            await setDoc(docRef, userData, { merge: true });
                        } catch(fbErr) { console.warn("Firebase sync err", fbErr); }
                        
                        setUser(userData);
                        updateLocalStorage(userData);
                    } else alert(res.message);
                } catch(err) { alert("เกิดข้อผิดพลาดในการยืนยัน OTP"); }
                setIsSubmitting(false);
            };

            const handleLogout = () => {
                localStorage.removeItem('elearning_app_state');
                setUser(null);
                setStep('email'); setOtp('');
            };

            const handleSaveProfile = async () => {
                if (!editForm.name.trim()) return alert("ชื่อ-นามสกุล ห้ามเว้นว่างครับ");
                setIsSubmitting(true);
                try {
                    const updatedUser = { ...user, ...editForm };
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', user.id), updatedUser, { merge: true });
                    setUser(updatedUser);
                    updateLocalStorage(updatedUser);
                    setIsEditing(false);
                } catch (e) {
                    alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล: " + e.message);
                }
                setIsSubmitting(false);
            };

            const handleGenerateCertificate = async () => {
                if (!confirm("ระบบจะออกใบประกาศด้วยชื่อและสังกัดปัจจุบันของคุณ ยืนยันใช่ไหมครับ? (หากต้องการแก้ไขข้อมูล ให้กดปุ่มดินสอเพื่อแก้ไขก่อน)")) return;
                
                setIsGeneratingCert(true);
                try {
                    const res = await fetch(appsScriptUrl, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: 'submitCertificate', user: user }) 
                    }).then(r => r.json());
                    
                    if (res.status === 'success') {
                        const updatedUser = { ...user, certificateUrl: res.pdfUrl, certificateDate: new Date().toISOString() };
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_users', user.id), updatedUser, { merge: true });
                        setUser(updatedUser);
                        updateLocalStorage(updatedUser);
                        alert("🎉 สร้างใบประกาศสำเร็จแล้ว! ระบบได้ส่งไฟล์ PDF เข้าอีเมลของคุณ และคุณสามารถดาวน์โหลดจากปุ่มด้านล่างนี้ได้เลยครับ");
                    } else {
                        alert("ข้อผิดพลาด: " + res.message);
                    }
                } catch(e) {
                    alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบออกใบประกาศ");
                }
                setIsGeneratingCert(false);
            };

            if (loading) return <div className="min-h-screen sky-bg flex items-center justify-center"><Loader2 className="w-12 h-12 text-white animate-spin" /></div>;

            return (
                <div className="min-h-screen w-full relative overflow-hidden font-sans antialiased text-slate-800 flex items-center justify-center p-4">
                    <div className="sky-bg"></div>
                    <div className="clouds-wrapper">
                        <div className="cloud-layer layer-1"></div>
                        <div className="cloud-layer layer-2"></div>
                        <div className="cloud-layer layer-3"></div>
                    </div>
                    
                    <div className="relative z-10 w-full max-w-md mx-auto animate-in fade-in zoom-in-95 duration-500">
                        {!user ? (
                            // ==========================================
                            // LOGIN SCREEN
                            // ==========================================
                            <div className="glass-card p-8">
                                <div className="text-center mb-8">
                                    <div className="w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-blue-500/30">
                                        <BookOpen className="text-white w-10 h-10" />
                                    </div>
                                    <h1 className="text-2xl font-black text-slate-800">เข้าสู่ระบบ e-Learning</h1>
                                    <p className="text-slate-500 mt-2">ศูนย์ความเป็นเลิศทางการแพทย์ด้านปลูกถ่ายอวัยวะ โรงพยาบาลราชวิถี</p>
                                </div>

                                {step === 'email' ? (
                                    <form onSubmit={handleRequestOTP} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-1">อีเมลของคุณ</label>
                                            <div className="relative">
                                                <Mail className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5" />
                                                <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-white/50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all font-medium" placeholder="your@email.com" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-1">ชื่อ - นามสกุล (สำหรับออกใบประกาศ)</label>
                                            <div className="relative">
                                                <User className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5" />
                                                <input type="text" required value={name} onChange={e=>setName(e.target.value)} className="w-full bg-white/50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all font-medium" placeholder="นพ. / พญ. / พย.ม." />
                                            </div>
                                        </div>
                                        <button type="submit" disabled={isSubmitting} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold rounded-xl py-3.5 shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-6">
                                            {isSubmitting ? <Loader2 className="w-5 h-5 animate-spin"/> : <><ShieldCheck className="w-5 h-5" /> ขอรับรหัส OTP</>}
                                        </button>
                                    </form>
                                ) : (
                                    <form onSubmit={handleVerifyOTP} className="space-y-4 animate-in slide-in-from-right-4">
                                        <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 text-sm text-blue-800 text-center mb-6">
                                            ระบบได้ส่งรหัส OTP 6 หลัก ไปที่ <b>{email}</b> แล้ว<br/>(กรุณาตรวจสอบในกล่องจดหมายขยะ หากไม่พบ)
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-1 text-center">กรอกรหัส OTP 6 หลัก</label>
                                            <input type="text" required maxLength="6" value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,''))} className="w-full bg-white/80 border border-slate-300 rounded-xl py-4 px-4 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all font-mono text-center text-3xl tracking-[0.5em] font-black" placeholder="------" />
                                        </div>
                                        <div className="flex gap-2 mt-6">
                                            <button type="button" onClick={()=>setStep('email')} disabled={isSubmitting} className="flex-1 bg-slate-100 text-slate-600 hover:bg-slate-200 font-bold rounded-xl py-3.5 transition-all">กลับ</button>
                                            <button type="submit" disabled={isSubmitting} className="flex-[2] bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold rounded-xl py-3.5 shadow-lg shadow-indigo-500/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                                                {isSubmitting ? <Loader2 className="w-5 h-5 animate-spin"/> : <><ArrowRight className="w-5 h-5" /> ยืนยัน OTP</>}
                                            </button>
                                        </div>
                                    </form>
                                )}
                            </div>
                        ) : (
                            // ==========================================
                            // DASHBOARD SCREEN
                            // ==========================================
                            <div className="glass-card p-6 md:p-8">
                                <div className="text-center mb-6">
                                    <div className="w-20 h-20 bg-slate-100 rounded-full mx-auto flex items-center justify-center mb-4 border-4 border-white shadow-md">
                                        <User className="text-slate-400 w-10 h-10" />
                                    </div>
                                    
                                    <h2 className="text-2xl font-black text-slate-800 flex items-center justify-center gap-2 group relative">
                                        {user.name}
                                    </h2>
                                    <button onClick={() => { setEditForm({ name: user.name || '', hospital: user.hospital || '', department: user.department || '', province: user.province || '' }); setIsEditing(!isEditing); }} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full font-bold inline-flex items-center gap-1 mt-2 border border-slate-200 transition-colors">
                                        <Pencil size={12}/> แก้ไขข้อมูล
                                    </button>
                                </div>
                                
                                {/* Edit Form Dropdown */}
                                {isEditing && (
                                    <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 mb-6 animate-in slide-in-from-top-2 shadow-inner">
                                        <div className="flex justify-between items-center mb-3">
                                            <h3 className="font-bold text-sm text-slate-700 flex items-center gap-1"><Pencil size={14}/> อัปเดตข้อมูลส่วนตัว</h3>
                                            <button onClick={()=>setIsEditing(false)} className="text-slate-400 hover:text-rose-500"><X size={16}/></button>
                                        </div>
                                        <div className="space-y-3">
                                            <input value={editForm.name} onChange={e=>setEditForm({...editForm, name: e.target.value})} placeholder="ชื่อ-นามสกุล (ใส่นำหน้าให้ครบ)" className="w-full text-sm p-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" />
                                            <input value={editForm.hospital} onChange={e=>setEditForm({...editForm, hospital: e.target.value})} placeholder="โรงพยาบาล" className="w-full text-sm p-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" />
                                            <input value={editForm.department} onChange={e=>setEditForm({...editForm, department: e.target.value})} placeholder="แผนก / สังกัด" className="w-full text-sm p-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" />
                                            <input value={editForm.province} onChange={e=>setEditForm({...editForm, province: e.target.value})} placeholder="จังหวัด" className="w-full text-sm p-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" />
                                            <button onClick={handleSaveProfile} disabled={isSubmitting} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl flex items-center justify-center gap-2 shadow-md disabled:opacity-50">
                                                {isSubmitting ? <Loader2 size={16} className="animate-spin"/> : <Save size={16}/>} บันทึกข้อมูล
                                            </button>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-2 gap-4 mb-6">
                                    <div className="bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl p-4 border border-green-100 shadow-sm">
                                        <div className="text-xs font-bold text-green-600 mb-1 flex items-center gap-1"><CheckCircle2 className="w-4 h-4"/> ความคืบหน้า</div>
                                        <div className="text-2xl font-black text-green-700 mb-2">100%</div>
                                        <div className="w-full bg-green-200 rounded-full h-2 mb-2"><div className="bg-green-500 h-2 rounded-full w-full"></div></div>
                                        <div className="text-[10px] text-green-600/80 font-medium">เวลาเรียนครบเกณฑ์</div>
                                    </div>
                                    
                                    <div className="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-2xl p-4 border border-blue-100 shadow-sm flex flex-col justify-between">
                                        <div>
                                            <div className="text-xs font-bold text-blue-600 mb-1 flex items-center gap-1 justify-between">Pretest <span className="bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full">9/40</span></div>
                                            <div className="text-xs font-bold text-indigo-600 flex items-center gap-1 justify-between mt-2">Posttest <span className="bg-indigo-200 text-indigo-800 px-2 py-0.5 rounded-full">33/40</span></div>
                                        </div>
                                        <div className="text-[10px] text-blue-600/80 font-medium text-center mt-2 border-t border-blue-200/50 pt-2">สอบผ่านเกณฑ์</div>
                                    </div>
                                </div>
                                
                                <div className="space-y-3 mb-8">
                                    <a href="./aiskilllab.html" className="w-full group bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-2xl p-4 flex items-center justify-between transition-all shadow-lg shadow-slate-800/20 active:scale-[0.98]">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-amber-400 group-hover:scale-110 transition-transform"><Bot className="w-5 h-5"/></div>
                                            <div className="text-left"><div className="text-sm font-black">AI Skill Lab</div><div className="text-[10px] text-white/60 font-medium">ห้องฝึกทักษะเจรจาเสมือนจริง</div></div>
                                        </div>
                                        <PlayCircle className="text-white/40 group-hover:text-amber-400 transition-colors" />
                                    </a>
                                    
                                    {!user.certificateUrl ? (
                                        <button onClick={handleGenerateCertificate} disabled={isGeneratingCert} className="w-full group bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white font-bold rounded-2xl p-4 flex items-center justify-between transition-all shadow-lg shadow-orange-500/20 active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-white"><Award className="w-5 h-5"/></div>
                                                <div className="text-left"><div className="text-sm font-black">รับประกาศนียบัตร</div><div className="text-[10px] text-white/80 font-medium">ออกเอกสารอัตโนมัติทันที</div></div>
                                            </div>
                                            {isGeneratingCert ? <Loader2 className="animate-spin w-5 h-5"/> : <Download className="w-5 h-5" />}
                                        </button>
                                    ) : (
                                        <a href={user.certificateUrl} target="_blank" className="w-full group bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-2xl p-4 flex items-center justify-between transition-all shadow-lg shadow-emerald-500/20 active:scale-[0.98]">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-white"><CheckCircle2 className="w-5 h-5"/></div>
                                                <div className="text-left"><div className="text-sm font-black">ดาวน์โหลดประกาศนียบัตร</div><div className="text-[10px] text-white/90 font-medium">สร้างเมื่อ {new Date(user.certificateDate).toLocaleDateString('th-TH')}</div></div>
                                            </div>
                                            <Download className="w-5 h-5" />
                                        </a>
                                    )}
                                </div>
                                
                                <button onClick={handleLogout} className="w-full bg-white hover:bg-slate-50 text-slate-600 font-bold rounded-xl py-3 border border-slate-200 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                                    <LogOut className="w-4 h-4" /> ออกจากระบบ
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
