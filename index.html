        /* --- Parallax Background --- */
        .sky-bg { position: fixed; inset: 0; z-index: 0; }
        .clouds-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .cloud-layer { position: absolute; bottom: 0; left: 0; width: 200%; height: 100%; background-repeat: repeat-x; background-size: auto 100%; animation: drift linear infinite; }
        .layer-1 { opacity: 0.9; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png'); animation-duration: 150s; }
        .layer-2 { opacity: 0.6; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog2.png'); animation-duration: 200s; transform: scale(1.1); }
        .layer-3 { opacity: 0.4; background-image: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png'); animation-duration: 250s; transform: scale(1.2); }

        @keyframes drift { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* --- UI Utilities --- */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.4); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(255,255,255,0.6); }
        
        /* Padding for safe areas (Notches/Home indicators) */

        // --- 2. UTILS ---
        function recursiveShuffle(arr) { 
            if (!arr || arr.length <= 1) return arr; 
            const idx = Math.floor(Math.random() * arr.length); 
            const rest = [...arr]; 
            rest.splice(idx, 1); 
            return [arr[idx], ...recursiveShuffle(rest)]; 
        }
        
        function formatQuestions(qs) { 
            return qs.map(q => { 
                const correctAnswerText = q.options[q.answer]; 
                const shuffledOpts = recursiveShuffle([...q.options]); 
                return { ...q, options: shuffledOpts, answer: shuffledOpts.indexOf(correctAnswerText) }; 
            }); 
        }
        
        function parseRawExams(raw) { 
            return raw.map((str, idx) => { 
                const parts = str.split('|').map(s => s.trim()); 
                return { id: idx + 1, question: parts[0].replace(/^[0-9]+\.\s*/, ''), options: parts.slice(1, parts.length - 1), answer: parseInt(parts[parts.length - 1].replace(/[^0-9]/g, ''), 10) }; 
            }); 
        }
        
        const FULL_EXAMS = [recursiveShuffle(formatQuestions(parseRawExams(QUIZ_QUESTIONS_RAW)))];

        const correctMedicalTerms = (text) => { 
            if (!text) return text; 
            let corrected = text; 
            const dict = { "แอบเนีย": "Apnea", "แอปเนีย": "Apnea", "ดีคัปปิ้ง": "Decoupling", "ดีคับปลิ้ง": "Decoupling", "เบรนเดส": "Brain Death", "สมองตาย": "Brain Death" }; 
            Object.keys(dict).forEach(key => corrected = corrected.replace(new RegExp(key, "g"), dict[key])); 
            return corrected; 
        };

        const fetchWithRetry = async (url, options) => {
          const delays = [500, 1000]; 
          for (let i = 0; i < delays.length; i++) {
            try {
              const res = await fetch(url, options);
              if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
              return await res.json();
            } catch (error) {
              if (i === delays.length - 1) throw error;
              await new Promise(res => setTimeout(res, delays[i]));
            }
          }
        };

        const callGeminiAPI = async (prompt, systemInstruction, base64Image = null) => {
          const apiKey = "AQ.Ab8RN6KJITz9uFnCtAF6TAgEeDPfKZoIvdYvl2MFmfYb6ok4cQ"; 
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;
          try {
            const parts = [{ text: prompt }];
            if (base64Image) {
              const mimeType = base64Image.match(/data:(.*?);base64/)[1];
              const data = base64Image.split(',')[1];
              parts.push({ inlineData: { mimeType, data } });
            }
            const payload = { contents: [{ parts }], systemInstruction: { parts: [{ text: systemInstruction }] } };
            const data = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            return data.candidates?.[0]?.content?.parts?.[0]?.text ?? "ขออภัยค่ะ ฟ้าไม่สามารถหาคำตอบได้ในขณะนี้";

        const pcm16ToWav = (base64PCM, sampleRate = 24000) => {
          const binaryString = window.atob(base64PCM); 
          const bytes = Uint8Array.from([...binaryString].map(c => c.charCodeAt(0))); 
          const buffer = new ArrayBuffer(44 + bytes.length); 
          const view = new DataView(buffer);
          
          const writeString = (v, offset, string) => { for (let i = 0; i < string.length; i++) v.setUint8(offset + i, string.charCodeAt(i)); };
          writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true); writeString(view, 8, 'WAVE'); 
          writeString(view, 12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); 
          view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); 
          view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(view, 36, 'data'); view.setUint32(40, bytes.length, true);
          new Uint8Array(buffer, 44).set(bytes); 
          return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        };

        // --- 5. CHATBOT COMPONENT & ADAPTIVE UI ---
        function GlobalAIChatbot({ store }) {
          const [isOpen, setIsOpen] = useState(false); 
          const [chatInput, setChatInput] = useState(''); 
          const [isTyping, setIsTyping] = useState(false); 
          const [messages, setMessages] = useState([]); 
          const [isRoleplay, setIsRoleplay] = useState(false); 
          const [currentScenarioPrompt, setCurrentScenarioPrompt] = useState(""); 
          const [isListening, setIsListening] = useState(false); 
          const [leftDockEl, setLeftDockEl] = useState(null); 
          const [rightDockEl, setRightDockEl] = useState(null); 
          const [selectedImage, setSelectedImage] = useState(null);
          
          const [isVadMode, setIsVadMode] = useState(false); 
          const [audioLevel, setAudioLevel] = useState(0); 
          const audioContextRef = useRef(null); 
          const analyserRef = useRef(null); 
          const microphoneRef = useRef(null); 
          const vadSilenceTimerRef = useRef(null); 
          const isSpeakingRef = useRef(false); 
          const latestTranscriptRef = useRef('');
          
          // Adaptive Layout States (Detecting Mobile or Portrait mode)
          const [isMobile, setIsMobile] = useState(window.innerWidth < 1024 || window.innerHeight > window.innerWidth);
          const [fabPos, setFabPos] = useState({ x: window.innerWidth - 80, y: window.innerHeight - 100 }); 
          const [isDraggingFab, setIsDraggingFab] = useState(false); 
          const [hasMoved, setHasMoved] = useState(false); 
          const dragStartFab = useRef({ x: 0, y: 0, cx: 0, cy: 0 });

          useEffect(() => { 
              const handleResize = () => { 
                  setIsMobile(window.innerWidth < 1024 || window.innerHeight > window.innerWidth);
                  setFabPos(prev => ({ x: Math.min(prev.x, window.innerWidth - 74), y: Math.min(prev.y, window.innerHeight - 74) })); 
              }; 
              window.addEventListener('resize', handleResize); 
              return () => window.removeEventListener('resize', handleResize); 
          }, []);

          const handleFabPointerDown = (e) => { 
              setIsDraggingFab(true); 
              setHasMoved(false); 
              const clientX = e.touches ? e.touches[0].clientX : e.clientX; 
              const clientY = e.touches ? e.touches[0].clientY : e.clientY; 
              dragStartFab.current = { x: clientX - fabPos.x, y: clientY - fabPos.y, cx: clientX, cy: clientY }; 
          };

          useEffect(() => {
              const handlePointerMove = (e) => { 
                  if (!isDraggingFab) return; 
                  e.preventDefault(); 
                  const clientX = e.touches ? e.touches[0].clientX : e.clientX; 
                  const clientY = e.touches ? e.touches[0].clientY : e.clientY; 
                  if (Math.abs(clientX - dragStartFab.current.cx) > 5 || Math.abs(clientY - dragStartFab.current.cy) > 5) setHasMoved(true); 
                  let newX = Math.max(10, Math.min(clientX - dragStartFab.current.x, window.innerWidth - 74)); 
                  let newY = Math.max(10, Math.min(clientY - dragStartFab.current.y, window.innerHeight - 74)); 
                  setFabPos({ x: newX, y: newY }); 
              };
              const handlePointerUp = () => setIsDraggingFab(false);
              
              if (isDraggingFab) { 
                  window.addEventListener('mousemove', handlePointerMove, { passive: false }); 
                  window.addEventListener('mouseup', handlePointerUp); 
                  window.addEventListener('touchmove', handlePointerMove, { passive: false }); 
                  window.addEventListener('touchend', handlePointerUp); 
              }
              return () => { 
                  window.removeEventListener('mousemove', handlePointerMove); 
                  window.removeEventListener('mouseup', handlePointerUp); 
                  window.removeEventListener('touchmove', handlePointerMove); 
                  window.removeEventListener('touchmove', handlePointerMove); 
                  window.removeEventListener('touchend', handlePointerUp); 
              };
          }, [isDraggingFab]);

          const recognitionRef = useRef(null); 
          const messagesEndRef = useRef(null); 
          const audioRef = useRef(null); 
          const currentSpeechIdRef = useRef(0);
          
          const isActiveRoleplay = store.currentScreen === 'dashboard' && store.activeTab === 'skill_lab' && store.selectedLabId !== null;
          const isDocked = isActiveRoleplay && !isMobile;
          const isShortsMode = isActiveRoleplay && isMobile;

          const { roleplayPhase, currentSpeaker, currentEmotion } = store;
          const userPosition = store.loggedInUser?.position || "บุคลากรทางการแพทย์";

          useEffect(() => { 
              let timeoutId; 
              const findDock = () => { 
                  const rightEl = document.getElementById('chat-dock-target'); 
                  const leftEl = document.getElementById('scenario-video-target'); 
                  if (rightEl && leftEl) { setRightDockEl(rightEl); setLeftDockEl(leftEl); } 
                  else { timeoutId = setTimeout(findDock, 100); } 
              }; 
              if (isDocked) findDock(); 
              else { setRightDockEl(null); setLeftDockEl(null); } 
              return () => clearTimeout(timeoutId); 
          }, [isDocked, store.selectedLabId]);

          const toggleChat = () => { 
              if (!isOpen && !isRoleplay) globalStore.setState({ currentSpeaker: 'FAH', currentEmotion: 'NEUTRAL' }); 
              setIsOpen(prev => !prev); 
          };

          const stopAudio = useCallback(() => { 
              currentSpeechIdRef.current += 1; 
              stopSpeaking(); 
              if (audioRef.current) { 
                  audioRef.current.pause(); 
                  audioRef.current.removeAttribute('src'); 
                  audioRef.current.load(); 
                  audioRef.current = null; 
              } 
          }, []);
          
          useEffect(() => stopAudio(), [store.activeTab, store.currentScreen, store.currentVideoId, stopAudio]);

          useEffect(() => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
              recognitionRef.current = new SpeechRecognition(); 
              recognitionRef.current.continuous = true; 
              recognitionRef.current.interimResults = true; 
              recognitionRef.current.lang = 'th-TH'; 
              
              recognitionRef.current.onresult = (event) => { 
                  let finalT = ''; 
                  let interimTranscript = ''; 
                  for (let i = event.resultIndex; i < event.results.length; ++i) { 
                      if (event.results[i].isFinal) finalT += event.results[i][0].transcript; 
                      else interimTranscript += event.results[i][0].transcript; 
                  } 
                  setChatInput(prev => { 
                      const newText = prev + finalT; 
                      latestTranscriptRef.current = newText || interimTranscript; 
                      return newText || interimTranscript; 
                  }); 
              };
              
              recognitionRef.current.onend = () => { 
                  if (isVadMode && isListening) { 
                      try { recognitionRef.current.start(); } catch(e){} 
                  } else { 
                      setIsListening(false); 
                      setChatInput(current => { 
                          const correctedText = correctMedicalTerms(current.trim()); 
                          if (correctedText && correctedText !== 'พร้อม') handleSendChat(null, correctedText); 
                          return current; 
                      }); 
                  } 
              };
              
              recognitionRef.current.onerror = (e) => { 
                  if(e.error !== 'no-speech') setIsListening(false); 
              };
            }
          }, [currentScenarioPrompt, messages, isVadMode, isListening]);

          const processAudio = useCallback(() => {
              if (!analyserRef.current || !isListening || !isVadMode) return;
              const dataArray = new Uint8Array(analyserRef.current.frequencyBinCount); 
              analyserRef.current.getByteFrequencyData(dataArray);
              
              let sum = 0; 
              for (let i = 0; i < dataArray.length; i++) { sum += dataArray[i]; } 
              const average = sum / dataArray.length; 
              setAudioLevel(average);
              
              if (average > 15) { 
                  if (!isSpeakingRef.current) isSpeakingRef.current = true; 
                  if (vadSilenceTimerRef.current) { 
                      clearTimeout(vadSilenceTimerRef.current); 
                      vadSilenceTimerRef.current = null; 
                  } 
              } else { 
                  if (isSpeakingRef.current && !vadSilenceTimerRef.current) { 
                      vadSilenceTimerRef.current = setTimeout(() => { 
                          isSpeakingRef.current = false; 
                          const finalSpeech = latestTranscriptRef.current.trim(); 
                          if (finalSpeech) { 
                              handleSendChat(null, correctMedicalTerms(finalSpeech)); 
                              setChatInput(''); 
                              latestTranscriptRef.current = ''; 
                          } 
                          vadSilenceTimerRef.current = null; 
                      }, 800); 
                  } 
              }
              if (isListening && isVadMode) requestAnimationFrame(processAudio);
          }, [isListening, isVadMode]);

          const startVAD = async () => { 
              try { 
                  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("NotSupportedError"); 
                  const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
                  audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)(); 
                  analyserRef.current = audioContextRef.current.createAnalyser(); 
                  microphoneRef.current = audioContextRef.current.createMediaStreamSource(stream); 
                  microphoneRef.current.connect(analyserRef.current); 
                  analyserRef.current.fftSize = 256; 
                  
                  setIsVadMode(true); 
                  setIsListening(true); 
                  recognitionRef.current?.start(); 
                  processAudio();

              } catch (err) { 
                  actions.showMsg('ไมค์ไม่ทำงาน หรือเบราว์เซอร์ไม่รองรับ', 'error'); 
              } 
          };
          
          const stopVAD = () => { 
              setIsVadMode(false); 
              setIsListening(false); 
              recognitionRef.current?.stop(); 
              if (audioContextRef.current) audioContextRef.current.close(); 
              if (vadSilenceTimerRef.current) clearTimeout(vadSilenceTimerRef.current); 
              actions.showMsg('ปิดไมโครโฟนแล้ว', 'success'); 
          };
          
          const toggleMic = () => { 
              if (isListening) stopVAD(); 
              else { setChatInput(''); latestTranscriptRef.current = ''; startVAD(); } 
          };
          
          const handleImageUpload = (e) => {

              if (!file) return;

          const playSampleVoice = (speaker) => {

              if (speaker === 'FAH') speakThai("สวัสดีค่ะ ฟ้าเองนะคะ นี่คือเสียงโหมดจำลองสถานการณ์ค่ะ", null, false, 'FAH'); 
              else speakThai("สวัสดีครับ ผมเมฆนะครับ นี่คือเสียงของผมครับ", null, false, 'BROTHER'); 
          };

          // รักษาเสียงและตั้งค่าเริ่มต้นเป็นน้องฟ้า (Aoede) เสมอ
          const speakThai = async (text, onEndCallback = null, forceStandard = false, speaker = 'FAH') => {
            stopAudio(); 
            currentSpeechIdRef.current += 1; 
            const speechId = currentSpeechIdRef.current; 
            let targetVoice = "Aoede"; 
            
            let cleanSpeakText = text.replace(/\[.*?\]/g, '').replace(/\*.*?\*/g, '').replace(/#.*?#/g, '').replace(/^(ฟ้า|เมฆ|น้องชาย|ลูกสาว|Fah|Mek|Brother|Sister|AI)\s*:\s*/i, '').trim();
            let emotionPrompt = `พูดด้วยน้ำเสียงธรรมชาติ: ${cleanSpeakText}`;
            
            if (isListening) { recognitionRef.current?.stop(); setIsListening(false); }
            
            if (isRoleplay && !forceStandard) { 
                if (speaker === 'BROTHER') { 
                    targetVoice = "Charon"; 
                    emotionPrompt = `เสียงผู้ชายวัยรุ่น 18 ปี อารมณ์เศร้าขุ่นเคือง: ${cleanSpeakText}`; 
                } else { 
                    targetVoice = "Aoede"; 
                    emotionPrompt = `เสียงผู้หญิงวัยรุ่น เศร้าเสียใจ: ${cleanSpeakText}`; 
                } 
            } else { 
                targetVoice = "Aoede"; 
                emotionPrompt = `เสียงผู้หญิงร่าเริง 22 ปี: ${cleanSpeakText}`; 
            }
            
            const fallbackTTS = () => {
                if (!('speechSynthesis' in window)) { if (onEndCallback) onEndCallback(); return; }
                const utterance = new SpeechSynthesisUtterance(cleanSpeakText);
                utterance.lang = 'th-TH'; 
                utterance.rate = 1.0; 
                utterance.pitch = speaker === 'BROTHER' ? 0.8 : 1.2;
                utterance.onend = () => { if (onEndCallback) onEndCallback(); };
                utterance.onerror = (e) => { if (onEndCallback) onEndCallback(); };
                window.speechSynthesis.speak(utterance);
            };

            try {
                const result = await callGeminiTTS(emotionPrompt, targetVoice); 
                if (speechId !== currentSpeechIdRef.current) return;
                
                const inlineData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                if (inlineData?.data) { 
                    const sampleRate = parseInt(inlineData.mimeType.match(/rate=(\d+)/)?.[1] ?? "24000", 10); 
                    const audio = new Audio(pcm16ToWav(inlineData.data, sampleRate)); 
                    audioRef.current = audio; 
                    audio.onended = () => { if (onEndCallback) onEndCallback(); }; 
                    audio.onerror = () => { fallbackTTS(); };

        function AuthWizard({ store, actions }) {
          const { authStep, tempLicense, registrationData: d, otpData } = store; 
          const [isChecking, setIsChecking] = useState(false); 
          const [hasVerified, setHasVerified] = useState(false); 
          const [selectedUserType, setSelectedUserType] = useState('เรียนใหม่');
          
          const deptList = Object.keys(HOSPITAL_MAPPING).filter(k => k !== 'อื่นๆ'); 
          const rawHospList = d.department && HOSPITAL_MAPPING[d.department] ? HOSPITAL_MAPPING[d.department].map(h => h.name) : []; 
          const hospList = [...new Set([...rawHospList, 'อื่นๆ'])];
          
          const renderForm = () => {
            if (authStep === 'check_license') {
              const handleVerify = async (e) => {
                e.preventDefault(); if (!tempLicense) return; setIsChecking(true);
                const license = tempLicense.trim(); const existUser = store.dbUsers.find(u => String(u.license || '').trim() === license || String(u.id || '').trim() === license);
                let processedData = {};
                if (existUser) { 
                    processedData = { ...existUser }; 
                    let hosp = processedData.hospital || ''; 
                    let customHosp = ''; 
                    if (processedData.department && HOSPITAL_MAPPING[processedData.department]) { 
                        const knownHospitals = HOSPITAL_MAPPING[processedData.department].map(h => h.name); 
                        if (hosp && !knownHospitals.includes(hosp)) { 
                            if (hosp.startsWith('ศูนย์บริการสาธารณสุข ')) { customHosp = hosp.replace('ศูนย์บริการสาธารณสุข ', ''); hosp = 'ศูนย์บริการสาธารณสุข'; } 
                            else { customHosp = hosp; hosp = 'อื่นๆ'; } 
                        } 
                    } 
                    processedData.hospital = hosp; processedData.customHospital = customHosp; setSelectedUserType('เข้าเรียนต่อ'); 
                } else { 
                    setSelectedUserType('เรียนใหม่'); processedData.userType = 'เรียนใหม่'; 
                }
                globalStore.setState({ registrationData: Object.assign({ ...store.registrationData, licenseId: license, isPrefilled: !!existUser }, processedData) });
                setTimeout(() => { setIsChecking(false); setHasVerified(true); }, 500);
              };
              
              const handleContinue = (e) => { 
                  e.preventDefault(); 
                  if (hasVerified) { 
                      let finalUserType = store.registrationData.userType || 'เรียนใหม่'; 
                      if (selectedUserType === 'เข้าเรียนต่อ' && finalUserType === 'เรียนใหม่') finalUserType = 'Online'; 
                      else if (selectedUserType === 'เรียนใหม่') finalUserType = 'เรียนใหม่'; 
                      globalStore.setState(p => ({ registrationData: { ...p.registrationData, userType: finalUserType }, authStep: 'register' })); 
                  } 
              };
              
              const options = store.registrationData.isPrefilled ? ['เข้าเรียนต่อ', 'แก้ไขสิทธิ์'] : ['เรียนใหม่', 'Onsite / Online'];

              return (
                <div className="flex flex-col h-full animate-in fade-in slide-in-from-right-8 justify-center">
                  <button onClick={() => actions.nav('welcome')} className="text-slate-700 hover:text-slate-900 flex items-center gap-2 font-bold transition-colors w-fit mb-8 text-sm active:scale-95 bg-white/40 border border-white/60 backdrop-blur-md px-4 py-2 rounded-full shadow-sm"><SafeIcon name="ArrowLeft" size={16} /> กลับ</button>
                  <div className="mb-6 text-center"><h2 className="text-2xl font-black text-slate-800 mb-2 drop-shadow-sm">ตรวจสอบสิทธิ์</h2><p className="text-slate-700 font-medium text-sm drop-shadow-sm">กรุณาระบุเลขใบประกอบวิชาชีพเพื่อตรวจสอบสถานะ</p></div>
                  <div className="flex-1 flex flex-col">
                    <div className="mb-8">
                        <input 
                            type="text" 
                            required 
                            placeholder="ระบุตัวเลข" 
                            value={tempLicense} 
                            onChange={e => { globalStore.setState({ tempLicense: e.target.value }); setHasVerified(false); }} 
                            className={`w-full px-4 py-4 text-center font-mono text-xl tracking-widest rounded-xl border focus:outline-none transition-all shadow-[inset_0_2px_5px_rgba(0,0,0,0.05),inset_0_0_15px_rgba(255,255,255,0.4)] ${isChecking ? 'bg-white/30 border-white/40 text-slate-600 cursor-not-allowed' : 'bg-white/40 border-white/50 text-slate-800 placeholder-slate-500 hover:bg-white/50 focus:bg-white/60 focus:border-white focus:ring-2 focus:ring-white/50 backdrop-blur-xl'}`}
                            disabled={isChecking} 
                        />
                        {!hasVerified && (<GradientButton type="button" onClick={handleVerify} disabled={isChecking || !tempLicense} className="w-full mt-4 py-3.5 text-sm rounded-xl border border-white/30 backdrop-blur-md">{isChecking ? 'กำลังตรวจสอบ...' : 'ตรวจสอบ'}</GradientButton>)}
                    </div>
                    <div className={`grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 transition-all duration-500 ${hasVerified ? 'opacity-100 translate-y-0' : 'opacity-40 pointer-events-none translate-y-4'}`}>
                       {options.map((type) => {
                          const isActive = selectedUserType === type; 
                          let iconName = 'User'; 
                          if (type === 'Onsite / Online') iconName = 'Users'; 
                          if (type === 'เข้าเรียนต่อ') iconName = 'PlayCircle'; 
                          if (type === 'แก้ไขสิทธิ์') iconName = 'Settings2';
                          return (
                            <label key={type} onClick={() => hasVerified && setSelectedUserType(type)} className={`p-4 rounded-[1.5rem] border transition-all duration-300 flex flex-col items-center gap-3 group ${hasVerified ? 'cursor-pointer' : ''} ${isActive ? 'border-line-400 bg-white/60 shadow-[0_5px_15px_rgba(0,185,0,0.2)] scale-105 backdrop-blur-xl' : 'border-white/50 bg-white/20 hover:bg-white/40 backdrop-blur-xl'}`}>
                              <div className={`w-12 h-12 rounded-full flex items-center justify-center transition-colors shadow-sm ${isActive ? 'bg-line-500 text-white' : 'bg-white/60 text-slate-700'}`}><SafeIcon name={iconName} size={24} /></div><span className={`font-bold text-sm transition-colors drop-shadow-sm ${isActive ? 'text-slate-800' : 'text-slate-700'}`}>{type}</span>
                            </label>
                          );
                       })}
                    </div>
                    <div className="flex-1"></div>
                    {hasVerified && (<GradientButton onClick={handleContinue} className="w-full animate-in fade-in zoom-in duration-300 border border-white/30 backdrop-blur-md">ดำเนินการต่อ <SafeIcon name="ArrowRight" size={20}/></GradientButton>)}
                  </div>
                </div>
              );
            }
            
            if (authStep === 'register') {
              const handleRequestOTP = async (e) => { 
                  e.preventDefault(); 
                  globalStore.setState(p => ({ otpData: { ...p.otpData, isSending: true, error: '' }, fallbackOtp: null })); 
                  const res = await actions.fetchAppsScript({ action: 'requestOTP', email: d.email, name: d.name }); 
                  if (res?.status === 'success') { 
                      globalStore.setState(p => ({ otpData: { ...p.otpData, isSending: false } })); 
                      globalStore.setState({ authStep: 'verify_otp' }); 
                  } else { 
                      globalStore.setState(p => ({ otpData: { ...p.otpData, isSending: false } })); 
                      actions.showMsg('ระบบขัดข้อง ไม่สามารถส่งรหัส OTP ได้', 'error'); 
                  } 
              };
              return (
                <div className="flex flex-col h-full animate-in fade-in slide-in-from-right-8 justify-center">
                  <div className="mb-6 text-center"><h2 className="text-2xl font-black text-slate-800 mb-2 drop-shadow-sm">ข้อมูลส่วนตัว</h2><p className="text-slate-700 font-medium text-sm flex items-center justify-center drop-shadow-sm">เพื่อใช้ในการออกประกาศนียบัตร {d.isPrefilled && (<span className="bg-emerald-100/80 text-emerald-800 px-3 py-1 rounded-full text-xs border border-emerald-300 flex items-center gap-1 ml-2 shadow-sm backdrop-blur-md"><SafeIcon name="CheckCircle" size={12}/> ดึงข้อมูลแล้ว</span>)}</p></div>

                    <div className="max-h-[40vh] overflow-y-auto custom-scrollbar pr-2 pb-4 space-y-4">
                       <FormInput label="ชื่อ - สกุล" value={d.name || ''} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, name: e.target.value} }))} placeholder="ระบุชื่อและนามสกุล" />
                       <FormSelect label="สิทธิ์การเรียน" value={d.userType || 'เรียนใหม่'} onChange={e => globalStore.setState(p => ({ registrationData: { ...p.registrationData, userType: e.target.value } }))} options={['เรียนใหม่', 'Onsite', 'Online']} placeholder="-- เลือกสิทธิ์ --" disabled={d.isPrefilled && d.userType && d.userType !== 'เรียนใหม่'} />
                       <FormInput label="เบอร์โทรศัพท์" type="tel" value={d.phone || ''} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, phone: e.target.value} }))} placeholder="08xxxxxxxx" />
                       <FormInput label="อีเมล (สำหรับรับ OTP)" type="email" value={d.email || ''} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, email: e.target.value} }))} placeholder="email@example.com" />
                       <FormInput label="ตำแหน่ง" value={d.position || ''} onChange={e => globalStore.setState(p => ({ registrationData: {...p.registrationData, position: e.target.value} }))} placeholder="ระบุตำแหน่ง" />

                     { dept: 'เขตสุขภาพที่ 1', score: 72, risk: 'Medium', color: 'bg-amber-400', text: 'text-amber-700', bg: 'bg-amber-50', recommend: 'ควรเสริมทักษะการฟัง (Active Listening) ในบางโรงพยาบาล' },
                     { dept: 'เขตสุขภาพที่ 6', score: 45, risk: 'High', color: 'bg-rose-500', text: 'text-rose-700', bg: 'bg-rose-50', recommend: '⚠️ ด่วน: เสนอจัด Onsite Workshop ฝึกซ้อมรับมือญาติผู้ป่วยรุนแรง' },
                     { dept: 'สำนักการแพทย์ กทม.', score: 60, risk: 'Medium', color: 'bg-amber-400', text: 'text-amber-700', bg: 'bg-amber-50', recommend: 'คะแนนคาบเส้น แนะนำให้ทำแบบทดสอบ e-Learning ซ้ำในหมวดที่ 3' }
                 ];

                 return (
                     <div className="animate-in fade-in flex flex-col h-full">
                         <div className="flex items-center justify-between mb-6">
                             <div>
                                 <h2 className="text-2xl font-extrabold flex gap-2 text-slate-800 drop-shadow-md"><SafeIcon name="Activity" className="text-rose-500" /> AI Predictive Risk (ระดับนโยบาย)</h2>
                                 <p className="text-slate-600 text-sm mt-1 font-medium">ระบบพยากรณ์ความเสี่ยงในการรับมือข้อพิพาท ประมวลผลจาก Empathy Score แยกตามสังกัด</p>
                             </div>
                             <GradientButton className="py-2.5 px-4 text-sm border border-white/50"><SafeIcon name="Download" size={16}/> สรุปรายงาน (PDF)</GradientButton>
                         </div>
                         
                         <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                             {riskData.map((d, i) => (
                                 <GlassCard key={i} className={`p-5 flex flex-col relative overflow-hidden transition-transform hover:scale-105 ${d.risk === 'High' ? 'border-2 border-rose-400 shadow-[0_0_20px_rgba(244,63,94,0.3)]' : 'border border-white/60'}`}>
                                     {d.risk === 'High' && <div className="absolute top-0 left-0 w-full h-1 bg-rose-500 animate-pulse"></div>}
                                     <div className="flex justify-between items-start mb-4">
                                         <h3 className="font-extrabold text-slate-800 text-lg leading-tight">{d.dept}</h3>
                                         <div className={`px-2 py-1 rounded font-black text-xs ${d.bg} ${d.text} border border-white/50 shadow-sm`}>{d.score}/100</div>
                                     </div>
                                     <div className="w-full bg-slate-200/50 rounded-full h-1.5 mb-4 overflow-hidden border border-white/20">
                                         <div className={`${d.color} h-1.5 rounded-full`} style={{width: `${d.score}%`}}></div>
                                     </div>
                                     <div className="mt-auto">
                                         <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 block">AI Recommendation</span>
                                         <p className={`text-xs font-medium leading-relaxed ${d.risk === 'High' ? 'text-rose-700 font-bold' : 'text-slate-700'}`}>{d.recommend}</p>
                                     </div>
                                 </GlassCard>
                             ))}
                         </div>

                         <GlassCard className="p-6 flex-1 border border-white/60">
                             <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><SafeIcon name="TrendingUp" className="text-blue-500"/> แนวโน้มภาพรวมระดับประเทศ (National Trend)</h3>
                             <div className="w-full h-[200px] flex items-center justify-center bg-white/40 rounded-xl border border-white/50 backdrop-blur-md shadow-inner text-slate-500 font-medium">
                                 [พื้นที่แสดงกราฟ แนะนำเชื่อมต่อ Looker Studio หรือ Chart.js ในเฟสต่อไป]
                             </div>
                         </GlassCard>
                     </div>
                 );
             }
             if (adminTab === 'content') {
                 return (
                     <div className="animate-in fade-in">
                         <h2 className="text-2xl font-extrabold mb-6 flex gap-2 text-slate-800 drop-shadow-md"><SafeIcon name="BookOpen" className="text-line-600" /> จัดการบทเรียนและข้อสอบ</h2>
                         <GlassCard className="p-8">
                             <button onClick={async () => { try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_config', 'content'), { lessons, questionSets: store.questionSets, updatedAt: new Date().toISOString() }, { merge: true }); actions.showMsg('อัปโหลดเนื้อหาสำเร็จ'); } catch(e) { actions.showMsg('เกิดข้อผิดพลาด', 'error'); } }} className="w-full bg-emerald-100/80 text-emerald-800 hover:bg-emerald-200/80 border border-emerald-300/80 py-4 rounded-xl font-bold flex justify-center gap-2 transition-colors shadow-sm backdrop-blur-md">
                                 <SafeIcon name="Upload" size={18} /> เผยแพร่ขึ้น Cloud
                             </button>
                         </GlassCard>
                     </div>
                 );
             }
             if (adminTab === 'data') {
                 return (
                     <div className="animate-in fade-in">
                         <h2 className="text-2xl font-extrabold mb-6 flex gap-2 text-slate-800 drop-shadow-md"><SafeIcon name="Database" className="text-line-600" /> ฐานข้อมูล & ระบบคิว</h2>
                         <GlassCard className="p-8">
                             <div className="space-y-3 mb-6">
                                 <input type="url" value={appsScriptUrl} onChange={e => globalStore.setState({ appsScriptUrl: e.target.value })} className="w-full p-4 rounded-xl bg-white/60 border border-white/80 text-slate-800 placeholder-slate-600 outline-none backdrop-blur-md" placeholder="URL ระบบ OTP" />
                             </div>
                             <div className="flex flex-col sm:flex-row justify-between items-center gap-4 border-t border-white/40 pt-6">
                                 <span className="text-sm text-slate-700 font-medium">{syncState.lastSync ? `อัปเดตล่าสุด: ${syncState.lastSync}` : 'ยังไม่เคยซิงค์ข้อมูล'}</span>
                                 <button onClick={async () => { globalStore.setState({ syncState: { ...syncState, isSyncing: true, text: 'กำลังซิงค์...' } }); await actions.fetchAppsScript({ action: 'syncData', users: dbUsers }); globalStore.setState({ syncState: { isSyncing: false, text: 'ส่งข้อมูลสำเร็จ', lastSync: new Date().toLocaleTimeString() } }); setTimeout(() => globalStore.setState(p => ({ syncState: { ...p.syncState, text: 'ส่งข้อมูลเข้า Google Sheets' } })), 3000); }} className="w-full sm:w-auto bg-white/60 text-line-800 hover:bg-white/80 border border-white/80 px-6 py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors shadow-sm backdrop-blur-md">
                                     <SafeIcon name="RefreshCw" size={18} className={syncState.isSyncing ? 'animate-spin' : ''} /> {syncState.text}
                                 </button>
                             </div>
                         </GlassCard>
                     </div>
                 );
             }
             if (adminTab === 'live') {
                 return (
                     <div className="animate-in fade-in">
                         <h2 className="text-2xl font-extrabold mb-6 flex gap-2 text-slate-800 drop-shadow-md"><SafeIcon name="Radio" className="text-rose-500" /> จัดการ Live</h2>
                         <GlassCard className="p-8 max-w-3xl space-y-6">
                             <div className="flex gap-4">
                                 <button onClick={() => globalStore.setState({ liveConfig: { ...liveConfig, status: 'live' } })} className={`p-4 rounded-xl font-bold flex-1 border transition-all backdrop-blur-md ${liveConfig.status === 'live' ? 'bg-rose-100/80 text-rose-600 border-rose-300/80 shadow-[0_0_15px_rgba(244,63,94,0.2)]' : 'bg-white/40 text-slate-700 border-white/60 hover:bg-white/60'}`}>Live</button>
                                 <button onClick={() => globalStore.setState({ liveConfig: { ...liveConfig, status: 'offline' } })} className={`p-4 rounded-xl font-bold flex-1 border transition-all backdrop-blur-md ${liveConfig.status === 'offline' ? 'bg-white/80 text-slate-800 border-white shadow-sm' : 'bg-white/40 text-slate-700 border-white/60 hover:bg-white/60'}`}>ออฟไลน์</button>
                             </div>
                             <GradientButton onClick={() => actions.saveSettingsToDB({ liveConfig })} className="w-full py-4 border border-white/40 backdrop-blur-md">บันทึกการตั้งค่า Live</GradientButton>
                         </GlassCard>
                     </div>
                 );
             }
             if (adminTab === 'users') {
                 return (
                     <div className="animate-in fade-in flex flex-col h-[80vh]">
                         <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                             <h2 className="text-2xl font-extrabold text-slate-800 drop-shadow-md">จัดการผู้เรียน ({filteredUsers.length})</h2>
                             <div className="bg-white/60 border border-white/80 p-2 rounded-2xl flex items-center gap-2 backdrop-blur-md shadow-sm w-full sm:w-auto">
                                 <SafeIcon name="Search" className="text-slate-600 ml-2" />
                                 <input type="text" placeholder="ค้นหาชื่อ..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="bg-transparent outline-none p-2 text-sm text-slate-800 placeholder-slate-600 w-full" />
                             </div>
                         </div>
                         <GlassCard className="flex-1 overflow-auto !p-0 border border-white/60">
                             <table className="w-full text-left text-sm min-w-[800px] text-slate-800">
                                 <thead className="bg-white/50 sticky top-0 z-20 backdrop-blur-md border-b border-white/60">
                                     <tr><th className="p-4 font-bold text-slate-800 uppercase tracking-wider">ชื่อ-สกุล</th><th className="p-4 font-bold text-slate-800 uppercase tracking-wider">สถานะ</th></tr>
                                 </thead>
                                 <tbody className="divide-y divide-white/40">
                                     {paginatedUsers.map(u => (
                                         <tr key={u.id} className="hover:bg-white/40 transition-colors">
                                             <td className="p-4 font-bold drop-shadow-sm">{u.name}</td>
                                             <td className="p-4"><span className={`px-3 py-1 rounded-full text-xs font-bold border backdrop-blur-sm ${u.status === 'ผ่าน' ? 'bg-emerald-100/80 text-emerald-800 border-emerald-300/80' : 'bg-white/60 text-slate-700 border-white/80'}`}>{u.status}</span></td>
                                         </tr>
                                     ))}
                                 </tbody>
                             </table>
                         </GlassCard>
                     </div>
                 );
             }
             return null;
          };

          return (
            <div className="min-h-screen w-full flex flex-col md:flex-row relative z-10">
               <div className="w-full md:w-64 bg-white/20 backdrop-blur-2xl border-r border-white/40 p-6 flex flex-col shrink-0 shadow-[4px_0_24px_rgba(0,0,0,0.05)]">
                  <div className="mb-8 hidden md:block"><h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-line-600 to-line-400 drop-shadow-md">Admin</h1></div>
                  <nav className="flex flex-row md:flex-col gap-2 overflow-x-auto pb-2 md:pb-0 custom-scrollbar">
                     {[{ id: 'users', icon: 'Users', label: 'ผู้เรียน' }, { id: 'live', icon: 'Radio', label: 'จัดการ Live' }, { id: 'content', icon: 'BookOpen', label: 'เนื้อหา' }, { id: 'data', icon: 'Database', label: 'ระบบ & คิว' }, { id: 'analytics', icon: 'Activity', label: 'Predictive' }].map(t => (
                         <button key={t.id} onClick={() => globalStore.setState({ adminTab: t.id })} className={`flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold text-sm shrink-0 border transition-all ${adminTab === t.id ? 'bg-white/80 text-line-800 border-white shadow-sm backdrop-blur-md' : 'border-transparent text-slate-700 hover:text-slate-900 hover:bg-white/40'}`}>
                             <SafeIcon name={t.icon} size={18} /> {t.label}
                         </button>
                     ))}
                  </nav>
                  <div className="mt-auto hidden md:block pt-8 border-t border-white/40">
                      <button onClick={() => { globalStore.setState({ currentScreen: 'welcome' }); actions.showMsg('ออกจากระบบผู้ดูแล'); }} className="flex items-center gap-2 text-sm font-bold text-slate-700 hover:text-slate-900 w-full justify-center bg-white/40 hover:bg-white/60 border border-white/60 rounded-xl py-3.5 shadow-sm transition-colors backdrop-blur-md">
                          <SafeIcon name="ArrowLeft" size={16} /> กลับหน้าหลัก
                      </button>
                  </div>
               </div>
               <div className="flex-1 p-4 md:p-8 overflow-y-auto custom-scrollbar">{renderTabContent()}</div>
            </div>
          );
        }

        // --- 7. MAIN APP INITIATOR ---
        function App() {
          const [store, setStore] = useGlobalState();

          useEffect(() => {
            if (db) {
               const loadData = async () => {
                  try {
                      onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_config', 'content'), (docSnap) => { 
                          if (docSnap.exists()) { 
                              const data = docSnap.data(); 
                              if (data.lessons) globalStore.setState({ lessons: data.lessons }); 
                              if (data.questionSets) globalStore.setState({ questionSets: data.questionSets }); 
                          } 
                      });
                      onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'elearning_config', 'settings'), (docSnap) => { 
                          if (docSnap.exists()) { 
                              const data = docSnap.data(); 
                              if (data.liveConfig) globalStore.setState({ liveConfig: data.liveConfig }); 
                              if (data.appsScriptUrl) globalStore.setState({ appsScriptUrl: data.appsScriptUrl }); 
                              if (data.certScriptUrl) globalStore.setState({ certScriptUrl: data.certScriptUrl }); 
                              if (data.lookerStudioUrl) globalStore.setState({ lookerStudioUrl: data.lookerStudioUrl }); 
                          } 
                      });
                  } catch (e) { console.warn("Firestore listeners error:", e); }
               };
               
               if (auth) {
                   onAuthStateChanged(auth, async (user) => {
                       if (user) { 
                           globalStore.setState({ fbUser: user, isAuthReady: true }); 
                           loadData(); 
                       } else { 
                           try { await signInAnonymously(auth); } catch (err) { globalStore.setState({ isAuthReady: true }); } 
                       }
                   });
               } else { globalStore.setState({ isAuthReady: true }); }
            } else { globalStore.setState({ isAuthReady: true }); }
            
            const handleHashChange = () => { 
                const hash = window.location.hash.replace('#', '') || 'landing'; 
                if (store.currentScreen !== hash) globalStore.setState({ currentScreen: hash }); 
            };
            window.addEventListener('hashchange', handleHashChange);
            return () => window.removeEventListener('hashchange', handleHashChange);
          }, []);

          useEffect(() => {
             const processQueue = async () => { 
                 const { syncQueue } = store; 
                 if (syncQueue.length === 0) return; 
                 const item = syncQueue[0]; 
                 try { 
                     const res = await actions.fetchAppsScript(item.payload); 
                     if (res?.status === 'success') globalStore.setState(p => ({ syncQueue: p.syncQueue.slice(1) })); 
                     else throw new Error("Sync failed"); 
                 } catch (e) { 
                     if (item.retries < 3) globalStore.setState(p => ({ syncQueue: [{ ...item, retries: item.retries + 1 }, ...p.syncQueue.slice(1)] })); 
                     else globalStore.setState(p => ({ syncQueue: p.syncQueue.slice(1) })); 
                 } 
             };
             const interval = setInterval(processQueue, 5000); 
             return () => clearInterval(interval);
          }, [store.syncQueue]);

          if (!store.isAuthReady) return (<div className="min-h-screen flex items-center justify-center"><div className="w-12 h-12 border-4 border-line-500 border-t-transparent rounded-full animate-spin shadow-[0_0_15px_rgba(0,185,0,0.5)]"></div></div>);

          const renderScreen = () => {
             switch (store.currentScreen) {
                 case 'landing': return <LandingScreen store={store} actions={actions} />;
                 case 'intro': return <IntroScreen store={store} actions={actions} />;
                 case 'welcome': return <WelcomeScreen store={store} actions={actions} />;
                 case 'auth_wizard': return <AuthWizard store={store} actions={actions} />;
                 case 'dashboard': return <StudentDashboard store={store} actions={actions} />;
                 case 'quiz': return <QuizScreen store={store} actions={actions} />;
                 case 'quiz_result': return <QuizResultScreen store={store} actions={actions} />;
                 case 'quiz_fail': return <QuizFailScreen store={store} actions={actions} />;
                 case 'cert_confirm': return <CertConfirmScreen store={store} actions={actions} />;
                 case 'profile_summary': return <ProfileSummaryScreen store={store} actions={actions} />;
                 case 'admin_login': return <AdminLoginScreen store={store} actions={actions} />;
                 case 'admin_dashboard': return <AdminDashboard store={store} actions={actions} />;
                 default: return <LandingScreen store={store} actions={actions} />;
             }
          };

          return (
            <div className="min-h-screen w-full font-sans text-slate-800 antialiased overflow-x-hidden relative">
               <GlobalBackground />
               <div className="relative z-10 w-full min-h-screen flex flex-col">{renderScreen()}</div>
               <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 ${store.uiMessage.visible ? 'translate-y-0 opacity-100' : '-translate-y-full opacity-0 pointer-events-none'}`}>
                   <div className={`flex items-center gap-3 px-6 py-3.5 rounded-full font-bold text-sm shadow-[0_10px_30px_rgba(0,0,0,0.15)] border backdrop-blur-xl ${store.uiMessage.type === 'error' ? 'bg-rose-100/90 text-rose-700 border-rose-300' : 'bg-emerald-100/90 text-emerald-800 border-emerald-300'}`}>
                       <SafeIcon name={store.uiMessage.type === 'error' ? "Info" : "CheckCircle"} size={18} />
                       <span className="drop-shadow-sm">{store.uiMessage.text}</span>
                   </div>
               </div>
               <GlobalAIChatbot store={store} />
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
