name: RJ Ailiverse QA Robot

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      # 🚨 God Mode: บังคับสร้างและติดตั้งระบบใหม่ทั้งหมดบน Cloud เพื่อตัดปัญหาไฟล์พัง
      - name: Bulletproof Install Dependencies
        run: |
          npm init -y
          npm install -D @playwright/test
          npm pkg set type="module" || true
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      # รันการทดสอบทั้งหมดในโฟลเดอร์ tests
      - name: Run RJ Ailiverse Flows
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
