name: RJ Ailiverse QA Robot

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      # 🚨 จุดที่แก้: เปลี่ยนจาก npm ci เป็น npm install 🚨
      - name: Install dependencies
        run: npm install
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: Run RJ Ailiverse Flows
        run: npx playwright test tests/rj-ailiverse-flows.spec.js
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
```
